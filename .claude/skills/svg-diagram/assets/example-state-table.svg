<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="760" height="420" fill="white"/>
<text x="20" y="28" font-family="monospace" font-size="16" fill="#1e40af" font-weight="bold">Online Softmax — 3-Iteration State Evolution</text>
<text x="20" y="50" font-family="monospace" font-size="12" fill="#64748b">Follow 1 Q token through K0V0, K1V1, K2V2.  Initial: m=-inf, l=0, O_acc=0</text>
<rect x="70" y="62" width="215" height="26" rx="3" fill="#3b82f6" stroke="#1e3a5f" stroke-width="1.5"/>
<text x="177.5" y="79" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">Iter 1 (K0,V0)</text>
<rect x="290" y="62" width="215" height="26" rx="3" fill="#3b82f6" stroke="#1e3a5f" stroke-width="1.5"/>
<text x="397.5" y="79" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">Iter 2 (K1,V1)</text>
<rect x="525" y="62" width="215" height="26" rx="3" fill="#3b82f6" stroke="#1e3a5f" stroke-width="1.5"/>
<text x="632.5" y="79" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">Iter 3 (K2,V2)</text>
<text x="55" y="109" text-anchor="end" font-family="monospace" font-size="14" fill="#374151" font-weight="bold">S</text>
<text x="55" y="157" text-anchor="end" font-family="monospace" font-size="14" fill="#374151" font-weight="bold">m</text>
<text x="55" y="222" text-anchor="end" font-family="monospace" font-size="14" fill="#374151" font-weight="bold">corr</text>
<text x="55" y="292" text-anchor="end" font-family="monospace" font-size="14" fill="#374151" font-weight="bold">l</text>
<text x="55" y="332" text-anchor="end" font-family="monospace" font-size="14" fill="#374151" font-weight="bold">O_acc</text>
<text x="177.5" y="109" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">S0 = [2.0, 1.0, 0.5, 3.0]</text>
<text x="397.5" y="109" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">S1 = [1.5, 4.0, 2.0, 1.0]</text>
<text x="632.5" y="109" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">S2 = [3.5, 2.0, 1.5, 0.5]</text>
<text x="177.5" y="157" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">-inf  -&gt;  3.0</text>
<text x="397.5" y="157" text-anchor="middle" font-family="monospace" font-size="13" fill="#b91c1c" font-weight="bold">3.0  -&gt;  4.0</text>
<text x="397.5" y="173" text-anchor="middle" font-family="monospace" font-size="11" fill="#b91c1c">max updated!</text>
<text x="632.5" y="157" text-anchor="middle" font-family="monospace" font-size="13" fill="#047857" font-weight="bold">4.0  -&gt;  4.0</text>
<text x="632.5" y="173" text-anchor="middle" font-family="monospace" font-size="11" fill="#047857">unchanged</text>
<rect x="78" y="195" width="199" height="48" rx="4" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
<text x="177.5" y="213" text-anchor="middle" font-family="monospace" font-size="12" fill="#047857" font-weight="bold">exp(m-m_new)</text>
<text x="177.5" y="228" text-anchor="middle" font-family="monospace" font-size="14" fill="#047857" font-weight="bold">= 0</text>
<rect x="298" y="195" width="199" height="62" rx="4" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
<text x="397.5" y="213" text-anchor="middle" font-family="monospace" font-size="12" fill="#b91c1c" font-weight="bold">exp(m-m_new)</text>
<text x="397.5" y="228" text-anchor="middle" font-family="monospace" font-size="12" fill="#b91c1c" font-weight="bold">= exp(3.0-4.0)</text>
<text x="397.5" y="243" text-anchor="middle" font-family="monospace" font-size="14" fill="#b91c1c" font-weight="bold">= 0.368  &amp;lt;- KEY!</text>
<rect x="533" y="195" width="199" height="48" rx="4" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
<text x="632.5" y="213" text-anchor="middle" font-family="monospace" font-size="12" fill="#047857" font-weight="bold">exp(m-m_new)</text>
<text x="632.5" y="228" text-anchor="middle" font-family="monospace" font-size="14" fill="#047857" font-weight="bold">= 1.0</text>
<text x="177.5" y="293" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">0  -&gt;  1.585</text>
<text x="397.5" y="293" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">1.585*0.368 + sum(P1)</text>
<text x="397.5" y="309" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">= 0.583 + 1.267</text>
<text x="397.5" y="323" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">= 1.850</text>
<text x="632.5" y="293" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">1.850*1.0 + sum(P2)</text>
<text x="632.5" y="309" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">= ...</text>
<text x="177.5" y="332" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">0  -&gt;  P0 @ V0</text>
<text x="397.5" y="332" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">0.368 x old + P1 @ V1</text>
<text x="632.5" y="332" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151">1.0 x old + P2 @ V2</text>
<line x1="289" y1="160" x2="286" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="287.5" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">carry state -&gt;</text>
<line x1="509" y1="160" x2="521" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="515.0" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">carry state -&gt;</text>
<rect x="20" y="375" width="720" height="34" rx="4" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
<text x="380.0" y="397" text-anchor="middle" font-family="monospace" font-size="14" fill="#047857" font-weight="bold">After 3 KV blocks:  O = O_acc / l = O_acc / 1.850    (one final normalization)</text>
</svg>