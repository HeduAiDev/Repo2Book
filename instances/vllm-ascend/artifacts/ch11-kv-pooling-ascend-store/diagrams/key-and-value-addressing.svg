<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<rect width="940" height="440" fill="white"/>
<text x="470.0" y="34" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0f172a" font-weight="bold">「搬哪个 chunk」与「在显存哪一段」分两路算，再汇入后端契约</text>
<rect x="40" y="80" width="180" height="56" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="130" y="104" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e40af" font-weight="bold">token 序列</text>
<text x="130" y="122" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#1d4ed8" font-weight="normal">+ prefix block_hashes</text>
<rect x="320" y="80" width="200" height="56" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="420" y="102" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e3a8a" font-weight="bold">process_tokens</text>
<text x="420" y="121" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#1d4ed8" font-weight="normal">按 chunk 切，逐块生成</text>
<rect x="620" y="74" width="280" height="68" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
<text x="760" y="96" text-anchor="middle" font-family="monospace" font-size="13" fill="#3730a3" font-weight="bold">PoolKey.to_string()</text>
<text x="760" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca" font-weight="normal">model@pcp@dcp@tp@pp@group</text>
<text x="760" y="130" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#4338ca" font-weight="normal">@cache_role@cache_family@chunk_hash</text>
<line x1="220" y1="108" x2="318" y2="108" stroke="#2563eb" stroke-width="2.4" marker-end="url(#a)"/>
<line x1="520" y1="108" x2="618" y2="108" stroke="#2563eb" stroke-width="2.4" marker-end="url(#a)"/>
<text x="130" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d4ed8" font-weight="bold">「搬哪个」= 名字</text>
<rect x="40" y="230" width="180" height="56" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="130" y="254" text-anchor="middle" font-family="monospace" font-size="13" fill="#15803d" font-weight="bold">block_id</text>
<text x="130" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#16a34a" font-weight="normal">（该 chunk 占的物理块）</text>
<rect x="320" y="226" width="200" height="64" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="420" y="248" text-anchor="middle" font-family="monospace" font-size="13" fill="#14532d" font-weight="bold">prepare_value</text>
<text x="420" y="266" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#15803d" font-weight="normal">base_addr + block_id×stride</text>
<text x="420" y="282" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#15803d" font-weight="normal">size = block_len/bs ×(end−start)</text>
<rect x="620" y="232" width="280" height="56" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
<text x="760" y="256" text-anchor="middle" font-family="monospace" font-size="13" fill="#065f46" font-weight="bold">(addr, size) 列表</text>
<text x="760" y="274" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#047857" font-weight="normal">每层 K/V 一段显存区间</text>
<line x1="220" y1="258" x2="318" y2="258" stroke="#16a34a" stroke-width="2.4" marker-end="url(#g)"/>
<line x1="520" y1="258" x2="618" y2="258" stroke="#16a34a" stroke-width="2.4" marker-end="url(#g)"/>
<text x="130" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d" font-weight="bold">「在哪」= 显存地址</text>
<rect x="330" y="350" width="280" height="60" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
<text x="470" y="376" text-anchor="middle" font-family="monospace" font-size="13" fill="#92400e" font-weight="bold">Backend.put(keys, addrs, sizes)</text>
<text x="470" y="396" text-anchor="middle" font-family="monospace" font-size="11.5" fill="#b45309" font-weight="normal">/ get(...) · exists(keys)</text>
<line x1="760" y1="142" x2="540" y2="348" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#b)"/>
<line x1="760" y1="288" x2="540" y2="352" stroke="#059669" stroke-width="2.2" marker-end="url(#g)"/>
<text x="700" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4f46e5" font-weight="bold">keys</text>
<text x="700" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#059669" font-weight="bold">addrs/sizes</text>
<rect x="40" y="350" width="250" height="60" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="165" y="374" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#b91c1c" font-weight="bold">put 前先 exists(keys) 去重</text>
<text x="165" y="393" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dc2626" font-weight="normal">池里已有的 chunk 跳过 → 只存一份</text>
<line x1="290" y1="380" x2="328" y2="380" stroke="#ef4444" stroke-width="2" marker-end="url(#a)"/>
</svg>