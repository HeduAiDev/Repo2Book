<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<rect width="980" height="560" fill="white"/>
<text x="490.0" y="36" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0f172a" font-weight="bold">两端解耦：调度进程「决定搬什么」，worker 进程后台线程「异步搬」</text>
<rect x="40" y="70" width="380" height="360" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<rect x="560" y="70" width="380" height="360" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
<text x="230.0" y="94" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1d4ed8" font-weight="bold">Scheduler 进程 · KVPoolScheduler</text>
<text x="230.0" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6" font-weight="normal">（无 KV、无后端连接）</text>
<text x="750.0" y="94" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#6d28d9" font-weight="bold">Worker 进程 · KVPoolWorker</text>
<text x="750.0" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed" font-weight="normal">（持有 m_store 后端 + 收/发后台线程）</text>
<rect x="70" y="134" width="320" height="46" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="230" y="153" text-anchor="middle" font-family="monospace" font-size="12.5" fill="#1e3a8a" font-weight="bold">get_num_new_matched_tokens</text>
<text x="230" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af" font-weight="normal">问池：本请求多少前缀已在池中</text>
<rect x="70" y="244" width="320" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="230" y="262" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e3a8a" font-weight="bold">建 LoadSpec → build_connector_meta</text>
<text x="230" y="279" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af" font-weight="normal">每拍打包 load/save 请求 = 一个节拍</text>
<rect x="590" y="134" width="320" height="44" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="750" y="152" text-anchor="middle" font-family="monospace" font-size="12" fill="#5b21b6" font-weight="bold">LookupKeyServer → lookup_scheduler</text>
<text x="750" y="169" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6d28d9" font-weight="normal">m_store.exists(keys) 查池命中前缀</text>
<rect x="590" y="226" width="320" height="44" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="750" y="244" text-anchor="middle" font-family="monospace" font-size="12" fill="#5b21b6" font-weight="bold">start_load_kv / wait_for_save</text>
<text x="750" y="261" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#6d28d9" font-weight="normal">add_request 入队即返回（主循环不阻塞）</text>
<rect x="590" y="296" width="320" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="750" y="316" text-anchor="middle" font-family="monospace" font-size="12.5" fill="#92400e" font-weight="bold">request_queue（解耦点）</text>
<text x="750" y="334" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#b45309" font-weight="normal">收/发线程 while True: get → _handle_request</text>
<text x="750" y="348" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#b45309" font-weight="normal">join() = 背压屏障，等 put 落地才放行</text>
<rect x="260" y="460" width="460" height="56" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
<text x="490" y="483" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#047857" font-weight="bold">External Pool · Backend 契约（MooncakeBackend）</text>
<text x="490" y="502" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#059669" font-weight="normal">exists / put / get → 内容寻址的共享 KV 池</text>
<line x1="390" y1="156" x2="588" y2="156" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#b)"/>
<text x="489.0" y="146" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed" font-weight="bold">② zmq REQ→REP lookup</text>
<line x1="588" y1="174" x2="390" y2="258" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#b)"/>
<text x="499.0" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed" font-weight="normal">④ 回命中长度</text>
<line x1="390" y1="280" x2="588" y2="248" stroke="#1d4ed8" stroke-width="2.4" marker-end="url(#a)"/>
<text x="489.0" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d4ed8" font-weight="bold">⑤ SchedulerOutput 携 metadata</text>
<line x1="750" y1="270" x2="750" y2="296" stroke="#d97706" stroke-width="2.2" marker-end="url(#a)"/>
<text x="810" y="286" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#b45309" font-weight="normal">⑥ 入队</text>
<line x1="750" y1="354" x2="600" y2="460" stroke="#0d9488" stroke-width="2.4" marker-end="url(#g)"/>
<text x="680" y="374" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0d9488" font-weight="bold">⑦ 后台线程 put / get</text>
<line x1="680" y1="178" x2="430" y2="460" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="4,4" marker-end="url(#g)"/>
<text x="570" y="444" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#0d9488" font-weight="normal">③ exists</text>
<text x="100" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d4ed8" font-weight="normal">① vLLM 调度调用</text>
<line x1="660" y1="516" x2="860" y2="354" stroke="#0d9488" stroke-width="1.6" stroke-dasharray="3,4" marker-end="url(#g)"/>
<text x="720" y="538" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0d9488" font-weight="normal">⑧ get_finished 回收 block</text>
</svg>