<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0d9488"/></marker></defs>
<rect width="980" height="500" fill="white"/>
<text x="490.0" y="34" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0f172a" font-weight="bold">两种省重算：P2P 直传（ch10） vs 经外存储池化复用（ch11）</text>
<rect x="30" y="60" width="440" height="300" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
<text x="250.0" y="86" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#b91c1c" font-weight="bold">ch10 · PD 分离 = 节点间 P2P 直传</text>
<rect x="80" y="130" width="150" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
<text x="155" y="156" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#991b1b" font-weight="bold">Prefill 实例</text>
<text x="155" y="175" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#b91c1c" font-weight="normal">算出 prompt 的 KV</text>
<rect x="270" y="130" width="150" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
<text x="345" y="156" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#991b1b" font-weight="bold">Decode 实例</text>
<text x="345" y="175" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#b91c1c" font-weight="normal">接着往下吐 token</text>
<line x1="230" y1="160" x2="268" y2="160" stroke="#dc2626" stroke-width="3" marker-end="url(#a)"/>
<text x="250.0" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#dc2626" font-weight="bold">KV 点对点直发，一次性</text>
<text x="250.0" y="250" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#7f1d1d" font-weight="normal">拓扑：点对点（prefill → decode）</text>
<text x="250.0" y="272" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#7f1d1d" font-weight="normal">节拍：随传随用，传完即弃</text>
<text x="250.0" y="294" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#7f1d1d" font-weight="normal">复用面：单次（这一对实例）</text>
<text x="250.0" y="330" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#7f1d1d" font-weight="normal">寻址：拓扑路由（谁发给谁）</text>
<rect x="510" y="60" width="440" height="300" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<text x="730.0" y="86" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1d4ed8" font-weight="bold">ch11 · KV 池化 = 经外存储中转复用</text>
<rect x="660" y="150" width="140" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="730" y="176" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e3a8a" font-weight="bold">共享 KV 池</text>
<text x="730" y="196" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#1d4ed8" font-weight="normal">by chunk_hash</text>
<rect x="530" y="118" width="100" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="580" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af" font-weight="bold">Req A</text>
<rect x="530" y="200" width="100" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="580" y="224" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af" font-weight="bold">Req B</text>
<rect x="830" y="118" width="100" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="880" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af" font-weight="bold">Req C</text>
<rect x="830" y="200" width="100" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="880" y="224" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af" font-weight="bold">另一实例</text>
<line x1="630" y1="138" x2="658" y2="168" stroke="#2563eb" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="630" y1="220" x2="658" y2="196" stroke="#2563eb" stroke-width="2.2" marker-end="url(#a)"/>
<text x="640" y="250" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#1d4ed8" font-weight="normal">put（存）</text>
<line x1="800" y1="178" x2="828" y2="142" stroke="#0d9488" stroke-width="2.2" marker-end="url(#g)"/>
<line x1="800" y1="192" x2="828" y2="222" stroke="#0d9488" stroke-width="2.2" marker-end="url(#g)"/>
<text x="810" y="252" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#0d9488" font-weight="normal">get（按 key 捞）</text>
<text x="730.0" y="294" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1e3a5f" font-weight="normal">拓扑：星型经池 · 节拍：存后异步复用</text>
<text x="730.0" y="316" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1e3a5f" font-weight="normal">复用面：跨请求 / 跨实例 · 寻址：内容哈希</text>
<text x="730.0" y="338" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1e3a5f" font-weight="normal">存前 lookup 去重 → 同前缀只存一份</text>
<rect x="30" y="392" width="920" height="78" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
<text x="490.0" y="416" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="bold">同样是「不重算已知前缀」，但一个靠拓扑直传、一个靠内容寻址的共享存储。</text>
<text x="490.0" y="440" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#475569" font-weight="normal">直传省一次跨节点的搬运；池化把 KV 攒成可被任何后来请求命中的共享资产——</text>
<text x="490.0" y="460" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#475569" font-weight="normal">key 由 prompt 前缀内容哈希决定，所以相同前缀跨请求、跨实例都能复用。</text>
</svg>