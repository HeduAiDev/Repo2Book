<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 970" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1180" height="970" fill="white"/>
<text x="590.0" y="42" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">走通一条全链：W8A8_DYNAMIC linear 层</text>
<text x="590.0" y="70" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">导入期填两张表 → 加载期读 json → 建层期选 scheme → 前向跑 NPU 量化算子</text>
<rect x="230.0" y="108" width="720" height="138" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
<text x="252.0" y="140" font-size="16" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">导入期 · 两张表就位</text>
<text x="260.0" y="170" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">@register_quantization_config('ascend') → AscendModelSlimConfig 进 vLLM 量化注册表</text>
<text x="260.0" y="196" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">@register_scheme('W8A8_DYNAMIC','linear') → (键)→AscendW8A8DynamicLinearMethod 进 _SCHEME_REGISTRY</text>
<line x1="590.0" y1="246" x2="590.0" y2="272" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="230.0" y="272" width="720" height="138" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="252.0" y="304" font-size="16" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">加载期 · 读逐层量化描述</text>
<text x="260.0" y="334" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">读模型目录 quant_model_description.json → 填 quant_description</text>
<text x="260.0" y="360" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">quant_description['…down_proj.weight'] == 'W8A8_DYNAMIC'（逐层一条）</text>
<line x1="590.0" y1="410" x2="590.0" y2="436" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="230.0" y="436" width="720" height="138" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="252.0" y="468" font-size="16" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">建层期 · 分发 + 选 scheme</text>
<text x="260.0" y="498" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">get_quant_method(layer, prefix): isinstance → 'linear'</text>
<text x="260.0" y="524" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">get_linear_quant_type → 'W8A8_DYNAMIC'；get_scheme_class 查表实例化 scheme</text>
<text x="260.0" y="550" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">AscendLinearMethod(scheme) ← wrapper 持有 scheme</text>
<line x1="590.0" y1="574" x2="590.0" y2="600" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="230.0" y="600" width="720" height="138" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
<text x="252.0" y="632" font-size="16" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">建权重 · scheme 决定形状</text>
<text x="260.0" y="662" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">scheme.get_weight → weight: int8 [out, in]</text>
<text x="260.0" y="688" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">scheme.get_perchannel_param → weight_scale/offset: [out, 1]（每输出通道一个）</text>
<text x="260.0" y="714" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">wrapper 逐个 register_parameter；process_weights_after_loading：transpose + 转 NZ 排布</text>
<line x1="590.0" y1="738" x2="590.0" y2="764" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="230.0" y="764" width="720" height="138" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="252.0" y="796" font-size="16" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">前向 apply · NPU 硬特化算子</text>
<text x="260.0" y="826" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">x → npu_dynamic_quant(x) → (int8 quantized_x, pertoken_scale 每 token 一个)</text>
<text x="260.0" y="852" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">npu_quant_matmul(quantized_x, weight, weight_scale, pertoken_scale, output_dtype=x.dtype)</text>
<text x="260.0" y="878" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">out = (Wq · xq) ⊙ weight_scale ⊙ pertoken_scale，融合反量化，回到 x.dtype</text>
<text x="590.0" y="932" font-size="13" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">npu_dynamic_quant / npu_quant_matmul 由 torch_npu 提供，真实量化 GEMM 需 NPU/CANN，host 不真跑</text>
</svg>