<text x="930" y="472" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">• W4A8 用 weight_scale_second [out, in//g]</text>
<text x="930" y="500" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">• MXFP 极端：每组 1 个 e8m0 共享指数</text>
<text x="930" y="528" font-size="12" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">• = microscaling 微缩放，护精度最强</text>
<line x1="90" y1="590" x2="1206" y2="590" stroke="#94a3b8" stroke-width="2"/>
<text x="90" y="612" font-size="13" text-anchor="start" fill="#64748b" font-weight="normal" font-family="sans-serif">粗 / 省显存</text>
<text x="1206" y="612" font-size="13" text-anchor="end" fill="#64748b" font-weight="normal" font-family="sans-serif">细 / 护精度</text>
<text x="660.0" y="612" font-size="12.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">粒度越细，scale 越多、显存略增，但量化误差越小</text>
