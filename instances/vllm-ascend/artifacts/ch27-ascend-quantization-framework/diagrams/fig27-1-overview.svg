<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 880" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arb" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
<rect width="1380" height="880" fill="white"/>
<text x="690.0" y="42" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">把昇腾量化整套接进 vLLM：不改 vLLM 量化框架一行</text>
<text x="690.0" y="70" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">三入口注册 → 一张 (quant_type, layer_type) 注册表 → 三个适配 vLLM 基类的 wrapper</text>
<text x="230" y="118" font-size="16" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">① 三入口：注册 Config</text>
<rect x="40" y="140" width="380" height="58" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="56" y="166" font-size="14.5" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="monospace">AscendModelSlimConfig</text>
<text x="56" y="187" font-size="11.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">@register_quantization_config('ascend')</text>
<rect x="40" y="212" width="380" height="58" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
<text x="56" y="238" font-size="14.5" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="monospace">AscendCompressedTensorsConfig</text>
<text x="56" y="259" font-size="11.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">先删 vLLM 原版 → 同名注册顶替</text>
<rect x="40" y="284" width="380" height="58" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
<text x="56" y="310" font-size="14.5" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="monospace">AscendFp8Config</text>
<text x="56" y="331" font-size="11.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">先删 fp8/deepseek_v4_fp8 → 顶替</text>
<rect x="70" y="372" width="320" height="60" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
<text x="230" y="397" font-size="14" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">vLLM 量化注册表</text>
<text x="230" y="418" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">QUANTIZATION_METHODS（已注册方法名列表）</text>
<line x1="230" y1="198" x2="230" y2="372" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
<line x1="230" y1="270" x2="230" y2="372" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
<line x1="230" y1="342" x2="230" y2="372" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
<text x="690.0" y="118" font-size="16" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">② 按层分发：get_quant_method(layer, prefix)</text>
<rect x="500" y="140" width="380" height="230" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.8"/>
<text x="690" y="168" font-size="14" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">isinstance(layer, ...) 四岔</text>
<text x="520" y="200" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="monospace">• LinearBase            → 'linear'</text>
<text x="520" y="230" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="monospace">• AttentionLayerBase    → 'attention'</text>
<text x="520" y="260" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="monospace">• FusedMoE              → 'moe'  (ch26)</text>
<text x="520" y="290" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="monospace">• VocabParallelEmbedding→ 'linear'</text>
<text x="520" y="320" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="monospace">• FLOAT 层 → 未量化方法（跳过）</text>
<text x="690" y="358" font-size="12.5" text-anchor="middle" fill="#334155" font-weight="normal" font-family="monospace">→ create_scheme_for_layer(...)</text>
<rect x="500" y="410" width="380" height="150" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="690" y="438" font-size="14" text-anchor="middle" fill="#5b21b6" font-weight="bold" font-family="sans-serif">③ scheme 注册表 _SCHEME_REGISTRY</text>
<text x="690" y="462" font-size="11.5" text-anchor="middle" fill="#6d28d9" font-weight="normal" font-family="monospace">dict[(quant_type, layer_type)] → SchemeClass</text>
<text x="516" y="488" font-size="10" text-anchor="start" fill="#5b21b6" font-weight="normal" font-family="monospace">('W8A8_DYNAMIC','linear') → AscendW8A8DynamicLinearMethod</text>
<text x="516" y="506" font-size="10" text-anchor="start" fill="#5b21b6" font-weight="normal" font-family="monospace">('W8A8_DYNAMIC','moe')    → AscendW8A8DynamicFusedMoEMethod</text>
<text x="516" y="524" font-size="10" text-anchor="start" fill="#5b21b6" font-weight="normal" font-family="monospace">('W4A8_DYNAMIC','linear') → AscendW4A8DynamicLinearMethod</text>
<text x="516" y="542" font-size="10" text-anchor="start" fill="#5b21b6" font-weight="normal" font-family="monospace">… @register_scheme 装饰器逐项落表 …</text>
<line x1="690" y1="370" x2="690" y2="410" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arb)"/>
<text x="690" y="588" font-size="11.5" text-anchor="middle" fill="#5b21b6" font-weight="normal" font-family="monospace">get_scheme_class(quant_type, layer_type) 查表 → 实例化 scheme</text>
<text x="1150" y="118" font-size="16" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">④ 三个 wrapper（持 scheme）</text>
<rect x="960" y="150" width="380" height="110" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
<text x="980" y="180" font-size="15" text-anchor="start" fill="#0e7490" font-weight="bold" font-family="monospace">AscendLinearMethod</text>
<text x="980" y="204" font-size="12.5" text-anchor="start" fill="#0891b2" font-weight="normal" font-family="monospace">(LinearMethodBase)</text>
<text x="980" y="230" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">linear / embedding 层</text>
<text x="980" y="250" font-size="11" text-anchor="start" fill="#64748b" font-weight="normal" font-family="monospace">create_weights / apply → 全转交 scheme</text>
<line x1="880" y1="205" x2="960" y2="205" stroke="#06b6d4" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="960" y="300" width="380" height="110" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
<text x="980" y="330" font-size="15" text-anchor="start" fill="#0e7490" font-weight="bold" font-family="monospace">AscendKVCacheMethod</text>
<text x="980" y="354" font-size="12.5" text-anchor="start" fill="#0891b2" font-weight="normal" font-family="monospace">(BaseKVCacheMethod)</text>
<text x="980" y="380" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">attention / KV cache 量化</text>
<text x="980" y="400" font-size="11" text-anchor="start" fill="#64748b" font-weight="normal" font-family="monospace">create_weights / apply → 全转交 scheme</text>
<line x1="880" y1="355" x2="960" y2="355" stroke="#06b6d4" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="960" y="450" width="380" height="110" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
<text x="980" y="480" font-size="15" text-anchor="start" fill="#0e7490" font-weight="bold" font-family="monospace">AscendFusedMoEMethod</text>
<text x="980" y="504" font-size="12.5" text-anchor="start" fill="#0891b2" font-weight="normal" font-family="monospace">(FusedMoEMethodBase)</text>
<text x="980" y="530" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">量化版 MoE ← ch26 FusedMoE</text>
<text x="980" y="550" font-size="11" text-anchor="start" fill="#64748b" font-weight="normal" font-family="monospace">create_weights / apply → 全转交 scheme</text>
<line x1="880" y1="505" x2="960" y2="505" stroke="#06b6d4" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="690" y="658" font-size="12.5" text-anchor="middle" fill="#334155" font-weight="normal" font-family="sans-serif">scheme 包进对应 wrapper，作为该层 quant_method 返回 vLLM</text>
<line x1="690" y1="600" x2="690" y2="632" stroke="#06b6d4" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="70" y="700" width="1240" height="140" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" stroke-dasharray="6 5"/>
<text x="690" y="728" font-size="15" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">一张表 + 三个 wrapper：换一种量化方案只是给注册表加一行装饰器，分发与适配代码零改动</text>
<text x="96" y="760" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 入口①直接继承 vLLM 基类 QuantizationConfig；入口②③名字被 vLLM 内置占用，故「先删原版、再同名顶替」。</text>
<text x="96" y="786" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 适配器只搬运：create_weights 按 scheme 给的形状逐个 register_parameter；apply 把前向原样转交 scheme.apply。</text>
<text x="96" y="812" font-size="12.5" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• scheme 才决定一切：W8A8 int8+per-channel、W4A8 4bit+per-group、MXFP e8m0 微缩放——真实量化算子走 torch_npu（NPU/CANN）。</text>
</svg>