<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 640" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="arR" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="1480" height="640" fill="white"/>
<text x="740.0" y="40" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">一处注册，全模型算子被批量顶替</text>
<text x="740.0" y="70" font-size="15" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">register_ascend_customop 建一张表 → 基座 __new__/dispatch_forward 顺势换身换头</text>
<rect x="40" y="130" width="300" height="360" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
<text x="190.0" y="164" font-size="18" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">模型定义</text>
<text x="190.0" y="188" font-size="13" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">（不知昇腾存在）</text>
<text x="64" y="216" font-size="14" text-anchor="start" fill="#1e293b" font-weight="normal" font-family="monospace">self.norm = RMSNorm(</text>
<text x="64" y="242" font-size="14" text-anchor="start" fill="#1e293b" font-weight="normal" font-family="monospace">        hidden_size, eps)</text>
<text x="64" y="268" font-size="14" text-anchor="start" fill="#1e293b" font-weight="normal" font-family="monospace">self.act = SiluAndMul()</text>
<text x="190.0" y="420" font-size="13" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">vLLM 主干源码</text>
<text x="190.0" y="444" font-size="15" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">一行都不改</text>
<text x="190.0" y="468" font-size="12" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">（OOT：out-of-tree 插件）</text>
<rect x="430" y="110" width="470" height="460" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="665.0" y="142" font-size="17" text-anchor="middle" fill="#1d4ed8" font-weight="bold" font-family="sans-serif">启动期：register_ascend_customop()</text>
<text x="665.0" y="164" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">worker 初始化时唯一一次调用</text>
<text x="460" y="186" font-size="14" text-anchor="start" fill="#1e293b" font-weight="bold" font-family="monospace">REGISTERED_ASCEND_OPS</text>
<rect x="460" y="202" width="410" height="158" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.6"/>
<text x="474" y="226" font-size="13" text-anchor="start" fill="#0369a1" font-weight="normal" font-family="monospace">"QuickGELU"</text>
<text x="660" y="226" font-size="14" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">→</text>
<text x="680" y="226" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">AscendQuickGELU</text>
<text x="474" y="256" font-size="13" text-anchor="start" fill="#0369a1" font-weight="normal" font-family="monospace">"SiluAndMul"</text>
<text x="660" y="256" font-size="14" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">→</text>
<text x="680" y="256" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">AscendSiluAndMul</text>
<text x="474" y="286" font-size="13" text-anchor="start" fill="#0369a1" font-weight="normal" font-family="monospace">"RMSNorm"</text>
<text x="660" y="286" font-size="14" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">→</text>
<text x="680" y="286" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">AscendRMSNorm</text>
<text x="474" y="316" font-size="13" text-anchor="start" fill="#0369a1" font-weight="normal" font-family="monospace">"FusedMoE"</text>
<text x="660" y="316" font-size="14" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">→</text>
<text x="680" y="316" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">AscendFusedMoE</text>
<text x="474" y="346" font-size="13" text-anchor="start" fill="#0369a1" font-weight="normal" font-family="monospace">… 其余 23 项（共 27）</text>
<text x="660" y="346" font-size="14" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">→</text>
<text x="680" y="346" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">Ascend*</text>
<text x="665.0" y="392" font-size="13" text-anchor="middle" fill="#334155" font-weight="normal" font-family="monospace">for name, op_cls in 表.items():</text>
<text x="665.0" y="414" font-size="13" text-anchor="middle" fill="#334155" font-weight="normal" font-family="monospace">CustomOp.register_oot(op_cls, name)</text>
<line x1="665.0" y1="426" x2="665.0" y2="454" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<rect x="500" y="458" width="330" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
<text x="665.0" y="484" font-size="15" text-anchor="middle" fill="#1d4ed8" font-weight="bold" font-family="monospace">op_registry_oot</text>
<text x="665.0" y="504" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal" font-family="monospace">{ 'RMSNorm': AscendRMSNorm, … }</text>
<rect x="980" y="130" width="460" height="360" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.6"/>
<text x="1210.0" y="162" font-size="16" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">构造期：执行到 RMSNorm(...)</text>
<rect x="1004" y="190" width="412" height="96" rx="8" fill="white" stroke="#f87171" stroke-width="1.6"/>
<text x="1024" y="216" font-size="13" text-anchor="start" fill="#1e293b" font-weight="normal" font-family="monospace">__new__ 查 op_registry_oot 命中</text>
<text x="1024" y="238" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">super().__new__(AscendRMSNorm)</text>
<text x="1024" y="266" font-size="14" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">换身：真正造出的是昇腾子类实例</text>
<rect x="1004" y="310" width="412" height="96" rx="8" fill="white" stroke="#f87171" stroke-width="1.6"/>
<text x="1024" y="336" font-size="13" text-anchor="start" fill="#1e293b" font-weight="normal" font-family="monospace">__init__ → dispatch_forward()</text>
<text x="1024" y="358" font-size="13" text-anchor="start" fill="#be123c" font-weight="normal" font-family="monospace">_forward_method = forward_oot</text>
<text x="1024" y="386" font-size="14" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">换头：forward 绑到 NPU 实现</text>
<line x1="340" y1="310.0" x2="430" y2="340.0" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="385.0" y="298.0" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">继承自</text>
<text x="385.0" y="316.0" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">基座</text>
<line x1="900" y1="340.0" x2="980" y2="310.0" stroke="#b91c1c" stroke-width="2" marker-end="url(#arR)"/>
<text x="940.0" y="330.0" font-size="12" text-anchor="middle" fill="#b91c1c" font-weight="normal" font-family="sans-serif">查表</text>
</svg>