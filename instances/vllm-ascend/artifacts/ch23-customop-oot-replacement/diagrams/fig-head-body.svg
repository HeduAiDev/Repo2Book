<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="1280" height="700" fill="white"/>
<text x="640.0" y="42" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">换头不换身：同一个算子，只替 forward 实现</text>
<text x="640.0" y="72" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">以 SiluAndMul 为例 —— 身（接口/权重/注册位置）继承自基座，头（forward）从 CUDA 换成 NPU</text>
<rect x="120.0" y="110" width="480" height="470" rx="14" fill="white" stroke="#475569" stroke-width="2"/>
<text x="360.0" y="142" font-size="17" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">基座 SiluAndMul（CUDA）</text>
<rect x="150.0" y="166" width="420" height="150" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="166.0" y="194" font-size="15" text-anchor="start" fill="#475569" font-weight="bold" font-family="sans-serif">头 · forward 实现</text>
<text x="166.0" y="226" font-size="13" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">forward_cuda(self, x):</text>
<text x="166.0" y="252" font-size="13" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">    self.op(out, x)</text>
<text x="166.0" y="278" font-size="13" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">    # torch.ops._C.silu_and_mul</text>
<rect x="150.0" y="340" width="420" height="210" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
<text x="166.0" y="368" font-size="15" text-anchor="start" fill="#64748b" font-weight="bold" font-family="sans-serif">身 · 继承自基座，一行不改</text>
<text x="166.0" y="398" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• class : 接口/签名 forward(x)</text>
<text x="166.0" y="432" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• __init__ / 权重 / 形状约定</text>
<text x="166.0" y="466" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 注册键 name（写进 op_registry_oot）</text>
<text x="166.0" y="500" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• forward_native（PyTorch 原生对照）</text>
<rect x="680.0" y="110" width="480" height="470" rx="14" fill="white" stroke="#b91c1c" stroke-width="2"/>
<text x="920.0" y="142" font-size="17" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">AscendSiluAndMul（NPU）</text>
<rect x="710.0" y="166" width="420" height="150" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="726.0" y="194" font-size="15" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">头 · forward 实现</text>
<text x="726.0" y="226" font-size="13" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">forward_oot(self, x):</text>
<text x="726.0" y="252" font-size="13" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">    out = torch_npu.npu_swiglu(x)</text>
<text x="726.0" y="278" font-size="13" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">    return out</text>
<rect x="710.0" y="340" width="420" height="210" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
<text x="726.0" y="368" font-size="15" text-anchor="start" fill="#64748b" font-weight="bold" font-family="sans-serif">身 · 继承自基座，一行不改</text>
<text x="726.0" y="398" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• class : 接口/签名 forward(x)</text>
<text x="726.0" y="432" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• __init__ / 权重 / 形状约定</text>
<text x="726.0" y="466" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 注册键 name（写进 op_registry_oot）</text>
<text x="726.0" y="500" font-size="13" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• forward_native（PyTorch 原生对照）</text>
<line x1="600.0" y1="241" x2="680.0" y2="241" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="640.0" y="227" font-size="15" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">换头</text>
<text x="640.0" y="263" font-size="12" text-anchor="middle" fill="#b91c1c" font-weight="normal" font-family="sans-serif">覆写</text>
<line x1="600.0" y1="445" x2="680.0" y2="445" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/>
<text x="640.0" y="433" font-size="14" text-anchor="middle" fill="#64748b" font-weight="bold" font-family="sans-serif">身不变</text>
<text x="640.0" y="467" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">= 继承</text>
</svg>