<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 740" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1320" height="740" fill="white"/>
<text x="660.0" y="38" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">两层正交二分：各判一次，互不干扰</text>
<text x="60" y="84" font-size="16" text-anchor="start" fill="#1d4ed8" font-weight="bold" font-family="sans-serif">第一层 · dispatch_forward（构造期，选 forward 后端）</text>
<rect x="540" y="100" width="240" height="64" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="660.0" y="128" font-size="16" text-anchor="middle" fill="#1d4ed8" font-weight="bold" font-family="monospace">enabled()?</text>
<text x="660.0" y="150" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">算子启用了吗</text>
<rect x="200" y="220" width="300" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
<text x="350.0" y="250" font-size="14" text-anchor="middle" fill="#334155" font-weight="bold" font-family="monospace">forward_native（compiled）</text>
<text x="350.0" y="274" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">基座 PyTorch 原生实现 · 不顶替</text>
<line x1="580" y1="164" x2="350.0" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="435.0" y="200" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">否</text>
<rect x="820" y="220" width="320" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2.2"/>
<text x="980.0" y="250" font-size="14" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="monospace">forward_oot（昇腾覆写）</text>
<text x="980.0" y="274" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">enabled 且 is_out_of_tree() == True</text>
<line x1="740" y1="164" x2="980.0" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="900.0" y="200" font-size="14" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">是 + 昇腾平台</text>
<line x1="60" y1="350" x2="1260" y2="350" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 5"/>
<text x="660.0" y="374" font-size="13" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="sans-serif">—— 走进 forward_oot 后，AscendRMSNorm 内部还有第二层判定 ——</text>
<text x="60" y="416" font-size="16" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">第二层 · enable_custom_op()（forward_oot 内，选具体 kernel）</text>
<rect x="540" y="432" width="240" height="64" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.6"/>
<text x="660.0" y="460" font-size="15" text-anchor="middle" fill="#c2410c" font-weight="bold" font-family="monospace">enable_custom_op()?</text>
<text x="660.0" y="482" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">编译产物 vllm_ascend_C 在位吗</text>
<rect x="160" y="560" width="420" height="120" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.2"/>
<text x="370.0" y="590" font-size="13" text-anchor="middle" fill="#047857" font-weight="bold" font-family="monospace">torch.ops._C_ascend.npu_add_rms_norm_bias</text>
<text x="370.0" y="616" font-size="14" text-anchor="middle" fill="#065f46" font-weight="bold" font-family="sans-serif">一颗 AscendC 融合 kernel</text>
<text x="370.0" y="640" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">add + rms_norm + bias 编进同一 kernel</text>
<text x="370.0" y="660" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">中间量留片上，HBM 只读写一次</text>
<line x1="580" y1="496" x2="370.0" y2="560" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="455.0" y="540" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">真 → 有库</text>
<rect x="760" y="560" width="460" height="120" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
<text x="990.0" y="590" font-size="13" text-anchor="middle" fill="#475569" font-weight="bold" font-family="monospace">torch_npu.npu_add_rms_norm + x.add_(bias)</text>
<text x="990.0" y="616" font-size="14" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">多颗 torch_npu 原子算子拼</text>
<text x="990.0" y="640" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">每颗 kernel 各读写一遍 HBM</text>
<text x="990.0" y="660" font-size="12" text-anchor="middle" fill="#b45309" font-weight="normal" font-family="sans-serif">结果正确，但访存更多 → 更慢</text>
<line x1="740" y1="496" x2="990.0" y2="560" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="895.0" y="540" font-size="14" text-anchor="middle" fill="#b45309" font-weight="bold" font-family="sans-serif">假 → 回退</text>
</svg>