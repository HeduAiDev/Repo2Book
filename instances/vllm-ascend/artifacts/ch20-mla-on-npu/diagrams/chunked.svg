<text x="720" y="269.08" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e293b">在线 softmax：按 lse_max 数值稳定加权</text>
<line x1="720" y1="292" x2="720" y2="332" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#ar)"/>
<rect x="600.0" y="332" width="240" height="48" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="720" y="360.93" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#7c3aed">output_final (T,H,D)</text>
<rect x="700" y="440" width="540" height="120" rx="10" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.4"/>
<text x="970" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">在线 softmax 合并（数值稳定）</text>
<text x="970" y="500" text-anchor="middle" font-size="15" fill="#1e293b">out = Σᵢ exp(lseᵢ − lse_max)·outᵢ ⁄ Σᵢ exp(lseᵢ − lse_max)</text>
<text x="970" y="528" text-anchor="middle" font-size="13" fill="#64748b">lse_max = maxᵢ lseᵢ；先减最大值再取指数，避免溢出</text>
<text x="230" y="560" text-anchor="middle" font-size="13" fill="#64748b">分块保证每块 workspace 有界：</text>
<text x="230" y="584" text-anchor="middle" font-size="12.5" fill="#64748b">max_context_chunk = workspace ⁄ 带历史的 prefill 数</text>
<text x="230" y="606" text-anchor="middle" font-size="12.5" fill="#64748b">→ round_down 到 block_size；num_chunks = cdiv(max_ctx, chunk)</text>
</svg>