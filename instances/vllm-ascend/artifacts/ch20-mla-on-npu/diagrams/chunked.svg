<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 660" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/></marker></defs>
<rect width="1280" height="660" fill="white"/>
<text x="640.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">chunked-context：分块算历史注意力，再用 LSE 在线 softmax 合并</text>
<text x="640.0" y="68" text-anchor="middle" font-size="14" fill="#64748b">长 context 切 num_chunks 块（每块 workspace 有界）→ 各出 (out, lse) → npu_attention_update 一把合并（等价基座 merge_attn_states）</text>
