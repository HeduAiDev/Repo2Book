<text x="470" y="394.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#b45309">kv_b_proj 解压 → k_nope,v</text>
<text x="470" y="410.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">FIA → (out_i, lse_i)</text>
