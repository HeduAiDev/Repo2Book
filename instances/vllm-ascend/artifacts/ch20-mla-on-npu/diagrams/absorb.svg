<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 660" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/></marker></defs>
<rect width="1240" height="660" fill="white"/>
<text x="620.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">权重吸收：把解码期对 KV 的解压，移到 query 侧并预先合并</text>
<text x="620.0" y="68" text-anchor="middle" font-size="14.5" fill="#64748b">KV cache 只存隐向量 kv_c（512 维）+ 解耦位置 k_pe（64 维）—— 约为满维 K/V 的 1/57</text>
<line x1="620.0" y1="92" x2="620.0" y2="614" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5 5"/>
<text x="310" y="116" text-anchor="middle" font-size="17" font-weight="bold" fill="#b91c1c">朴素 MHA 解码 · 每步都解压</text>
<text x="930" y="116" text-anchor="middle" font-size="17" font-weight="bold" fill="#15803d">吸收后 · 解码不碰满维 K/V</text>
<rect x="185.0" y="140" width="250" height="46" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.6"/>
<text x="310" y="167.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">缓存 kv_c (B,Lkv=512)</text>
<line x1="310" y1="186" x2="310" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="322.0" y="204.0" font-size="12.5" fill="#475569">W_UK 解压</text>
<rect x="185.0" y="214" width="250" height="46" rx="9" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.6"/>
<text x="310" y="241.59" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#b91c1c">k_nope (B,N,P=128)  每步重算</text>
<line x1="310" y1="260" x2="310" y2="288" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="322.0" y="278.0" font-size="12.5" fill="#475569">W_UV 解压</text>
<rect x="185.0" y="288" width="250" height="46" rx="9" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.6"/>
<text x="310" y="315.59" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#b91c1c">value (B,N,V=128)  每步重算</text>
<line x1="310" y1="334" x2="310" y2="366" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<rect x="180.0" y="366" width="260" height="70" rx="9" fill="#fff1f2" stroke="#b91c1c" stroke-width="1.6"/>
<text x="310" y="396.6" text-anchor="middle" font-size="15" font-weight="bold" fill="#b91c1c">MHA(q, k_nope, value)</text>
<text x="310" y="413.5" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1e293b">满维 K/V，N 头各一份</text>
<text x="310" y="472" text-anchor="middle" font-size="13.5" fill="#b91c1c">代价：每个缓存 token 每步都解压 → 算力 + 带宽双费</text>
<rect x="805.0" y="140" width="250" height="46" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.6"/>
<text x="930" y="167.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">缓存 kv_c (B,Lkv=512)</text>
<rect x="680.0" y="214" width="200" height="46" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.6"/>
<text x="780" y="241.59" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#15803d">q_nope (B,N,P=128)</text>
<line x1="780" y1="260" x2="780" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="792.0" y="284.0" font-size="12.5" fill="#475569">bmm(·, W_UK_T)</text>
<rect x="680.0" y="300" width="200" height="50" rx="9" fill="#dcfce7" stroke="#15803d" stroke-width="1.6"/>
<text x="780" y="320.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">ql_nope (B,N,Lkv)</text>
<text x="780" y="337.08" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">已投进 latent 空间</text>
<line x1="880" y1="325" x2="990" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<line x1="930" y1="186" x2="930" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="942.0" y="287.0" font-size="12.5" fill="#475569">K=V=kv_c</text>
<rect x="795.0" y="380" width="270" height="70" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.6"/>
<text x="930" y="410.6" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">MQA(ql_nope, kv_c, kv_c)</text>
<text x="930" y="427.08" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">只对 512 维隐向量做注意力</text>
<line x1="930" y1="450" x2="930" y2="486" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="942.0" y="472.0" font-size="12.5" fill="#475569">_v_up_proj · W_UV</text>
<rect x="805.0" y="486" width="250" height="44" rx="9" fill="#dcfce7" stroke="#15803d" stroke-width="1.6"/>
<text x="930" y="512.59" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#15803d">输出投回 V (B,N,V)</text>
<text x="930" y="560" text-anchor="middle" font-size="13.5" fill="#15803d">数学等价：(q·Wᵤₖᵀ)·kv_c = q·(Wᵤₖᵀ·kv_c) = q·k_nope，但把 Wᵤₖ 吸进 query 侧</text>
<text x="620.0" y="642" text-anchor="middle" font-size="13" fill="#64748b">加载期 process_weights_after_loading 拆出 W_UK/W_UV、permute 成 W_UK_T；运行期 _q_proj_and_k_up_proj 一次 bmm 完成吸收</text>
</svg>