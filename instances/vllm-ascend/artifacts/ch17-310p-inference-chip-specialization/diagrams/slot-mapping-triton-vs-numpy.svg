<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 740">
<defs><marker id="ab" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#2563eb"/></marker><marker id="ag" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#059669"/></marker></defs>
<rect width="1160" height="740" fill="white"/>
<text x="580.0" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1e293b" font-weight="bold">同一个 slot 公式，两条执行路径</text>
<text x="580.0" y="68" font-family="monospace" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal">slot = block_number × block_size + (position mod block_size)</text>
<rect x="40" y="100" width="500" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
<text x="290.0" y="124" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#2563eb" font-weight="bold">基座路径（910B / 主栈）</text>
<text x="290.0" y="144" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">vllm_ascend/worker/block_table.py</text>
<rect x="40" y="200" width="500" height="70" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="62" y="227" font-family="sans-serif" font-size="13" text-anchor="start" fill="#2563eb" font-weight="bold">输入在 NPU 上</text>
<text x="62" y="250" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">positions / query_start_loc  (device tensor)</text>
<line x1="290.0" y1="270" x2="290.0" y2="314" stroke="#2563eb" stroke-width="2.2" marker-end="url(#ab)"/>
<rect x="40" y="314" width="500" height="70" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="62" y="341" font-family="sans-serif" font-size="13" text-anchor="start" fill="#2563eb" font-weight="bold">Triton kernel 启动</text>
<text x="62" y="364" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">_compute_slot_mapping_kernel[(num_reqs+1,)](…)</text>
<line x1="290.0" y1="384" x2="290.0" y2="428" stroke="#2563eb" stroke-width="2.2" marker-end="url(#ab)"/>
<rect x="40" y="428" width="500" height="70" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
<text x="62" y="455" font-family="sans-serif" font-size="13" text-anchor="start" fill="#2563eb" font-weight="bold">直接写 device</text>
<text x="62" y="478" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">→ self.slot_mapping.gpu</text>
<rect x="40" y="548" width="500" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="290.0" y="575" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#2563eb" font-weight="bold">kernel 读 block_table.gpu → 天然形成 NPU 流序</text>
<rect x="620" y="100" width="500" height="56" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
<text x="870.0" y="124" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#059669" font-weight="bold">310P 路径（无 Triton）</text>
<text x="870.0" y="144" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">vllm_ascend/_310p/block_table.py</text>
<rect x="620" y="200" width="500" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.6"/>
<text x="642" y="227" font-family="sans-serif" font-size="13" text-anchor="start" fill="#059669" font-weight="bold">输入强制在 CPU</text>
<text x="642" y="250" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">_to_numpy：device 张量直接 raise</text>
<line x1="870.0" y1="270" x2="870.0" y2="314" stroke="#059669" stroke-width="2.2" marker-end="url(#ag)"/>
<rect x="620" y="314" width="500" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.6"/>
<text x="642" y="341" font-family="sans-serif" font-size="13" text-anchor="start" fill="#059669" font-weight="bold">NumPy 在 host 算</text>
<text x="642" y="364" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">np.add(block_numbers*block_size, offsets, out=…)</text>
<line x1="870.0" y1="384" x2="870.0" y2="428" stroke="#059669" stroke-width="2.2" marker-end="url(#ag)"/>
<rect x="620" y="428" width="500" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.6"/>
<text x="642" y="455" font-family="sans-serif" font-size="13" text-anchor="start" fill="#059669" font-weight="bold">算完再上传</text>
<text x="642" y="478" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">slot_mapping.np → copy_to_gpu(num_tokens)</text>
<rect x="620" y="548" width="500" height="44" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
<text x="870.0" y="575" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#059669" font-weight="bold">丢了 kernel 的隐式流序 → 需手动补回</text>
<rect x="40" y="662" width="1080" height="58" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
<text x="580.0" y="686" font-family="sans-serif" font-size="13.5" text-anchor="middle" fill="#b45309" font-weight="bold">减法引出的补偿：_update_states 在 condense（move_row 改写 block_table.np）的步骤手动 synchronize</text>
<text x="580.0" y="708" font-family="monospace" font-size="12" text-anchor="middle" fill="#92400e" font-weight="normal">torch.npu.current_stream().synchronize()  —— 仅在布局变更步补回基座靠 Triton kernel 隐式得到的流序</text>
</svg>