<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760">
<defs><marker id="ar" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker><marker id="im" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#7c3aed"/></marker></defs>
<rect width="1200" height="760" fill="white"/>
<text x="600.0" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1e293b" font-weight="bold">310P 不一刀切：按组件挑继承深度</text>
<text x="600.0" y="68" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal">实线=继承，紫虚线=import 复用（非继承）；箭头是否经过中层，区分三种深度</text>
<text x="210.0" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="#1d4ed8" font-weight="bold">① 主执行体 · 三层</text>
<rect x="30.0" y="116" width="360" height="78" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
<text x="210.0" y="146" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#1d4ed8" font-weight="bold">GPUModelRunner / InputBatch</text>
<text x="210.0" y="170" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">vLLM 基座</text>
<rect x="30.0" y="286" width="360" height="78" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
<text x="210.0" y="316" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#1d4ed8" font-weight="bold">NPUModelRunner / NPUInputBatch</text>
<text x="210.0" y="340" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">昇腾主栈 · 继承+猴补（第 14 章）</text>
<rect x="30.0" y="456" width="360" height="78" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2.2"/>
<text x="210.0" y="486" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#1d4ed8" font-weight="bold">NPUModelRunner310 / …310</text>
<text x="210.0" y="510" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">再继承一层</text>
<line x1="210.0" y1="194" x2="210.0" y2="286" stroke="#475569" stroke-width="2.4" marker-end="url(#ar)"/>
<line x1="210.0" y1="364" x2="210.0" y2="456" stroke="#475569" stroke-width="2.4" marker-end="url(#ar)"/>
<text x="600.0" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="#7c3aed" font-weight="bold">② BlockTable · 特例</text>
<rect x="420.0" y="116" width="360" height="78" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2.2"/>
<text x="600.0" y="146" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#7c3aed" font-weight="bold">_compute_slot_mapping_kernel</text>
<text x="600.0" y="170" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">vLLM 只贡献 Triton kernel</text>
<rect x="420.0" y="286" width="360" height="78" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2.2"/>
<text x="600.0" y="316" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#7c3aed" font-weight="bold">class BlockTable:</text>
<text x="600.0" y="340" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">昇腾独立类 · 不继承 vLLM BlockTable</text>
<rect x="420.0" y="456" width="360" height="78" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="2.2"/>
<text x="600.0" y="486" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#7c3aed" font-weight="bold">BlockTable(AscendBlockTable)</text>
<text x="600.0" y="510" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">建在昇腾独立类之上</text>
<line x1="600.0" y1="194" x2="600.0" y2="286" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#im)" stroke-dasharray="6,4"/>
<text x="774.0" y="244.0" font-family="sans-serif" font-size="11" text-anchor="end" fill="#7c3aed" font-weight="normal">import 复用</text>
<line x1="600.0" y1="364" x2="600.0" y2="456" stroke="#475569" stroke-width="2.4" marker-end="url(#ar)"/>
<text x="990.0" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="#059669" font-weight="bold">③ 与昇腾无关 · 两层</text>
<rect x="810.0" y="116" width="360" height="78" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.2"/>
<text x="990.0" y="146" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#047857" font-weight="bold">KVBlockZeroer / ShardedStateLoader</text>
<text x="990.0" y="170" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">vLLM 基类</text>
<rect x="810.0" y="286" width="360" height="78" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,4"/>
<text x="990.0" y="320" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#94a3b8" font-weight="normal">（无昇腾中间层）</text>
<text x="990.0" y="342" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#94a3b8" font-weight="normal">直接继承 vLLM 基类</text>
<rect x="810.0" y="456" width="360" height="78" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2.2"/>
<text x="990.0" y="486" font-family="monospace" font-size="14.5" text-anchor="middle" fill="#047857" font-weight="bold">AscendKVBlockZeroer310 / …310</text>
<text x="990.0" y="510" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">两层直继承</text>
<line x1="990.0" y1="194" x2="990.0" y2="456" stroke="#475569" stroke-width="2.4" marker-end="url(#ar)"/>
<rect x="40" y="566" width="1120" height="158" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
<text x="600.0" y="594" font-family="sans-serif" font-size="15" text-anchor="middle" fill="#b45309" font-weight="bold">310 这层各自改了什么（差异集中在「无 Triton / 无 MLA / 受限 dtype·格式」）</text>
<text x="70" y="622" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#78350f" font-weight="normal">• NPUModelRunner310：slot_mapping 与 decode 元数据 Triton → CPU NumPy；KV 钉死 FRACTAL_NZ；换 310 sampler</text>
<text x="70" y="643" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#78350f" font-weight="normal">• NPUInputBatch310：唯一改动——__init__ 末尾把 self.block_table 换成 _310p 的 MultiGroupBlockTable</text>
<text x="70" y="664" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#78350f" font-weight="normal">• BlockTable(310)：覆写 compute_slot_mapping，Triton kernel → NumPy 在 CPU 算 slot_mapping</text>
<text x="70" y="685" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#78350f" font-weight="normal">• AscendKVBlockZeroer310：去 Triton，收集 (k,v) 张量列表 + 逐块切片 .zero_()</text>
<text x="70" y="706" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#78350f" font-weight="normal">• ShardedStateLoader310：永远单 part（去 max_size 分片）+ 额外产出 parameters_type_map.json</text>
</svg>