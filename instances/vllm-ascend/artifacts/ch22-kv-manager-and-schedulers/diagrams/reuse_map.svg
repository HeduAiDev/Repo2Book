<text x="1020" y="205.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c3aed">CompressAttentionManager</text>
<text x="1020" y="223.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">压缩 MLA：//compress_ratio 后调 super()</text>
