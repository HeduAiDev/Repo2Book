<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 12 10" refX="11" refY="5" markerWidth="11" markerHeight="9" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#7c3aed"/></marker></defs>
<rect width="1340" height="760" fill="white"/>
<text x="670.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">KV 管理与调度：90% 原样复用 vLLM，只在 5 处开子类</text>
<text x="670.0" y="66" text-anchor="middle" font-size="14" fill="#64748b">箭头 = 继承 / override；右列每个特化都「贴着」左列对应基类，只改最小落点</text>
<rect x="40" y="92" width="560" height="610" rx="14" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.6"/>
<rect x="740" y="92" width="560" height="610" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6"/>
