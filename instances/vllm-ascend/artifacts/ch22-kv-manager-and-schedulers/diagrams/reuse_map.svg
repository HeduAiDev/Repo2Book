<text x="1020" y="490.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c3aed">RecomputeScheduler (+Config/Output)</text>
<text x="1020" y="508.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">kv_consumer 丢弃重算 → 回吐 PD proxy</text>
