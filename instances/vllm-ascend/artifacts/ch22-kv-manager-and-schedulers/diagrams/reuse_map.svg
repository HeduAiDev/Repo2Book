<text x="670" y="296" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7c3aed">复用查表</text>
<rect x="70.0" y="365" width="500" height="70" rx="9" fill="#ecfeff" stroke="#0f766e" stroke-width="1.7"/>
<text x="320" y="395.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f766e">Scheduler.schedule</text>
<text x="320" y="413.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">RUNNING/WAITING 双循环骨架</text>
