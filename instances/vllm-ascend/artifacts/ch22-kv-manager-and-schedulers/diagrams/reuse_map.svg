<text x="670" y="486" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7c3aed">override</text>
<rect x="70.0" y="555" width="500" height="70" rx="9" fill="#ecfeff" stroke="#0f766e" stroke-width="1.7"/>
<text x="320" y="585.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f766e">Scheduler.schedule</text>
<text x="320" y="603.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">num_new_tokens 计算骨架</text>
<rect x="770.0" y="555" width="500" height="70" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="1020" y="585.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c3aed">ProfilingChunkScheduler</text>
<text x="1020" y="603.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">二次模型预测 chunk size 收窄</text>
<line x1="605" y1="590" x2="735" y2="590" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar)"/>
<text x="670" y="581" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7c3aed">override</text>
<rect x="70.0" y="645" width="500" height="44" rx="9" fill="#ecfeff" stroke="#0f766e" stroke-width="1.7"/>
<text x="320" y="671.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f766e">BlockPool · 物理 block 分配 + 前缀缓存池（零改动）</text>
<text x="1020" y="660" text-anchor="middle" font-size="13.5" fill="#64748b">（无对应特化——物理 block 计数与硬件无关，整块原样继承）</text>
<text x="670.0" y="730" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">立意：成熟插件对宿主「核心循环」该尽量少碰——昇腾这里只动 KV 换算比例与三种调度策略的循环落点。</text>
</svg>