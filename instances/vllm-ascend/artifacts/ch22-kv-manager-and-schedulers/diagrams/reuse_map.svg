<text x="1020" y="300.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c3aed">get_manager_for_kv_cache_spec</text>
<text x="1020" y="318.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">重映射：压缩 MLA 改选 + 设 admission cap</text>
