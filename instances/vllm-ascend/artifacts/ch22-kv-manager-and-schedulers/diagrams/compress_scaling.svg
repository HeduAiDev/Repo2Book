<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 12 10" refX="11" refY="5" markerWidth="11" markerHeight="9" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#475569"/></marker></defs>
<rect width="1280" height="620" fill="white"/>
<text x="640.0" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">压缩 MLA 的 block 换算：每 compress_ratio 个逻辑 token 压成 1 个物理 KV slot</text>
<text x="640.0" y="66" text-anchor="middle" font-size="14" fill="#64748b">示例 compress_ratio=4、block_size=2（每图块仅示意，真实值更大）</text>
<text x="60" y="104" font-size="15" font-weight="bold" fill="#2563eb">逻辑 token 序列（共 16 个）</text>
<rect x="70" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
