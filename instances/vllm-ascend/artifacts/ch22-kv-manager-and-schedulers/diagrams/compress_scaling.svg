<rect x="130" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="157.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t1</text>
<rect x="190" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="217.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t2</text>
<rect x="250" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="277.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t3</text>
<rect x="310" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="337.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t4</text>
<rect x="370" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="397.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t5</text>
<rect x="430" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="457.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t6</text>
<rect x="490" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="517.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t7</text>
<rect x="550" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="577.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t8</text>
<rect x="610" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="637.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t9</text>
<rect x="670" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="697.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t10</text>
<rect x="730" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="757.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t11</text>
<rect x="790" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="817.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t12</text>
<rect x="850" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="877.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t13</text>
<rect x="910" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="937.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t14</text>
<rect x="970" y="120" width="54" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
<text x="997.0" y="146" text-anchor="middle" font-size="13" fill="#2563eb">t15</text>
<path d="M70,170 L70,180 L304,180 L304,170" fill="none" stroke="#2563eb" stroke-width="1.4"/>
<text x="187.0" y="198" text-anchor="middle" font-size="12.5" fill="#64748b">4 个一组</text>
<path d="M310,170 L310,180 L544,180 L544,170" fill="none" stroke="#2563eb" stroke-width="1.4"/>
<text x="427.0" y="198" text-anchor="middle" font-size="12.5" fill="#64748b">4 个一组</text>
<path d="M550,170 L550,180 L784,180 L784,170" fill="none" stroke="#2563eb" stroke-width="1.4"/>
<text x="667.0" y="198" text-anchor="middle" font-size="12.5" fill="#64748b">4 个一组</text>
<path d="M790,170 L790,180 L1024,180 L1024,170" fill="none" stroke="#2563eb" stroke-width="1.4"/>
<text x="907.0" y="198" text-anchor="middle" font-size="12.5" fill="#64748b">4 个一组</text>
<text x="640.0" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">// compress_ratio</text>
<line x1="187.0" y1="210" x2="220.0" y2="270" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#ar)"/>
<line x1="427.0" y1="210" x2="440.0" y2="270" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#ar)"/>
<line x1="667.0" y1="210" x2="660.0" y2="270" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#ar)"/>
<line x1="907.0" y1="210" x2="880.0" y2="270" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#ar)"/>
<text x="60" y="274" font-size="15" font-weight="bold" fill="#b45309">物理 KV slot（16 // 4 = 4 个）</text>
<rect x="140" y="282" width="160" height="44" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.5"/>
<text x="220.0" y="310" text-anchor="middle" font-size="14" fill="#b45309">slot 0</text>
<rect x="360" y="282" width="160" height="44" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.5"/>
<text x="440.0" y="310" text-anchor="middle" font-size="14" fill="#b45309">slot 1</text>
<rect x="580" y="282" width="160" height="44" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.5"/>
<text x="660.0" y="310" text-anchor="middle" font-size="14" fill="#b45309">slot 2</text>
<rect x="800" y="282" width="160" height="44" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.5"/>
<text x="880.0" y="310" text-anchor="middle" font-size="14" fill="#b45309">slot 3</text>
<rect x="132" y="362" width="396" height="46" rx="8" fill="none" stroke="#b45309" stroke-width="1.6" stroke-dasharray="5 4"/>
<text x="330.0" y="391" text-anchor="middle" font-size="13" fill="#b45309">物理 block 0（2 slot = 8 逻辑 token）</text>
<rect x="572" y="362" width="396" height="46" rx="8" fill="none" stroke="#b45309" stroke-width="1.6" stroke-dasharray="5 4"/>
<text x="770.0" y="391" text-anchor="middle" font-size="13" fill="#b45309">物理 block 1（2 slot = 8 逻辑 token）</text>
<text x="640.0" y="434" text-anchor="middle" font-size="13.5" fill="#64748b">logical_block_size = block_size × compress_ratio = 2 × 4 = 8 逻辑 token —— 前缀命中按这个粒度对齐</text>
<rect x="80" y="470" width="1120" height="118" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="105" y="504" font-size="14" fill="#1e293b"><tspan font-weight="bold" fill="#7c3aed">CompressAttentionManager</tspan>：物理 block 数 = ceil( (num_tokens // compress_ratio) / block_size )</text>
<text x="105" y="534" font-size="14" fill="#1e293b"><tspan font-weight="bold" fill="#0f766e">FullAttentionManager</tspan>（父类，不缩放）：物理 block 数 = ceil( num_tokens / block_size )</text>
<text x="105" y="566" font-size="13.5" fill="#64748b">唯一差别：入口处 num_tokens //= compress_ratio。其余 block 管理算法逐字复用父类——这就是「只改换算比例」。</text>
</svg>