<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 12 10" refX="11" refY="5" markerWidth="11" markerHeight="9" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#475569"/></marker></defs>
<rect width="1280" height="760" fill="white"/>
<text x="640.0" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">block 不够时的分叉：抢占（复用）vs 丢弃重算（昇腾特化）</text>
<rect x="450.0" y="70" width="380" height="50" rx="9" fill="#f1f5f9" stroke="#475569" stroke-width="1.7"/>
<text x="640.0" y="100.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#475569">RUNNING 循环：allocate_slots(request)</text>
<line x1="640.0" y1="120" x2="640.0" y2="152" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<polygon points="640.0,155 750.0,205 640.0,255 530.0,205" fill="#fffbeb" stroke="#d97706" stroke-width="1.7"/>
<text x="640.0" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97706">new_blocks</text>
<text x="640.0" y="218" text-anchor="middle" font-size="14" fill="#d97706">is None?</text>
<line x1="750.0" y1="205" x2="940.0" y2="205" stroke="#16a34a" stroke-width="2" marker-end="url(#ar)"/>
<text x="845.0" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">否（够）</text>
<rect x="915.0" y="182" width="230" height="48" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.7"/>
<text x="1030.0" y="210.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">调度该请求，break</text>
<line x1="640.0" y1="255" x2="640.0" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="654.0" y="278" font-size="13" font-weight="bold" fill="#dc2626">是（不够）</text>
<polygon points="640.0,293 770.0,345 640.0,397 510.0,345" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="640.0" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">is_kv_producer?</text>
<text x="640.0" y="360" text-anchor="middle" font-size="12.5" fill="#64748b">（PD 角色）</text>
<line x1="510.0" y1="345" x2="340.0" y2="345" stroke="#0f766e" stroke-width="2" marker-end="url(#ar)"/>
<text x="425.0" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">是 / 非 PD</text>
<rect x="50.0" y="318" width="280" height="60" rx="9" fill="#ecfeff" stroke="#0f766e" stroke-width="1.7"/>
<text x="190.0" y="343.34" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f766e">常规 preempt（逐字复用 vLLM）</text>
<text x="190.0" y="360.16" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">PRIORITY/FCFS 选最低优先级踢回 waiting</text>
<line x1="770.0" y1="345" x2="940.0" y2="345" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar)"/>
<text x="855.0" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">否 (consumer)</text>
<rect x="945.0" y="312" width="300" height="72" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="1095.0" y="334.09" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#7c3aed">丢弃重算（昇腾特化）</text>
<text x="1095.0" y="351.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">running.pop() + kv_cache_manager.free()</text>
<text x="1095.0" y="368.41" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">→ append recomputed_reqs</text>
<line x1="1095.0" y1="384" x2="1095.0" y2="470" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="935.0" y="472" width="320" height="66" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="1095.0" y="491.09" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#7c3aed">update_from_output 回吐</text>
<text x="1095.0" y="508.74" text-anchor="middle" font-size="11" font-weight="normal" fill="#1e293b">EngineCoreOutput(stop_reason='recomputed')</text>
<text x="1095.0" y="524.74" text-anchor="middle" font-size="11" font-weight="normal" fill="#1e293b">finish_reason=STOP, new_token_ids=[]</text>
<line x1="1095.0" y1="538" x2="1095.0" y2="600" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="935.0" y="602" width="320" height="66" rx="9" fill="#fef2f2" stroke="#dc2626" stroke-width="1.7"/>
<text x="1095.0" y="621.09" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#dc2626">PD proxy 收到 'recomputed'</text>
<text x="1095.0" y="638.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">把请求改投他节点重新 prefill+decode</text>
<text x="1095.0" y="654.74" text-anchor="middle" font-size="11" font-weight="normal" fill="#1e293b">回指 ch10/ch11 PD 分离与 remote KV</text>
<text x="640.0" y="720" text-anchor="middle" font-size="13.5" fill="#64748b">PD 分离下 decode 节点的 KV 来自 prefill 节点；本地抢占重算无意义，丢回 proxy 改投他处更划算。</text>
</svg>