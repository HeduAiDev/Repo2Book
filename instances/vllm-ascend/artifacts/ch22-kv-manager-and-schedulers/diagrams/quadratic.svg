<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 12 10" refX="11" refY="5" markerWidth="11" markerHeight="9" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#475569"/></marker></defs>
<rect width="1180" height="640" fill="white"/>
<text x="590.0" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">profiling chunk：用二次延迟模型反解「再算多少 token 恰好花掉目标延迟」</text>
<line x1="130" y1="500" x2="890" y2="500" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="130" y1="500" x2="130" y2="100" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="890" y="530" text-anchor="middle" font-size="14" fill="#1e293b">序列长 l</text>
<text x="118" y="92" text-anchor="end" font-size="14" fill="#1e293b">单步延迟 f(l)</text>
<polyline points="130.0,491.9 150.0,490.6 170.0,488.9 190.0,486.8 210.0,484.2 230.0,481.2 250.0,477.7 270.0,473.8 290.0,469.4 310.0,464.6 330.0,459.3 350.0,453.6 370.0,447.4 390.0,440.8 410.0,433.7 430.0,426.2 450.0,418.3 470.0,409.9 490.0,401.0 510.0,391.7 530.0,382.0 550.0,371.8 570.0,361.1 590.0,350.1 610.0,338.5 630.0,326.5 650.0,314.1 670.0,301.2 690.0,287.9 710.0,274.1 730.0,259.9 750.0,245.2 770.0,230.1 790.0,214.5 810.0,198.5 830.0,182.1 850.0,165.2 870.0,147.8 890.0,130.0" fill="none" stroke="#2563eb" stroke-width="2.6"/>
<text x="690.0" y="273.8970523537176" font-size="14.5" font-weight="bold" fill="#2563eb">f(l)=a·l²+b·l+c</text>
<line x1="370.0" y1="500" x2="370.0" y2="447.4219093708755" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="5 4"/>
<line x1="130" y1="447.4219093708755" x2="370.0" y2="447.4219093708755" stroke="#0f766e" stroke-width="1.2" stroke-dasharray="4 4"/>
<text x="370.0" y="524" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f766e">L（已算）</text>
<line x1="670.0" y1="500" x2="670.0" y2="301.2247030356357" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 4"/>
<line x1="130" y1="301.2247030356357" x2="670.0" y2="301.2247030356357" stroke="#b45309" stroke-width="1.2" stroke-dasharray="4 4"/>
<text x="670.0" y="524" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#b45309">L+x</text>
<rect x="128" y="301.2247030356357" width="6" height="146.1972063352398" fill="#7c3aed"/>
<line x1="134" y1="374.3233062032556" x2="200" y2="374.3233062032556" stroke="#7c3aed" stroke-width="1.4"/>
<text x="208" y="368.3233062032556" text-anchor="start" font-size="13.5" font-weight="bold" fill="#7c3aed">增量延迟</text>
<text x="208" y="388.3233062032556" text-anchor="start" font-size="13.5" font-weight="bold" fill="#7c3aed">= target_latency T</text>
<line x1="370.0" y1="544" x2="670.0" y2="544" stroke="#b45309" stroke-width="1.4" marker-end="url(#ar)"/>
<text x="520.0" y="562" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#b45309">x = 本次 chunk size</text>
<rect x="948" y="130" width="220" height="220" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="1058" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">反解 x</text>
<text x="962" y="188" font-size="12.5" fill="#1e293b">f(L+x)−f(L)=T</text>
<text x="962" y="215" font-size="12.5" fill="#1e293b">⟹ a·x²+(2aL+b)·x−T=0</text>
<text x="962" y="242" font-size="12.5" fill="#1e293b">A=a, B=2aL+b, C=−T</text>
<text x="962" y="269" font-size="12.5" fill="#1e293b">x=(−B+√(B²−4AC))/(2A)</text>
<text x="962" y="296" font-size="12.5" fill="#1e293b">取正根 → 平滑</text>
<text x="962" y="323" font-size="12.5" fill="#1e293b">→ 对齐 max(page,64)</text>
<text x="590.0" y="615" text-anchor="middle" font-size="13.5" fill="#64748b">延迟随长度凸增（a≥0）：同样一段 T，越往后（L 越大）能塞进的 chunk x 越小——调度自动对长序列收窄分块。</text>
</svg>