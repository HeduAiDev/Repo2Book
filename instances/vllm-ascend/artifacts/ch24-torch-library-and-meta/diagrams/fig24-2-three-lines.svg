<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 720" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1340" height="720" fill="white"/>
<text x="670.0" y="40" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">三条注册线，汇入同一张 torch 算子注册表</text>
<rect x="60" y="90" width="620" height="130" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2.0"/>
<text x="78" y="120" font-size="17" text-anchor="start" fill="#c2410c" font-weight="bold" font-family="sans-serif">①  C++ 真实现</text>
<text x="78" y="146" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">import vllm_ascend.vllm_ascend_C （加载 .so）</text>
<text x="78" y="168" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">csrc/torch_binding.cpp</text>
<text x="78" y="190" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">TORCH_LIBRARY_EXPAND(_C_ascend, ops)</text>
<text x="78" y="212" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">63 个 ops.def + ops.impl(name, kPrivateUse1, &amp;真实现)</text>
<rect x="60" y="250" width="620" height="130" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.0"/>
<text x="78" y="280" font-size="17" text-anchor="start" fill="#1d4ed8" font-weight="bold" font-family="sans-serif">②  C++ meta + Python 兜底</text>
<text x="78" y="306" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">同一个 .so 内 / import meta_registration</text>
<text x="78" y="328" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">csrc/torch_binding_meta.cpp</text>
<text x="78" y="350" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">TORCH_LIBRARY_IMPL_EXPAND(_C_ascend, Meta, ops)</text>
<text x="78" y="372" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">57 个 meta（缺口 6 个无 meta）+ Python 补 3 个</text>
<rect x="60" y="410" width="620" height="130" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.0"/>
<text x="78" y="440" font-size="17" text-anchor="start" fill="#15803d" font-weight="bold" font-family="sans-serif">③  纯 Python op</text>
<text x="78" y="466" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">import vllm_ascend.ops.register_custom_ops</text>
<text x="78" y="488" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">vllm_ascend/ops/register_custom_ops.py</text>
<text x="78" y="510" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">direct_register_custom_op × 10</text>
<text x="78" y="532" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">每个 = impl(PrivateUse1) + _register_fake(fake)</text>
<rect x="780" y="110" width="500" height="430" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2.0"/>
<text x="1030.0" y="144" font-size="19" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">torch Dispatcher 注册表</text>
<text x="1030.0" y="168" font-size="13" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">算子全名 → 按 dispatch key 索引的实现</text>
<text x="810" y="206" font-size="15" text-anchor="start" fill="#c2410c" font-weight="bold" font-family="sans-serif">PrivateUse1（真算）</text>
<text x="1050" y="206" font-size="15" text-anchor="start" fill="#1d4ed8" font-weight="bold" font-family="sans-serif">Meta（推形状）</text>
<line x1="1030" y1="186" x2="1030" y2="450" stroke="#cbd5e1" stroke-width="1.4"/>
<line x1="800" y1="218" x2="1260" y2="218" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="810" y="248" font-size="13.5" text-anchor="start" fill="#334155" font-weight="bold" font-family="monospace">_C_ascend::*</text>
<text x="822" y="270" font-size="13" text-anchor="start" fill="#9a3412" font-weight="normal" font-family="sans-serif">63 真实现</text>
<text x="1050" y="270" font-size="13" text-anchor="start" fill="#1e40af" font-weight="normal" font-family="sans-serif">57 + 3</text>
<line x1="800" y1="272" x2="1260" y2="272" stroke="#e2e8f0" stroke-width="1.2"/>
<text x="810" y="290" font-size="13.5" text-anchor="start" fill="#dc2626" font-weight="bold" font-family="sans-serif">  其中缺口 6 个</text>
<text x="822" y="312" font-size="13" text-anchor="start" fill="#9a3412" font-weight="normal" font-family="sans-serif">有真实现</text>
<text x="1050" y="312" font-size="13" text-anchor="start" fill="#dc2626" font-weight="normal" font-family="sans-serif">—  无 meta</text>
<line x1="800" y1="314" x2="1260" y2="314" stroke="#e2e8f0" stroke-width="1.2"/>
<text x="810" y="332" font-size="13.5" text-anchor="start" fill="#334155" font-weight="bold" font-family="monospace">vllm::*（10 个）</text>
<text x="822" y="354" font-size="13" text-anchor="start" fill="#9a3412" font-weight="normal" font-family="sans-serif">10 真实现</text>
<text x="1050" y="354" font-size="13" text-anchor="start" fill="#1e40af" font-weight="normal" font-family="sans-serif">10 fake</text>
<rect x="804" y="410" width="452" height="100" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
<text x="1030.0" y="438" font-size="14" text-anchor="middle" fill="#4338ca" font-weight="bold" font-family="sans-serif">注册产物（Python 侧可调用）</text>
<text x="1030.0" y="466" font-size="14" text-anchor="middle" fill="#334155" font-weight="normal" font-family="monospace">torch.ops._C_ascend.&lt;op&gt;</text>
<text x="1030.0" y="492" font-size="14" text-anchor="middle" fill="#334155" font-weight="normal" font-family="monospace">torch.ops.vllm.&lt;op&gt;</text>
