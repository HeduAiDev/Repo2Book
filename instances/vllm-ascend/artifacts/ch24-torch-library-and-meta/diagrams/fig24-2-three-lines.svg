<line x1="684" y1="315" x2="776" y2="330" stroke="#64748b" stroke-width="2.2" marker-end="url(#ar)"/>
<line x1="684" y1="475" x2="776" y2="330" stroke="#64748b" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="670.0" y="690" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">推理走 PrivateUse1 列真算；图捕获走 Meta 列只推形状 —— 缺口 6 个 op 进不了捕获图</text>
