<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="arR" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1280" height="760" fill="white"/>
<text x="640.0" y="40" font-size="25" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">同一个算子，要登记两份实现</text>
<text x="640.0" y="68" font-size="15" text-anchor="middle" fill="#475569" font-weight="normal" font-family="monospace">torch.ops._C_ascend.get_masked_input_and_mask</text>
<rect x="480" y="96" width="320" height="60" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2"/>
<text x="640.0" y="123" font-size="15" text-anchor="middle" fill="#4338ca" font-weight="bold" font-family="sans-serif">一个 schema · 一个算子</text>
<text x="640.0" y="144" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="monospace">ops.def("...(Tensor input,...) -&gt; (Tensor, Tensor)")</text>
<rect x="110" y="250" width="470" height="260" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2.2"/>
<text x="345.0" y="284" font-size="19" text-anchor="middle" fill="#c2410c" font-weight="bold" font-family="sans-serif">真实现 · 真算</text>
<text x="345.0" y="314" font-size="14" text-anchor="middle" fill="#9a3412" font-weight="bold" font-family="sans-serif">dispatch key = PrivateUse1（昇腾 NPU）</text>
<text x="138" y="350" font-size="13" text-anchor="start" fill="#7c2d12" font-weight="normal" font-family="monospace">at::empty_like(input)  造输出壳</text>
<text x="138" y="378" font-size="13" text-anchor="start" fill="#7c2d12" font-weight="normal" font-family="monospace">input.data_ptr()       拿真实设备内存</text>
<text x="138" y="406" font-size="13" text-anchor="start" fill="#7c2d12" font-weight="normal" font-family="monospace">getCurrentNPUStream()  取 NPU 流</text>
<text x="138" y="434" font-size="13" text-anchor="start" fill="#7c2d12" font-weight="normal" font-family="monospace">OpCommand.Run()        提交 AscendC kernel</text>
<rect x="134" y="454" width="422" height="40" rx="8" fill="#ffedd5" stroke="#fb923c" stroke-width="1.4"/>
<text x="345.0" y="479" font-size="14" text-anchor="middle" fill="#9a3412" font-weight="bold" font-family="sans-serif">→ 真往设备内存算并填数据</text>
<line x1="560" y1="156" x2="345.0" y2="250" stroke="#64748b" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="700" y="250" width="470" height="260" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.2"/>
<text x="935.0" y="284" font-size="19" text-anchor="middle" fill="#1d4ed8" font-weight="bold" font-family="sans-serif">meta 实现 · 只推形状</text>
<text x="935.0" y="314" font-size="14" text-anchor="middle" fill="#1e40af" font-weight="bold" font-family="sans-serif">dispatch key = Meta（at::kMeta 张量）</text>
<text x="728" y="350" font-size="13" text-anchor="start" fill="#1e3a8a" font-weight="normal" font-family="monospace">at::empty_like(input)  造输出壳</text>
<text x="728" y="378" font-size="13" text-anchor="start" fill="#1e3a8a" font-weight="normal" font-family="monospace">（无 data_ptr）        不碰设备内存</text>
<text x="728" y="406" font-size="13" text-anchor="start" fill="#1e3a8a" font-weight="normal" font-family="monospace">（无 NPU 流）          不取流</text>
<text x="728" y="434" font-size="13" text-anchor="start" fill="#1e3a8a" font-weight="normal" font-family="monospace">return {壳}            直接返回空壳</text>
<rect x="724" y="454" width="422" height="40" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
<text x="935.0" y="479" font-size="14" text-anchor="middle" fill="#1e40af" font-weight="bold" font-family="sans-serif">→ 只给出 shape / dtype，不真算</text>
<line x1="720" y1="156" x2="935.0" y2="250" stroke="#64748b" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="110" y="582" font-size="15" text-anchor="start" fill="#334155" font-weight="bold" font-family="sans-serif">两条使用路径，按张量设备各派发到一边：</text>
<rect x="150" y="600" width="390" height="90" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.6"/>
<text x="345" y="630" font-size="15" text-anchor="middle" fill="#854d0e" font-weight="bold" font-family="sans-serif">推理期：真实 NPU 张量</text>
<text x="345" y="656" font-size="13" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">torch 按设备 = NPU 派发</text>
<text x="345" y="678" font-size="13" text-anchor="middle" fill="#854d0e" font-weight="bold" font-family="sans-serif">→ 走左边真实现，真算出结果</text>
<line x1="345" y1="600" x2="345.0" y2="516" stroke="#ca8a04" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="740" y="600" width="390" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.6"/>
<text x="935" y="630" font-size="15" text-anchor="middle" fill="#15803d" font-weight="bold" font-family="sans-serif">图捕获期：Meta 张量（假跑）</text>
<text x="935" y="656" font-size="13" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">torch.compile / ACLGraph trace</text>
<text x="935" y="678" font-size="13" text-anchor="middle" fill="#15803d" font-weight="bold" font-family="sans-serif">→ 走右边 meta，只把形状推下去</text>
<line x1="935" y1="600" x2="935.0" y2="516" stroke="#16a34a" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="920" y="246" width="250" height="0.1" rx="0" fill="#fff" stroke="#fff" stroke-width="0"/>
<text x="640.0" y="720" font-size="15" text-anchor="middle" fill="#dc2626" font-weight="bold" font-family="sans-serif">若右边缺 meta —— trace 到该算子推不出输出形状 —— 整张图捕获在此断</text>
</svg>