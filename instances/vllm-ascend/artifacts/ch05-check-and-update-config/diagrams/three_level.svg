<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540">
<defs><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#15803d"/></marker></defs>
<rect width="1000" height="540" fill="white"/>
<text x="500.0" y="38" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#0f172a">三级取值：additional_config → env → default</text>
<text x="500.0" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">_get_config_value 只裁决一层；env 与 default 早在 envs.py 的 lambda 里塌缩成一个值</text>
<rect x="60" y="120" width="380" height="160" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
<text x="250.0" y="148" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#14532d">_get_config_value 裁决这一层</text>
<text x="80" y="182" font-family="sans-serif" font-size="13.5" fill="#166534">config_key in additional_config ?</text>
<text x="98" y="214" font-family="sans-serif" font-size="13" fill="#15803d" font-weight="bold">是 → 用 additional_config[key]（最高优先级）</text>
<text x="98" y="246" font-family="sans-serif" font-size="13" fill="#b91c1c">否 → 返回传入的 env_value（已含 env/default）</text>
<rect x="560" y="120" width="380" height="160" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
<text x="750.0" y="148" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e3a8a">envs.py：env 与 default 在此塌缩</text>
<text x="584" y="184" font-family="monospace" font-size="13" fill="#1e40af">lambda: bool(int(</text>
<text x="596" y="208" font-family="monospace" font-size="13" fill="#1e40af">os.getenv(KEY, "0")))</text>
<text x="584" y="244" font-family="sans-serif" font-size="12.5" fill="#475569">环境里有 KEY → 取环境值；没有 → 取 default</text>
<path d="M 560 235 C 510 270, 470 260, 444 240" fill="none" stroke="#15803d" stroke-width="2" marker-end="url(#arg)"/>
<text x="500.0" y="228" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#15803d">env_value（实参先求好再传入）</text>
<text x="60" y="350" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">逻辑优先级（高 → 低）：</text>
<rect x="60" y="368" width="233" height="42" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.8"/>
<text x="176" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#15803d">additional_config[key]</text>
<text x="309" y="397" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94a3b8">&gt;</text>
<rect x="325.0" y="368" width="214" height="42" rx="8" fill="#fef9c3" stroke="#a16207" stroke-width="1.8"/>
<text x="432" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a16207">环境变量 KEY（DEPRECATED）</text>
<text x="555" y="397" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94a3b8">&gt;</text>
<rect x="571.0" y="368" width="214" height="42" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.8"/>
<text x="678" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">default（lambda 内默认值）</text>
<rect x="60" y="440" width="880" height="56" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="1.8"/>
<text x="80" y="464" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#9f1239">失校验的代价（无 schema 后门）</text>
<text x="80" y="485" font-family="sans-serif" font-size="13" fill="#881337">把 additional_config 键名拼错 → 静默落回 env_value，不报错；你以为开了，其实没开。</text>
</svg>