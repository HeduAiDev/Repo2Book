<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480"><defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0d9488"/></marker><marker id="r" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker><marker id="o" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#ea580c"/></marker><marker id="bl" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker></defs><rect width="1000" height="480" fill="white"/><text x="500.0" y="36" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0f172a" font-weight="bold">标准路径的粒度换算：一个 CPU block = factor 个 GPU sub-block</text><text x="500.0" y="60" text-anchor="middle" font-family="monospace" font-size="13.5" fill="#475569" font-weight="normal">expand_block_ids（block_size_factor = 4）</text><text x="52" y="130" text-anchor="end" font-family="sans-serif" font-size="13" fill="#6d28d9" font-weight="bold">CPU</text><rect x="60" y="100" width="360" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5"/><text x="240.0" y="131" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="bold">CPU block 0（粗粒度）</text><rect x="440" y="100" width="360" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5"/><text x="620.0" y="131" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="bold">CPU block 3（粗粒度）</text><text x="52" y="238" text-anchor="end" font-family="sans-serif" font-size="13" fill="#0e7490" font-weight="bold">GPU</text><rect x="60" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="100.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">0</text><rect x="149" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="189.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">1</text><rect x="238" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="278.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">2</text><rect x="327" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="367.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">3</text><rect x="416" y="210" width="80" height="48" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4,3"/><text x="456.0" y="231" text-anchor="middle" font-family="monospace" font-size="12" fill="#b91c1c" font-weight="bold">8–11</text><text x="456.0" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b91c1c" font-weight="normal">缺位</text><rect x="505" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="545.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">12</text><rect x="594" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="634.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">13</text><rect x="683" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="723.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">14</text><rect x="772" y="210" width="80" height="48" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="812.0" y="240" text-anchor="middle" font-family="monospace" font-size="15" fill="#0e7490" font-weight="bold">15</text><line x1="240.0" y1="150" x2="100.0" y2="210" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="240.0" y1="150" x2="189.0" y2="210" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="240.0" y1="150" x2="278.0" y2="210" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="240.0" y1="150" x2="367.0" y2="210" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="620.0" y1="150" x2="545.0" y2="210" stroke="#0891b2" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="620.0" y1="150" x2="634.0" y2="210" stroke="#0891b2" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="620.0" y1="150" x2="723.0" y2="210" stroke="#0891b2" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="620.0" y1="150" x2="812.0" y2="210" stroke="#0891b2" stroke-width="1.4" stroke-dasharray="3,3"/><text x="500.0" y="290" text-anchor="middle" font-family="monospace" font-size="13" fill="#475569" font-weight="normal">block_id · factor + [0 .. factor)  →  0→[0,1,2,3]、3→[12,13,14,15]（block 2 缺位则无 8–11）</text><rect x="60" y="330" width="880" height="110" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/><text x="500.0" y="356" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#92400e" font-weight="bold">首块不整除：skip_count 对齐落位</text><text x="500.0" y="380" text-anchor="middle" font-family="monospace" font-size="13" fill="#a16207" font-weight="normal">搬 5 个 GPU sub-block、factor=4  →  dst_sub_blocks_to_skip = (-5) % 4 = 3</text><text x="500.0" y="402" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#a16207" font-weight="normal">目标 CPU 首块前 3 个 slot 已被占（部分块），跳过它们让细粒度精确对齐</text><text x="500.0" y="424" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#047857" font-weight="bold">极简路径无此换算：CPU / NPU block 1:1 同粒度，copy_blocks 直接映射</text></svg>