<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/></marker></defs>
<rect width="1180" height="620" fill="white"/>
<text x="590.0" y="38" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">把 FlashAttention 的 CUDA 内核，逐一换成 torch_npu 算子</text>
