<text x="590.0" y="616" text-anchor="middle" font-size="13.5" fill="#475569">workspace 预取是 NPU 算子相对 CUDA flash 内核的特有节拍：图捕获路径先量出算子所需暂存显存并缓存，再把真正算子录进 ACL 图。</text>
