<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#475569"/></marker></defs>
<rect width="1180" height="760" fill="white"/>
<text x="590.0" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">AscendAttentionBackendImpl.forward 的数据流</text>
<text x="590.0" y="54" text-anchor="middle" font-size="13" fill="#64748b">两条算子路径在图捕获下都先预取 workspace 再录图——workspace 预取是 NPU 算子的共性特有节拍，非 paged 专属</text>
<rect x="320.0" y="60" width="540" height="56" rx="10" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.8"/>
<text x="590.0" y="93.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">query / key / value  [num_tokens, num_heads, head_size]</text>
<line x1="590.0" y1="116" x2="590.0" y2="148" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="340.0" y="150" width="500" height="70" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="1.8"/>
<text x="590.0" y="180.75" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#b45309">reshape_and_cache → DeviceOperator → _npu_reshape_and_cache</text>
<text x="590.0" y="199.25" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#b45309">按 slot_mapping 把本步 K/V 散写回分页 cache</text>
<line x1="590.0" y1="220" x2="590.0" y2="254" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<polygon points="590.0,256 870.0,322.0 590.0,388 310.0,322.0" fill="#f1f5f9" stroke="#1e3a8a" stroke-width="2"/>
<text x="590.0" y="300.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">forward_impl 分流判定</text>
<text x="590.0" y="324.0" text-anchor="middle" font-size="13.5" fill="#1e293b">attn_state == DecodeOnly</text>
<text x="590.0" y="344.0" text-anchor="middle" font-size="13.5" fill="#1e293b">且 using_paged_attention(num_tokens) 且 sliding_window is None ?</text>
<line x1="310.0" y1="322.0" x2="240" y2="322.0" stroke="#475569" stroke-width="2"/>
<line x1="240" y1="322.0" x2="240" y2="446" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="292.0" y="314.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">是</text>
<rect x="40" y="448" width="400" height="78" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.8"/>
<text x="240.0" y="473.5" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#15803d">forward_paged_attention</text>
<text x="240.0" y="492.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#15803d">torch_npu._npu_paged_attention</text>
<text x="240.0" y="510.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#15803d">吃 block_table + context_lens(=seq_lens)</text>
<line x1="870.0" y1="322.0" x2="920" y2="322.0" stroke="#475569" stroke-width="2"/>
<line x1="920" y1="322.0" x2="920" y2="446" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="888.0" y="314.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">否</text>
<rect x="720" y="448" width="400" height="78" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="1.8"/>
<text x="920.0" y="474.5" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#b45309">forward_fused_infer_attention</text>
<text x="920.0" y="492.0" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#b45309">_get_fia_params 按五态整理 KV → </text>
<text x="920.0" y="509.5" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#b45309">torch_npu.npu_fused_infer_attention_score (TND)</text>
<rect x="40" y="544" width="400" height="44" rx="8" fill="#fffbeb" stroke="#d97706" stroke-dasharray="5,4"/>
<text x="240" y="571" text-anchor="middle" font-size="12.5" fill="#92400e">图捕获：_npu_paged_attention_get_workspace 预取</text>
<line x1="240" y1="526" x2="240" y2="542" stroke="#d97706" stroke-width="1.6" stroke-dasharray="4,3" marker-end="url(#ar)"/>
<rect x="720" y="544" width="400" height="44" rx="8" fill="#fffbeb" stroke="#d97706" stroke-dasharray="5,4"/>
<text x="920" y="571" text-anchor="middle" font-size="12.5" fill="#92400e">图捕获：*_get_max_workspace 预取</text>
<line x1="920" y1="526" x2="920" y2="542" stroke="#d97706" stroke-width="1.6" stroke-dasharray="4,3" marker-end="url(#ar)"/>
<line x1="240" y1="588" x2="240" y2="612" stroke="#475569" stroke-width="2"/>
<line x1="240" y1="612" x2="590.0" y2="612" stroke="#475569" stroke-width="2"/>
<line x1="920" y1="588" x2="920" y2="612" stroke="#475569" stroke-width="2"/>
<line x1="920" y1="612" x2="590.0" y2="612" stroke="#475569" stroke-width="2"/>
<line x1="590.0" y1="612" x2="590.0" y2="632" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="360.0" y="634" width="460" height="54" rx="10" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.8"/>
<text x="590.0" y="666.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">output[:num_tokens]  →  [num_tokens, num_heads * head_size]</text>
