<text x="20" y="396" font-size="13.5" fill="#475569">KV「paged cache（view）」= 把 (2,num_blocks,block_size,...) 的 cache 张量 view 成 (num_block, block_size, -1) 喂算子；本步新算的 K/V 已先经 reshape_and_cache 写回。</text>
<text x="20" y="418" font-size="13.5" fill="#475569">✱ sparse_mode 实由 attn_metadata.causal 与 sliding_window 决定（0 非因果 / 3 因果 / 4 滑窗），与五态正交（见 §19.6）；</text>
<text x="20" y="438" font-size="13.5" fill="#475569">上表列的是标准因果 MHA 情形——非因果 pooling 模型即便落在 ChunkedPrefill 也走 sparse_mode=0。</text>
