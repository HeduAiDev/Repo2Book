<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 540" font-family="sans-serif">
<defs><marker id="ab" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#6d28d9"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="1320" height="540" fill="white"/>
<text x="660.0" y="42" font-size="23" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">提议-验证闭环：本章管提议侧，第 28 章管验证侧</text>
<text x="660.0" y="68" font-size="13.5" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">紫 = 本章（提出 draft token / 按拒绝数收缩输入）    灰 = 第 28 章验证侧</text>
<rect x="80" y="120" width="440" height="120" rx="12" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2.2"/>
<text x="300.0" y="150" font-size="15" text-anchor="middle" fill="#6d28d9" font-weight="bold" font-family="sans-serif">①  proposer.propose / _propose</text>
<text x="300.0" y="176" font-size="12.5" text-anchor="middle" fill="#5b21b6" font-weight="normal" font-family="sans-serif">一步提出 k = num_speculative_tokens 个 draft token</text>
<text x="300.0" y="200" font-size="12" text-anchor="middle" fill="#7c3aed" font-weight="normal" font-family="sans-serif">薄壳：CPU 匹配近零成本</text>
<text x="300.0" y="220" font-size="12" text-anchor="middle" fill="#7c3aed" font-weight="normal" font-family="sans-serif">重量级：跑一次 draft 前向（ACLGraph 包裹）</text>
<rect x="800" y="120" width="440" height="120" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2.0"/>
<text x="1020.0" y="154" font-size="15" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">②  target 模型一次前向</text>
<text x="1020.0" y="182" font-size="12.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">并行验证 k+1 个候选位</text>
<text x="1020.0" y="208" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">（一趟前向算出每个候选位的真实分布）</text>
<rect x="800" y="360" width="440" height="120" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2.0" stroke-dasharray="6 4"/>
<text x="1020.0" y="390" font-size="15" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">③  AscendRejectionSampler  (第 28 章)</text>
<text x="1020.0" y="416" font-size="12.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">接受最长合法前缀 + 1 个 bonus token</text>
<text x="1020.0" y="442" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">其余 draft token 被拒绝</text>
<text x="1020.0" y="462" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">例：k=3 提出 → 接受 2 + bonus → 拒绝 1</text>
<rect x="80" y="360" width="440" height="120" rx="12" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2.2"/>
<text x="300.0" y="390" font-size="15" text-anchor="middle" fill="#6d28d9" font-weight="bold" font-family="sans-serif">④  prepare_inputs</text>
<text x="300.0" y="416" font-size="12.5" text-anchor="middle" fill="#5b21b6" font-weight="normal" font-family="sans-serif">按拒绝数收缩 query_start_loc / seq_lens</text>
<text x="300.0" y="442" font-size="12" text-anchor="middle" fill="#7c3aed" font-weight="normal" font-family="sans-serif">np.cumsum + np.repeat 构造 token_indices</text>
<text x="300.0" y="462" font-size="12" text-anchor="middle" fill="#7c3aed" font-weight="normal" font-family="sans-serif">只把未拒绝部分喂回下一步 speculator</text>
<line x1="520" y1="180.0" x2="800" y2="180.0" stroke="#6d28d9" stroke-width="2.4" marker-end="url(#ab)"/>
<text x="660.0" y="168.0" font-size="12.5" text-anchor="middle" fill="#6d28d9" font-weight="bold" font-family="sans-serif">k 个 draft token</text>
<line x1="1020.0" y1="240" x2="1020.0" y2="360" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#ag)"/>
<text x="1130.0" y="304.0" font-size="12" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">logits → 验证</text>
<line x1="800" y1="420.0" x2="520" y2="420.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#ag)"/>
<text x="660.0" y="408.0" font-size="12.5" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">已接受 token + 各请求拒绝数</text>
<line x1="300.0" y1="360" x2="300.0" y2="240" stroke="#6d28d9" stroke-width="2.4" marker-end="url(#ab)"/>
<text x="204.0" y="304.0" font-size="12" text-anchor="middle" fill="#6d28d9" font-weight="normal" font-family="sans-serif">下一步收缩后的输入</text>
<text x="660.0" y="300" font-size="13.5" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">一步投机 = 提议 k 个 → 一趟验证 → 接受前缀 → 收缩输入再来</text>
</svg>