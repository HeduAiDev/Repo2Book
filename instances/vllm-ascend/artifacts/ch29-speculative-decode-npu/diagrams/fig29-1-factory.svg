<rect x="800" y="204" width="600" height="56" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.7"/>
<text x="816" y="227" font-size="14" text-anchor="start" fill="#b45309" font-weight="bold" font-family="monospace">AscendNgramProposerNPU</text>
