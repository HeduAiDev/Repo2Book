<text x="155" y="429.0" font-size="13.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="monospace">"eagle" / "eagle3" / "mtp"</text>
<line x1="270" y1="424.0" x2="600" y2="424.0" stroke="#cbd5e1" stroke-width="1.4" marker-end="url(#ar)"/>
