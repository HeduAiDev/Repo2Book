<text x="816" y="355" font-size="14" text-anchor="start" fill="#b45309" font-weight="bold" font-family="monospace">AscendMedusaProposer</text>
<text x="816" y="375" font-size="12" text-anchor="start" fill="#64748b" font-weight="normal" font-family="sans-serif">gather 末位 hidden + super()</text>
