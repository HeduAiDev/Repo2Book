<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 700" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="1480" height="700" fill="white"/>
<text x="740.0" y="40" font-size="23" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">一处工厂分发：method 字符串 → 8 个 Ascend*Proposer</text>
<text x="740.0" y="66" font-size="13.5" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">绿 = 纯薄壳（提议成本近零）   橙 = 中等薄壳 / no-op   红 = 走重量级 base（要跑 draft 前向）</text>
<text x="150" y="104" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="monospace">speculative_config.method</text>
<text x="740.0" y="104" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="monospace">get_spec_decode_method</text>
<text x="1130" y="104" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">返回的 proposer 实例</text>
<rect x="600" y="132" width="140" height="520" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
<text x="670.0" y="372.0" font-size="13" text-anchor="middle" fill="#475569" font-weight="bold" font-family="monospace">if method ==</text>
<text x="670.0" y="394.0" font-size="13" text-anchor="middle" fill="#475569" font-weight="bold" font-family="monospace">elif … elif …</text>
<text x="670.0" y="416.0" font-size="12.5" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="monospace">else: raise</text>
<text x="670.0" y="434.0" font-size="12.5" text-anchor="middle" fill="#94a3b8" font-weight="normal" font-family="monospace">ValueError</text>
<rect x="40" y="140" width="230" height="56" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="155" y="173.0" font-size="13.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="monospace">"ngram"</text>
<line x1="270" y1="168.0" x2="600" y2="168.0" stroke="#cbd5e1" stroke-width="1.4" marker-end="url(#ar)"/>
<rect x="800" y="140" width="600" height="56" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.7"/>
<text x="816" y="163" font-size="14" text-anchor="start" fill="#047857" font-weight="bold" font-family="monospace">AscendNgramProposer</text>
<text x="816" y="183" font-size="12" text-anchor="start" fill="#64748b" font-weight="normal" font-family="sans-serif">CPU n-gram，调父类 batch_propose</text>
