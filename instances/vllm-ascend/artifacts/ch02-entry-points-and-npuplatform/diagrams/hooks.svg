<text x="854" y="152" font-size="12.5" font-family="monospace" fill="#a16207" text-anchor="start" font-weight="normal">→ Ascend{MLA,Attention,SFA,DSA,FA3}Backend</text>
<line x1="780" y1="330" x2="838" y2="136.0" stroke="#059669" stroke-width="1.6" marker-end="url(#ag)"/>
<rect x="840" y="174" width="400" height="52" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.6"/>
