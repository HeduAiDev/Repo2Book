<text x="854" y="408" font-size="12.5" font-family="monospace" fill="#047857" text-anchor="start" font-weight="normal">→ AscendCompiler</text>
<line x1="780" y1="354" x2="838" y2="392.0" stroke="#059669" stroke-width="1.6" marker-end="url(#ag)"/>
<rect x="840" y="430" width="400" height="52" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.6"/>
<text x="854" y="452" font-size="13.5" font-family="monospace" fill="#065f46" text-anchor="start" font-weight="bold">get_pass_manager_cls()</text>
<text x="854" y="472" font-size="12.5" font-family="monospace" fill="#047857" text-anchor="start" font-weight="normal">→ GraphFusionPassManager</text>
<line x1="780" y1="360" x2="838" y2="456.0" stroke="#059669" stroke-width="1.6" marker-end="url(#ag)"/>
<rect x="840" y="494" width="400" height="52" rx="9" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
<text x="854" y="516" font-size="13.5" font-family="monospace" fill="#854d0e" text-anchor="start" font-weight="bold">worker_cls  ('auto'→改写)</text>
<text x="854" y="536" font-size="12.5" font-family="monospace" fill="#a16207" text-anchor="start" font-weight="normal">→ NPUWorker / NPUWorker310 / XliteWorker</text>
<line x1="780" y1="366" x2="838" y2="520.0" stroke="#059669" stroke-width="1.6" marker-end="url(#ag)"/>
<text x="60" y="470" font-size="13.5" font-family="sans-serif" fill="#64748b" text-anchor="start" font-weight="bold">对照 vLLM 基类默认：</text>
<text x="60" y="495" font-size="12.5" font-family="monospace" fill="#64748b" text-anchor="start" font-weight="normal">get_device_communicator_cls()</text>
<text x="60" y="517" font-size="12.5" font-family="monospace" fill="#64748b" text-anchor="start" font-weight="normal">  → DeviceCommunicatorBase</text>
<text x="60" y="539" font-size="12.5" font-family="sans-serif" fill="#64748b" text-anchor="start" font-weight="normal">（CUDA 通用实现，被昇腾逐一覆盖）</text>
<rect x="710" y="640" width="250" height="50" rx="9" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="6 4"/>
<text x="835" y="670" font-size="14" font-family="sans-serif" fill="#c2410c" text-anchor="middle" font-weight="bold">横切：is_310p() / AscendDeviceType</text>
<line x1="835" y1="640" x2="838" y2="140.0" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="6 5"/>
<line x1="835" y1="640" x2="838" y2="524.0" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="6 5"/>
<text x="835" y="700" font-size="12" font-family="sans-serif" fill="#9a3412" text-anchor="middle" font-weight="normal">（构建期烙印 + 运行期复核，全库分流入口）</text>
