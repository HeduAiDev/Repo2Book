<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#059669"/></marker></defs>
<rect width="1280" height="720" fill="white"/>
<text x="640.0" y="34" font-size="19" font-family="sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">NPUPlatform：运行期分发的「总台」——身份替换属性 + 一批返回 qualname 的工厂钩子</text>
<rect x="500" y="300" width="280" height="130" rx="14" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.6"/>
<text x="640.0" y="340" font-size="19" font-family="sans-serif" fill="#ffffff" text-anchor="middle" font-weight="bold">NPUPlatform(Platform)</text>
<text x="640.0" y="370" font-size="14" font-family="monospace" fill="#dbeafe" text-anchor="middle" font-weight="normal">_enum = PlatformEnum.OOT</text>
<text x="640.0" y="396" font-size="13.5" font-family="sans-serif" fill="#bfdbfe" text-anchor="middle" font-weight="normal">继承 vLLM Platform 基类</text>
<text x="640.0" y="416" font-size="13.5" font-family="sans-serif" fill="#bfdbfe" text-anchor="middle" font-weight="normal">逐项覆盖默认实现</text>
<rect x="60" y="130" width="320" height="196" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="76" y="158" font-size="15.5" font-family="sans-serif" fill="#1d4ed8" text-anchor="start" font-weight="bold">身份替换类属性</text>
<text x="80" y="186" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">device_name / device_type = "npu"</text>
<text x="80" y="212" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">dispatch_key = "PrivateUse1"</text>
<text x="80" y="238" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">device_control_env_var =</text>
<text x="80" y="264" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">    "ASCEND_RT_VISIBLE_DEVICES"</text>
<text x="80" y="290" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">ray_device_key = "NPU"</text>
<text x="80" y="316" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">simple_compile_backend = "eager"</text>
<line x1="500" y1="345" x2="380" y2="228.0" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
<rect x="840" y="110" width="400" height="52" rx="9" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
