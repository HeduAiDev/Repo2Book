<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1180" height="720" fill="white"/>
<text x="590.0" y="36" font-size="20" font-family="sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">resolve_current_platform_cls_qualname：为什么装了插件就顶替、且平台唯一</text>
<rect x="70" y="70" width="420" height="150" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
<text x="86" y="98" font-size="16" font-family="sans-serif" fill="#475569" text-anchor="start" font-weight="bold">builtin_platform_plugins（问硬件）</text>
<text x="94" y="128" font-size="13.5" font-family="sans-serif" fill="#64748b" text-anchor="start" font-weight="normal">cuda_platform_plugin()  → 无 GPU → None</text>
<text x="94" y="156" font-size="13.5" font-family="sans-serif" fill="#64748b" text-anchor="start" font-weight="normal">rocm / tpu / xpu_platform_plugin() → None</text>
<text x="94" y="184" font-size="13.5" font-family="sans-serif" fill="#64748b" text-anchor="start" font-weight="normal">cpu_platform_plugin()  → None</text>
<rect x="690" y="70" width="420" height="150" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="706" y="98" font-size="16" font-family="sans-serif" fill="#1d4ed8" text-anchor="start" font-weight="bold">OOT 插件（装了就用）</text>
<text x="714" y="128" font-size="13.5" font-family="sans-serif" fill="#1e40af" text-anchor="start" font-weight="normal">ascend → register()</text>
<text x="714" y="156" font-size="13.5" font-family="sans-serif" fill="#1e40af" text-anchor="start" font-weight="normal">无条件 return  → 永远激活</text>
<text x="714" y="184" font-size="12.5" font-family="monospace" fill="#1e40af" text-anchor="start" font-weight="normal">'vllm_ascend.platform.NPUPlatform'</text>
<rect x="330" y="250" width="520" height="64" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
<text x="590.0" y="277" font-size="13.5" font-family="monospace" fill="#92400e" text-anchor="middle" font-weight="normal">for name, func in chain(builtin, oot):  platform_cls_qualname = func()</text>
<text x="590.0" y="300" font-size="14" font-family="sans-serif" fill="#92400e" text-anchor="middle" font-weight="bold">func() 返回非 None ⇒ name 进 activated_plugins</text>
