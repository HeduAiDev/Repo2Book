<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 800">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="1180" height="800" fill="white"/>
<text x="590.0" y="38" font-size="21" font-family="sans-serif" fill="#0f172a" text-anchor="middle" font-weight="bold">一根 qualname 字符串穿越四个阶段：import 被推迟到最后一刻</text>
<rect x="70" y="78" width="1040" height="152" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="92" y="110" font-size="18" font-family="sans-serif" fill="#3b82f6" text-anchor="start" font-weight="bold">① 安装期</text>
<text x="110" y="136" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">pip install vllm-ascend</text>
<text x="110" y="162" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">setuptools 把 setup.py 的 entry_points 写进包元数据：</text>
<text x="110" y="188" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">vllm.platform_plugins: ascend = vllm_ascend:register</text>
<text x="110" y="214" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">vllm.general_plugins: register_connector / model_loader / ...</text>
<rect x="70" y="260" width="1040" height="178" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="92" y="292" font-size="18" font-family="sans-serif" fill="#3b82f6" text-anchor="start" font-weight="bold">② 平台选择期</text>
<text x="110" y="318" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">首次读 vllm.platforms.current_platform → __getattr__ 拦截</text>
<text x="110" y="344" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">load_plugins_by_group('vllm.platform_plugins') → entry_points 发现 'ascend'</text>
<text x="110" y="370" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">plugin.load() 取出 register 函数（注意：只 load，不调用）</text>
<text x="110" y="396" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">resolve_current_platform_cls_qualname()：chain(builtin, oot) 逐个 func()</text>
<text x="110" y="422" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">builtin cuda/rocm/... 探测无硬件→None；register() 无条件→字符串</text>
<rect x="70" y="468" width="1040" height="152" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.6"/>
<text x="92" y="500" font-size="18" font-family="sans-serif" fill="#b91c1c" text-anchor="start" font-weight="bold">③ 懒加载实例化</text>
<text x="110" y="526" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">resolve_obj_by_qualname('vllm_ascend.platform.NPUPlatform')</text>
<text x="110" y="552" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">rsplit('.',1) → import_module('vllm_ascend.platform')  ← 此刻才真 import！</text>
<text x="110" y="578" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">连带 import torch_npu、触发 NPU 运行时；getattr 取出 NPUPlatform 类</text>
<text x="110" y="604" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">NPUPlatform() 实例化 → 缓存进 _current_platform 单例</text>
<rect x="70" y="650" width="1040" height="126" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.6"/>
<text x="92" y="682" font-size="18" font-family="sans-serif" fill="#b91c1c" text-anchor="start" font-weight="bold">④ 运行期分发</text>
<text x="110" y="708" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">引擎各处问 current_platform.get_attn_backend_cls(...) / get_device_communicator_cls()</text>
<text x="110" y="734" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">钩子返回 vllm_ascend.* 的 qualname 字符串 → 再经 resolve_obj_by_qualname 解析</text>
<text x="110" y="760" font-size="14.5" font-family="sans-serif" fill="#334155" text-anchor="start" font-weight="normal">check_and_update_config 把 parallel_config.worker_cls 'auto'→NPUWorker qualname</text>
<line x1="590.0" y1="232" x2="590.0" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
<line x1="590.0" y1="440" x2="590.0" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
<line x1="590.0" y1="622" x2="590.0" y2="648" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
<line x1="70" y1="453.0" x2="1110" y2="453.0" stroke="#b91c1c" stroke-width="2" stroke-dasharray="9 6"/>
<text x="1102" y="455.0" font-size="13" font-family="sans-serif" fill="#b91c1c" text-anchor="end" font-weight="bold">↑ 字符串态（蓝）：只在传递 qualname，零 import　│　已 import 类对象态（红）↓</text>
</svg>