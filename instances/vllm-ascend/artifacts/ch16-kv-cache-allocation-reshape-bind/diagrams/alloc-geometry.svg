<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arp" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker><marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1200" height="660" fill="white"/>
<text x="600.0" y="38" font-family="sans-serif" font-size="22" fill="#1e293b" text-anchor="middle" font-weight="bold">同一份 KV 字节，基座摆一条、昇腾摆两条</text>
<text x="600.0" y="62" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">_allocate_kv_cache_tensors：基座 torch.zeros 单块 int8；昇腾按 split_factor 拆独立 K/V，各自首地址 2MB 对齐</text>
<text x="120" y="98" font-family="sans-serif" font-size="15" fill="#2563eb" text-anchor="start" font-weight="bold">基座 gpu_model_runner.py</text>
<rect x="120" y="110" width="760" height="56" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="500.0" y="134.0" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">一整块 int8  torch.zeros(size)</text>
<text x="500.0" y="154.0" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">K 与 V 同住一张量（含 size-2 的 K/V 维），整块 shared_by 所有层</text>
<text x="896" y="142.0" font-family="sans-serif" font-size="12.5" fill="#2563eb" text-anchor="start">reshape：一次 view + permute</text>
<text x="120" y="216" font-family="sans-serif" font-size="15" fill="#7c3aed" text-anchor="start" font-weight="bold">昇腾 model_runner_v1.py</text>
<rect x="120" y="250" width="366.0" height="56" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="303.0" y="274.0" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">K_tensor (int8)</text>
<text x="303.0" y="294.0" font-family="monospace" font-size="11.5" fill="#64748b" text-anchor="middle">size // ((k+v)/k)</text>
<rect x="514.0" y="250" width="366.0" height="56" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="697.0" y="274.0" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">V_tensor (int8)</text>
<text x="697.0" y="294.0" font-family="monospace" font-size="11.5" fill="#64748b" text-anchor="middle">size // ((k+v)/v)</text>
<text x="120" y="242" font-family="sans-serif" font-size="11" fill="#dc2626" text-anchor="middle" font-weight="bold">▼ 2MB 对齐</text>
<text x="514.0" y="242" font-family="sans-serif" font-size="11" fill="#dc2626" text-anchor="middle" font-weight="bold">▼ 2MB 对齐</text>
<text x="500.0" y="328" font-family="sans-serif" font-size="10.5" fill="#64748b" text-anchor="middle">独立分配</text>
<text x="896" y="282.0" font-family="sans-serif" font-size="12.5" fill="#7c3aed" text-anchor="start">calc_split_factor 定比例</text>
<text x="120" y="358" font-family="sans-serif" font-size="13.5" fill="#d97706" text-anchor="start" font-weight="bold">DeepSeek-V3.2 sparse-c8 再追加（同一块对齐 int8 的两个视图）</text>
<rect x="120" y="370" width="471.2" height="56" rx="10" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
<text x="355.6" y="394.0" font-family="monospace" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">dsa_k (int8)</text>
<text x="355.6" y="414.0" font-family="sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle">indexer key</text>
<rect x="591.2" y="370" width="260.8" height="56" rx="10" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
<text x="721.6" y="394.0" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">dsa_k_scale</text>
<text x="721.6" y="414.0" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">scale_offset=_align_up</text>
<text x="591.2" y="362" font-family="sans-serif" font-size="11" fill="#d97706" text-anchor="middle">↕ 同一裸张量</text>
<text x="896" y="402.0" font-family="sans-serif" font-size="12.5" fill="#d97706" text-anchor="start">一次 register_buffer</text>
<text x="896" y="420.0" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="start">省 HCCL/Mooncake 注册条目</text>
<rect x="120" y="480" width="960" height="130" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
<text x="140" y="508" font-family="sans-serif" font-size="14" fill="#1e293b" text-anchor="start" font-weight="bold">为什么非拆不可：</text>
<text x="140" y="536" font-family="sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start">① PD 分离要求 kv_cache 的 0 维是 num_blocks、K/V 各自连续 —— 单块整张量做不到</text>
<text x="140" y="562" font-family="sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start">② Mooncake/ADXL 的 RDMA 注册要求首地址按 2MB 大页对齐 —— 多分配 alignment 字节再 _align_memory 切到边界</text>
<text x="140" y="588" font-family="sans-serif" font-size="12.5" fill="#1e293b" text-anchor="start">③ 一律先 int8 裸字节分配，dtype 留到 reshape 决定 —— 分配器只跟字节数打交道，bf16/fp8/int8-quant 同一条路</text>
</svg>