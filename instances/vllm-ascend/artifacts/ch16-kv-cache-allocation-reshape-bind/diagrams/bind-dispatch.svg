<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arp" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker><marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1120" height="640" fill="white"/>
<text x="560.0" y="38" font-family="sans-serif" font-size="21" fill="#1e293b" text-anchor="middle" font-weight="bold">bind：把 reshape 好的 KV 挂回各层 —— 按模型走三条路</text>
<text x="560.0" y="62" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">普通模型直接复用基座 bind_kv_cache；少数模型的层序/层数不规整，得特化</text>
<rect x="410.0" y="92" width="300" height="50" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
<text x="560.0" y="114" font-family="monospace" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">kv_caches  (reshape 产物)</text>
<text x="560.0" y="132" font-family="monospace" font-size="11.5" fill="#64748b" text-anchor="middle">model_config.hf_text_config.model_type ?</text>
<rect x="50.0" y="230" width="300" height="130" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="200" y="256" font-family="monospace" font-size="15" fill="#7c3aed" text-anchor="middle" font-weight="bold">deepseek_v4</text>
<text x="200" y="280" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">extract_dsv4_layer_index 排序</text>
<text x="200" y="300" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">MTP 层排到主模型层之后</text>
<text x="200" y="320" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">手填 self.kv_caches</text>
<text x="200" y="340" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">+ static_forward_context[l].kv_cache</text>
<line x1="560.0" y1="142" x2="200" y2="230" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar)"/>
<text x="380.0" y="182.0" font-family="sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle">== deepseek_v4</text>
<rect x="410.0" y="230" width="300" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="560.0" y="256" font-family="monospace" font-size="15" fill="#2563eb" text-anchor="middle" font-weight="bold">其它（普通模型）</text>
<text x="560.0" y="280" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">bind_kv_cache(</text>
<text x="560.0" y="300" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">  num_attn_module = 1)</text>
<text x="560.0" y="320" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">直接复用基座绑定</text>
<text x="560.0" y="340" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">按 layer_index 默认排序</text>
<line x1="560.0" y1="142" x2="560.0" y2="230" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
<text x="560.0" y="182.0" font-family="sans-serif" font-size="11" fill="#2563eb" text-anchor="middle">else</text>
<rect x="770.0" y="230" width="300" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="920" y="256" font-family="monospace" font-size="15" fill="#16a34a" text-anchor="middle" font-weight="bold">longcat_flash</text>
<text x="920" y="280" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">bind_kv_cache(</text>
<text x="920" y="300" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">  num_attn_module = 2)</text>
<text x="920" y="320" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">每解码层含 2 个</text>
<text x="920" y="340" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle">attention module</text>
<line x1="560.0" y1="142" x2="920" y2="230" stroke="#16a34a" stroke-width="2" marker-end="url(#ar)"/>
<text x="740.0" y="182.0" font-family="sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">== longcat_flash</text>
<rect x="320.0" y="410" width="480" height="56" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4"/>
<text x="560.0" y="434" font-family="monospace" font-size="13.5" fill="#d97706" text-anchor="middle" font-weight="bold">if enable_hamming_sparse:</text>
<text x="560.0" y="454" font-family="monospace" font-size="12.5" fill="#1e293b" text-anchor="middle">init_and_bind_hashk_cache  额外初始化 hashk cache</text>
<line x1="200" y1="360" x2="320.0" y2="410" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<line x1="560.0" y1="360" x2="560.0" y2="410" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<line x1="920" y1="360" x2="800.0" y2="410" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<rect x="390.0" y="510" width="340" height="50" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="560.0" y="532" font-family="monospace" font-size="13.5" fill="#1e293b" text-anchor="middle" font-weight="bold">self.kv_caches  +  forward_context</text>
<text x="560.0" y="550" font-family="sans-serif" font-size="11.5" fill="#16a34a" text-anchor="middle">每层 forward 时就地取用</text>
<line x1="560.0" y1="466" x2="560.0" y2="510" stroke="#16a34a" stroke-width="2" marker-end="url(#ar)"/>
</svg>