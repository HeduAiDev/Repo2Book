<rect width="1180" height="660" fill="white"/>
<text x="590.0" y="38" font-family="sans-serif" font-size="21" fill="#1e293b" text-anchor="middle" font-weight="bold">_adjust_kv_layout：把 block 维的 stride 钉成「一整页」</text>
<text x="590.0" y="62" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">as_strided 把 block 维 stride 钉成 num_element_per_page —— page 被 padding 抬大时，块间露出页对齐空隙</text>
<text x="130" y="96" font-family="sans-serif" font-size="13" fill="#1e293b" text-anchor="start" font-weight="bold">情形一  page == 自然块（16）：target_stride[0]=16=自然 stride[0] → 三块紧挨、无空隙（as_strided 退化成恒等）</text>
<rect x="130" y="110" width="112" height="44" rx="3" fill="#2563eb" fill-opacity="0.20" stroke="#2563eb" stroke-width="2"/>
<text x="186" y="137" font-family="monospace" font-size="12.5" fill="#2563eb" text-anchor="middle" font-weight="bold">block 0</text>
<text x="186" y="172" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">offset 0×16=0</text>
<rect x="242" y="110" width="112" height="44" rx="3" fill="#7c3aed" fill-opacity="0.20" stroke="#7c3aed" stroke-width="2"/>
<text x="298" y="137" font-family="monospace" font-size="12.5" fill="#7c3aed" text-anchor="middle" font-weight="bold">block 1</text>
<text x="298" y="172" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">offset 1×16=16</text>
<rect x="354" y="110" width="112" height="44" rx="3" fill="#16a34a" fill-opacity="0.20" stroke="#16a34a" stroke-width="2"/>
<text x="410" y="137" font-family="monospace" font-size="12.5" fill="#16a34a" text-anchor="middle" font-weight="bold">block 2</text>
<text x="410" y="172" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">offset 2×16=32</text>
<text x="130" y="236" font-family="sans-serif" font-size="13" fill="#1e293b" text-anchor="start" font-weight="bold">情形二  page=24 &gt; 自然块 16（page_size_bytes 被 padding）：target_stride[0]=24 → 每块 16 元素数据 + 8 元素页对齐空隙</text>
<rect x="130" y="250" width="112" height="44" rx="3" fill="#2563eb" fill-opacity="0.20" stroke="#2563eb" stroke-width="2"/>
<text x="186" y="277" font-family="monospace" font-size="12.5" fill="#2563eb" text-anchor="middle" font-weight="bold">block 0</text>
<rect x="242" y="250" width="56" height="44" rx="3" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1"/>
<text x="270" y="278" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">gap</text>
<text x="186" y="312" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">offset 0×24=0</text>
<rect x="298" y="250" width="112" height="44" rx="3" fill="#7c3aed" fill-opacity="0.20" stroke="#7c3aed" stroke-width="2"/>
<text x="354" y="277" font-family="monospace" font-size="12.5" fill="#7c3aed" text-anchor="middle" font-weight="bold">block 1</text>
<rect x="410" y="250" width="56" height="44" rx="3" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1"/>
<text x="438" y="278" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">gap</text>
<text x="354" y="312" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">offset 1×24=24</text>
<rect x="466" y="250" width="112" height="44" rx="3" fill="#16a34a" fill-opacity="0.20" stroke="#16a34a" stroke-width="2"/>
<text x="522" y="277" font-family="monospace" font-size="12.5" fill="#16a34a" text-anchor="middle" font-weight="bold">block 2</text>
<rect x="578" y="250" width="56" height="44" rx="3" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1"/>
<text x="606" y="278" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">gap</text>
<text x="522" y="312" font-family="monospace" font-size="10.5" fill="#64748b" text-anchor="middle">offset 2×24=48</text>
<text x="130" y="330" font-family="sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">0</text>
<text x="242" y="330" font-family="sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">16</text>
<text x="298" y="330" font-family="sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">24</text>
