<text x="466" y="330" font-family="sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">48</text>
<text x="578" y="330" font-family="sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">64</text>
<rect x="90" y="400" width="1000" height="96" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="1.6"/>
<text x="110" y="428" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="start" font-weight="bold">target_stride = (num_element_per_page, *stride[1:])</text>
<text x="110" y="452" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="start">block(第0)维强制成「一页」步长 num_element_per_page，其余维保持自然 stride</text>
<text x="110" y="474" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="start">对照基座：整块 view 自然 contiguous；仅 page_size 被 padding（情形二）时 as_strided 才露出页对齐空隙——多段视图据此在同一裸张量按页 overlap</text>
</svg>