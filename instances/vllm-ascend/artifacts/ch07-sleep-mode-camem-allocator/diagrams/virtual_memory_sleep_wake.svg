<text x="898.5" y="327.0" text-anchor="start" font-size="11" font-weight="bold" fill="#15803d">H2D</text>
<text x="590.0" y="552" text-anchor="middle" font-size="13" fill="#5b21b6">三态里那一行紫色虚拟地址值从不改变 → PyTorch 现存的张量指针、计算图引用全程有效，无需重建模型</text>
