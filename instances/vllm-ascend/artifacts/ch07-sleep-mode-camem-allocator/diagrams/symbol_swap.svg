<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 720" font-family="sans-serif">
<rect width="1140" height="720" fill="white"/>
<text x="570.0" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">移植 = 同构换符号</text>
<text x="570.0" y="60" text-anchor="middle" font-size="13" fill="#64748b">vllm/device_allocator/cumem.py　vs　vllm_ascend/device_allocator/camem.py</text>
<rect x="60" y="84" width="480" height="38" rx="7" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="300.0" y="109" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">vLLM cumem.py（GPU 原版）</text>
<rect x="600" y="84" width="480" height="38" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="840.0" y="109" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">vllm-ascend camem.py（NPU 移植）</text>
<rect x="60" y="134" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="134" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="147" text-anchor="start" font-size="10.5" fill="#94a3b8">拷贝原语</text>
<text x="70" y="164" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">libcudart.cudaMemcpy(dst, src, n)</text>
<text x="610" y="164" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">acl.rt.memcpy(dst, destMax, src, n, kind)</text>
<text x="570.0" y="160" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="174" width="480" height="34" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="174" width="480" height="34" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="187" text-anchor="start" font-size="10.5" fill="#94a3b8">C 扩展</text>
<text x="70" y="204" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">vllm.cumem_allocator</text>
<text x="610" y="204" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">vllm_ascend.vllm_ascend_C</text>
<text x="570.0" y="200" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="214" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="214" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="227" text-anchor="start" font-size="10.5" fill="#94a3b8">pluggable allocator</text>
<text x="70" y="244" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">torch.cuda.memory.CUDAPluggableAllocator</text>
<text x="610" y="244" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">torch.npu.memory.NPUPluggableAllocator</text>
<text x="570.0" y="240" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="254" width="480" height="34" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="254" width="480" height="34" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="267" text-anchor="start" font-size="10.5" fill="#94a3b8">内存池 / 上下文</text>
<text x="70" y="284" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">torch.cuda.memory.MemPool / use_mem_pool</text>
<text x="610" y="284" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">torch.npu.memory.MemPool / use_mem_pool</text>
<text x="570.0" y="280" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="294" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="294" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="307" text-anchor="start" font-size="10.5" fill="#94a3b8">清缓存</text>
<text x="70" y="324" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">torch.cuda.empty_cache()</text>
<text x="610" y="324" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">torch.npu.empty_cache()</text>
<text x="570.0" y="320" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="334" width="480" height="34" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="334" width="480" height="34" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="347" text-anchor="start" font-size="10.5" fill="#94a3b8">环境变量</text>
<text x="70" y="364" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">PYTORCH_CUDA_ALLOC_CONF</text>
<text x="610" y="364" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">PYTORCH_NPU_ALLOC_CONF</text>
<text x="570.0" y="360" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="374" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<rect x="600" y="374" width="480" height="34" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="70" y="387" text-anchor="start" font-size="10.5" fill="#94a3b8">.so 反查名</text>
<text x="70" y="404" text-anchor="start" font-size="12" font-family="monospace" fill="#1e3a8a">find_loaded_library("cumem_allocator")</text>
<text x="610" y="404" text-anchor="start" font-size="12" font-family="monospace" fill="#166534">find_loaded_library("vllm_ascend_C")</text>
<text x="570.0" y="400" text-anchor="middle" font-size="16" fill="#7c3aed">→</text>
<rect x="60" y="432" width="1020" height="34" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="570.0" y="454" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">结构性差异（非换符号——ascend 基于较早 vLLM 移植，之后上游又演进）</text>
<text x="70" y="484" text-anchor="start" font-size="11" fill="#64748b">差异点</text>
<text x="390" y="484" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#166534">ascend camem</text>
<text x="820" y="484" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1e3a8a">vLLM cumem（新版）</text>
<rect x="60" y="488" width="1020" height="30" rx="5" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
<text x="70" y="508" text-anchor="start" font-size="11.5" fill="#92400e">expandable_segments</text>
<text x="390" y="508" text-anchor="middle" font-size="11.5" fill="#166534">__init__ 期硬 assert 拒绝</text>
<text x="820" y="508" text-anchor="middle" font-size="11.5" fill="#1e3a8a">use_memory_pool 内临时关闭再恢复</text>
<rect x="60" y="524" width="1020" height="30" rx="5" fill="#ffffff" stroke="#fcd34d" stroke-width="1"/>
<text x="70" y="544" text-anchor="start" font-size="11.5" fill="#92400e">回调强引用（PR 22724）</text>
<text x="390" y="544" text-anchor="middle" font-size="11.5" fill="#166534">无</text>
<text x="820" y="544" text-anchor="middle" font-size="11.5" fill="#1e3a8a">有（防 GC 回收 bound method）</text>
<rect x="60" y="560" width="1020" height="30" rx="5" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
<text x="70" y="580" text-anchor="start" font-size="11.5" fill="#92400e">use_memory_pool 退出</text>
<text x="390" y="580" text-anchor="middle" font-size="11.5" fill="#166534">只 restore tag</text>
<text x="820" y="580" text-anchor="middle" font-size="11.5" fill="#1e3a8a">snapshot() 手动释放零分配</text>
<text x="570.0" y="704" text-anchor="middle" font-size="13" fill="#475569">类 / 方法 / 控制流逐行对位——sleep mode 的本质（保留 VA、解绑重绑物理页）与硬件无关，照搬最易跟上游同步</text>
</svg>