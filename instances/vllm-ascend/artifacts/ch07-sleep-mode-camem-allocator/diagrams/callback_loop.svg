<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="sans-serif">
<defs>
<marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#15803d"/></marker>
<marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#b91c1c"/></marker>
<marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
</defs>
<rect width="1080" height="600" fill="white"/>
<text x="540.0" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">pluggable allocator 的回调闭环</text>
<text x="540.0" y="60" text-anchor="middle" font-size="13" fill="#64748b">绿线＝分配记账　红线＝GC 弹账　紫线＝init_module 一次性登记回调</text>
<rect x="40" y="90" width="250" height="70" rx="9" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
<text x="165.0" y="120.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">torch（use_mem_pool 区间）</text>
<text x="165.0" y="138.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#334155">权重加载 / KV 分配</text>
<rect x="415" y="90" width="250" height="70" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="540.0" y="120.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">NPUPluggableAllocator</text>
<text x="540.0" y="138.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#334155">接管 malloc / free</text>
<rect x="790" y="90" width="250" height="70" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="915.0" y="120.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">vllm_ascend_C（C 扩展）</text>
<text x="915.0" y="138.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#334155">reserve + map / unmap 物理页</text>
<rect x="820" y="230" width="190" height="60" rx="9" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="915.0" y="255.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">物理页 + handle</text>
<text x="915.0" y="273.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#334155">(dev,size,VA,phys)</text>
<rect x="400" y="250" width="280" height="64" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="540.0" y="277.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">python_malloc_callback</text>
<text x="540.0" y="295.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">记 handle + 贴 current_tag</text>
<rect x="370" y="410" width="340" height="90" rx="9" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
<text x="540.0" y="441.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">pointer_to_data 账本</text>
<text x="540.0" y="459.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">{ 设备VA : AllocationData(handle, tag,</text>
<text x="540.0" y="477.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">cpu_backup_tensor) }</text>
<rect x="790" y="410" width="250" height="64" rx="9" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="915.0" y="437.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">python_free_callback</text>
<text x="915.0" y="455.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">弹账本 · 交还 handle</text>
<rect x="40" y="410" width="250" height="64" rx="9" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="165.0" y="437.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">张量被 GC</text>
<text x="165.0" y="455.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">torch 调 C 扩展 free</text>
<line x1="290" y1="125" x2="415" y2="125" stroke="#15803d" stroke-width="2" marker-end="url(#g)"/>
<text x="352" y="118" text-anchor="middle" font-size="11" fill="#15803d">分配</text>
<line x1="665" y1="125" x2="790" y2="125" stroke="#15803d" stroke-width="2" marker-end="url(#g)"/>
<line x1="915" y1="160" x2="915" y2="230" stroke="#15803d" stroke-width="2" marker-end="url(#g)"/>
<line x1="820" y1="262" x2="680" y2="276" stroke="#15803d" stroke-width="2" marker-end="url(#g)"/>
<text x="752" y="258" text-anchor="middle" font-size="11" fill="#15803d">回调</text>
<line x1="540" y1="314" x2="540" y2="410" stroke="#15803d" stroke-width="2" marker-end="url(#g)"/>
<text x="556" y="365" text-anchor="start" font-size="11" fill="#15803d">写入</text>
<line x1="290" y1="442" x2="370" y2="455" stroke="#b91c1c" stroke-width="2" marker-end="url(#r)"/>
<line x1="790" y1="448" x2="710" y2="455" stroke="#b91c1c" stroke-width="2" marker-end="url(#r)"/>
<text x="750" y="440" text-anchor="middle" font-size="11" fill="#b91c1c">弹出</text>
<line x1="915" y1="410" x2="915" y2="290" stroke="#b91c1c" stroke-width="2" marker-end="url(#r)"/>
<text x="980" y="352" text-anchor="middle" font-size="11" fill="#b91c1c">交还 handle</text>
<line x1="500" y1="160" x2="510" y2="250" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#b)"/>
<text x="430" y="205" text-anchor="middle" font-size="11" fill="#7c3aed">init_module</text>
<text x="430" y="220" text-anchor="middle" font-size="11" fill="#7c3aed">登记回调</text>
<text x="540.0" y="560" text-anchor="middle" font-size="13" fill="#475569">账本是 sleep / wake_up 能逐块 offload、逐块重映射的唯一依据</text>
<text x="540.0" y="582" text-anchor="middle" font-size="12" fill="#7c3aed">回调存进 C 扩展的全局变量 → CaMemAllocator 必须是单例</text>
</svg>