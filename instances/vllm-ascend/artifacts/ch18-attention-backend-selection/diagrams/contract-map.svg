<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0d9488"/></marker><marker id="r" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1080" height="660" fill="white"/>
<text x="540.0" y="36" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#0f172a" font-weight="bold">契约对账：vLLM AttentionBackend  ↔  AscendAttentionBackend</text>
<text x="540.0" y="60" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569" font-weight="normal">哪些是 v1 强制契约、哪些是昇腾额外保留</text>
<text x="260.0" y="92" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1d4ed8" font-weight="bold">vLLM 侧契约（vllm/v1/attention/backend.py）</text>
<text x="820.0" y="92" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6d28d9" font-weight="bold">昇腾落点（vllm_ascend/.../attention_v1.py）</text>
<rect x="50" y="108" width="420" height="24" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="260.0" y="125" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#1e3a8a" font-weight="bold">组 A · 4 个 @abstractmethod（必须实现）</text>
<rect x="50" y="140" width="420" height="50" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="66" y="170" text-anchor="start" font-family="monospace" font-size="14" fill="#1e3a8a" font-weight="bold">get_name()</text>
<rect x="610" y="140" width="420" height="50" rx="7" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="626" y="170" text-anchor="start" font-family="sans-serif" font-size="12.5" fill="#b91c1c" font-weight="bold">→ 伪装返回 "FLASH_ATTN"  ⚠ HACK</text>
<line x1="474" y1="165.0" x2="606" y2="165.0" stroke="#dc2626" stroke-width="2" marker-end="url(#r)"/>
<rect x="50" y="198" width="420" height="50" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="66" y="228" text-anchor="start" font-family="monospace" font-size="14" fill="#1e3a8a" font-weight="bold">get_impl_cls()</text>
<rect x="610" y="198" width="420" height="50" rx="7" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="626" y="228" text-anchor="start" font-family="sans-serif" font-size="12.5" fill="#5b21b6" font-weight="normal">→ 按 enable_cp() 运行期二选一</text>
<line x1="474" y1="223.0" x2="606" y2="223.0" stroke="#8b5cf6" stroke-width="2" marker-end="url(#b)"/>
<rect x="50" y="256" width="420" height="50" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="66" y="286" text-anchor="start" font-family="monospace" font-size="14" fill="#1e3a8a" font-weight="bold">get_builder_cls()</text>
<rect x="610" y="256" width="420" height="50" rx="7" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="626" y="286" text-anchor="start" font-family="sans-serif" font-size="12.5" fill="#5b21b6" font-weight="normal">→ 按 enable_cp() 运行期二选一</text>
<line x1="474" y1="281.0" x2="606" y2="281.0" stroke="#8b5cf6" stroke-width="2" marker-end="url(#b)"/>
<rect x="50" y="314" width="420" height="50" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="66" y="344" text-anchor="start" font-family="monospace" font-size="14" fill="#1e3a8a" font-weight="bold">get_kv_cache_shape()</text>
<rect x="610" y="314" width="420" height="50" rx="7" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="626" y="344" text-anchor="start" font-family="sans-serif" font-size="12.5" fill="#5b21b6" font-weight="normal">→ (2, num_blocks, block_size, …)</text>
<line x1="474" y1="339.0" x2="606" y2="339.0" stroke="#8b5cf6" stroke-width="2" marker-end="url(#b)"/>
<rect x="50" y="378" width="420" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
<text x="260.0" y="395" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#854d0e" font-weight="bold">组 B · 基类自带默认实现（可覆写，非 abstract）</text>
<rect x="50" y="410" width="420" height="50" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="1.5"/>
<text x="66" y="432" text-anchor="start" font-family="monospace" font-size="13" fill="#854d0e" font-weight="bold">get_supported_kernel_block_sizes()</text>
<text x="66" y="450" text-anchor="start" font-family="sans-serif" font-size="11.5" fill="#a16207" font-weight="normal">默认 [MultipleOf(1)]</text>
<rect x="610" y="410" width="420" height="50" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="1.5"/>
<text x="626" y="440" text-anchor="start" font-family="sans-serif" font-size="13" fill="#854d0e" font-weight="bold">→ 覆写返回 [128]</text>
<line x1="474" y1="435.0" x2="606" y2="435.0" stroke="#eab308" stroke-width="2" marker-end="url(#a)"/>
<rect x="50" y="492" width="420" height="66" rx="7" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
<text x="260.0" y="516" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b" font-weight="bold">（v1 基类无此契约点）</text>
<text x="260.0" y="536" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" font-weight="normal">基座 vllm/v1/attention/ 全目录无 def、无调用</text>
<rect x="610" y="478" width="420" height="94" rx="7" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
<text x="820.0" y="500" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#334155" font-weight="bold">组 C · 昇腾额外保留（v0 遗留接口）</text>
<text x="626" y="524" text-anchor="start" font-family="monospace" font-size="13.5" fill="#1e293b" font-weight="bold">swap_blocks() / copy_blocks()</text>
<text x="626" y="544" text-anchor="start" font-family="sans-serif" font-size="11.5" fill="#475569" font-weight="normal">按 (2, …) 布局做块级索引搬运</text>
<text x="540.0" y="518" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94a3b8" font-weight="bold">✗</text>
