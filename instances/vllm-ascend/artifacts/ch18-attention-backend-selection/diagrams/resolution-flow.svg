<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="b" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#0d9488"/></marker><marker id="r" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1080" height="540" fill="white"/>
<text x="540.0" y="36" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#0f172a" font-weight="bold">OOT 后端被接进来的两条线：占位声明 vs 真正解析路径</text>
<rect x="70.0" y="80" width="460" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="300" y="102" text-anchor="middle" font-family="monospace" font-size="13.5" fill="#1e3a8a" font-weight="bold">selector.get_attn_backend(…)</text>
<text x="300" y="120" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1e3a8a" font-weight="normal">vLLM 组装 AttentionSelectorConfig（含 use_mla/use_sparse）</text>
<line x1="300" y1="132" x2="300" y2="166" stroke="#3b82f6" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="70.0" y="166" width="460" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="300" y="188" text-anchor="middle" font-family="monospace" font-size="13.5" fill="#1e3a8a" font-weight="bold">_cached_get_attn_backend(…)  @cache</text>
<text x="300" y="206" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1e3a8a" font-weight="normal">调 current_platform.get_attn_backend_cls(…)</text>
<line x1="300" y1="218" x2="300" y2="252" stroke="#3b82f6" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="70.0" y="252" width="460" height="52" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
<text x="300" y="274" text-anchor="middle" font-family="monospace" font-size="13.5" fill="#5b21b6" font-weight="bold">NPUPlatform.get_attn_backend_cls(…)</text>
<text x="300" y="292" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b21b6" font-weight="normal">三元 key 查 backend_map → 返回点分类路径字符串</text>
<line x1="300" y1="304" x2="300" y2="338" stroke="#8b5cf6" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="70.0" y="338" width="460" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="300" y="360" text-anchor="middle" font-family="monospace" font-size="13.5" fill="#1e3a8a" font-weight="bold">resolve_obj_by_qualname("vllm_ascend.…")</text>
<text x="300" y="378" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1e3a8a" font-weight="normal">importlib 延迟解析字符串 → 后端类对象</text>
<line x1="300" y1="390" x2="300" y2="424" stroke="#3b82f6" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="70.0" y="424" width="460" height="52" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
<text x="300" y="446" text-anchor="middle" font-family="monospace" font-size="13.5" fill="#0f766e" font-weight="bold">AscendAttentionBackend  类</text>
<text x="300" y="464" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#0f766e" font-weight="normal">vLLM 拿到后端类，后续调 get_name/get_impl_cls…</text>
<text x="300" y="502" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#475569" font-weight="bold">主解析路径（运行期，按需触发）</text>
<rect x="800" y="95" width="240" height="320" rx="10" fill="#fafafa" stroke="#a8a29e" stroke-width="1.8" stroke-dasharray="6,5"/>
<text x="920.0" y="122" text-anchor="middle" font-family="sans-serif" font-size="13.5" fill="#57534e" font-weight="bold">导入期 · 占位声明</text>
<rect x="820" y="145" width="200" height="72" rx="7" fill="#f5f5f4" stroke="#78716c" stroke-width="1.5"/>
<text x="920.0" y="170" text-anchor="middle" font-family="monospace" font-size="12" fill="#44403c" font-weight="bold">@register_backend(</text>
<text x="920.0" y="188" text-anchor="middle" font-family="monospace" font-size="12" fill="#44403c" font-weight="bold">  CUSTOM, "ASCEND")</text>
<text x="920.0" y="206" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#57534e" font-weight="normal">装饰 AscendAttentionBackend</text>
<line x1="920.0" y1="217" x2="920.0" y2="248" stroke="#a8a29e" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a)"/>
<rect x="820" y="250" width="200" height="64" rx="7" fill="#f5f5f4" stroke="#78716c" stroke-width="1.5"/>
<text x="920.0" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#44403c" font-weight="bold">_ATTN_OVERRIDES[CUSTOM]</text>
<text x="920.0" y="292" text-anchor="middle" font-family="monospace" font-size="11" fill="#44403c" font-weight="bold">= "ASCEND"</text>
<text x="920.0" y="308" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#57534e" font-weight="normal">占住 CUSTOM 槽，装饰器 no-op</text>
<rect x="820" y="332" width="200" height="66" rx="7" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
<text x="920.0" y="354" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#92400e" font-weight="bold">声明「CUSTOM 由昇腾接管」</text>
<text x="920.0" y="372" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#92400e" font-weight="normal">但本版不靠它解析后端——</text>
<text x="920.0" y="388" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#92400e" font-weight="normal">真正解析走左侧点分路径</text>
</svg>