<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="1320" height="760" fill="white"/>
<text x="660.0" y="44" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">AscendFusedMoE：继承 vLLM FusedMoE，只换三个头</text>
<text x="660.0" y="74" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">super().__init__() 复用整副身体；昇腾只替 quant_method / runner / forward_impl</text>
<rect x="60" y="110" width="540" height="590" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 5"/>
<text x="330.0" y="144" font-size="16" text-anchor="middle" fill="#64748b" font-weight="bold" font-family="sans-serif">身 · super().__init__() 继承复用，一行不改</text>
<text x="90" y="200" font-size="14" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 权重创建（w13_weight / w2_weight 参数与形状）</text>
<text x="90" y="256" font-size="14" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 路由参数（top_k / renormalize / topk_group …）</text>
<text x="90" y="312" font-size="14" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• EP / DP / TP 并行配置与 group 句柄</text>
<text x="90" y="368" font-size="14" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• weight_loader（按 TP/EP 切分加载权重）</text>
<text x="90" y="424" font-size="14" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• FusedMoE 调用约定 forward(hidden, router_logits)</text>
<text x="90" y="480" font-size="14" text-anchor="start" fill="#475569" font-weight="normal" font-family="sans-serif">• 容错 / EPLB 接口（expert_map / log2phy 占位）</text>
<rect x="700" y="140" width="560" height="158" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="720" y="170" font-size="15" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">头①  quant_method + base_quant_method</text>
<text x="724" y="200" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">→ AscendUnquantizedFusedMoEMethod</text>
<text x="724" y="224" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">apply(): select_experts → fused_experts</text>
<text x="724" y="248" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">base_quant_method 必须同步换，</text>
<text x="724" y="272" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">否则基类 dispatch 回上游会 raise</text>
<line x1="600" y1="219" x2="700" y2="219" stroke="#b91c1c" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="700" y="320" width="560" height="158" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="720" y="350" font-size="15" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">头②  runner</text>
<text x="724" y="380" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">→ AscendMoERunner（只改 2 个旋钮）</text>
<text x="724" y="404" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">use_dp_chunking=False  ⇒ 走 forward_impl</text>
<text x="724" y="428" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">_fused_output_is_reduced：告诉基类</text>
<text x="724" y="452" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">MC2/AllToAll 的 finalize 已 all-reduce</text>
<line x1="600" y1="399" x2="700" y2="399" stroke="#b91c1c" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="700" y="500" width="560" height="158" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
<text x="720" y="530" font-size="15" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">头③  forward_impl（覆写）</text>
<text x="724" y="560" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">prepare → apply → finalize 三段</text>
<text x="724" y="584" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">① comm.prepare 通信前置</text>
<text x="724" y="608" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">② quant_method.apply 选专家+算</text>
<text x="724" y="632" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="sans-serif">③ comm.finalize 通信后置</text>
<line x1="600" y1="579" x2="700" y2="579" stroke="#b91c1c" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="980.0" y="130" font-size="13" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">替换（换头）</text>
<text x="650.0" y="712" font-size="13" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">身不变 = 继承；头被替 = 覆写。这是 ch23『换头不换身』在全书最大单体算子上的压力测试。</text>
</svg>