<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 700" font-family="sans-serif">
<rect width="1340" height="700" fill="white"/>
<text x="670.0" y="42" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">batch-invariant：两步消除批内非确定性</text>
<text x="670.0" y="70" font-size="13.5" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="monospace">init_batch_invariance（VLLM_BATCH_INVARIANT=1 时启动期一次性）</text>
<rect x="70" y="110" width="580" height="290" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
<text x="360.0" y="144" font-size="16" text-anchor="middle" fill="#b45309" font-weight="bold" font-family="sans-serif">① override_envs_for_invariance — 关漂移源</text>
<text x="98" y="180" font-size="13.5" text-anchor="start" fill="#7c2d12" font-weight="bold" font-family="monospace">weight_nz_mode = 0</text>
<text x="98" y="202" font-size="12" text-anchor="start" fill="#92400e" font-weight="normal" font-family="sans-serif">关 NZ 权重重排（不同排布→不同累加序）</text>
<text x="98" y="234" font-size="13.5" text-anchor="start" fill="#7c2d12" font-weight="bold" font-family="monospace">enable_matmul_allreduce = False</text>
<text x="98" y="256" font-size="12" text-anchor="start" fill="#92400e" font-weight="normal" font-family="sans-serif">关 matmul-allreduce 融合</text>
<text x="98" y="288" font-size="13.5" text-anchor="start" fill="#7c2d12" font-weight="bold" font-family="monospace">HCCL_DETERMINISTIC = "strict"</text>
<text x="98" y="310" font-size="12" text-anchor="start" fill="#92400e" font-weight="normal" font-family="sans-serif">集合通信强制确定性 reduce 顺序</text>
<text x="98" y="342" font-size="13.5" text-anchor="start" fill="#7c2d12" font-weight="bold" font-family="monospace">LCCL_DETERMINISTIC = "1"</text>
<text x="98" y="364" font-size="12" text-anchor="start" fill="#92400e" font-weight="normal" font-family="sans-serif">同上（卡内通信库）</text>
<rect x="690" y="110" width="580" height="290" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="980.0" y="144" font-size="16" text-anchor="middle" fill="#1d4ed8" font-weight="bold" font-family="sans-serif">② enable_batch_invariant_mode — 替换算子</text>
<text x="718" y="180" font-size="13" text-anchor="start" fill="#1e3a8a" font-weight="normal" font-family="monospace">torch.library.Library("aten", "IMPL") 在 NPU 上替换：</text>
<text x="730" y="212" font-size="13" text-anchor="start" fill="#1e40af" font-weight="normal" font-family="monospace">• aten::mm / matmul / addmm / bmm</text>
<text x="730" y="242" font-size="13" text-anchor="start" fill="#1e40af" font-weight="normal" font-family="monospace">• aten::softmax / _softmax</text>
<text x="730" y="272" font-size="13" text-anchor="start" fill="#1e40af" font-weight="normal" font-family="monospace">• aten::sum（+ torch.sum 猴补）</text>
<text x="718" y="320" font-size="13" text-anchor="start" fill="#1e3a8a" font-weight="normal" font-family="sans-serif">→ 固定分块 kernel（AscendC 优先、triton 回退）</text>
<text x="718" y="346" font-size="12" text-anchor="start" fill="#1d4ed8" font-weight="normal" font-family="monospace">matmul_persistent: BLOCK_K 常量 · float32 累加 · allow_tf32=False</text>
<rect x="70" y="430" width="1200" height="230" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/>
<text x="670.0" y="462" font-size="15" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">效果：同一行 token 无论和谁组 batch，reduce 顺序相同 ⇒ 逐位相同</text>
<text x="360" y="500" font-size="13.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">batch = [ 行A ]</text>
<rect x="290" y="520" width="140" height="26" rx="6" fill="#fde68a" stroke="#94a3b8" stroke-width="1.4"/>
<text x="360" y="538" font-size="12.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">行A</text>
<text x="360" y="630" font-size="12.5" text-anchor="middle" fill="#b45309" font-weight="bold" font-family="monospace">行A 输出 = bits(行A)</text>
<text x="980" y="500" font-size="13.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">batch = [ 行A, 行B, 行C ]</text>
<rect x="910" y="520" width="140" height="26" rx="6" fill="#fde68a" stroke="#94a3b8" stroke-width="1.4"/>
<text x="980" y="538" font-size="12.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">行A</text>
<rect x="910" y="554" width="140" height="26" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.4"/>
<text x="980" y="572" font-size="12.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">行B</text>
<rect x="910" y="588" width="140" height="26" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.4"/>
<text x="980" y="606" font-size="12.5" text-anchor="middle" fill="#334155" font-weight="bold" font-family="sans-serif">行C</text>
<text x="980" y="630" font-size="12.5" text-anchor="middle" fill="#b45309" font-weight="bold" font-family="monospace">行A 输出 = bits(行A)</text>
<text x="670.0" y="580" font-size="40" text-anchor="middle" fill="#10b981" font-weight="bold" font-family="sans-serif">=</text>
<text x="670.0" y="626" font-size="13" text-anchor="middle" fill="#059669" font-weight="bold" font-family="sans-serif">逐位相同</text>
</svg>