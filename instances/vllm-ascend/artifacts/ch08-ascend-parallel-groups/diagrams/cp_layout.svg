<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560">
<defs><marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
<rect width="1080" height="560" fill="white"/>
<text x="540.0" y="42" font-family="sans-serif" font-size="25" font-weight="bold" fill="#0f172a" text-anchor="middle">上下文并行归口：样例 C（world=4, tp=2, pcp=2, dcp=2）</text>
<text x="540.0" y="72" font-family="monospace" font-size="14.5" fill="#64748b" text-anchor="middle">all_ranks = arange(4).reshape(...,pcp=2,tp=2) = [[0,1],[2,3]]  （行=pcp，列=tp）</text>
<text x="184.0" y="146" font-family="sans-serif" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">基座 TP（行向）</text>
<text x="184.0" y="168" font-family="monospace" font-size="12.5" fill="#64748b" text-anchor="middle">view(-1, tp=2)</text>
<rect x="120" y="190" width="64" height="64" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="152.0" y="230.0" font-family="monospace" font-size="22" font-weight="bold" fill="#2563eb" text-anchor="middle">0</text>
<rect x="184" y="190" width="64" height="64" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="216.0" y="230.0" font-family="monospace" font-size="22" font-weight="bold" fill="#2563eb" text-anchor="middle">1</text>
<rect x="120" y="254" width="64" height="64" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
<text x="152.0" y="294.0" font-family="monospace" font-size="22" font-weight="bold" fill="#1d4ed8" text-anchor="middle">2</text>
<rect x="184" y="254" width="64" height="64" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
<text x="216.0" y="294.0" font-family="monospace" font-size="22" font-weight="bold" fill="#1d4ed8" text-anchor="middle">3</text>
<rect x="116" y="186" width="136" height="72" rx="10" fill="none" stroke="#2563eb" stroke-width="3.5"/>
<rect x="116" y="250" width="136" height="72" rx="10" fill="none" stroke="#1d4ed8" stroke-width="3.5"/>
<text x="184.0" y="348" font-family="sans-serif" font-size="13" fill="#475569" text-anchor="middle">每行一组 → [0,1] · [2,3]</text>
<text x="184.0" y="368" font-family="sans-serif" font-size="12.5" fill="#94a3b8" text-anchor="middle"></text>
<text x="544.0" y="146" font-family="sans-serif" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">DCP（复用 TP 的卡）</text>
<text x="544.0" y="168" font-family="monospace" font-size="12.5" fill="#64748b" text-anchor="middle">reshape(-1, dcp=2)</text>
<rect x="480" y="190" width="64" height="64" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="512.0" y="230.0" font-family="monospace" font-size="22" font-weight="bold" fill="#16a34a" text-anchor="middle">0</text>
<rect x="544" y="190" width="64" height="64" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="576.0" y="230.0" font-family="monospace" font-size="22" font-weight="bold" fill="#16a34a" text-anchor="middle">1</text>
<rect x="480" y="254" width="64" height="64" rx="7" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
<text x="512.0" y="294.0" font-family="monospace" font-size="22" font-weight="bold" fill="#15803d" text-anchor="middle">2</text>
<rect x="544" y="254" width="64" height="64" rx="7" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
<text x="576.0" y="294.0" font-family="monospace" font-size="22" font-weight="bold" fill="#15803d" text-anchor="middle">3</text>
<rect x="476" y="186" width="136" height="72" rx="10" fill="none" stroke="#16a34a" stroke-width="3.5"/>
<rect x="476" y="250" width="136" height="72" rx="10" fill="none" stroke="#15803d" stroke-width="3.5"/>
<text x="544.0" y="348" font-family="sans-serif" font-size="13" fill="#475569" text-anchor="middle">此处 dcp==tp → 整组当 DCP</text>
<text x="544.0" y="368" font-family="sans-serif" font-size="12.5" fill="#94a3b8" text-anchor="middle">dcp ≤ tp，把 TP 组再细分</text>
<text x="904.0" y="146" font-family="sans-serif" font-size="17" font-weight="bold" fill="#0f172a" text-anchor="middle">PCP（列向，跨 tp 跳取）</text>
<text x="904.0" y="168" font-family="monospace" font-size="12.5" fill="#64748b" text-anchor="middle">transpose(3,4).reshape(-1, pcp=2)</text>
<rect x="840" y="190" width="64" height="64" rx="7" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="872.0" y="230.0" font-family="monospace" font-size="22" font-weight="bold" fill="#7c3aed" text-anchor="middle">0</text>
<rect x="904" y="190" width="64" height="64" rx="7" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
<text x="936.0" y="230.0" font-family="monospace" font-size="22" font-weight="bold" fill="#6d28d9" text-anchor="middle">1</text>
<rect x="840" y="254" width="64" height="64" rx="7" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="872.0" y="294.0" font-family="monospace" font-size="22" font-weight="bold" fill="#7c3aed" text-anchor="middle">2</text>
<rect x="904" y="254" width="64" height="64" rx="7" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
<text x="936.0" y="294.0" font-family="monospace" font-size="22" font-weight="bold" fill="#6d28d9" text-anchor="middle">3</text>
<rect x="836" y="186" width="72" height="136" rx="10" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
<rect x="900" y="186" width="72" height="136" rx="10" fill="none" stroke="#6d28d9" stroke-width="3.5"/>
<text x="904.0" y="348" font-family="sans-serif" font-size="13" fill="#475569" text-anchor="middle">每列一组 → [0,2] · [1,3]</text>
<text x="904.0" y="368" font-family="sans-serif" font-size="12.5" fill="#94a3b8" text-anchor="middle">把 pcp 换到末尾再切</text>
<rect x="120" y="396" width="840" height="56" rx="12" fill="#fdf4ff" stroke="#a21caf" stroke-width="1.8"/>
<text x="540.0" y="419" font-family="sans-serif" font-size="14.5" font-weight="bold" fill="#86198f" text-anchor="middle">CP 不增 world：只在已有的卡上换维度切。组的排布在此讲清</text>
<text x="540.0" y="440" font-family="monospace" font-size="12.5" fill="#a21caf" text-anchor="middle">attention 篇只在运行期用 enable_cp() 决定是否经这些组做 CP all_gather</text>
</svg>