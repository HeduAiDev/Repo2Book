<text x="630.0" y="44" font-family="sans-serif" font-size="25" font-weight="bold" fill="#0f172a" text-anchor="middle">加法式扩展：昇腾组叠在基座组之上，不替换、不重绑</text>
<text x="630.0" y="74" font-family="sans-serif" font-size="14.5" fill="#64748b" text-anchor="middle">两层都调同一个基座工厂 init_model_parallel_group 造 GroupCoordinator——这是「复用」的接缝</text>
