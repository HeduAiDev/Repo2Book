<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 800">
<defs><marker id="ap" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="1020" height="800" fill="white"/>
<text x="510.0" y="44" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1e293b">netloader.load_model：能拉就拉，拉不动就优雅回退</text>
<text x="510.0" y="74" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b">弹性网络加载是快路径；任何一条岔路都退回 vLLM 的 DefaultModelLoader</text>
<rect x="110.0" y="100" width="360" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="290.0" y="132.5" text-anchor="middle" font-family="monospace" font-size="17" font-weight="bold" fill="#5b21b6">load_model(vllm_config, model_config)</text>
<polygon points="290,184 475,250 290,316 105,250" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="290" y="235.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#92400e">source 有效性判断</text>
<text x="290" y="255.0" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">① 非 None  ② 是 list</text>
<text x="290" y="275.0" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">③ 本 rank 在 source 内</text>
<rect x="110.0" y="356" width="360" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="290.0" y="388.0" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5b21b6">initialize_model：先建一个空骨架</text>
<rect x="110.0" y="440" width="360" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="290.0" y="471.5" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#5b21b6">elastic_load：从对等实例弹性拉权重填入</text>
<polygon points="290,516 475,576 290,636 105,576" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="290" y="571.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#92400e">elastic_load</text>
<text x="290" y="591.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#92400e">返回 None？</text>
<rect x="110.0" y="692" width="360" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="290.0" y="726.0" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#166534">拉到权重 → 返回填好的模型</text>
<rect x="560" y="217" width="440" height="66" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="246.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#475569">回退①：revert_to_default</text>
<text x="780.0" y="265.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#475569">→ DefaultModelLoader（load_format=auto）</text>
<rect x="560" y="543" width="440" height="66" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="572.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#475569">回退②：清 NPU cache 后 revert_to_default</text>
<text x="780.0" y="591.0" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#475569">→ 同样走 DefaultModelLoader</text>
<line x1="290" y1="152" x2="290" y2="184" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<line x1="290" y1="316" x2="290" y2="356" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<text x="336" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">有效</text>
<line x1="475" y1="250" x2="554" y2="250" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<text x="517.5" y="240" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">无效（任一成立）</text>
<line x1="290" y1="408" x2="290" y2="440" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<line x1="290" y1="492" x2="290" y2="516" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<line x1="290" y1="636" x2="290" y2="692" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<text x="356" y="668" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">否（成功）</text>
<line x1="475" y1="576" x2="554" y2="576" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
<text x="517.5" y="566" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">是（拉取失败）</text>
</svg>