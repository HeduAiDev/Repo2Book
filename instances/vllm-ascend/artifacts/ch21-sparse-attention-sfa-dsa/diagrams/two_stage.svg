<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 660" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#475569"/></marker></defs>
<rect width="1340" height="660" fill="white"/>
<text x="670.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">两段式稀疏注意力：先挑出少数最相关的 KV，再只算这部分</text>
<text x="670.0" y="68" text-anchor="middle" font-size="14.5" fill="#64748b">把全长注意力的 O(L) 开销，压到只跟 top-k（DSA 512 / SFA 2048）相关</text>
<rect x="50.0" y="150" width="200" height="56" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.7"/>
<text x="150" y="172.94" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">query</text>
<text x="150" y="190.58" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e293b">（当前 token 的查询）</text>
<rect x="35.0" y="300" width="230" height="74" rx="9" fill="#fff7ed" stroke="#b45309" stroke-width="1.7"/>
<text x="150" y="322.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#b45309">全长 KV cache</text>
<text x="150" y="341.25" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">L 个历史位置</text>
<text x="150" y="357.41" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">MLA 低秩 latent（回指 ch20）</text>
<rect x="410.0" y="120" width="300" height="130" rx="9" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="560" y="148.44" text-anchor="middle" font-size="16" font-weight="bold" fill="#7c3aed">阶段一 · Lightning Indexer</text>
<text x="560" y="171.42" text-anchor="middle" font-size="13" font-weight="normal" fill="#1e293b">低维投影打分</text>
<text x="560" y="188.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">（index_n_heads=64, head_dim=128）</text>
<text x="560" y="206.75" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">对 L 个 KV 各算一个</text>
<text x="560" y="224.25" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">「相关性代理分数」</text>
<line x1="252" y1="150" x2="408" y2="150" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="330.0" y="141" text-anchor="middle" font-size="12.5" fill="#475569">q_li 投影 + RoPE</text>
<line x1="267" y1="300" x2="408" y2="300" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="337.5" y="291" text-anchor="middle" font-size="12.5" fill="#475569">k_li / 压缩 KV</text>
<rect x="410.0" y="330" width="300" height="78" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="560" y="354.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c3aed">选出 top-k 索引</text>
<text x="560" y="373.25" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">DSA：index_topk = 512</text>
<text x="560" y="390.75" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">SFA：sparse_count = 2048</text>
<line x1="560" y1="250" x2="560" y2="330" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="574" y="296" font-size="12.5" fill="#6d28d9">argsort 取前 k 个</text>
<rect x="865.0" y="225" width="290" height="130" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.7"/>
<text x="1010" y="253.44" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">阶段二 · 稀疏注意力</text>
<text x="1010" y="276.42" text-anchor="middle" font-size="13" font-weight="normal" fill="#1e293b">只对 top-k 个 KV</text>
<text x="1010" y="294.42" text-anchor="middle" font-size="13" font-weight="normal" fill="#1e293b">算全精度注意力</text>
<text x="1010" y="310.41" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">npu_sparse_flash_attention</text>
<text x="1010" y="326.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">/ npu_sparse_attn_sharedkv</text>
<line x1="712" y1="150" x2="862" y2="150" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#ar)"/>
<line x1="712" y1="330" x2="862" y2="330" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="787.0" y="321" text-anchor="middle" font-size="12.5" fill="#475569">sparse_indices = top-k</text>
<text x="787" y="141" text-anchor="middle" font-size="12" fill="#1d4ed8">query（ql_nope, q_pe）</text>
<rect x="895.0" y="470" width="230" height="56" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.7"/>
<text x="1010" y="493.1" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">注意力输出</text>
<text x="1010" y="511.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">→ o_proj</text>
<line x1="1010" y1="355" x2="1010" y2="470" stroke="#15803d" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="80" y="580" width="1180" height="60" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="110" y="605" font-size="14.5" font-weight="bold" fill="#1e293b">复杂度对照（单 query）：</text>
<text x="110" y="627" font-size="13.5" fill="#475569">全长注意力 O(L·d) ——— 稀疏注意力 O(L·d_idx + k·d)：索引打分用极小 d_idx=128，全精度注意力被钉在常数 k 上；L ≫ k 时收益显著。</text>
</svg>