<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" font-family="sans-serif">
<defs>
<marker id="ar" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#475569"/></marker>
<marker id="arp" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#7c3aed"/></marker>
</defs>
<rect width="1280" height="860" fill="white"/>
<text x="640.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">DSA 一层 forward：元数据期预建索引元数据，前向期选 top-512 再算</text>
<text x="640.0" y="68" text-anchor="middle" font-size="14" fill="#64748b">decode 与 prefill 两路对称，下图以 prefill 路为例（_forward_prefill）</text>
<rect x="70" y="110" width="430" height="320" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="285" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#7c3aed">元数据期 · AscendDSAMetadataBuilder.build</text>
<rect x="105.0" y="155" width="360" height="46" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="285" y="173.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">split_decodes_and_prefills</text>
<text x="285" y="189.66" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">按 query_len 拆 decode / prefill</text>
<line x1="285" y1="201" x2="285" y2="224" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="105.0" y="224" width="360" height="46" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="285" y="242.92" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">build_prefill_metadata / build_decode_metadata</text>
<text x="285" y="258.66" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">各装配一份元数据</text>
<line x1="285" y1="270" x2="285" y2="295" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="90.0" y="295" width="390" height="58" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.7"/>
<text x="285" y="311.09" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#7c3aed">npu_quant_lightning_indexer_metadata</text>
<text x="285" y="328.25" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">sparse_count = index_topk = 512</text>
<text x="285" y="344.08" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e293b">sparse_mode = 3   →  qli_metadata</text>
<line x1="285" y1="353" x2="285" y2="376" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="90.0" y="376" width="390" height="44" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.7"/>
<text x="285" y="393.92" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">npu_sparse_attn_sharedkv_metadata</text>
<text x="285" y="409.66" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">→  sas_metadata（稀疏注意力元数据）</text>
<text x="920" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">前向期 · AscendDSAImpl.forward</text>
<rect x="705.0" y="118" width="430" height="56" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.7"/>
<text x="920" y="141.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">hidden_states 拆 [decode | prefill]</text>
<text x="920" y="157.66" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">o_proj_input 两段各写各的</text>
<line x1="920" y1="174" x2="920" y2="196" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="705.0" y="196" width="430" height="70" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.7"/>
<text x="920" y="217.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">MLA 式低秩 prolog（内联）</text>
<text x="920" y="234.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">q = wq_b(q_norm(wq_a(h)))，kv = kv_norm(wkv(h))</text>
<text x="920" y="250.41" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">各自 inplace_partial_rotary_mul 加 RoPE</text>
<line x1="920" y1="266" x2="920" y2="288" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="705.0" y="288" width="430" height="70" rx="9" fill="#fff7ed" stroke="#b45309" stroke-width="1.7"/>
<text x="920" y="309.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">indexer_select_qli</text>
<text x="920" y="326.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">投影 q + compressor 压缩 KV</text>
<text x="920" y="342.41" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">量化写 indexer KV cache</text>
<line x1="920" y1="358" x2="920" y2="380" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="705.0" y="380" width="430" height="64" rx="9" fill="#ffedd5" stroke="#b45309" stroke-width="1.7"/>
<text x="920" y="399.09" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#b45309">npu_quant_lightning_indexer</text>
<text x="920" y="416.08" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e293b">sparse_count = index_topk = 512</text>
<text x="920" y="431.41" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">→ compress_topk_idxs（top-512 索引）</text>
<line x1="920" y1="444" x2="920" y2="466" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="705.0" y="466" width="430" height="70" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.7"/>
<text x="920" y="487.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">npu_sparse_attn_sharedkv</text>
<text x="920" y="504.91" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">cmp_sparse_indices = compress_topk_idxs</text>
<text x="920" y="521.08" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e293b">只对 top-512 个 KV 算注意力</text>
<line x1="920" y1="536" x2="920" y2="558" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="705.0" y="558" width="430" height="52" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.7"/>
<text x="920" y="579.76" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">o_proj：wo_a → wo_b</text>
<text x="920" y="595.66" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">（先 inplace 逆 RoPE）</text>
<path d="M 480 324 C 620 324, 640 412.0, 700 412.0" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arp)"/>
<text x="600" y="360.0" text-anchor="middle" font-size="12" fill="#7c3aed">qli_metadata</text>
<path d="M 480 398 C 600 398, 630 501.0, 700 501.0" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arp)"/>
<text x="600" y="465.5" text-anchor="middle" font-size="12" fill="#7c3aed">sas_metadata</text>
<text x="640.0" y="820" text-anchor="middle" font-size="13.5" fill="#64748b">「选哪些 KV」在元数据期就把索引元数据备好；前向期只做轻量索引器打分选 top-512，再把这 512 个喂给稀疏内核。</text>
</svg>