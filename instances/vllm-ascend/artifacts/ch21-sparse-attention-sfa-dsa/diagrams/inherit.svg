<text x="180" y="205.34" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f766e">MLACommonMetadataBuilder</text>
<text x="180" y="222.16" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">（vLLM MLA 元数据 builder）</text>
