<text x="1175" y="341.26" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">AscendDSAImpl</text>
<text x="1175" y="357.74" text-anchor="middle" font-size="11" font-weight="normal" fill="#1e293b">内联 wq_a/wq_b/wkv 低秩 prolog</text>
<line x1="835" y1="320" x2="835" y2="237" stroke="#0f766e" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="847" y="282.5" font-size="12" fill="#0f766e">继承</text>
<line x1="1175" y1="320" x2="1175" y2="237" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="1187" y="282.5" font-size="12" fill="#7c3aed">继承</text>
<line x1="670.0" y1="175" x2="670.0" y2="400" stroke="#e2e8f0" stroke-width="1.4" stroke-dasharray="5 5"/>
<rect x="230.0" y="470" width="880" height="110" rx="9" fill="#f8fafc" stroke="#475569" stroke-width="1.7"/>
<text x="670.0" y="509.44" text-anchor="middle" font-size="16" font-weight="bold" fill="#475569">共用底座 · DeviceOperator 设备算子门面（device_op.py）</text>
<text x="670.0" y="529.25" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">DeviceOperator = get_device_adaptor()：import 期按 AscendDeviceType 选 BaseDeviceAdaptor(A2/A3) 或 A5DeviceAdaptor</text>
<text x="670.0" y="546.75" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#1e293b">封装 reshape_and_cache / 稀疏内核选择 / KV cache 解包 —— 注意力各章（ch19/ch20/ch21）写一份设备无关控制流</text>
<line x1="510" y1="372" x2="510" y2="430" stroke="#475569" stroke-width="1.8"/>
<line x1="510" y1="430" x2="670.0" y2="430" stroke="#475569" stroke-width="1.8"/>
<line x1="1175" y1="372" x2="1175" y2="430" stroke="#475569" stroke-width="1.8"/>
<line x1="1175" y1="430" x2="670.0" y2="430" stroke="#475569" stroke-width="1.8"/>
<line x1="670.0" y1="430" x2="670.0" y2="470" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="670.0" y="640" text-anchor="middle" font-size="13.5" fill="#64748b">两条线分歧在「复用 vs 自起一套」，但都以 ch20 的 MLA 低秩 KV 压缩为底，再叠一层「只对 top-k 算注意力」的稀疏选择。</text>
</svg>