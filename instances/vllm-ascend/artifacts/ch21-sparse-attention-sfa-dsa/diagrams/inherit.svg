<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 720" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 12 10" refX="11" refY="5" markerWidth="11" markerHeight="9" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#475569"/></marker></defs>
<rect width="1340" height="720" fill="white"/>
<text x="670.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">SFA 复用 vLLM MLA，DSA 自起一套——两条线都「建在 MLA 之上」</text>
<rect x="290" y="62" width="760" height="40" rx="20" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="670.0" y="87" text-anchor="middle" font-size="15" font-weight="bold" fill="#dc2626">vLLM 主干无对位后端 —— 这是插件「加法式扩展」出的能力（ch08 母题在注意力子系统的再现），不是顶替某个内核</text>
<text x="340" y="138" text-anchor="middle" font-size="18" font-weight="bold" fill="#1d4ed8">SFA · 直接复用 MLA 全套</text>
<text x="340" y="160" text-anchor="middle" font-size="12.5" fill="#64748b">ch18 路由 (use_mla,use_sparse,use_compress)=(T,T,F)</text>
