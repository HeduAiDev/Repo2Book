<text x="180" y="341.34" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1d4ed8">AscendSFAMetadataBuilder</text>
<text x="180" y="358.16" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">复用 MLA 元数据装配</text>
<rect x="370.0" y="320" width="280" height="52" rx="9" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.7"/>
<text x="510" y="341.26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">AscendSFAImpl</text>
<text x="510" y="358.16" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">叠两段式稀疏选择</text>
<line x1="180" y1="320" x2="180" y2="237" stroke="#0f766e" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="192" y="282.5" font-size="12" fill="#0f766e">继承</text>
<line x1="510" y1="320" x2="510" y2="237" stroke="#0f766e" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="522" y="282.5" font-size="12" fill="#0f766e">继承</text>
<text x="1000" y="138" text-anchor="middle" font-size="18" font-weight="bold" fill="#b45309">DSA · 自起一套，内联 MLA prolog</text>
<text x="1000" y="160" text-anchor="middle" font-size="12.5" fill="#64748b">ch18 路由 (use_mla,use_sparse,use_compress)=(T,F,T)</text>
<rect x="685.0" y="185" width="300" height="50" rx="9" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.7"/>
<text x="835" y="205.34" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f766e">AttentionMetadataBuilder</text>
<text x="835" y="222.16" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">（vLLM 通用 builder，非 MLA）</text>
<rect x="1040.0" y="185" width="270" height="50" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
<text x="1175" y="205.26" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">DSAAttentionImpl</text>
<text x="1175" y="222.16" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1e293b">（昇腾自有 abstract.py）</text>
<rect x="685.0" y="320" width="300" height="52" rx="9" fill="#fff7ed" stroke="#b45309" stroke-width="1.7"/>
<text x="835" y="341.34" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#b45309">AscendDSAMetadataBuilder</text>
