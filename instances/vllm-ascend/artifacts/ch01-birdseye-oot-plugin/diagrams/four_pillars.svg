<line x1="814" y1="794" x2="858" y2="794" stroke="#9333ea" stroke-width="2.4" marker-end="url(#ap)"/>
<line x1="190" y1="590" x2="190" y2="668" stroke="#9333ea" stroke-width="2.4" marker-end="url(#ap)"/>
<text x="280" y="620" font-family="sans-serif" font-size="11.5" fill="#7e22ce" text-anchor="start">① platform 段</text>
<rect x="40" y="866" width="1240" height="52" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="660.0" y="898" font-family="sans-serif" font-size="14.5" font-weight="bold" fill="#15803d" text-anchor="middle">要素四 · 往每个扩展点登记昇腾实现：get_*_cls 返回的每个类名，就是后面各章 zoom-in 的昇腾实现（注意力 / 通信 / 编译 / worker …）</text>
