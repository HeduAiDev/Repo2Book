<rect width="1320" height="940" fill="white"/>
<text x="660.0" y="42" font-family="sans-serif" font-size="25" font-weight="bold" fill="#0f172a" text-anchor="middle">OOT 插件四要素：装上就被发现 · 一个平台类接管分发 · 改不动处打补丁 · 每个扩展点登记昇腾实现</text>
<text x="360" y="86" font-family="sans-serif" font-size="17" font-weight="bold" fill="#b45309" text-anchor="middle">vllm-ascend 侧（登记实现）</text>
<text x="960" y="86" font-family="sans-serif" font-size="17" font-weight="bold" fill="#2563eb" text-anchor="middle">vLLM 侧（预留扩展点 · 反向钩入）</text>
<line x1="660" y1="100" x2="660" y2="910" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 5"/>
<rect x="40" y="108" width="1240" height="150" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
<text x="58" y="130" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b45309">支柱一 · 安装期挂入（entry points）</text>
