<text x="360.0" y="177" font-family="monospace" font-size="15" font-weight="bold" fill="#b45309" text-anchor="middle">setup.py  entry_points</text>
<text x="360.0" y="199" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">vllm.platform_plugins / vllm.general_plugins</text>
<rect x="730" y="150" width="460" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="960.0" y="177" font-family="monospace" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">plugins.load_plugins_by_group</text>
<text x="960.0" y="199" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">importlib.metadata.entry_points(group=…)</text>
<line x1="590" y1="185" x2="730" y2="185" stroke="#2563eb" stroke-width="2.4" marker-end="url(#a)"/>
<text x="660" y="176" font-family="sans-serif" font-size="12" fill="#b45309" text-anchor="middle">pip install</text>
<text x="660" y="202" font-family="sans-serif" font-size="12" fill="#2563eb" text-anchor="middle">按组名反查</text>
<rect x="40" y="278" width="1240" height="330" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="58" y="300" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">支柱二 · 运行期分发（一个 NPUPlatform 接管所有「问平台要组件」）</text>
<rect x="130" y="318" width="460" height="66" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="360.0" y="345" font-family="monospace" font-size="15" font-weight="bold" fill="#b45309" text-anchor="middle">register()</text>
<text x="360.0" y="367" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">return "vllm_ascend.platform.NPUPlatform"</text>
<rect x="730" y="318" width="460" height="66" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="960.0" y="345" font-family="monospace" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">resolve_current_platform_cls_qualname</text>
<text x="960.0" y="367" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">probe 激活 · OOT 优先于 builtin</text>
<line x1="590" y1="351" x2="730" y2="351" stroke="#2563eb" stroke-width="2.4" marker-end="url(#a)"/>
<text x="660" y="344" font-family="sans-serif" font-size="12" fill="#b45309" text-anchor="middle">只返回字符串</text>
<text x="660" y="366" font-family="sans-serif" font-size="12" fill="#2563eb" text-anchor="middle">选中 OOT</text>
<rect x="730" y="408" width="460" height="62" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="960.0" y="435" font-family="monospace" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">current_platform（模块级 __getattr__）</text>
<text x="960.0" y="457" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">首次访问才 resolve + 实例化（懒加载）</text>
<line x1="960.0" y1="384" x2="960.0" y2="408" stroke="#2563eb" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="130" y="486" width="460" height="104" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="360.0" y="513" font-family="monospace" font-size="15" font-weight="bold" fill="#b45309" text-anchor="middle">class NPUPlatform(Platform)</text>
<text x="360.0" y="538" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">_enum = PlatformEnum.OOT</text>
<text x="360.0" y="560" font-family="sans-serif" font-size="11.5" fill="#475569" text-anchor="middle">get_attn_backend_cls / get_device_communicator_cls …</text>
<text x="360.0" y="578" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">每个钩子返回一个昇腾类的 qualname</text>
<line x1="730" y1="439.0" x2="590" y2="506" stroke="#2563eb" stroke-width="2.4" marker-end="url(#a)"/>
<text x="660" y="452" font-family="sans-serif" font-size="12" fill="#2563eb" text-anchor="middle">实例化</text>
<rect x="40" y="628" width="1240" height="220" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
<text x="58" y="650" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7e22ce">支柱三 · 两段式 monkey-patch（给没有工厂钩子的地方）</text>
<rect x="130" y="668" width="300" height="60" rx="10" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
<text x="280.0" y="695" font-family="monospace" font-size="15" font-weight="bold" fill="#7e22ce" text-anchor="middle">pre_register_and_update()</text>
<text x="280.0" y="717" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">平台被选定后首个回调</text>
<rect x="130" y="764" width="300" height="60" rx="10" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
<text x="280.0" y="791" font-family="monospace" font-size="15" font-weight="bold" fill="#7e22ce" text-anchor="middle">每个 worker.__init__</text>
<text x="280.0" y="813" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">worker 启动时</text>
<rect x="478" y="668" width="336" height="60" rx="10" fill="#faf5ff" stroke="#7e22ce" stroke-width="2"/>
<text x="646.0" y="695" font-family="monospace" font-size="15" font-weight="bold" fill="#7e22ce" text-anchor="middle">adapt_patch(is_global_patch=True)</text>
<text x="646.0" y="717" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">import patch.platform（副作用）</text>
<rect x="478" y="764" width="336" height="60" rx="10" fill="#faf5ff" stroke="#7e22ce" stroke-width="2"/>
<text x="646.0" y="791" font-family="monospace" font-size="15" font-weight="bold" fill="#7e22ce" text-anchor="middle">adapt_patch(is_global_patch=False)</text>
<text x="646.0" y="813" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">import patch.worker（副作用）</text>
<line x1="430" y1="698" x2="478" y2="698" stroke="#9333ea" stroke-width="2.4" marker-end="url(#ap)"/>
<line x1="430" y1="794" x2="478" y2="794" stroke="#9333ea" stroke-width="2.4" marker-end="url(#ap)"/>
<rect x="858" y="668" width="332" height="60" rx="10" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
<text x="1024.0" y="695" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7e22ce" text-anchor="middle">engine-core / scheduler 层符号</text>
<text x="1024.0" y="717" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">platform 段：约 25 条改写</text>
<rect x="858" y="764" width="332" height="60" rx="10" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
<text x="1024.0" y="791" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7e22ce" text-anchor="middle">worker / 模型 / 算子层符号</text>
<text x="1024.0" y="813" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">worker 段：约 22 条改写</text>
