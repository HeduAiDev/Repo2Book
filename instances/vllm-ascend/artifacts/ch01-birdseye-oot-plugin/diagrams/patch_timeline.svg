<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 640">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#334155"/></marker></defs>
<rect width="1320" height="640" fill="white"/>
<text x="660.0" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">两段式 monkey-patch 的时机轴：platform 段在 worker 启动前，worker 段在 worker 内</text>
<line x1="60" y1="300" x2="1260" y2="300" stroke="#334155" stroke-width="2.4" marker-end="url(#a)"/>
<text x="1260" y="326" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="end">时间 →</text>
<rect x="60" y="86" width="800" height="150" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6"/>
<text x="80" y="112" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7e22ce">platform 段　is_global_patch=True　作用域：engine-core / scheduler</text>
<rect x="900" y="404" width="360" height="150" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6"/>
<text x="920" y="430" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1d4ed8">worker 段　is_global_patch=False</text>
<text x="920" y="452" font-family="sans-serif" font-size="13" fill="#2563eb">作用域：worker 进程内 · 模型 / 算子</text>
<circle cx="180" cy="300" r="6" fill="#334155"/>
<text x="180" y="286" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">T1 平台选定</text>
<circle cx="430" cy="300" r="6" fill="#334155"/>
<text x="430" y="286" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">T2 pre_register_and_update</text>
<circle cx="700" cy="300" r="6" fill="#334155"/>
<text x="700" y="286" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">T3 engine-core 子进程</text>
<circle cx="1030" cy="300" r="6" fill="#334155"/>
<text x="1030" y="286" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">T4 worker.__init__</text>
<rect x="110" y="132" width="280" height="88" rx="10" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
<text x="250.0" y="158" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7e22ce" text-anchor="middle">pre_register_and_update()</text>
<text x="250.0" y="180" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle">adapt_patch(is_global_patch=True)</text>
<text x="250.0" y="200" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle">→ import patch.platform</text>
<line x1="250.0" y1="220" x2="430" y2="294" stroke="#7e22ce" stroke-width="1.8" stroke-dasharray="4 4"/>
<rect x="540" y="132" width="300" height="88" rx="10" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
<text x="690.0" y="158" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7e22ce" text-anchor="middle">general plugins（每个子进程）</text>
<text x="690.0" y="180" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">register_* 先 _ensure_global_patch()</text>
<text x="690.0" y="200" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">进程级幂等锁：同进程只打一次</text>
<line x1="690.0" y1="220" x2="700" y2="294" stroke="#7e22ce" stroke-width="1.8" stroke-dasharray="4 4"/>
<rect x="920" y="456" width="320" height="82" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
<text x="1080.0" y="482" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle">每个 worker.__init__</text>
<text x="1080.0" y="504" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle">adapt_patch(is_global_patch=False)</text>
<text x="1080.0" y="524" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle">→ import patch.worker</text>
<line x1="1080.0" y1="456" x2="1030" y2="306" stroke="#1d4ed8" stroke-width="1.8" stroke-dasharray="4 4"/>
<text x="60" y="600" font-family="sans-serif" font-size="13" fill="#64748b">判据：这个 vLLM 符号在哪一层、何时被用到——engine/scheduler 全局对象走 platform 段；worker 进程内的模型/算子走 worker 段。</text>
</svg>