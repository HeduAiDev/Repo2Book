<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7.5" markerHeight="5.5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker><marker id="ao" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7.5" markerHeight="5.5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="1300" height="720" fill="white"/>
<text x="650.0" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">一处覆写，整链切换：vLLM 问 current_platform 要组件，拿到的全是昇腾版</text>
<rect x="520" y="300" width="260" height="120" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="2.6"/>
<text x="650.0" y="342" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b45309" text-anchor="middle">current_platform</text>
<text x="650.0" y="370" font-family="monospace" font-size="15" fill="#92400e" text-anchor="middle">= NPUPlatform</text>
<text x="650.0" y="398" font-family="sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">覆写一组 get_*_cls 工厂钩子</text>
<text x="200" y="140" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">vLLM 引擎的调用点</text>
<rect x="60" y="168" width="230" height="52" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="175.0" y="199.0" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#2563eb" text-anchor="middle">要注意力后端</text>
<line x1="290" y1="194" x2="520" y2="360.0" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
<rect x="60" y="258" width="230" height="52" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="175.0" y="289.0" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#2563eb" text-anchor="middle">要设备通信器</text>
<line x1="290" y1="284" x2="520" y2="360.0" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
<rect x="60" y="348" width="230" height="52" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="175.0" y="379.0" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#2563eb" text-anchor="middle">要图捕获包装</text>
<line x1="290" y1="374" x2="520" y2="360.0" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
<rect x="60" y="438" width="230" height="52" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="175.0" y="469.0" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#2563eb" text-anchor="middle">要编译后端</text>
<line x1="290" y1="464" x2="520" y2="360.0" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
<text x="405" y="546" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">统一问 current_platform.get_*_cls()</text>
<text x="1075" y="140" font-family="sans-serif" font-size="15" font-weight="bold" fill="#b45309" text-anchor="middle">昇腾实现类（返回的 qualname）</text>
<rect x="960" y="168" width="280" height="52" rx="9" fill="#fef3c7" stroke="#b45309" stroke-width="1.8"/>
<text x="1100.0" y="199.0" font-family="monospace" font-size="13.5" font-weight="bold" fill="#b45309" text-anchor="middle">AscendAttentionBackend</text>
<line x1="780" y1="360.0" x2="960" y2="194" stroke="#b45309" stroke-width="2" marker-end="url(#ao)"/>
<text x="1100.0" y="238" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">get_attn_backend_cls →</text>
<rect x="960" y="258" width="280" height="52" rx="9" fill="#fef3c7" stroke="#b45309" stroke-width="1.8"/>
<text x="1100.0" y="289.0" font-family="monospace" font-size="13.5" font-weight="bold" fill="#b45309" text-anchor="middle">NPUCommunicator</text>
<line x1="780" y1="360.0" x2="960" y2="284" stroke="#b45309" stroke-width="2" marker-end="url(#ao)"/>
<text x="1100.0" y="328" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">get_device_communicator_cls →</text>
<rect x="960" y="348" width="280" height="52" rx="9" fill="#fef3c7" stroke="#b45309" stroke-width="1.8"/>
<text x="1100.0" y="379.0" font-family="monospace" font-size="13.5" font-weight="bold" fill="#b45309" text-anchor="middle">ACLGraphWrapper</text>
<line x1="780" y1="360.0" x2="960" y2="374" stroke="#b45309" stroke-width="2" marker-end="url(#ao)"/>
<text x="1100.0" y="418" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">get_static_graph_wrapper_cls →</text>
<rect x="960" y="438" width="280" height="52" rx="9" fill="#fef3c7" stroke="#b45309" stroke-width="1.8"/>
<text x="1100.0" y="469.0" font-family="monospace" font-size="13.5" font-weight="bold" fill="#b45309" text-anchor="middle">AscendCompiler</text>
<line x1="780" y1="360.0" x2="960" y2="464" stroke="#b45309" stroke-width="2" marker-end="url(#ao)"/>
<text x="1100.0" y="508" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">get_compile_backend →</text>
<rect x="60" y="596" width="1180" height="96" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="84" y="626" font-family="sans-serif" font-size="14.5" font-weight="bold" fill="#334155">对照基座 vLLM：Platform 基类的默认答案</text>
<text x="84" y="654" font-family="sans-serif" font-size="13" fill="#475569">· get_attn_backend_cls 默认返回空串 &quot;&quot;（子类必须覆写）　· get_device_communicator_cls 默认返回通用 DeviceCommunicatorBase</text>
<text x="84" y="678" font-family="sans-serif" font-size="13" fill="#475569">NPUPlatform 把这些默认逐一换成昇腾 qualname——vLLM 源码一行未改，整条组件链就被顶替。</text>
</svg>