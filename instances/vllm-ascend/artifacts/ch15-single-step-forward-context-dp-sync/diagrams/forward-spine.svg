<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arp" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker></defs>
<rect width="1180" height="760" fill="white"/>
<text x="590.0" y="38" font-family="sans-serif" font-size="22" fill="#1e293b" text-anchor="middle" font-weight="bold">execute_model 一拍前向的主干七步</text>
<text x="590.0" y="62" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">横切实体（注意力后端 / MoE 通信原语 / 采样器内部）只点名，分别留 ch18 / ch26 / 采样章</text>
<rect x="180.0" y="92" width="360" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="360" y="118" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">execute_model(scheduler_output)</text>
<text x="360" y="138" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">更新持久 batch · 早返回判定</text>
<rect x="180.0" y="178" width="360" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="360" y="204" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">_prepare_inputs</text>
<text x="360" y="224" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">整形输入 → input_ids / positions / logits_indices</text>
<line x1="360" y1="152" x2="360" y2="178" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="180.0" y="264" width="360" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="360" y="290" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">_determine_batch_execution_and_padding</text>
<text x="360" y="310" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">dispatch cudagraph + DP 协调</text>
<line x1="360" y1="238" x2="360" y2="264" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="180.0" y="350" width="360" height="60" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="360" y="376" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">_build_attention_metadata</text>
<text x="360" y="396" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">建 attn_metadata（后端实体）</text>
<line x1="360" y1="324" x2="360" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="180.0" y="436" width="360" height="60" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
<rect x="188.0" y="444" width="344" height="44" rx="7" fill="white" stroke="#7c3aed" stroke-width="1.4"/>
<text x="360" y="462" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">set_ascend_forward_context</text>
<text x="360" y="482" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">包基座 + 注入昇腾上下文（本章重点）</text>
<line x1="360" y1="410" x2="360" y2="436" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="180.0" y="522" width="360" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="360" y="548" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">_model_forward</text>
<text x="360" y="568" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">跑 self.model + flash_comm_v1 回收</text>
<line x1="360" y1="496" x2="360" y2="522" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="180.0" y="608" width="360" height="60" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="360" y="634" font-family="monospace" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="bold">_sample</text>
<text x="360" y="654" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">sampler / rejection_sampler 派发</text>
<line x1="360" y1="582" x2="360" y2="608" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="830" y="264" width="250" height="60" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="955.0" y="288" font-family="monospace" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="bold">_sync_metadata_across_dp</text>
<text x="955.0" y="308" font-family="sans-serif" font-size="12" fill="#16a34a" text-anchor="middle">DP 各卡一次 all_reduce</text>
<line x1="540.0" y1="294.0" x2="830" y2="294.0" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arg)"/>
<text x="685.0" y="286.0" font-family="sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">dp_size&gt;1</text>
<text x="560.0" y="384.0" font-family="sans-serif" font-size="12" fill="#d97706" text-anchor="start">AscendAttentionBackend / MLA → ch18</text>
<text x="560.0" y="470.0" font-family="sans-serif" font-size="12" fill="#d97706" text-anchor="start">MoE 通信原语 all_to_all / mc2 → ch26</text>
<text x="560.0" y="642.0" font-family="sans-serif" font-size="12" fill="#d97706" text-anchor="start">采样器内部留采样章</text>
</svg>