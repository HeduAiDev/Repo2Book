<circle cx="560.0" cy="408.0" r="5" fill="#ea580c"/>
<line x1="60.0" y1="408.0" x2="560.0" y2="408.0" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="4,3"/>
<rect x="60.0" y="444.0" width="470" height="44.0" rx="9" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="514.0" y="462.0" font-family="monospace" font-size="12" text-anchor="end" fill="#ea580c" font-weight="bold">⑦ 退出 _torch_cuda_wrapper：finally 落稳态缺省</text>
<text x="514.0" y="481.0" font-family="sans-serif" font-size="11" text-anchor="end" fill="#475569" font-weight="normal">torch.cuda.* 复位</text>
<circle cx="560.0" cy="466.0" r="5" fill="#ea580c"/>
<line x1="60.0" y1="466.0" x2="560.0" y2="466.0" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="4,3"/>
<text x="860.0" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#0891b2" font-weight="bold">进入：装符号 →</text>
<text x="260.0" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#ea580c" font-weight="bold">← 退出：卸符号</text>
</svg>