<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560">
<defs><marker id="fa" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1120" height="560" fill="white"/>
<text x="560.0" y="38" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#1e293b" font-weight="bold">capture_model：进入「装」符号、退出「卸」符号，对称成对</text>
<line x1="560.0" y1="78" x2="560.0" y2="504" stroke="#cbd5e1" stroke-width="3"/>
<rect x="590.0" y="96.0" width="470" height="44.0" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="606.0" y="114.0" font-family="monospace" font-size="12" text-anchor="start" fill="#2563eb" font-weight="bold">① NPUModelRunner.capture_model(self)</text>
<text x="606.0" y="133.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">进入 override</text>
<circle cx="560.0" cy="118.0" r="5" fill="#2563eb"/>
<line x1="1060.0" y1="118.0" x2="560.0" y2="118.0" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="4,3"/>
<rect x="590.0" y="154.0" width="470" height="44.0" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="606.0" y="172.0" font-family="monospace" font-size="12" text-anchor="start" fill="#7c3aed" font-weight="bold">② _get_gpu_model_runner_module_name(self)</text>
<text x="606.0" y="191.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">沿 MRO 取父类模块名</text>
<circle cx="560.0" cy="176.0" r="5" fill="#7c3aed"/>
<line x1="1060.0" y1="176.0" x2="560.0" y2="176.0" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="4,3"/>
<rect x="590.0" y="212.0" width="470" height="44.0" rx="9" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
<text x="606.0" y="230.0" font-family="monospace" font-size="12" text-anchor="start" fill="#0891b2" font-weight="bold">③ with _torch_cuda_wrapper():</text>
<text x="606.0" y="249.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">torch.cuda.* ↦ torch.npu.*</text>
<circle cx="560.0" cy="234.0" r="5" fill="#0891b2"/>
<line x1="1060.0" y1="234.0" x2="560.0" y2="234.0" stroke="#0891b2" stroke-width="1.6" stroke-dasharray="4,3"/>
<rect x="590.0" y="270.0" width="470" height="44.0" rx="9" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
<text x="606.0" y="288.0" font-family="monospace" font-size="12" text-anchor="start" fill="#0891b2" font-weight="bold">④ with _replace_..._wrapper(mod):</text>
<text x="606.0" y="307.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">父模块 graph_capture/CUDAGraphWrapper ↦ NPU/ACL</text>
<circle cx="560.0" cy="292.0" r="5" fill="#0891b2"/>
<line x1="1060.0" y1="292.0" x2="560.0" y2="292.0" stroke="#0891b2" stroke-width="1.6" stroke-dasharray="4,3"/>
<rect x="325.0" y="328.0" width="470" height="44.0" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
<text x="560.0" y="346.0" font-family="monospace" font-size="13" text-anchor="middle" fill="#16a34a" font-weight="bold">⑤ GPUModelRunner.capture_model(self)</text>
<text x="560.0" y="366.0" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#166534" font-weight="normal">父类巨方法一行不改地跑在替换态下</text>
<rect x="60.0" y="386.0" width="470" height="44.0" rx="9" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="514.0" y="404.0" font-family="monospace" font-size="12" text-anchor="end" fill="#ea580c" font-weight="bold">⑥ 退出 _replace_...：finally 还原 original_attrs</text>
