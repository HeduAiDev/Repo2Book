<text x="68" y="166" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">torch.cuda.Event</text>
<text x="512" y="166" font-family="monospace" font-size="12.5" text-anchor="end" fill="#2563eb" font-weight="bold">torch.npu.Event</text>
<line x1="270.0" y1="162" x2="320.0" y2="162" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#map)"/>
<text x="68" y="200" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">torch.cuda.Stream</text>
<text x="512" y="200" font-family="monospace" font-size="12.5" text-anchor="end" fill="#2563eb" font-weight="bold">torch.npu.Stream</text>
<line x1="270.0" y1="196" x2="320.0" y2="196" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#map)"/>
<text x="68" y="234" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">torch.cuda.synchronize</text>
<text x="512" y="234" font-family="monospace" font-size="12.5" text-anchor="end" fill="#2563eb" font-weight="bold">torch.npu.synchronize</text>
<line x1="270.0" y1="230" x2="320.0" y2="230" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#map)"/>
<text x="68" y="268" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">torch.cuda.mem_get_info</text>
<text x="512" y="268" font-family="monospace" font-size="12.5" text-anchor="end" fill="#2563eb" font-weight="bold">torch.npu.mem_get_info</text>
<line x1="270.0" y1="264" x2="320.0" y2="264" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#map)"/>
<rect x="540" y="72" width="500" height="154" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
<rect x="540" y="72" width="500" height="46" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
<text x="790.0" y="94" font-family="monospace" font-size="15" text-anchor="middle" fill="#7c3aed" font-weight="bold">_replace_gpu_model_runner_function_wrapper()</text>
<text x="790.0" y="112" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">换父类所在模块的模块级符号（经 MRO 定位）</text>
<text x="568" y="136" font-family="sans-serif" font-size="11.5" text-anchor="start" fill="#64748b" font-weight="bold">原符号（父类引用）</text>
<text x="1012" y="136" font-family="sans-serif" font-size="11.5" text-anchor="end" fill="#64748b" font-weight="bold">with 内临时指向</text>
<line x1="556" y1="144" x2="1024" y2="144" stroke="#e2e8f0" stroke-width="1"/>
<text x="568" y="166" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">&lt;父模块&gt;.graph_capture</text>
<text x="1012" y="166" font-family="monospace" font-size="12.5" text-anchor="end" fill="#7c3aed" font-weight="bold">NPU 版 graph_capture</text>
<line x1="770.0" y1="162" x2="820.0" y2="162" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#map)"/>
<text x="568" y="200" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">&lt;父模块&gt;.CUDAGraphWrapper</text>
<text x="1012" y="200" font-family="monospace" font-size="12.5" text-anchor="end" fill="#7c3aed" font-weight="bold">ACLGraphWrapper</text>
<line x1="770.0" y1="196" x2="820.0" y2="196" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#map)"/>
<rect x="40" y="330" width="500" height="96" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
<text x="60" y="356" font-family="sans-serif" font-size="13.5" text-anchor="start" fill="#854d0e" font-weight="bold">失败兜底（except 分支）</text>
<text x="60" y="378" font-family="monospace" font-size="11.5" text-anchor="start" fill="#713f12" font-weight="normal">Event/Stream → _EventPlaceholder / _StreamPlaceholder</text>
<text x="60" y="398" font-family="sans-serif" font-size="11.5" text-anchor="start" fill="#713f12" font-weight="normal">record/wait/synchronize 全 no-op、query 恒 True</text>
<text x="60" y="416" font-family="sans-serif" font-size="11.5" text-anchor="start" fill="#854d0e" font-weight="bold">→ 异常路径 torch.cuda.* 仍可调用不崩</text>
<rect x="540" y="330" width="500" height="96" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="560" y="356" font-family="sans-serif" font-size="13.5" text-anchor="start" fill="#166534" font-weight="bold">可逆性（finally 分支）</text>
<text x="560" y="378" font-family="monospace" font-size="11.5" text-anchor="start" fill="#14532d" font-weight="normal">_replace：逐一 setattr 还原 original_attrs（旧值）</text>
<text x="560" y="398" font-family="sans-serif" font-size="11.5" text-anchor="start" fill="#14532d" font-weight="normal">_torch_cuda：还原成一组稳态缺省（非原样 cuda）</text>
<text x="560" y="416" font-family="sans-serif" font-size="11.5" text-anchor="start" fill="#166534" font-weight="bold">→ 置换生存期 ⊆ with 作用域，不泄漏到作用域外</text>
</svg>