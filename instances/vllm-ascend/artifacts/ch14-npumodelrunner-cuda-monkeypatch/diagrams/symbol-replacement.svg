<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600">
<defs><marker id="map" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
<rect width="1080" height="600" fill="white"/>
<text x="540.0" y="38" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#1e293b" font-weight="bold">两个 wrapper 临时换掉哪些符号（作用域仅 with 内有效）</text>
<rect x="40" y="72" width="500" height="222" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
