<text x="290.0" y="94" font-family="monospace" font-size="15" text-anchor="middle" fill="#2563eb" font-weight="bold">_torch_cuda_wrapper()</text>
<text x="290.0" y="112" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">进程级换 torch 设备符号（代表 4 个，源码共 8 个：7 torch.cuda.* + torch.Event）</text>
<text x="68" y="136" font-family="sans-serif" font-size="11.5" text-anchor="start" fill="#64748b" font-weight="bold">原符号（父类引用）</text>
<text x="512" y="136" font-family="sans-serif" font-size="11.5" text-anchor="end" fill="#64748b" font-weight="bold">with 内临时指向</text>
