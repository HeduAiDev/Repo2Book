<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1080" height="560" fill="white"/>
<text x="540.0" y="38" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#1e293b" font-weight="bold">父类怎么表达设备差异，决定了子类继承还是重写</text>
<text x="540.0" y="64" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal">同一个仓库，Worker 重写、ModelRunner 继承——分水岭在父类那一侧</text>
<rect x="40" y="96" width="470" height="410" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
<text x="275.0" y="128" font-family="sans-serif" font-size="17" text-anchor="middle" fill="#b91c1c" font-weight="bold">ch13 · GPU Worker（基座父类）</text>
<text x="275.0" y="152" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#b91c1c" font-weight="normal">设备差异 = else-raise 钉死</text>
<rect x="64" y="174" width="422" height="132" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
<text x="80" y="200" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">if device_type == "cuda":</text>
<text x="80" y="221" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">    self.device = "cuda:N"</text>
<text x="80" y="242" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">    init_distributed("nccl")</text>
<text x="80" y="263" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">else:</text>
<text x="80" y="284" font-family="monospace" font-size="12.5" text-anchor="start" fill="#b91c1c" font-weight="bold">    raise RuntimeError(...)</text>
<text x="275.0" y="342" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#b91c1c" font-weight="normal">昇腾 device_type=="npu" → 第一脚掉进 else</text>
<text x="275.0" y="366" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#b91c1c" font-weight="bold">无接缝可换 → 只能整段重写</text>
<rect x="110" y="450" width="330" height="38" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
<text x="275.0" y="474" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#991b1b" font-weight="bold">NPUWorker(WorkerBase) · 平级重写</text>
<rect x="570" y="96" width="470" height="410" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2.5"/>
<text x="805.0" y="128" font-family="sans-serif" font-size="17" text-anchor="middle" fill="#047857" font-weight="bold">ch14 · GPU ModelRunner（基座父类）</text>
<text x="805.0" y="152" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#047857" font-weight="normal">设备差异 = 三类「可换接缝（seam）」</text>
<rect x="594" y="172" width="422" height="66" rx="6" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
<text x="610" y="194" font-family="sans-serif" font-size="13.5" text-anchor="start" fill="#065f46" font-weight="bold">① override 钩子</text>
<text x="610" y="213" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">_init_device_properties / _sync_device</text>
<text x="610" y="230" font-family="sans-serif" font-size="11" text-anchor="start" fill="#64748b" font-weight="normal">父类亲口标注 used for model runner override</text>
<rect x="594" y="250" width="422" height="66" rx="6" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
<text x="610" y="272" font-family="sans-serif" font-size="13.5" text-anchor="start" fill="#065f46" font-weight="bold">② 散落的 torch.cuda.*</text>
<text x="610" y="291" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">mem_get_info / Event / Stream / synchronize</text>
<text x="610" y="308" font-family="sans-serif" font-size="11" text-anchor="start" fill="#64748b" font-weight="normal">进程级符号，可临时改向 torch.npu.*</text>
<rect x="594" y="328" width="422" height="66" rx="6" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5"/>
<text x="610" y="350" font-family="sans-serif" font-size="13.5" text-anchor="start" fill="#065f46" font-weight="bold">③ 模块级符号</text>
<text x="610" y="369" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">graph_capture / CUDAGraphWrapper</text>
<text x="610" y="386" font-family="sans-serif" font-size="11" text-anchor="start" fill="#64748b" font-weight="normal">可 setattr 换成 NPU / ACL 同形版</text>
<rect x="620" y="450" width="370" height="38" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
<text x="805.0" y="474" font-family="sans-serif" font-size="13.5" text-anchor="middle" fill="#065f46" font-weight="bold">NPUModelRunner(GPUModelRunner) · 继承 + 临时猴补</text>
</svg>