<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 680" font-family="sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker>
<marker id="arrD" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#0ea5e9"/></marker>
</defs>
<rect width="1180" height="680" fill="white"/>
<text x="590.0" y="40" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">一个类，两半身：MooncakeLayerwiseConnector 按 role 只活半边</text>
<text x="590.0" y="68" text-anchor="middle" font-size="14" font-weight="normal" fill="#64748b">同一份代码在调度进程与 worker 进程各实例化一次，role 决定哪半是活的</text>
<rect x="420" y="92" width="340" height="56" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="590" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">MooncakeLayerwiseConnector（facade）</text>
<text x="590" y="136" text-anchor="middle" font-size="11.5" font-weight="italic" fill="#64748b">每个 base-class 钩子按 role 转发到下面半边</text>
<rect x="70" y="190" width="480" height="360" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
<text x="310" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">role == SCHEDULER（调度进程）</text>
<text x="310" y="242" text-anchor="middle" font-size="12" font-weight="normal" fill="#2563eb">决定收/发什么、建元数据、发握手</text>
<rect x="92" y="264" width="436" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
<text x="112" y="286" text-anchor="start" font-size="13" font-weight="bold" fill="#1e40af" font-family="monospace">get_num_new_matched_tokens</text>
<text x="112" y="306" text-anchor="start" font-size="11" font-weight="normal" fill="#1d4ed8">do_remote_prefill → 拉整段 prompt（异步）</text>
<rect x="92" y="330" width="436" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
<text x="112" y="352" text-anchor="start" font-size="13" font-weight="bold" fill="#1e40af" font-family="monospace">update_state_after_alloc</text>
<text x="112" y="372" text-anchor="start" font-size="11" font-weight="normal" fill="#1d4ed8">按 do_remote_prefill / do_remote_decode 分入 recv / send 队列 + POST 握手</text>
<rect x="92" y="396" width="436" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
<text x="112" y="418" text-anchor="start" font-size="13" font-weight="bold" fill="#1e40af" font-family="monospace">build_connector_meta</text>
<text x="112" y="438" text-anchor="start" font-size="11" font-weight="normal" fill="#1d4ed8">把待 recv/send 化成 ReqMeta，逐步下发</text>
<rect x="92" y="462" width="436" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.4"/>
<text x="112" y="484" text-anchor="start" font-size="13" font-weight="bold" fill="#1e40af" font-family="monospace">request_finished_all_groups</text>
<text x="112" y="504" text-anchor="start" font-size="11" font-weight="normal" fill="#1d4ed8">HMA 逐组聚合，回收</text>
<rect x="630" y="190" width="480" height="360" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
<text x="870" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#b91c1c">role == WORKER（worker 进程）</text>
<text x="870" y="242" text-anchor="middle" font-size="12" font-weight="normal" fill="#dc2626">碰真实 KV 张量、跑收发后台线程</text>
<rect x="652" y="264" width="436" height="56" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.4"/>
<text x="672" y="286" text-anchor="start" font-size="13" font-weight="bold" fill="#991b1b" font-family="monospace">start_load_kv</text>
<text x="672" y="306" text-anchor="start" font-size="11" font-weight="normal" fill="#b91c1c">forward 前调：consumer 登记收 / producer 解析块映射</text>
<rect x="652" y="330" width="436" height="56" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.4"/>
<text x="672" y="352" text-anchor="start" font-size="13" font-weight="bold" fill="#991b1b" font-family="monospace">save_kv_layer</text>
<text x="672" y="372" text-anchor="start" font-size="11" font-weight="normal" fill="#b91c1c">每算完一层立刻入发送队列 = 逐层 push（本连接器的招牌）</text>
<rect x="652" y="396" width="436" height="56" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.4"/>
<text x="672" y="418" text-anchor="start" font-size="13" font-weight="bold" fill="#991b1b" font-family="monospace">get_finished</text>
<text x="672" y="438" text-anchor="start" font-size="11" font-weight="normal" fill="#b91c1c">把后台线程已完成的传输回收上报，好释放块</text>
<rect x="652" y="462" width="436" height="56" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.4"/>
<text x="672" y="484" text-anchor="start" font-size="13" font-weight="bold" fill="#991b1b" font-family="monospace">register_kv_caches</text>
<text x="672" y="504" text-anchor="start" font-size="11" font-weight="normal" fill="#b91c1c">把 KV 张量内存登记给 mooncake 引擎</text>
<path d="M500,148 L350,186" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
<path d="M680,148 L830,186" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
<text x="590.0" y="588" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0369a1">MooncakeLayerwiseConnectorMetadata：每步 scheduler 装好 → worker 取用</text>
<path d="M310,604 L870,604" stroke="#0ea5e9" stroke-width="2.4" stroke-dasharray="7,5" fill="none" marker-end="url(#arrD)"/>
<text x="310" y="624" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">SCHEDULER</text>
<text x="870" y="624" text-anchor="middle" font-size="11" font-weight="bold" fill="#b91c1c">WORKER</text>
<text x="590.0" y="658" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">这就是 vLLM v1 连接器的标准切分：scheduler 出主意、worker 干体力活，元数据当信使</text>
</svg>