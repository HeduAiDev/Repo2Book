<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker>
</defs>
<rect width="1180" height="620" fill="white"/>
<text x="590.0" y="42" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">★ KV 亲和路由：lookup 命中 → need_to_allocate → 跨节点字节只按缺口算</text>
<text x="590.0" y="70" text-anchor="middle" font-size="14" font-weight="normal" fill="#64748b">一条 P = 400 token 的 prompt：本地已算 C = 100，外部池命中 H = 300</text>
<rect x="90" y="110" width="250.0" height="64" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
<text x="215.0" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">本地已算</text>
<text x="215.0" y="158" text-anchor="middle" font-size="12" font-weight="normal" fill="#15803d">0 → 100</text>
<rect x="340.0" y="110" width="500.0" height="64" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.2"/>
<text x="590.0" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d28d9">从外部 KV 池加载</text>
<text x="590.0" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d28d9">need_to_allocate = 200</text>
<rect x="840.0" y="110" width="250.0" height="64" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8"/>
<text x="965.0" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">本地算</text>
<text x="965.0" y="158" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#b45309">300 → 400</text>
<line x1="90.0" y1="174" x2="90.0" y2="182" stroke="#94a3b8" stroke-width="1.5"/>
<text x="90.0" y="198" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">0</text>
<line x1="340.0" y1="174" x2="340.0" y2="182" stroke="#94a3b8" stroke-width="1.5"/>
<text x="340.0" y="198" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">100</text>
<line x1="840.0" y1="174" x2="840.0" y2="182" stroke="#94a3b8" stroke-width="1.5"/>
<text x="840.0" y="198" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">300</text>
<line x1="1090.0" y1="174" x2="1090.0" y2="182" stroke="#94a3b8" stroke-width="1.5"/>
<text x="1090.0" y="198" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">400</text>
<text x="1120" y="198" text-anchor="start" font-size="12" font-weight="normal" fill="#94a3b8">token</text>
<rect x="90" y="250" width="470" height="150" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
<text x="325" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e22ce">① 先问池：lookup(token_len, block_hashes, group_ids)</text>
<text x="325" y="308" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#7c3aed">zmq REQ → 池的 lookup RPC → 返回命中 token 数 H</text>
<text x="325" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d28d9">H = 300（这条 prompt 的前 300 个 token 已在池里）</text>
<text x="325" y="368" text-anchor="middle" font-size="11.5" font-weight="italic" fill="#7e22ce">若 H == request.num_tokens(=400) → 砍 1，留 1 个本地跑 forward</text>
<text x="325" y="388" text-anchor="middle" font-size="11" font-weight="italic" fill="#9333ea">（vLLM 不允许 0 个新 token 进 forward）</text>
<rect x="620" y="250" width="470" height="150" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="855" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">② 算缺口：只补 H − C，不重算/重传 P</text>
<text x="855" y="312" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1e40af">need_to_allocate = max(0, H − C)</text>
<text x="855" y="338" text-anchor="middle" font-size="13" font-weight="normal" fill="#1d4ed8">= max(0, 300 − 100) = 200</text>
<text x="855" y="368" text-anchor="middle" font-size="12" font-weight="normal" fill="#2563eb">LoadSpec(vllm_cached=100, kvpool_cached=300)</text>
<text x="855" y="388" text-anchor="middle" font-size="11.5" font-weight="italic" fill="#1d4ed8">vLLM 只分配这 200 个 token 的块，从池所在处加载</text>
<path d="M560,325 L616,325" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
<rect x="90" y="440" width="1000" height="130" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="590" y="470" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">省下的传输 = 跨节点搬运量 ∝ 缺口(H−C)，而非整段 prompt P</text>
<text x="590" y="500" text-anchor="middle" font-size="13" font-weight="normal" fill="#475569">朴素 PD 分离：搬整段 400 token 的 KV</text>
<text x="590" y="524" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#166534">亲和路由：只搬 200 token 的 KV  →  传输量砍掉 (400−200)/400 = 50%</text>
<text x="590" y="552" text-anchor="middle" font-size="12" font-weight="italic" fill="#15803d">命中率越高，省得越多；前缀全命中时几乎不搬，只跑最后 1 个 token</text>
</svg>