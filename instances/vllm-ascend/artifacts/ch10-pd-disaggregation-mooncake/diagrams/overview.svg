<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker>
<marker id="arrP" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#7c3aed"/></marker>
</defs>
<rect width="1280" height="760" fill="white"/>
<text x="640.0" y="42" text-anchor="middle" font-size="23" font-weight="bold" fill="#0f172a">PD 分离三层：proxy 分发 → 连接器分发 → mooncake P2P 传输</text>
<text x="640.0" y="70" text-anchor="middle" font-size="14" font-weight="normal" fill="#64748b">一个请求自顶向下穿过三层；KV 亲和在连接器层旁挂一问，决定省多少传输</text>
<rect x="70" y="100" width="860" height="120" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
<text x="90" y="128" text-anchor="start" font-size="16" font-weight="bold" fill="#4338ca">③ proxy / router 负载均衡层</text>
<text x="90" y="150" text-anchor="start" font-size="12" font-weight="normal" fill="#6366f1" font-style="italic">examples/disaggregated_prefill_v1/load_balance_proxy_server_example.py</text>
<rect x="110" y="162" width="360" height="44" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
<text x="290" y="182" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#3730a3">SharedProxyScheduler · 每角色一个最少负载堆</text>
<text x="290" y="199" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#4338ca">prefill=tokens+0.3·kv ｜ decode=tokens</text>
<rect x="500" y="162" width="410" height="44" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
<text x="705" y="182" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#3730a3">assign_instances · 挑 prefiller→握手→挑 decoder</text>
<text x="705" y="199" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#4338ca">build_prefill_request 盖 P 角色章 (max_tokens=1)</text>
<rect x="70" y="270" width="860" height="150" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
<text x="90" y="298" text-anchor="start" font-size="16" font-weight="bold" fill="#047857">① 连接器分发层（vLLM v1 KVConnector 契约）</text>
<rect x="110" y="314" width="280" height="90" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
<text x="250" y="338" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#065f46">AscendMultiConnector</text>
<text x="250" y="360" text-anchor="middle" font-size="11" font-weight="normal" fill="#047857">子类化 MultiConnector + SupportsHMA</text>
<text x="250" y="377" text-anchor="middle" font-size="11" font-weight="normal" fill="#047857">首个命中子连接器赢 load·save 给全体</text>
<text x="250" y="394" text-anchor="middle" font-size="11" font-weight="normal" fill="#047857">layerwise 永远拿真 blocks</text>
<rect x="430" y="324" width="156" height="70" rx="8" fill="#ecfccb" stroke="#a3e635" stroke-width="1.5"/>
<text x="508" y="346" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#3f6212">Mooncake</text>
<text x="508" y="362" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#3f6212">Connector</text>
<text x="508" y="382" text-anchor="middle" font-size="11" font-weight="normal" fill="#65a30d">同契约</text>
<path d="M390,359 L430,359" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
<rect x="598" y="324" width="156" height="70" rx="8" fill="#ecfccb" stroke="#a3e635" stroke-width="1.5"/>
<text x="676" y="346" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#3f6212">Mooncake</text>
<text x="676" y="362" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#3f6212">HybridConnector</text>
<text x="676" y="382" text-anchor="middle" font-size="11" font-weight="normal" fill="#65a30d">同契约</text>
<path d="M390,359 L598,359" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
<rect x="766" y="324" width="156" height="70" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
<text x="844" y="346" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#713f12">Mooncake</text>
<text x="844" y="362" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#713f12">LayerwiseConnector</text>
<text x="844" y="382" text-anchor="middle" font-size="11" font-weight="normal" fill="#92400e">本章讲透 ▼</text>
<path d="M390,359 L766,359" stroke="#34d399" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
<rect x="70" y="470" width="860" height="120" rx="14" fill="#fef2f2" stroke="#f87171" stroke-width="2.5"/>
<text x="90" y="498" text-anchor="start" font-size="16" font-weight="bold" fill="#b91c1c">② mooncake P2P 传输层（prefill ↔ decode 跨节点直传 KV）</text>
<rect x="110" y="514" width="360" height="60" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
<text x="290" y="537" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#991b1b">GlobalTE · 进程级单例 TransferEngine</text>
<text x="290" y="556" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#b91c1c">backend 'ascend' · P2PHANDSHAKE</text>
<rect x="500" y="514" width="410" height="60" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
<text x="705" y="537" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">get_transfer_meta · base_addr + block_id·block_len</text>
<text x="705" y="556" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#b91c1c">group_concurrent_contiguous 连续块合批</text>
<path d="M500,220 L500,266" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
<text x="560" y="248" text-anchor="start" font-size="11.5" font-weight="normal" fill="#475569">下发 prefill / decode 请求</text>
<path d="M500,420 L500,466" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
<text x="560" y="448" text-anchor="start" font-size="11.5" font-weight="normal" fill="#475569">save_kv_layer / start_load_kv 回调驱动传输</text>
<rect x="975" y="270" width="250" height="320" rx="14" fill="#faf5ff" stroke="#a855f7" stroke-width="2.5"/>
<text x="1100" y="298" text-anchor="middle" font-size="15" font-weight="bold" fill="#7e22ce">★ KV 亲和路由</text>
<text x="1100" y="318" text-anchor="middle" font-size="12" font-weight="normal" fill="#9333ea">（本章高潮）</text>
<text x="1100" y="350" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">KVPoolScheduler</text>
<text x="1100" y="371" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">.get_num_new_matched_tokens</text>
<text x="1100" y="392" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8"></text>
<text x="1100" y="413" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">client.lookup 先问：</text>
<text x="1100" y="434" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">「这条 prompt 有多少</text>
<text x="1100" y="455" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">token 已在外部 KV 命中？」</text>
<text x="1100" y="476" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8"></text>
<text x="1100" y="497" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">need_to_allocate</text>
<text x="1100" y="518" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">  = 命中 − 已算</text>
<text x="1100" y="539" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">只拉缺口，KV 在哪</text>
<text x="1100" y="560" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#6b21a8">就从哪加载</text>
<text x="1100" y="575" text-anchor="middle" font-size="11" font-weight="italic" fill="#7e22ce">跨节点字节 ∝ 缺口，非整段</text>
<path d="M930,345 L971,345" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrP)"/>
<text x="640.0" y="640" text-anchor="middle" font-size="13" font-weight="normal" fill="#475569">三层各自独立扩缩：prefill 实例算得快、decode 实例吐得稳，代价是把 prompt 的 KV 搬一次</text>
<text x="640.0" y="662" text-anchor="middle" font-size="13" font-weight="bold" fill="#7e22ce">亲和路由让「搬一次」尽量小——这是 PD 分离真正省钱的地方</text>
</svg>