<text x="590.0" y="384.5" text-anchor="middle" font-size="15" fill="#713f12">entry.aclgraph</text>
<text x="590.0" y="402.5" text-anchor="middle" font-size="15" fill="#713f12">is None ?</text>
<line x1="430.0" y1="388" x2="270" y2="388" stroke="#475569" stroke-width="2.2"/>
<line x1="270" y1="388" x2="270" y2="450" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<text x="340.0" y="372" text-anchor="middle" font-size="14" fill="#b45309">是 / 首见此形状</text>
<rect x="70" y="450" width="400" height="150" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="270.0" y="482.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">首见：捕获 (capture)</text>
<text x="270.0" y="501.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#9a3412">validate_cudagraph_capturing_enabled()</text>
<text x="270.0" y="520.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#9a3412">记 input_addresses = [x.data_ptr()…]</text>
<text x="270.0" y="539.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#9a3412">aclgraph = torch.npu.NPUGraph()</text>
<text x="270.0" y="558.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#9a3412">with torch.npu.graph(aclgraph, pool):</text>
<text x="270.0" y="577.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#9a3412">    output = runnable(*args)</text>
<rect x="70" y="624" width="400" height="76" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="270.0" y="648.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">except RuntimeError → 命中 207008 ?</text>
<text x="270.0" y="666.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#b91c1c">_is_stream_resource_capture_error →</text>
<text x="270.0" y="684.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#b91c1c">改写成带调参指引的 RuntimeError</text>
<line x1="270" y1="600" x2="270" y2="624" stroke="#dc2626" stroke-width="2.2" marker-end="url(#r)"/>
<text x="270" y="720" text-anchor="middle" font-size="13.5" fill="#9a3412">捕获成功 → weak_ref 存 entry，本次返回真 output</text>
<line x1="750.0" y1="388" x2="910" y2="388" stroke="#475569" stroke-width="2.2"/>
<line x1="910" y1="388" x2="910" y2="450" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<text x="840.0" y="372" text-anchor="middle" font-size="14" fill="#16a34a">否 / 已捕获</text>
<rect x="710" y="450" width="400" height="150" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="910.0" y="482.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">已捕获：重放 (replay)</text>
<text x="910.0" y="501.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#15803d">[DEBUG] 断言 input 地址与捕获时一致</text>
<text x="910.0" y="520.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#15803d">FULL 模式 &amp; 非 draft-eagle:</text>
<text x="910.0" y="539.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#15803d">    current_stream().synchronize()</text>
<text x="910.0" y="558.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#15803d">entry.aclgraph.replay()</text>
<text x="910.0" y="577.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#15803d">return entry.output（复用捕获池张量）</text>
