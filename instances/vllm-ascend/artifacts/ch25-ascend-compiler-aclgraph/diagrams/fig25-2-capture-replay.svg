<rect width="1180" height="760" fill="white"/>
<text x="590.0" y="40" text-anchor="middle" font-size="25" font-weight="bold" fill="#1e293b">ACLGraphWrapper.__call__：按 BatchDescriptor 分桶，每形状捕一张 NPUGraph</text>
