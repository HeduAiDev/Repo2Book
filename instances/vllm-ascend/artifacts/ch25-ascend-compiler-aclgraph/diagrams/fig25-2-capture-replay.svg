<text x="570.0" y="256" text-anchor="end" font-size="15" fill="#16a34a">是</text>
<rect x="390.0" y="262" width="400" height="56" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="590.0" y="295.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#6d28d9">查 concrete_aclgraph_entries[batch_descriptor]</text>
<line x1="590.0" y1="318" x2="590.0" y2="344" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
