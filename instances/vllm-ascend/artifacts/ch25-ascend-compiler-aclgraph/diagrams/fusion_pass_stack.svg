<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="sans-serif">
<defs>
<marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
<marker id="p" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker>
<marker id="g" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker>
</defs>
<rect width="1200" height="700" fill="white"/>
<text x="600.0" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">GraphFusionPassManager.configure()：按 config 开关 append 的 6 个融合 Pass</text>
<text x="600.0" y="66" text-anchor="middle" font-size="15" fill="#64748b">self.passes 按源码顺序逐个 append；每个 Pass 挂一个开关，全关则该 pass 不进栈</text>
<text x="600.0" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="#7c3aed">self.passes（按序 append）</text>
<rect x="415" y="108" width="370" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="431" y="130" text-anchor="start" font-size="15.5" font-weight="bold" fill="#6d28d9">① AddRMSNormQuantFusionPass</text>
<text x="431" y="150" text-anchor="start" font-size="13" font-family="monospace" fill="#7c3aed">if fuse_norm_quant · 非 310P</text>
<rect x="415" y="173" width="370" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="431" y="195" text-anchor="start" font-size="15.5" font-weight="bold" fill="#6d28d9">② QKNormRopeFusionPass</text>
<text x="431" y="215" text-anchor="start" font-size="13" font-family="monospace" fill="#7c3aed">if fuse_qknorm_rope</text>
<rect x="415" y="238" width="370" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="431" y="260" text-anchor="start" font-size="15.5" font-weight="bold" fill="#6d28d9">③ MatmulAllReduceAddRMSNormPass</text>
<text x="431" y="280" text-anchor="start" font-size="13" font-family="monospace" fill="#7c3aed">if fuse_allreduce_rms</text>
<rect x="415" y="303" width="370" height="52" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
<text x="431" y="325" text-anchor="start" font-size="15.5" font-weight="bold" fill="#6d28d9">④ MulsAddFusionPass</text>
<text x="431" y="345" text-anchor="start" font-size="13" font-family="monospace" fill="#7c3aed">if fuse_muls_add · 非 310P</text>
<rect x="415" y="368" width="370" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
<text x="431" y="390" text-anchor="start" font-size="15.5" font-weight="bold" fill="#3730a3">⑤ SequenceParallelismPass</text>
<text x="431" y="410" text-anchor="start" font-size="13" font-family="monospace" fill="#4f46e5">if enable_sp</text>
<rect x="415" y="433" width="370" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
<text x="431" y="455" text-anchor="start" font-size="15.5" font-weight="bold" fill="#3730a3">⑥ SequenceParallelismMoePass</text>
<text x="431" y="475" text-anchor="start" font-size="13" font-family="monospace" fill="#4f46e5">if enable_sp</text>
<path d="M791,368 q8,0 8,8 L799,418.5 q0,8 6,8 q-6,0 -6,8 L799,477 q0,8 -8,8" fill="none" stroke="#6366f1" stroke-width="1.6"/>
<rect x="40" y="150" width="320" height="168" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="200.0" y="188.0" text-anchor="middle" font-size="12.8" font-weight="bold" fill="#9a3412">register_dummy_fusion_op</text>
<text x="200.0" y="204.8" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#9a3412">挂 torch.ops._C_ascend.* 空壳占位算子：</text>
<text x="200.0" y="221.6" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#9a3412">rms_norm / fused_add_rms_norm /</text>
<text x="200.0" y="238.4" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#9a3412">static_scaled_fp8_quant / …</text>
<text x="200.0" y="255.2" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#9a3412"></text>
<text x="200.0" y="272.0" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#9a3412">→ pattern 注册时有锚点可抓，</text>
<text x="200.0" y="288.8" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#9a3412">  真实算子在别处由 torch.library 装配</text>
<line x1="360" y1="234.0" x2="409" y2="234.0" stroke="#ea580c" stroke-width="2.2" marker-end="url(#a)"/>
<text x="387.5" y="226.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#ea580c">提供占位锚点</text>
<rect x="825" y="108" width="335" height="96" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="992.5" y="143.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d28d9">BasePattern.register：一份 pattern 双注册</text>
<text x="992.5" y="160.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#6d28d9">（每个 pass 内的 pattern 都走这里）</text>
<text x="992.5" y="177.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#6d28d9">同一对 pattern_fn / replacement_fn →</text>
<rect x="825" y="232" width="335" height="50" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="992.5" y="253.0" text-anchor="middle" font-size="12.8" font-weight="bold" fill="#1d4ed8">pm.register_replacement(...)</text>
<text x="992.5" y="269.8" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#1d4ed8">→ torch Inductor（供分支 B 用）</text>
<rect x="825" y="294" width="335" height="50" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
<text x="992.5" y="315.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">nge.register_replacement(..., extra_check)</text>
<text x="992.5" y="331.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#15803d">→ npugraph_ex（供分支 A 用，跨 stream 拒融）</text>
<line x1="992.5" y1="204" x2="992.5" y2="228" stroke="#7c3aed" stroke-width="2" marker-end="url(#p)"/>
<rect x="825" y="362" width="335" height="120" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="992.5" y="393.1" text-anchor="middle" font-size="12.6" font-weight="bold" fill="#475569">目录里有、但不进 self.passes：</text>
<text x="992.5" y="409.70000000000005" text-anchor="middle" font-size="12.6" font-weight="normal" fill="#475569">· noop_elimination / allgather_chunk_noop</text>
<text x="992.5" y="426.3" text-anchor="middle" font-size="12.6" font-weight="normal" fill="#475569">  → 在 SP pass 内部被串起来调用</text>
<text x="992.5" y="442.90000000000003" text-anchor="middle" font-size="12.6" font-weight="normal" fill="#475569">· base_pattern → 所有 pattern 的基类，</text>
<text x="992.5" y="459.5" text-anchor="middle" font-size="12.6" font-weight="normal" fill="#475569">  不是独立 pass</text>
<rect x="40" y="545" width="1120" height="120" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
<text x="62" y="571" text-anchor="start" font-size="15" font-weight="bold" fill="#854d0e">一个融合实例（AddRMSNormQuantPattern）：2 kernel + 1 中间张量 → 1 kernel + 0</text>
<rect x="62" y="585" width="470" height="64" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
<text x="297.0" y="613.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#be123c">pattern：npu_add_rms_norm_bias(...) → out0=output[0]</text>
<text x="297.0" y="629.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#be123c">再 quantize(out0, scale, …)　【2 算子 + 中间张量 out0】</text>
<line x1="540" y1="617" x2="620" y2="617" stroke="#16a34a" stroke-width="2.4" marker-end="url(#g)"/>
<text x="580.0" y="607" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">融合</text>
<rect x="630" y="585" width="518" height="64" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
<text x="889.0" y="613.0" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#15803d">replacement：npu_add_rms_norm_quant(...)</text>
<text x="889.0" y="629.8" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#15803d">【1 融合算子 + 0 中间张量落地】</text>
</svg>