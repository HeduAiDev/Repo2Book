<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470">
<rect width="980" height="470" fill="white"/>
<text x="490.0" y="36" font-family="sans-serif" font-size="21" text-anchor="middle" fill="#1e293b" font-weight="bold">KV cache 显存预算分解（一台 100 GiB NPU 的算例）</text>
<rect x="60" y="80" width="860" height="64" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
<line x1="834.0" y1="72" x2="834.0" y2="152" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
<text x="920" y="68" font-family="sans-serif" font-size="13" text-anchor="end" fill="#64748b" font-weight="normal">total_memory = 100 GiB</text>
<text x="834.0" y="168" font-family="sans-serif" font-size="13" text-anchor="end" fill="#b91c1c" font-weight="bold">× gpu_memory_utilization 0.9  →  requested = 90 GiB</text>
<text x="877.0" y="117.0" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8" font-weight="normal">预留 10</text>
<text x="60" y="202" font-family="sans-serif" font-size="14" text-anchor="start" fill="#334155" font-weight="bold">requested 90 GiB 的去向：</text>
<rect x="60" y="218" width="86.0" height="64" rx="4" fill="#fca5a5" stroke="#991b1b" stroke-width="1.5"/>
<rect x="146.0" y="218" width="60.199999999999996" height="64" rx="4" fill="#fdba74" stroke="#9a3412" stroke-width="1.5"/>
<rect x="206.2" y="218" width="43.0" height="64" rx="4" fill="#fde047" stroke="#854d0e" stroke-width="1.5"/>
<rect x="249.2" y="218" width="25.799999999999997" height="64" rx="4" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.5"/>
<rect x="275.0" y="218" width="559.0" height="64" rx="4" fill="#86efac" stroke="#166534" stroke-width="1.5"/>
<text x="554.5" y="248.0" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#166534" font-weight="bold">KV cache = 65</text>
<text x="554.5" y="268.0" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#166534" font-weight="normal">65 GiB</text>
<rect x="60.0" y="312" width="16" height="16" rx="3" fill="#fca5a5" stroke="#991b1b" stroke-width="1.2"/>
<text x="84.0" y="325" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#991b1b" font-weight="bold">weights 10</text>
<rect x="232.0" y="312" width="16" height="16" rx="3" fill="#fdba74" stroke="#9a3412" stroke-width="1.2"/>
<text x="256.0" y="325" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#9a3412" font-weight="bold">peak_activation 7</text>
<rect x="404.0" y="312" width="16" height="16" rx="3" fill="#fde047" stroke="#854d0e" stroke-width="1.2"/>
<text x="428.0" y="325" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#854d0e" font-weight="bold">non_torch 5</text>
<rect x="576.0" y="312" width="16" height="16" rx="3" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.2"/>
<text x="600.0" y="325" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#5b21b6" font-weight="bold">ACLGraph 估算 3</text>
<rect x="748.0" y="312" width="16" height="16" rx="3" fill="#86efac" stroke="#166534" stroke-width="1.2"/>
<text x="772.0" y="325" font-family="sans-serif" font-size="12.5" text-anchor="start" fill="#166534" font-weight="bold">KV cache 65</text>
<text x="490.0" y="376" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#166534" font-weight="bold">available_kv = requested(90) − [weights(10)+peak_act(7)+non_torch(5)] − ACLGraph(3) = 65 GiB</text>
<text x="490.0" y="406" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#64748b" font-weight="normal">关 ACLGraph 估算开关：不扣那 3 GiB → KV = 68 GiB（但运行期 graph pool 仍要吃，易 OOM）</text>
<text x="490.0" y="432" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#7c3aed" font-weight="bold">回退建议：suggested_util = min(0.9 + 3/100, 1.0) = 0.93  （把被 ACLGraph 占走的 KV 补回来）</text>
</svg>