<rect width="940" height="560" fill="white"/>
<text x="470.0" y="36" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#1e293b" font-weight="bold">WorkerBase 一个抽象，两个平级实现</text>
<rect x="210.0" y="60" width="520" height="130" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
<text x="470.0" y="88" font-family="sans-serif" font-size="17" text-anchor="middle" fill="#4338ca" font-weight="bold">WorkerBase（硬件无关抽象基类）</text>
<text x="240.0" y="118" font-family="monospace" font-size="13" text-anchor="start" fill="#3730a3" font-weight="normal">init_device()</text>
<text x="240.0" y="134" font-family="monospace" font-size="11.5" text-anchor="start" fill="#b91c1c" font-weight="normal">raise NotImplementedError</text>
<text x="490.0" y="118" font-family="monospace" font-size="13" text-anchor="start" fill="#3730a3" font-weight="normal">determine_available_memory()</text>
<text x="490.0" y="134" font-family="monospace" font-size="11.5" text-anchor="start" fill="#b91c1c" font-weight="normal">raise NotImplementedError</text>
<text x="240.0" y="150" font-family="monospace" font-size="13" text-anchor="start" fill="#3730a3" font-weight="normal">compile_or_warm_up_model()</text>
<text x="240.0" y="166" font-family="monospace" font-size="11.5" text-anchor="start" fill="#b91c1c" font-weight="normal">raise NotImplementedError</text>
<text x="490.0" y="150" font-family="monospace" font-size="13" text-anchor="start" fill="#3730a3" font-weight="normal">execute_model()</text>
<text x="490.0" y="166" font-family="monospace" font-size="11.5" text-anchor="start" fill="#b91c1c" font-weight="normal">raise NotImplementedError</text>
<rect x="30" y="300" width="360" height="200" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="210.0" y="326" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#475569" font-weight="bold">Worker（GPU 实现，基座）</text>
<text x="50" y="356" font-family="monospace" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal">init_device():</text>
<text x="58" y="380" font-family="monospace" font-size="12" text-anchor="start" fill="#334155" font-weight="normal">if device_type == "cuda":</text>
<text x="74" y="400" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">cuda:N · NCCL · CUDA inductor …</text>
<text x="58" y="424" font-family="monospace" font-size="12" text-anchor="start" fill="#334155" font-weight="normal">else:</text>
<text x="74" y="444" font-family="monospace" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold">raise RuntimeError(Not support …)</text>
<text x="210.0" y="478" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#b91c1c" font-weight="normal">设备层钉死 cuda → 继承只能走到 raise</text>
<rect x="550" y="300" width="360" height="200" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
<text x="730.0" y="326" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#047857" font-weight="bold">NPUWorker（昇腾实现）</text>
<text x="570" y="356" font-family="monospace" font-size="12" text-anchor="start" fill="#065f46" font-weight="normal">• torch.npu.set_device(npu:N)</text>
<text x="570" y="382" font-family="monospace" font-size="12" text-anchor="start" fill="#065f46" font-weight="normal">• torch_npu._inductor（triton）</text>
<text x="570" y="408" font-family="monospace" font-size="12" text-anchor="start" fill="#065f46" font-weight="normal">• init_distributed(…, "hccl")</text>
<text x="570" y="434" font-family="monospace" font-size="12" text-anchor="start" fill="#065f46" font-weight="normal">• ACLGraph / profile_cudagraph_memory</text>
<text x="570" y="460" font-family="monospace" font-size="12" text-anchor="start" fill="#065f46" font-weight="normal">• _warm_up_atb（ATB 预热）</text>
<text x="730.0" y="492" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#047857" font-weight="normal">每处设备调用换成 torch_npu / ATB / ACLGraph</text>
