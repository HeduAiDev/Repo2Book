<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420">
<defs><marker id="fa" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1180" height="420" fill="white"/>
<text x="590.0" y="36" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#1e293b" font-weight="bold">一个 Worker 的四步生命周期</text>
<rect x="20.0" y="90" width="250" height="170" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
<text x="145.0" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#0f172a" font-weight="bold">① init_device</text>
<line x1="36.0" y1="132" x2="254.0" y2="132" stroke="#3b82f6" stroke-width="1.2"/>
<text x="36.0" y="156" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">torch.npu.set_device</text>
<text x="36.0" y="180" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">torch_npu._inductor</text>
<text x="36.0" y="204" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">MemorySnapshot / hccl</text>
<text x="145.0" y="246" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3b82f6" font-weight="bold">产物：self.device</text>
<text x="145.0" y="286" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#64748b" font-weight="normal">启动期一次</text>
<rect x="316.6666666666667" y="90" width="250" height="170" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
<text x="441.6666666666667" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#0f172a" font-weight="bold">② determine_available_memory</text>
<line x1="332.6666666666667" y1="132" x2="550.6666666666667" y2="132" stroke="#f59e0b" stroke-width="1.2"/>
<text x="332.6666666666667" y="156" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">memory_profiling + profile_run</text>
<text x="332.6666666666667" y="180" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">profile_cudagraph_memory</text>
<text x="332.6666666666667" y="204" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">算 KV 预算 + 回退建议</text>
<text x="441.6666666666667" y="246" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#f59e0b" font-weight="bold">产物：available_kv_cache_memory_bytes</text>
<text x="441.6666666666667" y="286" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#64748b" font-weight="normal">启动期一次</text>
<rect x="613.3333333333334" y="90" width="250" height="170" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5"/>
<text x="738.3333333333334" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#0f172a" font-weight="bold">③ compile_or_warm_up_model</text>
<line x1="629.3333333333334" y1="132" x2="847.3333333333334" y2="132" stroke="#8b5cf6" stroke-width="1.2"/>
<text x="629.3333333333334" y="156" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">_dummy_run(warmup_sizes)</text>
<text x="629.3333333333334" y="180" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">capture_model（ACLGraph）</text>
<text x="629.3333333333334" y="204" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">_warm_up_atb（ATB 预热）</text>
<text x="738.3333333333334" y="246" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#8b5cf6" font-weight="bold">产物：CompilationTimes</text>
<text x="738.3333333333334" y="286" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#64748b" font-weight="normal">启动期一次</text>
<rect x="910.0" y="90" width="250" height="170" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
<text x="1035.0" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#0f172a" font-weight="bold">④ execute_model</text>
<line x1="926.0" y1="132" x2="1144.0" y2="132" stroke="#22c55e" stroke-width="1.2"/>
<text x="926.0" y="156" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">profile_memory / profiler.step</text>
<text x="926.0" y="180" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">→ model_runner.execute_model</text>
<text x="926.0" y="204" font-family="monospace" font-size="11.5" text-anchor="start" fill="#334155" font-weight="normal">（派发给 NPUModelRunner）</text>
<text x="1035.0" y="246" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#22c55e" font-weight="bold">产物：ModelRunnerOutput</text>
<text x="1035.0" y="286" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#64748b" font-weight="normal">每个 step 一次（热路径）</text>
<line x1="270.0" y1="175.0" x2="314.6666666666667" y2="175.0" stroke="#475569" stroke-width="2.5" marker-end="url(#fa)"/>
<line x1="566.6666666666667" y1="175.0" x2="611.3333333333334" y2="175.0" stroke="#475569" stroke-width="2.5" marker-end="url(#fa)"/>
<line x1="863.3333333333334" y1="175.0" x2="908.0" y2="175.0" stroke="#475569" stroke-width="2.5" marker-end="url(#fa)"/>
<path d="M 1130.0 260 C 1200.0 260, 1200.0 340, 1035.0 340 C 870.0 340, 870.0 260, 940.0 260" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="5,4" marker-end="url(#fa)"/>
<text x="1035.0" y="360" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#16a34a" font-weight="bold">稳态：调度器每拍回到这里</text>
</svg>