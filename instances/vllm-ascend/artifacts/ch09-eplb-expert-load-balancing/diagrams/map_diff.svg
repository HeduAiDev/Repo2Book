<text x="590" y="538" text-anchor="middle" font-size="12.5" fill="#64748b">收方先 irecv 进预分配 buffer，全部 req.wait() 后再 copy_ 原位替换 expert 槽——先收齐再落地，避免半搬运被前向读到</text>
