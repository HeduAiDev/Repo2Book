<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" font-family="sans-serif">
<defs>
<marker id="a" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker>
</defs>
<rect width="1180" height="660" fill="white"/>
<text x="590.0" y="42" text-anchor="middle" font-size="23" font-weight="bold" fill="#0f172a">D2DExpertWeightLoader 三态机：发车与落地隔开，防上一层没搬完就接新任务</text>
<rect x="110" y="240" width="200" height="130" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
<text x="210.0" y="290" text-anchor="middle" font-size="20" font-weight="bold" fill="#991b1b">WAITING</text>
<text x="210.0" y="318" text-anchor="middle" font-size="14" fill="#991b1b">state = 0</text>
<text x="210.0" y="346" text-anchor="middle" font-size="12.5" fill="#dc2626">等 EplbWorker 的新 expert_map</text>
<rect x="490" y="240" width="200" height="130" rx="14" fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
<text x="590.0" y="290" text-anchor="middle" font-size="20" font-weight="bold" fill="#854d0e">READY</text>
<text x="590.0" y="318" text-anchor="middle" font-size="14" fill="#854d0e">state = 1</text>
<text x="590.0" y="346" text-anchor="middle" font-size="12.5" fill="#ca8a04">P2POp 已攒好，待发车</text>
<rect x="870" y="240" width="200" height="130" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
<text x="970.0" y="290" text-anchor="middle" font-size="20" font-weight="bold" fill="#166534">TRANSFERRING</text>
<text x="970.0" y="318" text-anchor="middle" font-size="14" fill="#166534">state = 2</text>
<text x="970.0" y="346" text-anchor="middle" font-size="12.5" fill="#16a34a">isend/irecv 已发，待回收落地</text>
<line x1="310" y1="305.0" x2="484" y2="305.0" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<text x="400.0" y="155" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1e293b">generate_expert_d2d_transfer_task</text>
<text x="400.0" y="177" text-anchor="middle" font-size="12.5" fill="#475569">攒 P2POp</text>
<text x="400.0" y="195" text-anchor="middle" font-size="12.5" fill="#475569">（每 expert 多块张量各挂 isend/irecv）</text>
<line x1="690" y1="305.0" x2="864" y2="305.0" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<text x="780.0" y="155" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1e293b">asyn_expert_weight_transfer</text>
<text x="780.0" y="177" text-anchor="middle" font-size="12.5" fill="#475569">batch_isend_irecv</text>
<text x="780.0" y="195" text-anchor="middle" font-size="12.5" fill="#475569">异步发车（不等）</text>
<path d="M 970.0 370 C 970.0 480, 210.0 480, 210.0 374" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
<text x="590.0" y="474" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1e293b">update_expert_map_and_weight</text>
<text x="590.0" y="494" text-anchor="middle" font-size="12.5" fill="#475569">req.wait() 收车 → copy_ 落地新权重 → 更新 expert_map / log2phy_map → 状态回 WAITING（闭环）</text>
<rect x="350" y="520" width="480" height="46" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="590" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">互斥保护：非 WAITING 态下 generate 直接 return（warning_once）</text>
<text x="590" y="558" text-anchor="middle" font-size="12" fill="#64748b">上一层的搬运没落地，绝不接下一层的新任务</text>
</svg>