<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="sans-serif">
<defs>
<marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker>
<marker id="arrG" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#15803d"/></marker>
<marker id="arrB" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#1d4ed8"/></marker>
</defs>
<rect width="1200" height="800" fill="white"/>
<text x="600.0" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">EPLB 在线热迁移流水线：重规划进子进程，靠两条队列与异步 P2P 与推理解耦</text>
<rect x="40" y="70" width="680" height="320" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
<text x="60" y="98" text-anchor="start" font-size="15" font-weight="bold" fill="#1d4ed8">推理主进程（vllm_ascend/worker/model_runner_v1.py）</text>
<rect x="70" y="118" width="300" height="250" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="220" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">① EplbUpdator · 节拍状态机</text>
<text x="220" y="172" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">cur_iterations + 3 个 flag</text>
<text x="220" y="194" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">forward_before()：取规划 / 发 P2P</text>
<text x="220" y="216" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">forward_end()：gather+点火 / 收权重</text>
<text x="220" y="238" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">update_iteration()：推进 / 归零</text>
<text x="220" y="290" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">一整轮 = interval + algo</text>
<text x="220" y="308" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">+ num_moe_layers 拍</text>
<text x="220" y="344" text-anchor="middle" font-size="11" font-weight="italic" fill="#94a3b8">eplb_updator.py:L77-L148</text>
<rect x="400" y="118" width="300" height="250" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="550" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">③ D2DExpertWeightLoader</text>
<text x="550" y="172" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">异步 P2P · 三态机</text>
<text x="550" y="194" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">WAITING → READY → TRANSFERRING</text>
<text x="550" y="216" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">generate → asyn → update</text>
<text x="550" y="238" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#334155">dist.P2POp(isend/irecv)</text>
<text x="550" y="290" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">搬的是 expert 权重张量</text>
<text x="550" y="308" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">每 step 只搬一层</text>
<text x="550" y="344" text-anchor="middle" font-size="11" font-weight="italic" fill="#94a3b8">eplb_device_transfer_loader.py</text>
<rect x="770" y="110" width="390" height="168" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
<text x="965" y="140" text-anchor="middle" font-size="15" font-weight="bold" fill="#854d0e">shared_dict = Manager().dict()</text>
<text x="965" y="162" text-anchor="middle" font-size="12" font-weight="normal" fill="#a16207">跨进程共享态（主进程 ↔ 子进程）</text>
<rect x="795" y="188" width="340" height="30" rx="6" fill="#fffbeb" stroke="#eab308" stroke-width="1.5"/>
<text x="810" y="208" text-anchor="start" font-size="13" font-weight="bold" fill="#854d0e">expert_maps</text>
<text x="960" y="208" text-anchor="start" font-size="12" font-weight="normal" fill="#a16207">各层各卡当前 expert 放置</text>
<rect x="795" y="226" width="340" height="30" rx="6" fill="#fffbeb" stroke="#eab308" stroke-width="1.5"/>
<text x="810" y="246" text-anchor="start" font-size="13" font-weight="bold" fill="#854d0e">moe_load</text>
<text x="960" y="246" text-anchor="start" font-size="12" font-weight="normal" fill="#a16207">all_gather 后的全局负载</text>
<rect x="40" y="470" width="720" height="290" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
<text x="60" y="498" text-anchor="start" font-size="15" font-weight="bold" fill="#15803d">② EPLB 子进程（daemon=True Process）</text>
<rect x="70" y="518" width="280" height="220" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="210" y="544" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">worker_process()</text>
<text x="210" y="572" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">while True:</text>
<text x="210" y="596" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">  planner_q.get()  ← 阻塞等唤醒</text>
<text x="210" y="620" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">  info = worker.do_update()</text>
<text x="210" y="644" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">  block_update_q.put(info)</text>
<text x="210" y="668" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">  （背压：队列非空则自旋）</text>
<text x="210" y="716" text-anchor="middle" font-size="11" font-weight="italic" fill="#86998a">eplb_worker.py:L342-L378</text>
<rect x="375" y="518" width="175" height="220" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="462" y="544" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">EplbWorker</text>
<text x="462" y="574" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">do_update()</text>
<text x="462" y="596" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">读 shared_dict</text>
<text x="462" y="618" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">→ 算新放置</text>
<text x="462" y="640" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">→ compose</text>
<text x="462" y="662" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">  send/recv</text>
<text x="462" y="684" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">→ pack</text>
<rect x="575" y="518" width="165" height="220" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
<text x="657" y="544" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">④ PolicyFactory</text>
<text x="657" y="574" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">int → 策略类</text>
<text x="657" y="598" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">rebalance_experts</text>
<text x="657" y="622" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">（唯一接口）</text>
<text x="657" y="646" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">DefaultEplb</text>
<text x="657" y="670" text-anchor="middle" font-size="12" font-weight="normal" fill="#166534">贪心装箱 + 冗余</text>
<rect x="810" y="470" width="350" height="290" rx="14" fill="#faf5ff" stroke="#9333ea" stroke-width="2.5"/>
<text x="985" y="498" text-anchor="middle" font-size="15" font-weight="bold" fill="#7e22ce">NPU 间 D2D 权重搬运</text>
<rect x="845" y="540" width="110" height="70" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
<text x="900" y="575" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b21a8">NPU 0</text>
<text x="900" y="596" text-anchor="middle" font-size="11" font-weight="normal" fill="#7e22ce">持有 expert</text>
<rect x="1015" y="540" width="110" height="70" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
<text x="1070" y="575" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b21a8">NPU 1</text>
<text x="1070" y="596" text-anchor="middle" font-size="11" font-weight="normal" fill="#7e22ce">接收 expert</text>
<line x1="955" y1="565" x2="1010" y2="565" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arr)"/>
<text x="985" y="558" text-anchor="middle" font-size="11" font-weight="normal" fill="#7e22ce">isend/irecv</text>
<text x="985" y="645" text-anchor="middle" font-size="12" font-weight="normal" fill="#6b21a8">batch_isend_irecv 批量搬运</text>
<text x="985" y="668" text-anchor="middle" font-size="12" font-weight="normal" fill="#6b21a8">借 get_dynamic_eplb_group()</text>
<text x="985" y="691" text-anchor="middle" font-size="12" font-weight="normal" fill="#6b21a8">= _DYNAMIC_EPLB（第 8 章建）</text>
<text x="985" y="714" text-anchor="middle" font-size="12" font-weight="normal" fill="#6b21a8">拓扑复用 MC2 group_ranks</text>
<line x1="170" y1="390" x2="170" y2="514" stroke="#15803d" stroke-width="3" marker-end="url(#arrG)"/>
<rect x="85" y="415" width="230" height="50" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="1.5"/>
<text x="200" y="435" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">planner_q.put(1)</text>
<text x="200" y="453" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#15803d">唤醒信号（无界队列）</text>
<line x1="430" y1="514" x2="430" y2="372" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrB)"/>
<rect x="330" y="415" width="250" height="50" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5"/>
<text x="455" y="435" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1d4ed8">block_update_q</text>
<text x="455" y="453" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#1d4ed8">规划结果（maxsize=1 背压）</text>
<path d="M 700 200 L 768 200" stroke="#ca8a04" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#arr)"/>
<text x="720" y="192" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#a16207">写 moe_load</text>
<path d="M 600 518 Q 980 340 965 280" stroke="#ca8a04" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#arr)"/>
<text x="820" y="400" text-anchor="middle" font-size="11" font-weight="normal" fill="#a16207">do_update 读 expert_maps/moe_load</text>
<path d="M 700 230 Q 870 250 900 536" stroke="#9333ea" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#arr)"/>
</svg>