<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 720" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="1320" height="720" fill="white"/>
<text x="660.0" y="42" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">薄壳子类化：只覆写几处热点，其余继承基类不动</text>
<text x="660.0" y="70" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">红 = 昇腾覆写（碰 NPU 同步 / 能上 Triton）  灰 = 继承基类、一行不改</text>
<text x="330" y="104" font-size="16" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">vLLM 基类</text>
<text x="980" y="104" font-size="16" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">昇腾子类（薄壳）</text>
<rect x="60" y="124" width="540" height="220" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" stroke-dasharray="6 5"/>
<text x="80" y="152" font-size="15" text-anchor="start" fill="#475569" font-weight="bold" font-family="monospace">class Sampler</text>
<rect x="720" y="124" width="540" height="220" rx="12" fill="#fff7f7" stroke="#ef4444" stroke-width="1.8"/>
<text x="740" y="152" font-size="14" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="monospace">class AscendSampler(Sampler)</text>
<text x="80" y="180" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• sample()</text>
<text x="740" y="180" font-size="12" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="sans-serif">↳ 继承：sample()</text>
<text x="80" y="210" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• apply_temperature / compute_logprobs</text>
<text x="740" y="210" font-size="12" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="sans-serif">↳ 继承：apply_temperature / compute_logprobs</text>
<text x="80" y="240" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• gather_logprobs / forward</text>
<text x="740" y="240" font-size="12" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="sans-serif">↳ 继承：gather_logprobs / forward</text>
<text x="80" y="270" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• greedy_sample()</text>
<text x="740" y="270" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">▣ greedy_sample()</text>
<text x="80" y="300" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• apply_penalties()</text>
<text x="740" y="300" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">▣ apply_penalties()</text>
<text x="80" y="330" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• __init__</text>
<text x="740" y="330" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">▣ __init__  装配 AscendTopKTopPSampler</text>
<line x1="600" y1="234.0" x2="720" y2="234.0" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="60" y="370" width="540" height="100" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" stroke-dasharray="6 5"/>
<text x="80" y="398" font-size="15" text-anchor="start" fill="#475569" font-weight="bold" font-family="monospace">class TopKTopPSampler</text>
<rect x="720" y="370" width="540" height="100" rx="12" fill="#fff7f7" stroke="#ef4444" stroke-width="1.8"/>
<text x="740" y="398" font-size="14" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="monospace">class AscendTopKTopPSampler(TopKTopPSampler)</text>
<text x="80" y="426" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• forward()</text>
<text x="740" y="426" font-size="12" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="sans-serif">↳ 继承：forward()</text>
<text x="80" y="456" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• forward_native()</text>
<text x="740" y="456" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">▣ forward_native()  top-k/top-p→softmax→random_sample</text>
<line x1="600" y1="420.0" x2="720" y2="420.0" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="60" y="496" width="540" height="130" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" stroke-dasharray="6 5"/>
<text x="80" y="524" font-size="15" text-anchor="start" fill="#475569" font-weight="bold" font-family="monospace">class RejectionSampler</text>
<rect x="720" y="496" width="540" height="130" rx="12" fill="#fff7f7" stroke="#ef4444" stroke-width="1.8"/>
<text x="740" y="524" font-size="14" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="monospace">class AscendRejectionSampler(RejectionSampler)</text>
<text x="80" y="552" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• parse_output / compute_probs</text>
<text x="740" y="552" font-size="12" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="sans-serif">↳ 继承：parse_output / compute_probs</text>
<text x="80" y="582" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• apply_penalties()</text>
<text x="740" y="582" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">▣ apply_penalties()  /  forward()</text>
<text x="80" y="612" font-size="12.5" text-anchor="start" fill="#94a3b8" font-weight="normal" font-family="monospace">• prepare_sampling()</text>
<text x="740" y="612" font-size="12" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">▣ prepare_sampling()  /  __init__()</text>
<line x1="600" y1="561.0" x2="720" y2="561.0" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="660.0" y="702" font-size="13" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">偏离面越小，越容易随 vLLM 上游升级走 —— 这是「换头不换身」在采样层的复用。</text>
</svg>