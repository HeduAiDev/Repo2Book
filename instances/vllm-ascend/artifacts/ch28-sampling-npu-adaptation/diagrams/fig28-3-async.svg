<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 520" font-family="sans-serif">
<rect width="1320" height="520" fill="white"/>
<defs><marker id="sy" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker></defs>
<text x="660.0" y="40" font-size="22" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">异步指数随机：让 q.exponential_() 与模型计算在两条 stream 上重叠</text>
<text x="70" y="86" font-size="15" text-anchor="start" fill="#475569" font-weight="bold" font-family="sans-serif">同步串行（概念基线）</text>
<rect x="70" y="100" width="360" height="48" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
<text x="250" y="130" font-size="13.5" text-anchor="middle" fill="#3730a3" font-weight="normal" font-family="sans-serif">模型前向 → logits → softmax</text>
<rect x="440" y="100" width="240" height="48" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
<text x="560" y="130" font-size="13.5" text-anchor="middle" fill="#854d0e" font-weight="normal" font-family="monospace">q.exponential_()</text>
<rect x="690" y="100" width="200" height="48" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="790" y="130" font-size="13.5" text-anchor="middle" fill="#166534" font-weight="normal" font-family="monospace">div_ / argmax</text>
<text x="910" y="130" font-size="13" text-anchor="start" fill="#b91c1c" font-weight="normal" font-family="sans-serif">临界路径 = 三段相加</text>
<text x="70" y="206" font-size="15" text-anchor="start" fill="#15803d" font-weight="bold" font-family="sans-serif">异步重叠（昇腾）</text>
<rect x="70" y="220" width="60" height="130" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
<text x="100" y="290" font-size="14" text-anchor="middle" fill="#475569" font-weight="bold" font-family="sans-serif">主</text>
<text x="100" y="310" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">stream</text>
<rect x="150" y="230" width="420" height="50" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
<text x="360" y="260" font-size="13.5" text-anchor="middle" fill="#3730a3" font-weight="normal" font-family="sans-serif">模型前向 → logits → softmax</text>
<rect x="600" y="230" width="220" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="710" y="260" font-size="12.5" text-anchor="middle" fill="#166534" font-weight="normal" font-family="monospace">probs.div_(q).argmax</text>
<rect x="70" y="300" width="60" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
<text x="100" y="322" font-size="10.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">global</text>
<text x="100" y="338" font-size="10.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">stream</text>
<rect x="150" y="300" width="300" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
<text x="300" y="330" font-size="13" text-anchor="middle" fill="#854d0e" font-weight="normal" font-family="monospace">q.exponential_()  并行发起</text>
<line x1="450" y1="325" x2="600" y2="270" stroke="#7c3aed" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#sy)"/>
<text x="470" y="370" font-size="12.5" text-anchor="start" fill="#7c3aed" font-weight="normal" font-family="sans-serif">wait_stream / Event.synchronize：div_ 前汇流一次</text>
<text x="840" y="260" font-size="13" text-anchor="start" fill="#15803d" font-weight="bold" font-family="sans-serif">临界路径 ≈ 模型前向 + div_/argmax</text>
<text x="840" y="282" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="sans-serif">（指数随机的延迟被藏进前向，少一段）</text>
<text x="660.0" y="470" font-size="12.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">RNG 与本步 logits→probs 无数据依赖 → 可并行；只在最终 div_ 前同步一次。默认走 random_sample 内的两行包裹，enable_async_exponential 更进一步用 Event 预算。</text>
</svg>