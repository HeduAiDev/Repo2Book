<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" font-family="sans-serif">
<rect width="1280" height="560" fill="white"/>
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<text x="640.0" y="42" font-size="24" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">加速，不是依赖：HAS_TRITON 不可用时优雅回退</text>
<text x="640.0" y="70" font-size="14" text-anchor="middle" fill="#64748b" font-weight="normal" font-family="sans-serif">penalties / top-k-top-p / 拒绝采样 —— 每个热点都长这一个样</text>
<polygon points="640.0,102.0 760.0,150 640.0,198.0 520.0,150" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
<text x="640.0" y="146" font-size="16" text-anchor="middle" fill="#854d0e" font-weight="bold" font-family="monospace">if HAS_TRITON ?</text>
<text x="640.0" y="168" font-size="12" text-anchor="middle" fill="#a16207" font-weight="normal" font-family="sans-serif">（昇腾 Triton 是否可用）</text>
<rect x="150" y="270" width="440" height="220" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="370" y="300" font-size="15" text-anchor="middle" fill="#15803d" font-weight="bold" font-family="sans-serif">是 → 走昇腾 Triton-Ascend 内核（加速）</text>
<text x="180" y="340" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="monospace">• apply_penalties_triton(...)</text>
<text x="180" y="370" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="monospace">• rejection_greedy_sample_with_triton(...)</text>
<text x="180" y="400" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="monospace">• rejection_random_sample_kernel[...](...)</text>
<text x="180" y="430" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="monospace">• sample_recovered_tokens_kernel[...](...)</text>
<text x="180" y="460" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="monospace">• npu_apply_top_k_top_p（A2/A3 AscendC 算子）</text>
<rect x="690" y="270" width="440" height="220" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.8"/>
<text x="910" y="300" font-size="15" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">否 → 回退基类 / 纯 torch（仍正确）</text>
<text x="720" y="340" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">• Sampler.apply_penalties(...)  基类原版</text>
<text x="720" y="370" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">• rejection_greedy_sample_pytorch(...)</text>
<text x="720" y="400" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">• rejection_random_sample_pytorch(...)</text>
<text x="720" y="430" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">• sample_recovered_tokens_pytorch(...)</text>
<text x="720" y="460" font-size="12.5" text-anchor="start" fill="#7f1d1d" font-weight="normal" font-family="monospace">• _apply_top_k_top_p_pytorch（sort/cumsum）</text>
<line x1="550.0" y1="186" x2="400" y2="270" stroke="#15803d" stroke-width="2" marker-end="url(#ar)"/>
<line x1="730.0" y1="186" x2="880" y2="270" stroke="#b91c1c" stroke-width="2" marker-end="url(#ar)"/>
<text x="330" y="240" font-size="15" text-anchor="middle" fill="#15803d" font-weight="bold" font-family="sans-serif">是</text>
<text x="950" y="240" font-size="15" text-anchor="middle" fill="#b91c1c" font-weight="bold" font-family="sans-serif">否</text>
<text x="640.0" y="528" font-size="13" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">两条路结果同分布：Triton 只换更快的内核，不改采样语义。无 NPU Triton 也能跑，只是慢一点。</text>
</svg>