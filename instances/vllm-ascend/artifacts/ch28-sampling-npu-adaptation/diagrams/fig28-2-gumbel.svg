<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 560" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="9" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="9" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#15803d"/></marker></defs>
<rect width="1320" height="560" fill="white"/>
<text x="660.0" y="40" font-size="23" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">同一分布，两条路：multinomial 卡同步 vs Gumbel-max 全程在 NPU</text>
<text x="70" y="96" font-size="15" text-anchor="start" fill="#b91c1c" font-weight="bold" font-family="sans-serif">上路 · torch.multinomial（基类未走）</text>
<rect x="70" y="116" width="150" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
<text x="145" y="153.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">probs</text>
<rect x="270" y="116" width="150" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
<text x="345" y="144.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">构建 CDF</text>
<text x="345" y="162.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">累积分布</text>
<rect x="470" y="116" width="150" height="64" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
<text x="545" y="144.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">CPU-NPU</text>
<text x="545" y="162.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">同步 ⚠</text>
<rect x="700" y="116" width="150" height="64" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
<text x="775" y="144.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">host 取样</text>
<text x="775" y="162.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">回拷设备</text>
<rect x="930" y="116" width="150" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
<text x="1005" y="153.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">token id</text>
<line x1="220" y1="148" x2="268" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<line x1="420" y1="148" x2="468" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<line x1="650" y1="148" x2="698" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<line x1="880" y1="148" x2="928" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="550" y="210" font-size="13.5" text-anchor="middle" fill="#b91c1c" font-weight="normal" font-family="sans-serif">流水线停顿：等 host 算完才能继续 —— 这正是要避开的同步点。</text>
<text x="70" y="282" font-size="15" text-anchor="start" fill="#15803d" font-weight="bold" font-family="sans-serif">下路 · probs.div_(q).argmax,  q ~ Exp(1)（昇腾与基类都走这条）</text>
<rect x="70" y="302" width="160" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="150" y="339.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">probs</text>
<rect x="270" y="302" width="160" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="350" y="330.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="monospace">q.exponential_()</text>
<text x="350" y="348.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="monospace">q ~ Exp(1)</text>
<rect x="490" y="302" width="160" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="570" y="330.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="monospace">probs.div_(q)</text>
<text x="570" y="348.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">逐元素</text>
<rect x="710" y="302" width="160" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="790" y="339.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="monospace">argmax(dim=-1)</text>
<rect x="930" y="302" width="160" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
<text x="1010" y="339.0" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="normal" font-family="sans-serif">token id</text>
<line x1="230" y1="334" x2="268" y2="334" stroke="#15803d" stroke-width="2" marker-end="url(#arg)"/>
<line x1="450" y1="334" x2="488" y2="334" stroke="#15803d" stroke-width="2" marker-end="url(#arg)"/>
<line x1="670" y1="334" x2="708" y2="334" stroke="#15803d" stroke-width="2" marker-end="url(#arg)"/>
<line x1="890" y1="334" x2="928" y2="334" stroke="#15803d" stroke-width="2" marker-end="url(#arg)"/>
<rect x="70" y="402" width="1180" height="56" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.6"/>
<text x="90" y="426" font-size="13.5" text-anchor="start" fill="#15803d" font-weight="bold" font-family="sans-serif">昇腾的 NPU delta（两行）：</text>
<text x="290" y="426" font-size="13" text-anchor="start" fill="#166534" font-weight="normal" font-family="monospace">with npu_stream_switch(global_stream()):  q.exponential_()   →   wait_stream() 汇流</text>
<text x="90" y="448" font-size="12.5" text-anchor="start" fill="#166534" font-weight="normal" font-family="sans-serif">把指数随机切到独立 stream 异步发起，与模型计算重叠；Gumbel 数学来自上游，昇腾只加这层异步包裹。</text>
<text x="660.0" y="506" font-size="13" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">同分布证明：q_i/p_i ~ Exp(p_i)，独立指数取最小落在 i 的概率 = p_i / Σp_j = p_i。故 argmax(p/q) ~ Categorical(p)。</text>
</svg>