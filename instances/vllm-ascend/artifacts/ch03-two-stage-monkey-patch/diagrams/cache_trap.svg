<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker></defs>
<rect width="1200" height="680" fill="white"/>
<text x="600.0" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">from-import 缓存陷阱：名字绑定 ≠ 对象身份</text>
<text x="40" y="92" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b">第 1 步　模块 M 定义 broadcast，调用方执行 from M import broadcast</text>
<rect x="70" y="110" width="240" height="56" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="190.0" y="134" font-family="monospace" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">M.broadcast</text>
<text x="190.0" y="154" font-family="sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle">顶层名字</text>
<rect x="70" y="184" width="240" height="56" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="190.0" y="208" font-family="monospace" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">caller.broadcast</text>
<text x="190.0" y="228" font-family="sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle">调用方缓存的名字</text>
<rect x="560" y="147" width="150" height="50" rx="25" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
<text x="635.0" y="177" font-family="monospace" font-size="15" font-weight="bold" fill="#475569" text-anchor="middle">原 fn</text>
<line x1="310" y1="138.0" x2="560" y2="159" stroke="#2563eb" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="310" y1="212.0" x2="560" y2="185" stroke="#2563eb" stroke-width="2.2" marker-end="url(#a)"/>
<text x="560" y="232" font-family="sans-serif" font-size="12.5" fill="#64748b">两个名字指向同一个函数对象</text>
<line x1="40" y1="262" x2="1160" y2="262" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="40" y="296" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c">第 2 步　只改顶层名字 M.broadcast = w　→　调用方漏网（陷阱）</text>
<rect x="70" y="314" width="240" height="56" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
<text x="190.0" y="338" font-family="monospace" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">M.broadcast</text>
<text x="190.0" y="358" font-family="sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle">已改</text>
<rect x="70" y="388" width="240" height="56" rx="9" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/>
<text x="190.0" y="412" font-family="monospace" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">caller.broadcast</text>
<text x="190.0" y="432" font-family="sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle">仍指旧对象！</text>
<rect x="560" y="314" width="150" height="50" rx="25" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="635.0" y="344" font-family="monospace" font-size="15" font-weight="bold" fill="#16a34a" text-anchor="middle">wrapper w</text>
<rect x="560" y="388" width="150" height="50" rx="25" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="635.0" y="418" font-family="monospace" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">原 fn</text>
<line x1="310" y1="342.0" x2="560" y2="339.0" stroke="#16a34a" stroke-width="2.2" marker-end="url(#ag)"/>
<line x1="310" y1="416.0" x2="560" y2="413.0" stroke="#dc2626" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="730" y="345" font-family="sans-serif" font-size="12.5" fill="#16a34a">新调用拿到 wrapper</text>
<text x="730" y="419" font-family="sans-serif" font-size="12.5" fill="#dc2626">已缓存的调用仍走旧 fn → patch 漏网</text>
<line x1="40" y1="462" x2="1160" y2="462" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="40" y="496" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d">解药　把所有持有引用的别名都重绑为 w</text>
<rect x="70" y="514" width="1060" height="132" rx="12" fill="#f8fafc" stroke="#16a34a" stroke-width="1.6"/>
<text x="94" y="552" font-family="monospace" font-size="13.5" fill="#0f172a">torch.distributed.broadcast              = broadcast310p_wrapper(torch.distributed.broadcast)</text>
<text x="94" y="582" font-family="monospace" font-size="13.5" fill="#0f172a">torch.distributed.distributed_c10d.broadcast = broadcast310p_wrapper(torch.distributed.distributed_c10d.broadcast)</text>
<text x="94" y="626" font-family="sans-serif" font-size="13" fill="#475569">顶层名字 + distributed_c10d 子模块别名「同时」重绑 —— 不管调用方从哪个名字 import，拿到的都是 wrapper。</text>
</svg>