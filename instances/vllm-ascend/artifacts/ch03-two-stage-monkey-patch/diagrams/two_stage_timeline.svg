<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#6d28d9"/></marker></defs>
<rect width="1180" height="620" fill="white"/>
<text x="590.0" y="38" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">两段式 monkey-patch：单一入口 adapt_patch · 二分两段时机</text>
<line x1="590.0" y1="70" x2="590.0" y2="590" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
<text x="295" y="92" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1d4ed8" text-anchor="middle">platform 段 · 进程早期、构图前</text>
<text x="885" y="92" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b45309" text-anchor="middle">worker 段 · 每个 worker 进程构造时</text>
<rect x="40" y="120" width="230" height="78" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="155.0" y="146.5" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">触发点①</text>
<text x="155.0" y="163.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="middle">NPUPlatform.</text>
<text x="155.0" y="180.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="middle">pre_register_and_update()</text>
<rect x="40" y="210" width="230" height="78" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
<text x="155.0" y="236.5" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">触发点②</text>
<text x="155.0" y="253.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="middle">_ensure_global_patch()</text>
<text x="155.0" y="270.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#64748b" text-anchor="middle">（守卫 _GLOBAL_PATCH_APPLIED）</text>
<rect x="40" y="314" width="230" height="78" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.6"/>
<text x="155.0" y="340.75" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#6d28d9" text-anchor="middle">被三个 general_plugins 入口调：</text>
<text x="155.0" y="357.25" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#475569" text-anchor="middle">register_connector /</text>
<text x="155.0" y="373.75" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#475569" text-anchor="middle">model_loader / service_profiling</text>
<rect x="330" y="200" width="215" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
<text x="437.5" y="231.0" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b" text-anchor="middle">adapt_patch(</text>
<text x="437.5" y="249.0" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle">is_global_patch=True)</text>
<rect x="330" y="320" width="215" height="72" rx="10" fill="#1e293b" stroke="#0f172a" stroke-width="1.6"/>
<text x="437.5" y="352.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#e2e8f0" text-anchor="middle">from vllm_ascend.patch</text>
<text x="437.5" y="369.0" font-family="sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">import platform</text>
<line x1="270" y1="159" x2="328" y2="218" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="270" y1="249" x2="328" y2="235" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="270" y1="353" x2="328" y2="252" stroke="#6d28d9" stroke-width="2" marker-end="url(#ag)"/>
<line x1="437" y1="270" x2="437" y2="318" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="630" y="165" width="230" height="70" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.6"/>
<text x="745.0" y="196.0" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b45309" text-anchor="middle">触发点</text>
<text x="745.0" y="214.0" font-family="sans-serif" font-size="14" font-weight="normal" fill="#334155" text-anchor="middle">NPUWorker.__init__</text>
<rect x="920" y="200" width="215" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
<text x="1027.5" y="231.0" font-family="sans-serif" font-size="13" font-weight="bold" fill="#b45309" text-anchor="middle">adapt_patch()</text>
<text x="1027.5" y="248.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#475569" text-anchor="middle">（默认 is_global_patch=False）</text>
<rect x="920" y="320" width="215" height="72" rx="10" fill="#1e293b" stroke="#0f172a" stroke-width="1.6"/>
<text x="1027.5" y="352.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#e2e8f0" text-anchor="middle">from vllm_ascend.patch</text>
<text x="1027.5" y="369.0" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fcd34d" text-anchor="middle">import worker</text>
<line x1="860" y1="200" x2="918" y2="225" stroke="#b45309" stroke-width="2" marker-end="url(#a)"/>
<line x1="1027" y1="270" x2="1027" y2="318" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="40" y="440" width="1100" height="120" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="62" y="470" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">import 副作用 = 执行 patch</text>
<text x="62" y="498" font-family="sans-serif" font-size="13" fill="#334155">• patch 没有任何显式 apply()：import 这两个包时，包 __init__ 里一串「裸 import」级联触发各 patch_*.py 的模块级重绑代码。</text>
<text x="62" y="520" font-family="sans-serif" font-size="13" fill="#334155">• platform 段必须早于「构建 Scheduler / MultiprocExecutor / KV-cache 工厂表」之前——它替换的正是构图阶段就被引用的类。</text>
<text x="62" y="542" font-family="sans-serif" font-size="13" fill="#334155">• worker 子进程（spawn）是全新解释器，父进程的 patch 不继承，故必须在每个 worker __init__ 里重新触发 worker 段。</text>
</svg>