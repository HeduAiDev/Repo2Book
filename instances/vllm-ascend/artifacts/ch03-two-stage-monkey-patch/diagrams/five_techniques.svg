<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="white"/>
<text x="640.0" y="42" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">5 种重绑技法：按「被替换引用的形态」选招</text>
<text x="640.0" y="72" font-family="sans-serif" font-size="14.5" fill="#64748b" text-anchor="middle">monkey-patch 改的是「某命名空间里的名字指向哪个对象」，不改对象本身</text>
<rect x="28.0" y="100" width="232.0" height="540" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<rect x="28.0" y="100" width="232.0" height="58" rx="12" fill="#2563eb"/>
<rect x="28.0" y="130" width="232.0" height="28" fill="#2563eb"/>
<text x="144.0" y="126" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">①</text>
<text x="144.0" y="150" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">整类替换</text>
<text x="144.0" y="188" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">被替换引用形态</text>
<text x="144.0" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">类名属性</text>
<rect x="38.0" y="230" width="212.0" height="62" rx="7" fill="#0f172a"/>
<text x="48.0" y="254" font-family="monospace" font-size="11.5" fill="#e2e8f0">MultiprocExecutor</text>
<text x="48.0" y="276" font-family="monospace" font-size="11.5" fill="#e2e8f0">= AscendMultiprocExecutor</text>
<text x="144.0" y="318" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">代表 patch</text>
<text x="144.0" y="336" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="middle">platform/patch_multiproc_executor.py</text>
<rect x="38.0" y="562" width="212.0" height="66" rx="7" fill="white" stroke="#2563eb" stroke-width="1" stroke-dasharray="3 3"/>
<text x="144.0" y="590" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">子类整体重写，把模块属性指</text>
<text x="144.0" y="610" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">向子类</text>
<rect x="276.0" y="100" width="232.0" height="540" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<rect x="276.0" y="100" width="232.0" height="58" rx="12" fill="#7c3aed"/>
<rect x="276.0" y="130" width="232.0" height="28" fill="#7c3aed"/>
<text x="392.0" y="126" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">②</text>
<text x="392.0" y="150" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">工厂(注册表)替换</text>
<text x="392.0" y="188" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">被替换引用形态</text>
<text x="392.0" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7c3aed" text-anchor="middle">类名 + 派发表</text>
<rect x="286.0" y="230" width="212.0" height="62" rx="7" fill="#0f172a"/>
<text x="296.0" y="254" font-family="monospace" font-size="11.5" fill="#e2e8f0">spec_manager_map[MambaSpec]</text>
<text x="296.0" y="276" font-family="monospace" font-size="11.5" fill="#e2e8f0">= AscendMambaManager</text>
<text x="392.0" y="318" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">代表 patch</text>
<text x="392.0" y="336" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="middle">platform/patch_mamba_manager.py</text>
<rect x="286.0" y="562" width="212.0" height="66" rx="7" fill="white" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>
<text x="392.0" y="590" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">只换类名不够：</text>
<text x="392.0" y="610" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">工厂照旧表 new 旧类</text>
<rect x="524.0" y="100" width="232.0" height="540" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<rect x="524.0" y="100" width="232.0" height="58" rx="12" fill="#0891b2"/>
<rect x="524.0" y="130" width="232.0" height="28" fill="#0891b2"/>
<text x="640.0" y="126" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">③</text>
<text x="640.0" y="150" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">方法替换</text>
<text x="640.0" y="188" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">被替换引用形态</text>
<text x="640.0" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0891b2" text-anchor="middle">类的单个属性</text>
<rect x="534.0" y="230" width="212.0" height="84" rx="7" fill="#0f172a"/>
<text x="544.0" y="254" font-family="monospace" font-size="11.5" fill="#e2e8f0">Scheduler.</text>
<text x="544.0" y="276" font-family="monospace" font-size="11.5" fill="#e2e8f0">_mamba_block_aligned_split</text>
<text x="544.0" y="298" font-family="monospace" font-size="11.5" fill="#e2e8f0">= fn</text>
<text x="640.0" y="340" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">代表 patch</text>
<text x="640.0" y="358" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="middle">platform/patch_scheduler.py</text>
<rect x="534.0" y="562" width="212.0" height="66" rx="7" fill="white" stroke="#0891b2" stroke-width="1" stroke-dasharray="3 3"/>
<text x="640.0" y="590" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">不建子类，只换一个绑定方法</text>
<rect x="772.0" y="100" width="232.0" height="540" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
<rect x="772.0" y="100" width="232.0" height="58" rx="12" fill="#d97706"/>
<rect x="772.0" y="130" width="232.0" height="28" fill="#d97706"/>
<text x="888.0" y="126" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">④</text>
<text x="888.0" y="150" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">库函数 wrapper</text>
<text x="888.0" y="188" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">被替换引用形态</text>
<text x="888.0" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#d97706" text-anchor="middle">模块里的函数</text>
<rect x="782.0" y="230" width="212.0" height="84" rx="7" fill="#0f172a"/>
<text x="792.0" y="254" font-family="monospace" font-size="11.5" fill="#e2e8f0">triton.next_power_of_2</text>
<text x="792.0" y="276" font-family="monospace" font-size="11.5" fill="#e2e8f0">= next_power_of_2</text>
<text x="792.0" y="298" font-family="monospace" font-size="11.5" fill="#e2e8f0">broadcast = wrapper(fn)</text>
<text x="888.0" y="340" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">代表 patch</text>
<text x="888.0" y="358" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="middle">worker/patch_triton.py</text>
<text x="888.0" y="374" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="middle">platform/patch_distributed.py</text>
<rect x="782.0" y="562" width="212.0" height="66" rx="7" fill="white" stroke="#d97706" stroke-width="1" stroke-dasharray="3 3"/>
<text x="888.0" y="590" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">闭包捕获原 fn，前后增量</text>
<text x="888.0" y="610" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">包裹 / 直接补函数</text>
<rect x="1020.0" y="100" width="232.0" height="540" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<rect x="1020.0" y="100" width="232.0" height="58" rx="12" fill="#dc2626"/>
<rect x="1020.0" y="130" width="232.0" height="28" fill="#dc2626"/>
<text x="1136.0" y="126" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">⑤</text>
<text x="1136.0" y="150" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">from-import 缓存陷阱</text>
<text x="1136.0" y="188" font-family="sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle">被替换引用形态</text>
<text x="1136.0" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">同对象的所有别名</text>
<rect x="1030.0" y="230" width="212.0" height="106" rx="7" fill="#0f172a"/>
<text x="1040.0" y="254" font-family="monospace" font-size="11.5" fill="#e2e8f0">torch.distributed.broadcast</text>
<text x="1040.0" y="276" font-family="monospace" font-size="11.5" fill="#e2e8f0">= w</text>
<text x="1040.0" y="298" font-family="monospace" font-size="11.5" fill="#e2e8f0">distributed_c10d.broadcast</text>
<text x="1040.0" y="320" font-family="monospace" font-size="11.5" fill="#e2e8f0">= w</text>
<text x="1136.0" y="362" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">代表 patch</text>
<text x="1136.0" y="380" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="middle">platform/patch_distributed.py</text>
<rect x="1030.0" y="562" width="212.0" height="66" rx="7" fill="white" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
<text x="1136.0" y="590" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">调用方可能已缓存引用：</text>
<text x="1136.0" y="610" font-family="sans-serif" font-size="12" fill="#334155" text-anchor="middle">所有别名都要重绑</text>
</svg>