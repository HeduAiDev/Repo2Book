<text x="165.0" y="192" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：kv_lora</text>
<rect x="119.0" y="202" width="92" height="22" rx="11" fill="#2563eb"/>
<text x="165.0" y="217" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">bfloat16</text>
