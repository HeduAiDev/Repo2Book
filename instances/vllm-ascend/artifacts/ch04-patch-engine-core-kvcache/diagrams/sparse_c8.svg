<text x="165.0" y="394" font-family="monospace" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">kv_cache[0]</text>
<text x="165.0" y="422" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：kv_lora</text>
<rect x="119.0" y="432" width="92" height="22" rx="11" fill="#2563eb"/>
<text x="165.0" y="447" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">bfloat16</text>
