<text x="590.0" y="70" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">page_size_bytes 重算的根因：indexer key 降精度省显存，再补一条量化 scale</text>
<text x="40" y="116" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">原 MLA（3 元组，全 bf16）</text>
