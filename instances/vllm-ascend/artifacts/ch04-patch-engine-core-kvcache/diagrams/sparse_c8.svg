<text x="429.0" y="394" font-family="monospace" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">kv_cache[1]</text>
<text x="429.0" y="422" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：k_rope</text>
<rect x="383.0" y="432" width="92" height="22" rx="11" fill="#2563eb"/>
<text x="429.0" y="447" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">bfloat16</text>
<rect x="568" y="360" width="250" height="92" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="693.0" y="394" font-family="monospace" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">kv_cache[2]</text>
<text x="693.0" y="422" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：indexer key</text>
<rect x="647.0" y="432" width="92" height="22" rx="11" fill="#dc2626"/>
<text x="693.0" y="447" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">int8</text>
<rect x="832" y="360" width="250" height="92" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="957.0" y="394" font-family="monospace" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">kv_cache[3]</text>
<text x="957.0" y="422" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：key scale</text>
<rect x="911.0" y="432" width="92" height="22" rx="11" fill="#059669"/>
<text x="957.0" y="447" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">float16</text>
<text x="1112" y="411.0" font-family="sans-serif" font-size="13" fill="#475569"></text>
<rect x="40" y="470" width="1100" height="56" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="60" y="494" font-family="sans-serif" font-size="13" fill="#334155">kv_cache[2] 从 bf16 降到 int8：省一半字节；新增 kv_cache[3] 存量化 scale 作补偿。</text>
<text x="60" y="514" font-family="sans-serif" font-size="13" fill="#334155">A5 设备把 kv_lora+k_rope 合并成单 CKV（fp8），A3 分开存（bf16）——同一公式按 qk_rope_head_dim==0 分流。</text>
</svg>