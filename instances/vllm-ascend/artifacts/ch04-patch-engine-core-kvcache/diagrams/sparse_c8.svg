<text x="429.0" y="192" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：k_rope</text>
<rect x="383.0" y="202" width="92" height="22" rx="11" fill="#2563eb"/>
<text x="429.0" y="217" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">bfloat16</text>
<rect x="568" y="130" width="250" height="92" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="693.0" y="164" font-family="monospace" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">kv_cache[2]</text>
<text x="693.0" y="192" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">存：indexer key</text>
<rect x="647.0" y="202" width="92" height="22" rx="11" fill="#2563eb"/>
<text x="693.0" y="217" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">bfloat16</text>
<text x="848" y="181.0" font-family="sans-serif" font-size="13" fill="#475569"></text>
<defs><marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#7c3aed"/></marker></defs>
<line x1="590.0" y1="252" x2="590.0" y2="292" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="360.0" y="258" width="460" height="28" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.2"/>
<text x="590.0" y="277" font-family="sans-serif" font-size="13.5" fill="#6d28d9" text-anchor="middle">cache_sparse_c8 = True：indexer key 转 int8 + 补 fp16 scale</text>
<text x="40" y="346" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Sparse-C8（4 元组）</text>
