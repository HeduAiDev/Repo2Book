<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560">
<rect width="1180" height="560" fill="white"/>
<defs><marker id="ag" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#0891b2"/></marker></defs>
<text x="590.0" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">解锁 CP + hybrid 前缀缓存：去断言 + 有效块大小缩放</text>
<text x="590.0" y="68" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">原版禁止 hybrid 开 context parallel；昇腾把 block_size 乘上 CP 因子，重新对齐命中长度</text>
<rect x="60" y="100" width="460" height="110" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="290.0" y="130" font-family="sans-serif" font-size="15" font-weight="bold" fill="#b91c1c" text-anchor="middle">vLLM 基座：直接拒绝</text>
<text x="84" y="158" font-family="monospace" font-size="13" fill="#7f1d1d">assert dcp_world_size == 1</text>
<text x="84" y="180" font-family="monospace" font-size="13" fill="#7f1d1d">assert pcp_world_size == 1</text>
<text x="84" y="200" font-family="monospace" font-size="12.5" fill="#7f1d1d">resolve(): 多组+CP &#62;1 → raise ValueError</text>
<line x1="70" y1="110" x2="510" y2="200" stroke="#dc2626" stroke-width="2.5" stroke-opacity="0.55"/>
<line x1="510" y1="110" x2="70" y2="200" stroke="#dc2626" stroke-width="2.5" stroke-opacity="0.55"/>
<rect x="560" y="100" width="560" height="110" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="584" y="130" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0e7490">昇腾：MLA / SWA-MLA 各自实现了 CP</text>
<text x="584" y="158" font-family="sans-serif" font-size="13" fill="#155e75">去掉两条 assert，保存 dcp / pcp；</text>
<text x="584" y="180" font-family="sans-serif" font-size="13" fill="#155e75">把 raise 换成 lcm / gcd 真实计算；</text>
<text x="584" y="200" font-family="sans-serif" font-size="13" fill="#155e75">命中长度改按「有效块大小」对齐。</text>
<rect x="40" y="290" width="196" height="96" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
<text x="138.0" y="324" font-family="monospace" font-size="13.5" font-weight="bold" fill="#475569" text-anchor="middle">spec.block_size</text>
<text x="138.0" y="348" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">每类 attention</text>
<text x="138.0" y="367" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">各自的逻辑块</text>
<rect x="266.0" y="290" width="196" height="96" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="364.0" y="324" font-family="monospace" font-size="13.5" font-weight="bold" fill="#0891b2" text-anchor="middle">× dcp × pcp</text>
<text x="364.0" y="348" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">CP 因子</text>
<text x="364.0" y="367" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">(dcp_world×pcp_world)</text>
<rect x="492.0" y="290" width="196" height="96" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="590.0" y="324" font-family="monospace" font-size="13.5" font-weight="bold" fill="#7c3aed" text-anchor="middle">× compress_ratio</text>
<text x="590.0" y="348" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">DeepseekV4 C128</text>
<text x="590.0" y="367" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">压缩放大</text>
<rect x="718.0" y="290" width="196" height="96" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
<text x="816.0" y="324" font-family="monospace" font-size="13.5" font-weight="bold" fill="#0891b2" text-anchor="middle">effective_block_size</text>
<text x="816.0" y="348" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">_get_effective</text>
<text x="816.0" y="367" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">_block_size()</text>
<rect x="944.0" y="290" width="196" height="96" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
<text x="1042.0" y="324" font-family="monospace" font-size="13.5" font-weight="bold" fill="#0e7490" text-anchor="middle">lcm(各类有效块)</text>
<text x="1042.0" y="348" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">lcm_block_size</text>
<text x="1042.0" y="367" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">命中长度的整除单位</text>
<line x1="236" y1="338.0" x2="264.0" y2="338.0" stroke="#0891b2" stroke-width="2.5" marker-end="url(#ag)"/>
<line x1="462.0" y1="338.0" x2="490.0" y2="338.0" stroke="#0891b2" stroke-width="2.5" marker-end="url(#ag)"/>
<line x1="688.0" y1="338.0" x2="716.0" y2="338.0" stroke="#0891b2" stroke-width="2.5" marker-end="url(#ag)"/>
<line x1="914.0" y1="338.0" x2="942.0" y2="338.0" stroke="#0891b2" stroke-width="2.5" marker-end="url(#ag)"/>
<text x="60" y="268" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">有效块大小怎么算（_get_effective_block_size）</text>
<rect x="40" y="440" width="540" height="92" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="60" y="468" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">scheduler_block_size</text>
<text x="60" y="492" font-family="monospace" font-size="13" fill="#334155">= lcm(group_block_sizes) × dcp × pcp</text>
<text x="60" y="514" font-family="sans-serif" font-size="12.5" fill="#64748b">调度器对 num_computed_tokens 取整的不变量（CP 因子只乘进这里）</text>
<rect x="600" y="440" width="540" height="92" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="620" y="468" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">hash_block_size</text>
<text x="620" y="492" font-family="monospace" font-size="13" fill="#334155">= gcd(group_block_sizes)</text>
<text x="620" y="514" font-family="sans-serif" font-size="12.5" fill="#64748b">算 block hash 的最细粒度，每组 block_size 必被它整除</text>
</svg>