<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 623">
<rect x="0" y="0" width="1480" height="100%" fill="white"/>
<text x="740.0" y="40" font-family="sans-serif" font-size="25" font-weight="bold" fill="#0f172a" text-anchor="middle">本章 5 个 KV-cache patch 案例：原算法 → 昇腾约束 → 重绑定手法</text>
<text x="740.0" y="66" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">每个案例都对照 vLLM 基座，点名复用第 3 章的 5 类重绑技法（本章不再重讲技法本身）</text>
<rect x="24" y="94" width="250" height="50" fill="#1e293b"/>
<text x="149.0" y="124.0" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">案例</text>
<rect x="274" y="94" width="400" height="50" fill="#1e293b"/>
<text x="474.0" y="124.0" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">原算法（vLLM 基座）</text>
<rect x="674" y="94" width="360" height="50" fill="#1e293b"/>
<text x="854.0" y="124.0" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">昇腾约束</text>
<rect x="1034" y="94" width="422" height="50" fill="#1e293b"/>
<text x="1245.0" y="124.0" font-family="sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">重绑定手法（复用第 3 章技法）</text>
<rect x="24" y="144" width="1432" height="91" fill="#2563eb" fill-opacity="0.05"/>
<rect x="24" y="144" width="6" height="91" fill="#2563eb"/>
<rect x="24" y="144" width="250" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="149.0" y="184.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">① block_size</text>
<text x="149.0" y="205.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">16 → 128</text>
<rect x="274" y="144" width="400" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="288" y="174.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">kernel block 取 backend 支持</text>
<text x="288" y="195.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">的最小值（CUDA mamba2 = 16）；</text>
<text x="288" y="216.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">block_size 对齐推迟到执行期</text>
<rect x="674" y="144" width="360" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="688" y="184.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">NPU mamba kernel 不支持 16；</text>
<text x="688" y="205.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">硬件要求所有 cache tensor 连续</text>
<rect x="1034" y="144" width="422" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="1048" y="174.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">技法③ 方法替换</text>
<text x="1048" y="195.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">整体顶替 verify_and_update_config</text>
<text x="1048" y="216.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">把对齐数硬钉 128 并前移到构图期</text>
<rect x="24" y="235" width="1432" height="91" fill="#7c3aed" fill-opacity="0.05"/>
<rect x="24" y="235" width="6" height="91" fill="#7c3aed"/>
<rect x="24" y="235" width="250" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="149.0" y="275.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7c3aed" text-anchor="middle">② MLAAttentionSpec</text>
<text x="149.0" y="296.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7c3aed" text-anchor="middle">子类化</text>
<rect x="274" y="235" width="400" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="288" y="275.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">page_size_bytes 走父类；</text>
<text x="288" y="296.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">MLA 的 KV 是 3 元组、全 bf16</text>
<rect x="674" y="235" width="360" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="688" y="265.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">DSA / Sparse-C8 把 indexer key</text>
<text x="688" y="286.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">从 bf16 降 int8 + 存 fp16 scale</text>
<text x="688" y="307.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">→ KV 变 4 元组（A5/A3 dtype 不同）</text>
<rect x="1034" y="235" width="422" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="1048" y="265.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">技法① 整类替换</text>
<text x="1048" y="286.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">AscendMLAAttentionSpec 重写</text>
<text x="1048" y="307.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">page_size_bytes；技法⑤ 三处别名重绑</text>
<rect x="24" y="326" width="1432" height="91" fill="#0891b2" fill-opacity="0.05"/>
<rect x="24" y="326" width="6" height="91" fill="#0891b2"/>
<rect x="24" y="326" width="250" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="149.0" y="366.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0891b2" text-anchor="middle">③ CP + hybrid</text>
<text x="149.0" y="387.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0891b2" text-anchor="middle">前缀缓存</text>
<rect x="274" y="326" width="400" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="288" y="356.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">assert dcp==1 / pcp==1；</text>
<text x="288" y="377.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">多组 block size + CP&gt;1 直接</text>
<text x="288" y="398.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">raise ValueError（PR #40860）</text>
<rect x="674" y="326" width="360" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="688" y="366.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">昇腾对 MLA / SWA-MLA 层</text>
<text x="688" y="387.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">各自独立实现 context parallel</text>
<rect x="1034" y="326" width="422" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="1048" y="356.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">技法① 去断言 + _effective_block_size</text>
<text x="1048" y="377.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">技法②/③ 工厂 + resolve 改 lcm/gcd</text>
<text x="1048" y="398.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">技法⑤ 补绑 from-import 旧引用</text>
<rect x="24" y="417" width="1432" height="91" fill="#d97706" fill-opacity="0.05"/>
<rect x="24" y="417" width="6" height="91" fill="#d97706"/>
<rect x="24" y="417" width="250" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="149.0" y="457.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#d97706" text-anchor="middle">④ bind_kv_cache</text>
<text x="149.0" y="478.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#d97706" text-anchor="middle">跳 NPU raise</text>
<rect x="274" y="417" width="400" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="288" y="447.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">同 layer_index 多 layer_name 时,</text>
<text x="288" y="468.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">非 CUDA/CPU/XPU 平台走</text>
<text x="288" y="489.0" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">else: raise NotImplementedError</text>
<rect x="674" y="417" width="360" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="688" y="457.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">NPU 初始化 KV cache 会撞上</text>
<text x="688" y="478.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">这条 raise（临时补丁，带 TODO）</text>
<rect x="1034" y="417" width="422" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="1048" y="447.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">技法③ 方法替换</text>
<text x="1048" y="468.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">重绑 bind_kv_cache，每 index</text>
<text x="1048" y="489.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">只取 layer_names[0]，绕过 raise</text>
<rect x="24" y="508" width="1432" height="91" fill="#dc2626" fill-opacity="0.05"/>
<rect x="24" y="508" width="6" height="91" fill="#dc2626"/>
<rect x="24" y="508" width="250" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="149.0" y="548.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">⑤ int32</text>
<text x="149.0" y="569.5" font-family="sans-serif" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">slot_mapping</text>
<rect x="274" y="508" width="400" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="288" y="548.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">slot_mapping 默认 int64</text>
<text x="288" y="569.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">（CUDA reshape_and_cache 接受）</text>
<rect x="674" y="508" width="360" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="688" y="548.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">vllm-ascend 的 reshape_and_cache</text>
<text x="688" y="569.5" font-family="sans-serif" font-size="13" font-weight="normal" fill="#334155" text-anchor="start">算子要求 slot_mapping 为 int32</text>
<rect x="1034" y="508" width="422" height="91" fill="none" stroke="#cbd5e1" stroke-width="1"/>
<text x="1048" y="538.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">子类覆盖（非 patch）</text>
<text x="1048" y="559.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">del 父类张量后以 int32 重建</text>
<text x="1048" y="580.0" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#334155" text-anchor="start">立即 gc 不浪费显存</text>
</svg>