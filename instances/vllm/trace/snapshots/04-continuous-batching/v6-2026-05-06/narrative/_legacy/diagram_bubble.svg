<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1000" height="620" fill="#f8fafc"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Static Batching vs Continuous Batching 对比</text>

  <!-- ═══ LEFT PANEL: Static Batching ═══ -->
  <text x="260" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#334155">Static Batching</text>

  <!-- Phase 1: Prefill -->
  <text x="60" y="103" font-size="13" font-weight="bold" fill="#1e40af">Phase 1: Prefill (所有请求一起处理)</text>

  <!-- Prefill background bar -->
  <rect x="60" y="113" width="400" height="30" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>

  <!-- Request 0 - Long -->
  <rect x="60" y="113" width="50" height="30" rx="2" fill="#2563eb"/>
  <text x="85" y="133" font-size="7" fill="white" text-anchor="middle">长</text>

  <!-- Request 1 - Long -->
  <rect x="110" y="113" width="50" height="30" rx="2" fill="#2563eb"/>
  <text x="135" y="133" font-size="7" fill="white" text-anchor="middle">长</text>

  <!-- Requests 2-7 - Short with bubble -->
  <rect x="160" y="113" width="15" height="30" rx="2" fill="#3b82f6"/>
  <text x="167" y="133" font-size="7" fill="white" text-anchor="middle">短</text>
  <rect x="175" y="113" width="35" height="30" rx="2" fill="#fca5a5" opacity="0.6"/>

  <rect x="210" y="113" width="15" height="30" rx="2" fill="#3b82f6"/>
  <text x="217" y="133" font-size="7" fill="white" text-anchor="middle">短</text>
  <rect x="225" y="113" width="35" height="30" rx="2" fill="#fca5a5" opacity="0.6"/>

  <rect x="260" y="113" width="15" height="30" rx="2" fill="#3b82f6"/>
  <text x="267" y="133" font-size="7" fill="white" text-anchor="middle">短</text>
  <rect x="275" y="113" width="35" height="30" rx="2" fill="#fca5a5" opacity="0.6"/>

  <rect x="310" y="113" width="15" height="30" rx="2" fill="#3b82f6"/>
  <text x="317" y="133" font-size="7" fill="white" text-anchor="middle">短</text>
  <rect x="325" y="113" width="35" height="30" rx="2" fill="#fca5a5" opacity="0.6"/>

  <rect x="360" y="113" width="15" height="30" rx="2" fill="#3b82f6"/>
  <text x="367" y="133" font-size="7" fill="white" text-anchor="middle">短</text>
  <rect x="375" y="113" width="35" height="30" rx="2" fill="#fca5a5" opacity="0.6"/>

  <rect x="410" y="113" width="15" height="30" rx="2" fill="#3b82f6"/>
  <text x="417" y="133" font-size="7" fill="white" text-anchor="middle">短</text>
  <rect x="425" y="113" width="35" height="30" rx="2" fill="#fca5a5" opacity="0.6"/>

  <!-- Bubble dash box for prefill -->
  <rect x="180" y="113" width="280" height="30" rx="3" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="320" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">BUBBLE: 短请求等待长请求 prefill 完成</text>

  <!-- Phase 2: Decode -->
  <text x="60" y="178" font-size="13" font-weight="bold" fill="#15803d">Phase 2: Decode (每步每个请求1个token)</text>

  <!-- GPU capacity indicator -->
  <rect x="470" y="188" width="80" height="117" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="472" y="200" font-size="9" fill="#64748b">GPU capacity</text>
  <text x="472" y="212" font-size="9" fill="#64748b">2048 tok/step</text>
  <text x="472" y="260" font-size="9" fill="#dc2626">实际只用: 8 tok/step</text>

  <!-- 10 decode steps -->
  <rect x="60" y="188" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="188" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="194" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="199" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="199" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="205" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="210" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="210" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="216" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="221" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="221" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="227" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="232" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="232" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="238" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="243" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="243" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="249" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="254" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="254" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="260" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="265" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="265" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="271" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="276" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="276" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="282" font-size="6" fill="#991b1b">IDLE</text>

  <rect x="60" y="287" width="400" height="8" rx="1" fill="#fee2e2"/>
  <rect x="60" y="287" width="8" height="8" rx="1" fill="#22c55e"/>
  <text x="71" y="293" font-size="6" fill="#991b1b">IDLE</text>

  <!-- Bubble dash box for decode -->
  <rect x="60" y="188" width="400" height="107" rx="3" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="260" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">BUBBLE: GPU 利用率 &lt; 1%</text>

  <!-- Static total -->
  <text x="60" y="335" font-size="14" font-weight="bold" fill="#dc2626">总步数: ~2304 steps | GPU利用率: ~36%</text>

  <!-- ═══ RIGHT PANEL: Continuous Batching ═══ -->
  <text x="710" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#334155">Continuous Batching</text>

  <text x="510" y="103" font-size="13" font-weight="bold" fill="#1e40af">Interleaved: Prefill Chunks + Decode 混合</text>

  <!-- Token Budget box -->
  <rect x="510" y="113" width="400" height="24" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="515" y="129" font-size="11" fill="#64748b">Token Budget: 2048 tokens/step</text>

  <!-- Step 1 -->
  <rect x="510" y="152" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="152" width="220" height="18" rx="2" fill="#22c55e"/>
  <rect x="730" y="152" width="180" height="18" rx="2" fill="#3b82f6"/>
  <text x="513" y="164" font-size="8" fill="#1e293b">Step 1: 短prefill(8x128) + 长prefill(1024)</text>

  <!-- Step 2 -->
  <rect x="510" y="174" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="174" width="20" height="18" rx="2" fill="#22c55e"/>
  <rect x="530" y="174" width="380" height="18" rx="2" fill="#3b82f6"/>
  <text x="513" y="186" font-size="8" fill="#1e293b">Step 2: 8xdecode(8) + 长prefill(2040)</text>

  <!-- Step 3 -->
  <rect x="510" y="196" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="196" width="20" height="18" rx="2" fill="#22c55e"/>
  <rect x="530" y="196" width="380" height="18" rx="2" fill="#3b82f6"/>
  <text x="513" y="208" font-size="8" fill="#1e293b">Step 3: 8xdecode(8) + 长prefill(2040)</text>

  <!-- Step 4 -->
  <rect x="510" y="218" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="218" width="220" height="18" rx="2" fill="#22c55e"/>
  <rect x="730" y="218" width="140" height="18" rx="2" fill="#3b82f6"/>
  <rect x="870" y="218" width="40" height="18" rx="2" fill="#fef3c7"/>
  <text x="513" y="230" font-size="8" fill="#1e293b">Step 4: 短prefill+decode + 长prefill(rest)</text>

  <!-- Step 5 -->
  <rect x="510" y="240" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="240" width="20" height="18" rx="2" fill="#22c55e"/>
  <rect x="530" y="240" width="240" height="18" rx="2" fill="#3b82f6"/>
  <rect x="770" y="240" width="140" height="18" rx="2" fill="#fef3c7"/>
  <text x="513" y="252" font-size="8" fill="#1e293b">Step 5: decode + 新请求prefill(chunk)</text>

  <!-- Step 6 -->
  <rect x="510" y="262" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="262" width="220" height="18" rx="2" fill="#22c55e"/>
  <rect x="730" y="262" width="120" height="18" rx="2" fill="#3b82f6"/>
  <rect x="850" y="262" width="60" height="18" rx="2" fill="#fef3c7"/>
  <text x="513" y="274" font-size="8" fill="#1e293b">Step 6: 混合prefill+decode</text>

  <!-- Step 7 -->
  <rect x="510" y="284" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="284" width="20" height="18" rx="2" fill="#22c55e"/>
  <rect x="530" y="284" width="320" height="18" rx="2" fill="#3b82f6"/>
  <rect x="850" y="284" width="60" height="18" rx="2" fill="#fef3c7"/>
  <text x="513" y="296" font-size="8" fill="#1e293b">Step 7: 多请求decode + 新prefill</text>

  <!-- Step 8 -->
  <rect x="510" y="306" width="400" height="18" rx="2" fill="#e2e8f0"/>
  <rect x="510" y="306" width="120" height="18" rx="2" fill="#22c55e"/>
  <rect x="630" y="306" width="280" height="18" rx="2" fill="#3b82f6"/>
  <text x="513" y="318" font-size="8" fill="#1e293b">Step 8: decode + prefill(almost full)</text>

  <!-- Full utilization banner -->
  <rect x="510" y="340" width="400" height="28" rx="6" fill="#16a34a"/>
  <text x="710" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="white">GPU 几乎满负荷运作 (FULL UTILIZATION)</text>

  <!-- CB total -->
  <text x="510" y="390" font-size="14" font-weight="bold" fill="#16a34a">总步数: ~400-800 steps | GPU利用率: ~95%+</text>

  <!-- Arrow -->
  <line x1="475" y1="420" x2="495" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="485" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">Continuous Batching 消除 Bubble</text>

  <!-- Legend -->
  <text x="50" y="560" font-size="13" font-weight="bold" fill="#1e293b">图例:</text>
  <rect x="100" y="548" width="16" height="16" rx="2" fill="#2563eb"/>
  <text x="122" y="560" font-size="12" fill="#334155">Prefill (prompt 处理)</text>
  <rect x="280" y="548" width="16" height="16" rx="2" fill="#22c55e"/>
  <text x="302" y="560" font-size="12" fill="#334155">Decode (逐 token 生成)</text>
  <rect x="460" y="548" width="16" height="16" rx="2" fill="#fca5a5"/>
  <text x="482" y="560" font-size="12" fill="#334155">Bubble (GPU 空闲)</text>
  <rect x="640" y="548" width="16" height="16" rx="2" fill="#fef3c7"/>
  <text x="662" y="560" font-size="12" fill="#334155">少量空闲 budget</text>

  <text x="500" y="605" text-anchor="middle" font-size="11" fill="#94a3b8">vLLM-from-Scratch 第4章 Continuous Batching --- Bubble 对比</text>
</svg>
