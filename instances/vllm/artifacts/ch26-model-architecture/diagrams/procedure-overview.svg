<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="sans-serif">
<defs><marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arrback" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="1180" height="540" fill="white"/>
<text x="590.0" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">从模型代码到架构图：四步可复用程序</text>
<rect x="40.0" y="90" width="230" height="150" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.5"/>
<text x="60.0" y="124" font-size="22" font-weight="bold" fill="#1d4ed8">P1</text>
<text x="173.0" y="124" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">读 __init__</text>
<text x="155.0" y="152" text-anchor="middle" font-size="15" fill="#334155">出模块树（嵌套框）</text>
<line x1="60.0" y1="170" x2="250.0" y2="170" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="3,3"/>
<text x="155.0" y="192" text-anchor="middle" font-size="11.5" fill="#64748b" font-weight="bold">源码判据</text>
<text x="155.0" y="212" text-anchor="middle" font-size="12" fill="#475569" font-family="monospace">self.&lt;name&gt; =</text>
<text x="155.0" y="229" text-anchor="middle" font-size="12" fill="#475569" font-family="monospace">Module(...)</text>
<rect x="330.0" y="90" width="230" height="150" rx="12" fill="#d1fae5" stroke="#047857" stroke-width="2.5"/>
<text x="350.0" y="124" font-size="22" font-weight="bold" fill="#047857">P2</text>
<text x="463.0" y="124" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">读 forward</text>
<text x="445.0" y="152" text-anchor="middle" font-size="15" fill="#334155">出数据流（有向边）</text>
<line x1="350.0" y1="170" x2="540.0" y2="170" stroke="#047857" stroke-width="1" stroke-dasharray="3,3"/>
<text x="445.0" y="192" text-anchor="middle" font-size="11.5" fill="#64748b" font-weight="bold">源码判据</text>
<text x="445.0" y="212" text-anchor="middle" font-size="12" fill="#475569" font-family="monospace">x =</text>
<text x="445.0" y="229" text-anchor="middle" font-size="12" fill="#475569" font-family="monospace">self.&lt;child&gt;(x)</text>
<rect x="620.0" y="90" width="230" height="150" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="2.5"/>
<text x="640.0" y="124" font-size="22" font-weight="bold" fill="#b45309">P3</text>
<text x="753.0" y="124" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">标子系统边界</text>
<text x="735.0" y="152" text-anchor="middle" font-size="15" fill="#334155">算子 / 编译区 / 并行</text>
<line x1="640.0" y1="170" x2="830.0" y2="170" stroke="#b45309" stroke-width="1" stroke-dasharray="3,3"/>
<text x="735.0" y="192" text-anchor="middle" font-size="11.5" fill="#64748b" font-weight="bold">源码判据</text>
<text x="735.0" y="212" text-anchor="middle" font-size="12" fill="#475569" font-family="monospace">torch.ops.vllm.* ·</text>
<text x="735.0" y="229" text-anchor="middle" font-size="12" fill="#475569" font-family="monospace">@torch.compile · *ParallelLinear</text>
<rect x="910.0" y="90" width="230" height="150" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
<text x="930.0" y="124" font-size="22" font-weight="bold" fill="#7c3aed">P4</text>
<text x="1043.0" y="124" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">用 svg-diagram</text>
<text x="1025.0" y="152" text-anchor="middle" font-size="15" fill="#334155">渲染成图</text>
<line x1="930.0" y1="170" x2="1120.0" y2="170" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,3"/>
<text x="1025.0" y="192" text-anchor="middle" font-size="11.5" fill="#64748b" font-weight="bold">源码判据</text>
<text x="1025.0" y="218" text-anchor="middle" font-size="12.5" fill="#475569" font-family="monospace">Python → xmllint → PNG</text>
<line x1="274.0" y1="165.0" x2="324.0" y2="165.0" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>
<line x1="564.0" y1="165.0" x2="614.0" y2="165.0" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>
<line x1="854.0" y1="165.0" x2="904.0" y2="165.0" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>
<rect x="40" y="280" width="1100" height="62" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="7,4"/>
<text x="590.0" y="304" text-anchor="middle" font-size="16" font-weight="bold" fill="#b91c1c">验证（回边）：每个图元逐一溯源回源码</text>
<text x="590.0" y="328" text-anchor="middle" font-size="13.5" fill="#7f1d1d">每个框 ⟶ 一条 self.X=Module ｜ 每条边 ⟶ 一句 forward 赋值 ｜ 每种着色 ⟶ 一个装饰器/类名/torch.ops。溯源不到的图元 = 杜撰，删。</text>
<path d="M 1025.0 240 L 1025.0 278" fill="none" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrback)"/>
<path d="M 40 310 L 155.0 310 L 155.0 244" fill="none" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrback)"/>
</svg>