<text x="112" y="366" text-anchor="start" font-size="11.5" font-weight="normal" fill="#334155">output_rank（最后一段 PP 的第一个 TP worker）返回 ModelRunnerOutput</text>
<rect x="84" y="380" width="20" height="16" rx="3" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
<text x="112" y="392" text-anchor="start" font-size="11.5" font-weight="normal" fill="#334155">最后一段 PP 的其他 TP worker（结果冗余，不需收回）</text>
<rect x="84" y="406" width="20" height="16" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
<text x="112" y="418" text-anchor="start" font-size="11.5" font-weight="normal" fill="#334155">其他 PP 段（中间层激活，无最终 token）</text>
<rect x="220" y="326" width="520" height="50" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
<text x="480" y="344" text-anchor="middle" font-size="12" font-weight="normal" fill="#92400e">广播仍是 1 次 enqueue（O(1) 次发送）</text>
<text x="480" y="362" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#78350f">应答从 O(world_size=12) 次 dequeue 降到 O(1) 次，省掉 11 次跨进程搬运</text>
</svg>
