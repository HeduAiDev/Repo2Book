<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" font-family="sans-serif">
<defs><marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arrg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker><marker id="arro" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#ea580c"/></marker></defs>
<rect width="980" height="480" fill="white"/>
<text x="490" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">ready / death 两条管道：端点归属与关闭顺序</text>
<text x="490" y="56" text-anchor="middle" font-size="13" font-weight="normal" fill="#475569">父进程关掉已交给子进程的那端；自己留下读端 + death 写端</text>
<rect x="90" y="80" width="220" height="56" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
<text x="200" y="114" text-anchor="middle" font-size="15" font-weight="bold" fill="#3730a3">Executor（父进程）</text>
<rect x="570" y="80" width="220" height="56" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="680" y="114" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">WorkerProc（子进程）</text>
<text x="490" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Ready Pipe（子 → 父，报告就绪）</text>
<rect x="120" y="170" width="160" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="200" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">ready_reader  ✓ 保留</text>
<rect x="600" y="170" width="160" height="40" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text x="680" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12">ready_writer  ✓ 子持有</text>
<text x="680" y="203" text-anchor="middle" font-size="10" font-weight="normal" fill="#92400e">（发完 READY 后 worker_main 置 None）</text>
<line x1="595" y1="190" x2="285" y2="190" stroke="#16a34a" stroke-width="2" marker-end="url(#arrg)"/>
<text x="490" y="181" text-anchor="middle" font-size="11" font-weight="normal" fill="#166534">send(READY, handle)</text>
<text x="300" y="226" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#7c3aed">proc.start() 后 → 父立刻 ready_writer.close()</text>
<text x="490" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">Death Pipe（父 → 子，感知父进程退出）</text>
<rect x="120" y="300" width="160" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="200" y="317" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">death_writer  ✓ 保留</text>
<text x="200" y="333" text-anchor="middle" font-size="10" font-weight="normal" fill="#b91c1c">（关闭即触发子进程 EOFError）</text>
<rect x="600" y="300" width="160" height="40" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
<text x="680" y="317" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">death_reader  ✓ 子持有</text>
<text x="680" y="333" text-anchor="middle" font-size="10" font-weight="normal" fill="#c2410c">（阻塞 recv()，收 EOFError 后退出）</text>
<line x1="285" y1="320" x2="595" y2="320" stroke="#dc2626" stroke-width="2" marker-end="url(#arro)" stroke-dasharray="6,4"/>
<text x="490" y="311" text-anchor="middle" font-size="11" font-weight="normal" fill="#991b1b">父退出 / shutdown → EOF → child 自清理</text>
<text x="620" y="356" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#7c3aed">proc.start() 后 → 父立刻 death_reader.close()</text>
<text x="40" y="410" text-anchor="start" font-size="11.5" font-weight="bold" fill="#0f172a">图例：</text>
<rect x="100" y="422" width="18" height="16" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
<text x="124" y="434" text-anchor="start" font-size="11" font-weight="normal" fill="#334155">父进程持有（保留）</text>
<rect x="370" y="422" width="18" height="16" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
<text x="394" y="434" text-anchor="start" font-size="11" font-weight="normal" fill="#334155">子进程持有（spawn 时传入）</text>
<rect x="640" y="422" width="18" height="16" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
<text x="664" y="434" text-anchor="start" font-size="11" font-weight="normal" fill="#334155">父进程持有 death 写端 → 关闭即触发 EOF</text>
</svg>
