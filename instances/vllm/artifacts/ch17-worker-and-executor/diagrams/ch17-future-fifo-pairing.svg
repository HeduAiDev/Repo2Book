<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 720" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ap" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
<rect width="1160" height="720" fill="white"/>
<text x="40" y="40" text-anchor="start" font-size="21" font-weight="bold" fill="#0f172a">FutureWrapper + futures_queue：FIFO 配对让回复对上请求</text>
<text x="40" y="88" text-anchor="start" font-size="13.5" font-weight="bold" fill="#334155">① 调用方依次 collective_rpc(..., non_block=True)，每次生成 FutureWrapper 并 appendleft 进 deque</text>
<rect x="70" y="105" width="230" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="185.0" y="134.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">RPC#1 → FutureWrapper#1</text>
<rect x="340" y="105" width="230" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="455.0" y="134.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">RPC#2 → FutureWrapper#2</text>
<rect x="610" y="105" width="230" height="50" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
<text x="725.0" y="134.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2410c">RPC#3 → FutureWrapper#3</text>
<text x="40" y="198" text-anchor="start" font-size="13.5" font-weight="bold" fill="#334155">② futures_queue（deque）：appendleft 入左端，pop 从右端取 → 右端 = 最早发出的请求</text>
<rect x="360" y="210" width="142" height="50" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
<text x="431.0" y="239.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2410c">Future#3</text>
<rect x="510" y="210" width="142" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="581.0" y="239.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Future#2</text>
<rect x="660" y="210" width="142" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="731.0" y="239.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">Future#1</text>
<text x="350" y="240" text-anchor="end" font-size="12" font-weight="bold" fill="#7c3aed">appendleft →</text>
<text x="814" y="240" text-anchor="start" font-size="12" font-weight="bold" fill="#7c3aed">← pop</text>
<line x1="185.0" y1="155" x2="731.0" y2="206" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ap)" stroke-dasharray="4,3" opacity="0.8"/>
<line x1="455.0" y1="155" x2="581.0" y2="206" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ap)" stroke-dasharray="4,3" opacity="0.8"/>
<line x1="725.0" y1="155" x2="431.0" y2="206" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ap)" stroke-dasharray="4,3" opacity="0.8"/>
<text x="40" y="308" text-anchor="start" font-size="13.5" font-weight="bold" fill="#334155">③ 底层 response MQ 是 FIFO：回复顺序 = 发出顺序（worker 按收到次序回写）</text>
<rect x="850" y="320" width="220" height="46" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="960.0" y="347.25" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1d4ed8">reply #1</text>
<rect x="850" y="376" width="220" height="46" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="960.0" y="403.25" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">reply #2</text>
<rect x="850" y="432" width="220" height="46" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
<text x="960.0" y="459.25" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#c2410c">reply #3</text>
<text x="960" y="516" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">↑ dequeue 顺序：#1 → #2 → #3</text>
<text x="40" y="410" text-anchor="start" font-size="13.5" font-weight="bold" fill="#334155">④ 对 Future#3 调 result()：while not done → pop 出队尾，先把排在前面的排空</text>
<rect x="70" y="434" width="460" height="56" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="300.0" y="458.5" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1d4ed8">pop #1 → _wait_for_response()</text>
<text x="300.0" y="474.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#475569">取 reply#1，set_result，Future#1 done</text>
<line x1="530" y1="462" x2="844" y2="343" stroke="#2563eb" stroke-width="1.6" marker-end="url(#a)" opacity="0.7"/>
<rect x="70" y="504" width="460" height="56" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="300.0" y="528.5" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">pop #2 → _wait_for_response()</text>
<text x="300.0" y="544.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#475569">取 reply#2，set_result，Future#2 done</text>
<line x1="530" y1="532" x2="844" y2="399" stroke="#16a34a" stroke-width="1.6" marker-end="url(#a)" opacity="0.7"/>
<rect x="70" y="574" width="460" height="56" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
<text x="300.0" y="598.5" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#c2410c">此时队列只剩 #3 自己</text>
<text x="300.0" y="614.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#475569">取 reply#3，set_result，返回给调用方</text>
<line x1="530" y1="602" x2="844" y2="455" stroke="#ea580c" stroke-width="1.6" marker-end="url(#a)" opacity="0.7"/>
<text x="40" y="690" text-anchor="start" font-size="13.5" font-weight="bold" fill="#7c3aed">结论：第 k 个发出的请求恒配第 k 个回复 —— 无需给每个 RPC 配 id 或独立通道，两个 FIFO 同序即可。</text>
</svg>
