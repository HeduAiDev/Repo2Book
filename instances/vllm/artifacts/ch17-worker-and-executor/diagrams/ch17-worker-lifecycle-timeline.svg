<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 880" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1140" height="880" fill="white"/>
<text x="40" y="40" text-anchor="start" font-size="21" font-weight="bold" fill="#0f172a">Worker 子进程生命周期：出生 → READY 握手 → 服役 → 死亡</text>
<rect x="150" y="50" width="300" height="40" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="300" y="77" text-anchor="middle" font-size="15" font-weight="bold" fill="#3730a3">Executor（父进程）</text>
<rect x="690" y="50" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="840" y="77" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">WorkerProc（子进程）</text>
<line x1="300" y1="94" x2="300" y2="840" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="840" y1="94" x2="840" y2="840" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="300" y1="130" x2="840" y2="130" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<text x="570.0" y="123" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#475569">make_worker_process：起进程 + ready/death pipe</text>
<rect x="826" y="170" width="28" height="156" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
<rect x="864" y="170" width="260" height="101" rx="5" fill="#fefce8" stroke="#ca8a04" stroke-width="1.2"/>
<text x="874" y="190" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">worker_main：装 SIGTERM/SIGINT 信号处理</text>
<text x="874" y="207" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">WorkerWrapperBase.init_worker</text>
<text x="874" y="224" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">  └ 按 worker_cls qualname 解析真实 Worker</text>
<text x="874" y="241" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">init_device（建设备+分布式组+model_runner）</text>
<text x="874" y="258" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">load_model</text>
<line x1="840" y1="326" x2="300" y2="326" stroke="#16a34a" stroke-width="1.6" marker-end="url(#ag)"/>
<text x="570.0" y="319" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#16a34a">ready_pipe.send({status: READY, handle})</text>
<rect x="286" y="360" width="28" height="66" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.2"/>
<rect x="10" y="360" width="300" height="50" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
<text x="20" y="380" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">wait_for_ready：收齐所有 worker 的 READY</text>
<text x="20" y="397" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">（任一 worker 未就绪就不发 RPC，避免死锁）</text>
<line x1="300" y1="426" x2="100" y2="426" stroke="#ea580c" stroke-width="1.6" marker-end="url(#a)"/>
<text x="200.0" y="419" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ea580c">start_worker_monitor 起监控线程</text>
<rect x="120" y="476" width="900" height="150" rx="8" fill="#f8fafc" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="130" y="498" text-anchor="start" font-size="14" font-weight="bold" fill="#0369a1">稳态：worker_busy_loop 循环服役</text>
<line x1="300" y1="526" x2="840" y2="526" stroke="#2563eb" stroke-width="1.6" marker-end="url(#a)"/>
<text x="570.0" y="519" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">rpc_broadcast_mq.enqueue((method, args, output_rank))</text>
<rect x="864" y="556" width="250" height="67" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
<text x="874" y="576" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">dequeue → getattr(self.worker, method)</text>
<text x="874" y="593" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">或 cloudpickle.loads(callable)</text>
<text x="874" y="610" text-anchor="start" font-size="11.5" font-weight="normal" fill="#713f12">执行 → handle_output 回写</text>
<line x1="840" y1="626" x2="300" y2="626" stroke="#16a34a" stroke-width="1.6" marker-end="url(#ag)"/>
<text x="570.0" y="619" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">worker_response_mq.enqueue((SUCCESS, output))</text>
<text x="40" y="674" text-anchor="start" font-size="14" font-weight="bold" fill="#0f172a">两条失败支线：</text>
<line x1="840" y1="692" x2="300" y2="692" stroke="#dc2626" stroke-width="1.6" marker-end="url(#ar)"/>
<text x="570.0" y="685" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">方法抛异常 → enqueue((FAILURE, str(e))) → collective_rpc 抛 RuntimeError</text>
<line x1="840" y1="736" x2="100" y2="736" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="3,3" marker-end="url(#ar)"/>
<text x="470.0" y="729" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">进程被 OS 杀死（OOM/segfault）→ sentinel 唤醒 monitor → failure_callback</text>
<line x1="300" y1="776" x2="840" y2="776" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<text x="570.0" y="769" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">shutdown：关 death_writer → graceful → SIGTERM → SIGKILL</text>
</svg>
