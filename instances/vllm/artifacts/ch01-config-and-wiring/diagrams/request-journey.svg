<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ap" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
<rect width="1040" height="720" fill="white"/>
<text x="520" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">一个请求的端到端旅程</text>
<rect x="70" y="66" width="360" height="60" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
<text x="250" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">离线 LLM</text>
<text x="250" y="111" text-anchor="middle" font-size="11.5" fill="#047857">调用方线程 while has_unfinished: step()</text>
<rect x="610" y="66" width="360" height="60" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
<text x="790" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">服务 AsyncLLM / OpenAI server</text>
<text x="790" y="111" text-anchor="middle" font-size="11.5" fill="#1d4ed8">独立子进程 run_busy_loop + 背景 output_handler</text>
<rect x="370" y="168" width="300" height="56" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2.5"/>
<text x="520" y="190" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">InputProcessor</text>
<text x="520" y="211" text-anchor="middle" font-size="11.5" fill="#475569">tokenize → EngineCoreRequest</text>
<rect x="330" y="300" width="380" height="232" rx="16" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
<text x="520" y="324" text-anchor="middle" font-size="15" font-weight="bold" fill="#b45309">EngineCore（内核 · GPU 活）</text>
<rect x="370" y="580" width="300" height="56" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2.5"/>
<text x="520" y="602" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">OutputProcessor</text>
<text x="520" y="623" text-anchor="middle" font-size="11.5" fill="#475569">detokenize → RequestOutput</text>
<line x1="250" y1="126" x2="440" y2="168" stroke="#10b981" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="790" y1="126" x2="600" y2="168" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="520" y1="224" x2="520" y2="300" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<text x="612" y="266" text-anchor="middle" font-size="11" font-weight="normal" fill="#475569">EngineCoreRequest</text>
<rect x="382" y="344" width="80" height="50" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
<text x="422" y="363" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">schedule</text>
<text x="422" y="384" text-anchor="middle" font-size="9.5" fill="#92400e">排哪些 token</text>
<rect x="480" y="344" width="80" height="50" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
<text x="520" y="363" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">execute_model</text>
<text x="520" y="384" text-anchor="middle" font-size="9.5" fill="#92400e">前向 + 采样</text>
<line x1="462" y1="369" x2="480" y2="369" stroke="#d97706" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="578" y="344" width="80" height="50" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
<text x="618" y="363" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">update</text>
<text x="618" y="384" text-anchor="middle" font-size="9.5" fill="#92400e">出 token / 回收</text>
<line x1="560" y1="369" x2="578" y2="369" stroke="#d97706" stroke-width="2.2" marker-end="url(#a)"/>
<path d="M618,394 V410 H422 V394" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="520" y="424" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#92400e">逐拍循环（连续批处理 · 批次跨拍持久）</text>
<rect x="374" y="430" width="132" height="40" rx="9" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
<text x="440" y="444" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">Scheduler</text>
<text x="440" y="465" text-anchor="middle" font-size="9.5" fill="#92400e">token 预算 / 抢占</text>
<rect x="534" y="430" width="132" height="40" rx="9" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5"/>
<text x="600" y="444" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">分页 KV cache</text>
<text x="600" y="465" text-anchor="middle" font-size="9.5" fill="#92400e">块池 / 前缀复用</text>
<line x1="520" y1="532" x2="520" y2="580" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<text x="610" y="560" text-anchor="middle" font-size="11" font-weight="normal" fill="#475569">EngineCoreOutputs</text>
<line x1="520" y1="636" x2="520" y2="660" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<text x="520" y="676" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">RequestOutput → 回到你手里</text>
<text x="300" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">CPU</text>
<text x="300" y="612" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">CPU</text>
</svg>