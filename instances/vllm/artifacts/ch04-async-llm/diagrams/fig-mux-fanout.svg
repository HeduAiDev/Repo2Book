<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560">
<defs>
<marker id="am" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker>
<marker id="aA" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker>
<marker id="aB" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#059669"/></marker>
<marker id="aC" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#d97706"/></marker>
</defs>
<rect width="1180" height="560" fill="white"/>
<text x="30" y="34" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">多路复用解扇出：一个 EngineCore 批 → 按 req_id 分回 N 个队列</text>
<text x="30" y="58" font-family="sans-serif" font-size="13" fill="#64748b">IPC 单出口扇入  →  process_outputs 按 req_id 解扇出  →  per-request 队列互不排队</text>
<rect x="60" y="130" width="230" height="290" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<text x="175" y="120" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#1e293b">EngineCoreOutputs 批</text>
<text x="175" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">get_output_async() 一次拉回</text>
<rect x="80" y="180" width="190" height="56" rx="5" fill="white" stroke="#2563eb" stroke-width="2"/>
<text x="175" y="202" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#2563eb">EngineCoreOutput</text>
<text x="175" y="222" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563eb">request_id = req_A</text>
<rect x="80" y="255" width="190" height="56" rx="5" fill="white" stroke="#059669" stroke-width="2"/>
<text x="175" y="277" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#059669">EngineCoreOutput</text>
<text x="175" y="297" text-anchor="middle" font-family="monospace" font-size="11" fill="#059669">request_id = req_B</text>
<rect x="80" y="330" width="190" height="56" rx="5" fill="white" stroke="#d97706" stroke-width="2"/>
<text x="175" y="352" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#d97706">EngineCoreOutput</text>
<text x="175" y="372" text-anchor="middle" font-family="monospace" font-size="11" fill="#d97706">request_id = req_C</text>
<rect x="420" y="150" width="280" height="250" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
<text x="560" y="140" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#4338ca">output_handler.process_outputs</text>
<text x="440" y="180" font-family="monospace" font-size="11" fill="#1e293b">for o in engine_core_outputs:</text>
<text x="454" y="200" font-family="monospace" font-size="11" fill="#1e293b">req_id = o.request_id</text>
<text x="454" y="220" font-family="monospace" font-size="11" fill="#1e293b">st = request_states[req_id]</text>
<text x="454" y="240" font-family="monospace" font-size="11" fill="#1e293b">st.queue.put(out)</text>
<rect x="438" y="260" width="244" height="120" rx="5" fill="white" stroke="#94a3b8" stroke-width="1.4"/>
<text x="560" y="278" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#64748b">request_states: req_id → RequestState</text>
<text x="454" y="296" font-family="monospace" font-size="11" fill="#2563eb">req_A  →  queue A</text>
<text x="454" y="322" font-family="monospace" font-size="11" fill="#059669">req_B  →  queue B</text>
<text x="454" y="348" font-family="monospace" font-size="11" fill="#d97706">req_C  →  queue C</text>
<path d="M290,208 C355,208 355,200 420,205" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#aA)"/>
<path d="M290,283 C355,283 355,200 420,205" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#aB)"/>
<path d="M290,358 C355,358 355,200 420,205" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#aC)"/>
<rect x="850" y="140" width="200" height="50" rx="6" fill="#fffbeb" stroke="#2563eb" stroke-width="2.2"/>
<text x="950" y="160" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#2563eb">RequestOutputCollector</text>
<text x="950" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563eb">queue A</text>
<rect x="890" y="202" width="120" height="34" rx="5" fill="#eef2ff" stroke="#2563eb" stroke-width="1.6"/>
<text x="950" y="224" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">generate() A</text>
<path d="M680,292 C775,292 775,165 850,165" fill="none" stroke="#2563eb" stroke-width="2.4" marker-end="url(#aA)"/>
<path d="M950,190 L950,202" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#aA)"/>
<rect x="850" y="260" width="200" height="50" rx="6" fill="#fffbeb" stroke="#059669" stroke-width="2.2"/>
<text x="950" y="280" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#059669">RequestOutputCollector</text>
<text x="950" y="298" text-anchor="middle" font-family="monospace" font-size="11" fill="#059669">queue B</text>
<rect x="890" y="322" width="120" height="34" rx="5" fill="#eef2ff" stroke="#059669" stroke-width="1.6"/>
<text x="950" y="344" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">generate() B</text>
<path d="M680,318 C775,318 775,285 850,285" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aB)"/>
<path d="M950,310 L950,322" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#aB)"/>
<rect x="850" y="380" width="200" height="50" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="2.2"/>
<text x="950" y="400" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#d97706">RequestOutputCollector</text>
<text x="950" y="418" text-anchor="middle" font-family="monospace" font-size="11" fill="#d97706">queue C</text>
<rect x="890" y="442" width="120" height="34" rx="5" fill="#eef2ff" stroke="#d97706" stroke-width="1.6"/>
<text x="950" y="464" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">generate() C</text>
<path d="M680,344 C775,344 775,405 850,405" fill="none" stroke="#d97706" stroke-width="2.4" marker-end="url(#aC)"/>
<path d="M950,430 L950,442" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#aC)"/>
<text x="355" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#64748b">扇入：单 IPC 出口</text>
<text x="775" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#64748b">解扇出：per-request 多队列</text>
<text x="950" y="510" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e293b">每路 generate 只等自己的队列 → 尾延迟与并发数解耦</text>
</svg>