<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760">
<defs>
<marker id="am" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker>
<marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker>
<marker id="ao" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker>
<marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#059669"/></marker>
</defs>
<rect width="1180" height="760" fill="white"/>
<text x="30" y="34" font-family="Droid Sans Fallback" font-size="20" font-weight="bold" fill="#1e293b">生产者-消费者时序：output_handler 喂、generate 取（单请求）</text>
<rect x="35" y="60" width="150" height="40" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
<text x="110" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Client</text>
<rect x="109" y="100" width="2" height="620" fill="#cbd5e1"/>
<rect x="275" y="60" width="150" height="40" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
<text x="350" y="85" text-anchor="middle" font-family="Droid Sans Fallback" font-size="12" font-weight="bold" fill="#1e293b">generate() 协程</text>
<rect x="349" y="100" width="2" height="620" fill="#cbd5e1"/>
<rect x="530" y="60" width="180" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="620" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">RequestOutputCollector</text>
<rect x="619" y="100" width="2" height="620" fill="#cbd5e1"/>
<rect x="815" y="60" width="150" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="890" y="85" text-anchor="middle" font-family="Droid Sans Fallback" font-size="12" font-weight="bold" fill="#1e293b">output_handler 任务</text>
<rect x="889" y="100" width="2" height="620" fill="#cbd5e1"/>
<rect x="1005" y="60" width="150" height="40" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
<text x="1080" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">EngineCore (stub)</text>
<rect x="1079" y="100" width="2" height="620" fill="#cbd5e1"/>
<path d="M110,130 L350,130" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#am)"/>
<text x="230" y="123" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">async for ... in generate()</text>
<rect x="345" y="130" width="10" height="570" rx="2" fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-width="1"/>
<path d="M350,180 L620,180" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
<text x="485" y="173" text-anchor="middle" font-family="Droid Sans Fallback" font-size="11" fill="#2563eb">add_request → 建 Collector</text>
<path d="M350,224 L1080,224" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
<text x="715" y="217" text-anchor="middle" font-family="Droid Sans Fallback" font-size="11" fill="#2563eb">add_request_async（投递请求）</text>
<rect x="270" y="260" width="660" height="250" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,4"/>
<rect x="270" y="260" width="120" height="22" rx="3" fill="#94a3b8"/>
<text x="278" y="276" font-family="monospace" font-size="11" font-weight="bold" fill="white">while not finished</text>
<rect x="240" y="289" width="220" height="26" rx="4" fill="#fffbeb" stroke="#6366f1" stroke-width="1"/>
<text x="350" y="306" text-anchor="middle" font-family="Droid Sans Fallback" font-size="10.5" fill="#6366f1">get_nowait() → None（槽空）</text>
<path d="M350,344 L620,344" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#am)"/>
<text x="485" y="337" text-anchor="middle" font-family="Droid Sans Fallback" font-size="11" fill="#64748b">await get()：挂起于 ready.wait()</text>
<rect x="245" y="355" width="210" height="26" rx="4" fill="#fffbeb" stroke="#64748b" stroke-width="1"/>
<text x="350" y="372" text-anchor="middle" font-family="Droid Sans Fallback" font-size="10.5" fill="#64748b">协程挂起，让出事件循环</text>
<path d="M890,402 L1080,402" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#ao)"/>
<text x="985" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#dc2626">await get_output_async()</text>
<path d="M1080,432 L890,432" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#ao)"/>
<text x="985" y="425" text-anchor="middle" font-family="monospace" font-size="11" fill="#dc2626">EngineCoreOutput</text>
<rect x="885" y="402" width="10" height="140" rx="2" fill="#dc2626" fill-opacity="0.18" stroke="#dc2626" stroke-width="1"/>
<path d="M890,476 L620,476" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#ao)"/>
<text x="755" y="469" text-anchor="middle" font-family="monospace" font-size="11" fill="#dc2626">process_outputs → put()</text>
<rect x="495" y="487" width="250" height="26" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
<text x="620" y="504" text-anchor="middle" font-family="Droid Sans Fallback" font-size="10.5" fill="#d97706">槽空 → 写值 + ready.set() 唤醒</text>
<path d="M620,536 L350,536" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
<text x="485" y="529" text-anchor="middle" font-family="Droid Sans Fallback" font-size="11" fill="#059669">get() 返回 RequestOutput</text>
<path d="M350,570 L110,570" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
<text x="230" y="563" text-anchor="middle" font-family="Droid Sans Fallback" font-size="11" fill="#059669">yield out（一个 token 块）</text>
<rect x="305" y="601" width="360" height="26" rx="4" fill="#fffbeb" stroke="#2563eb" stroke-width="1"/>
<text x="485" y="618" text-anchor="middle" font-family="Droid Sans Fallback" font-size="10.5" fill="#2563eb">循环直到 EngineCoreOutput.finished = True</text>
<rect x="540" y="648" width="420" height="64" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="4,4"/>
<rect x="540" y="648" width="170" height="22" rx="3" fill="#dc2626"/>
<text x="548" y="664" font-family="Droid Sans Fallback" font-size="11" font-weight="bold" fill="white">alt 生产者超前</text>
<path d="M890,692 L620,692" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#ao)"/>
<text x="755" y="685" text-anchor="middle" font-family="Droid Sans Fallback" font-size="11" fill="#dc2626">连续两次 put() → self.output.add() 合帧</text>
</svg>