<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
<defs>
  <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/>
  </marker>
</defs>
<rect width="960" height="520" fill="#fafbfc"/>
<text x="480.0" y="35" fill="#1e293b" font-size="19" font-family="sans-serif" text-anchor="middle" font-weight="bold">Token Budget Allocation: First 3 Steps</text>
<text x="480.0" y="56" fill="#64748b" font-size="12" font-family="sans-serif" text-anchor="middle" >B = 512 max tokens per step. Prefill tokens fill leftover budget after decode.</text>
<rect x="60" y="70" width="240" height="340" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>
<text x="180.0" y="95" fill="#1e293b" font-size="16" font-family="sans-serif" text-anchor="middle" font-weight="bold">Step 1</text>
<rect x="80" y="110" width="200" height="18" fill="#3b82f6" rx="2"/>
<text x="180.0" y="144" fill="#94a3b8" font-size="11" font-family="sans-serif" text-anchor="middle" >512/512 used</text>
<rect x="75" y="164" width="10" height="10" fill="#3b82f6" rx="2"/>
<text x="92" y="174" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r1: 512 tokens</text>
<text x="92" y="190" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >prefill chunk</text>
<line x1="305" y1="240.0" x2="333" y2="240.0" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
<rect x="340" y="70" width="240" height="340" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>
<text x="460.0" y="95" fill="#1e293b" font-size="16" font-family="sans-serif" text-anchor="middle" font-weight="bold">Step 2</text>
<rect x="360" y="110" width="112" height="18" fill="#60a5fa" rx="2"/>
<rect x="472" y="110" width="78" height="18" fill="#3b82f6" rx="2"/>
<rect x="550" y="110" width="9" height="18" fill="#3b82f6" rx="2"/>
<rect x="559" y="110" width="1" height="18" fill="#e2e8f0" rx="2"/>
<text x="460.0" y="144" fill="#94a3b8" font-size="11" font-family="sans-serif" text-anchor="middle" >512/512 used</text>
<rect x="355" y="164" width="10" height="10" fill="#60a5fa" rx="2"/>
<text x="372" y="174" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r1: 288 tokens</text>
<text x="372" y="190" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >remaining prefill</text>
<rect x="355" y="219" width="10" height="10" fill="#3b82f6" rx="2"/>
<text x="372" y="229" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r2: 200 tokens</text>
<text x="372" y="245" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >full prefill</text>
<rect x="355" y="274" width="10" height="10" fill="#3b82f6" rx="2"/>
<text x="372" y="284" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r3: 24 tokens</text>
<text x="372" y="300" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >prefill chunk</text>
<line x1="585" y1="240.0" x2="613" y2="240.0" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
<rect x="620" y="70" width="240" height="340" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>
<text x="740.0" y="95" fill="#1e293b" font-size="16" font-family="sans-serif" text-anchor="middle" font-weight="bold">Step 3</text>
<rect x="640" y="110" width="0" height="18" fill="#22c55e" rx="2"/>
<rect x="640" y="110" width="0" height="18" fill="#22c55e" rx="2"/>
<rect x="640" y="110" width="10" height="18" fill="#60a5fa" rx="2"/>
<rect x="650" y="110" width="190" height="18" fill="#e2e8f0" rx="2"/>
<text x="740.0" y="144" fill="#94a3b8" font-size="11" font-family="sans-serif" text-anchor="middle" >28/512 used</text>
<rect x="635" y="164" width="10" height="10" fill="#22c55e" rx="2"/>
<text x="652" y="174" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r1: 1 token</text>
<text x="652" y="190" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >decode</text>
<rect x="635" y="219" width="10" height="10" fill="#22c55e" rx="2"/>
<text x="652" y="229" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r2: 1 token</text>
<text x="652" y="245" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >decode</text>
<rect x="635" y="274" width="10" height="10" fill="#60a5fa" rx="2"/>
<text x="652" y="284" fill="#334155" font-size="13" font-family="sans-serif" text-anchor="start" font-weight="bold">r3: 26 tokens</text>
<text x="652" y="300" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="start" >remaining prefill</text>
<text x="60" y="440" fill="#86efac" font-size="13" font-family="sans-serif" text-anchor="start" >Key insight: Step 2 mixes prefill (r1, r2, r3) tokens in one forward pass — this is continuous batching.</text>
<text x="60" y="460" fill="#86efac" font-size="13" font-family="sans-serif" text-anchor="start" >Step 3 mixes r3's remaining prefill with r1/r2 decode tokens. No phase segregation.</text>
<text x="60" y="498" fill="#334155" font-size="12" font-family="sans-serif" text-anchor="start" >Prefill</text>
<rect x="120" y="488" width="14" height="14" fill="#3b82f6" rx="2"/>
<text x="160" y="498" fill="#334155" font-size="12" font-family="sans-serif" text-anchor="start" >Prefill (chunked)</text>
<rect x="300" y="488" width="14" height="14" fill="#60a5fa" rx="2"/>
<text x="440" y="498" fill="#334155" font-size="12" font-family="sans-serif" text-anchor="start" >Decode</text>
<rect x="500" y="488" width="14" height="14" fill="#22c55e" rx="2"/>
<text x="560" y="498" fill="#334155" font-size="12" font-family="sans-serif" text-anchor="start" >Unused budget</text>
<rect x="680" y="488" width="14" height="14" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="0.5" rx="2"/>
</svg>