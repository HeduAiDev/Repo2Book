<text x="675" y="422" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">规则：每个餐盘容量 = Token Budget B = 512</text>
<text x="675" y="442" text-anchor="middle" font-size="10" fill="#16a34a">想装多少装多少，餐盘满了就结账 → 吃完再来装</text>
<text x="495" y="475" font-size="10" font-weight="bold" fill="#166534">第一步 (Step 1):</text>
<text x="505" y="491" font-size="10" fill="#334155">r1 装 512/800  (餐盘满 → 下次继续)</text>
<text x="505" y="507" font-size="10" fill="#334155">餐盘剩余 0 →  第一步结束</text>
<text x="495" y="527" font-size="10" font-weight="bold" fill="#166534">第二步 (Step 2):</text>
<text x="505" y="543" font-size="10" fill="#334155">r1 装 288/800  (288+200+24=512 → 三人都吃上)</text>
<text x="505" y="559" font-size="10" fill="#334155">r2 装 200/200 ✓   r3 装 24/50  (将在下一步装完)</text>
<rect x="490" y="540" width="370" height="65" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="675" y="564" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Continuous Batching 效率</text>
<text x="675" y="584" text-anchor="middle" font-size="11" fill="#16a34a">步数 ≈ ceil(总食物/餐盘) = ceil(1220/512) ≈ 3</text>
<text x="675" y="600" text-anchor="middle" font-size="11" fill="#16a34a">GPU 利用率 ≈ 100%  (餐盘几乎不可能空着)</text>
<text x="450" y="590" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b7280">传统食堂 900 步 → 自助餐 3 步 → 快了 300 倍！</text>
