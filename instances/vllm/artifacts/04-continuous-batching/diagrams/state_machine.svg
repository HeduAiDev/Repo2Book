<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
<defs>
  <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
  </marker>
  <marker id="ar_red" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#f59e0b"/>
  </marker>
  <marker id="ar_green" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#22c55e"/>
  </marker>
</defs>
<rect width="900" height="520" fill="#fafbfc"/>
<text x="450.0" y="38" fill="#1e293b" font-size="20" font-family="sans-serif" text-anchor="middle" font-weight="bold">Request State Machine</text>
<text x="450.0" y="62" fill="#64748b" font-size="13" font-family="sans-serif" text-anchor="middle" >each request traverses this lifecycle inside the scheduler</text>
<rect x="360.0" y="100" width="180" height="56" fill="#f8fafc" rx="12" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="450.0" y="126.0" fill="#334155" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">WAITING</text>
<text x="450.0" y="146.0" fill="#64748b" font-size="11" font-family="sans-serif" text-anchor="middle" >waiting in FCFS queue</text>
<rect x="360.0" y="230" width="180" height="56" fill="#3b82f6" rx="12" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="450.0" y="256.0" fill="#ffffff" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">RUNNING</text>
<text x="450.0" y="276.0" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle" >active, holding KV cache blocks</text>
<rect x="100" y="230" width="180" height="56" fill="#fef3c7" rx="12" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="190.0" y="256.0" fill="#ffffff" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">PREEMPTED</text>
<text x="190.0" y="276.0" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle" >KV cache freed, requeued</text>
<rect x="640" y="390" width="150" height="56" fill="#dcfce7" rx="12" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="715.0" y="416.0" fill="#ffffff" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">FINISHED</text>
<text x="715.0" y="436.0" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle" >EOS / max_tokens</text>
<line x1="450.0" y1="156" x2="450.0" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#ar_green)"/>
<text x="465.0" y="193.0" fill="#22c55e" font-size="11" font-family="sans-serif" text-anchor="start" >admitted:
KV alloc OK
budget OK</text>
<line x1="360.0" y1="258.0" x2="280" y2="258.0" stroke="#64748b" stroke-width="2" marker-end="url(#ar_red)"/>
<text x="320.0" y="215" fill="#f59e0b" font-size="11" font-family="sans-serif" text-anchor="middle" >KV cache OOM
preempted</text>
<path d="M190.0,230 Q245.0,210 300.0,156" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>
<text x="150.0" y="120" fill="#64748b" font-size="10" font-family="sans-serif" text-anchor="middle" >requeue
(insert at head)</text>
<line x1="540.0" y1="258.0" x2="640" y2="418.0" stroke="#64748b" stroke-width="2" marker-end="url(#ar_green)"/>
<text x="605.0" y="248.0" fill="#22c55e" font-size="11" font-family="sans-serif" text-anchor="start" >EOS / max_tokens
→ free KV cache</text>
<text x="450" y="185" fill="#22c55e" font-size="12" font-family="sans-serif" text-anchor="start" >Phase 2 entry</text>
<text x="450" y="200" fill="#64748b" font-size="10" font-family="sans-serif" text-anchor="start" >(waiting → running)</text>
<text x="315" y="280" fill="#f59e0b" font-size="12" font-family="sans-serif" text-anchor="start" >Phase 1 OOM → preempt</text>
<text x="315" y="295" fill="#64748b" font-size="10" font-family="sans-serif" text-anchor="start" >(pop lowest priority)</text>
<text x="30" y="490" fill="#334155" font-size="12" font-family="sans-serif" text-anchor="start" >Phase 1 (schedule): running requests first — preempt on OOM</text>
<text x="30" y="510" fill="#334155" font-size="12" font-family="sans-serif" text-anchor="start" >Phase 2 (schedule): admit waiting → running — stop on OOM</text>
<text x="450.0" y="490" fill="#64748b" font-size="12" font-family="sans-serif" text-anchor="middle" font-weight="bold">"no prefill phase, no decode phase — just num_computed_tokens"</text>
</svg>