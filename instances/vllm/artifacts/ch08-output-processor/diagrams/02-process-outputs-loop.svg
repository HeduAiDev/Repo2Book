<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 980">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="r" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="760" height="980" fill="white"/>
<text x="380.0" y="30" font-family="sans-serif" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="bold">process_outputs：唯一遍历整批的单循环</text>
<text x="380.0" y="52" font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal">for engine_core_output in engine_core_outputs:</text>
<rect x="140.0" y="75" width="380" height="62" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="330.0" y="102.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">取 req_state = request_states.get(req_id)</text>
<text x="330.0" y="120.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">为 None（已 abort）→ continue 跳过</text>
<rect x="140.0" y="163" width="380" height="56" rx="8" fill="#fef9c3" stroke="#ca8a02" stroke-width="1.5"/>
<text x="330.0" y="187.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">① stats：_update_stats_from_output</text>
<text x="330.0" y="205.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">（metrics 子系统，本步累计）</text>
<rect x="140.0" y="245" width="380" height="56" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="330.0" y="269.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">② prefill 翻转：is_prefilling = False</text>
<text x="330.0" y="287.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">记 num_cached_tokens（首次）</text>
<rect x="140.0" y="327" width="380" height="74" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="330.0" y="351.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">③ detokenizer.update(new_token_ids, ...)</text>
<text x="330.0" y="369.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">增量去 token + check_stop_strings</text>
<text x="330.0" y="387.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">命中停止串 → finish_reason = STOP</text>
<rect x="140.0" y="427" width="380" height="56" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="330.0" y="451.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">④ logprobs_processor.update_from_output</text>
<text x="330.0" y="469.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">增量累积 sample / prompt logprobs</text>
<rect x="140.0" y="509" width="380" height="56" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
<text x="330.0" y="533.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">⑤ make_request_output(...)</text>
<text x="330.0" y="551.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">三道闸门：FINAL_ONLY / stream_interval / 父聚合</text>
<line x1="330" y1="137" x2="330" y2="163" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="330" y1="219" x2="330" y2="245" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="330" y1="301" x2="330" y2="327" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="330" y1="401" x2="330" y2="427" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="330" y1="483" x2="330" y2="509" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<polygon points="330,553 460,603 330,653 200,603" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
<text x="330" y="601.0" font-family="sans-serif" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">返回了</text>
<text x="330" y="616.0" font-family="sans-serif" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="normal">RequestOutput？</text>
<line x1="330" y1="565" x2="330" y2="553" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="140.0" y="673" width="380" height="64" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
<text x="330.0" y="701.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">queue 非空 → queue.put()  (AsyncLLM)</text>
<text x="330.0" y="719.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">否则 → request_outputs.append()  (LLMEngine)</text>
<line x1="330" y1="653" x2="330" y2="673" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="344" y="667" font-family="sans-serif" font-size="13" fill="#16a34a" text-anchor="start" font-weight="bold">是</text>
<text x="470" y="607" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="start" font-weight="normal">否（被节流 / 聚合未齐）</text>
<polygon points="330,729 460,775 330,821 200,775" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
<text x="330" y="773.0" font-family="sans-serif" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">finish_reason</text>
<text x="330" y="788.0" font-family="sans-serif" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="normal">is not None？</text>
<line x1="330" y1="737" x2="330" y2="729" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="140.0" y="839" width="380" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="330.0" y="865.0" font-family="sans-serif" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">_finish_request：注销三张映射表</text>
<text x="330.0" y="883.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">EngineCore 未完成 → reqs_to_abort.append</text>
<text x="330.0" y="901.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">_update_stats_from_finished</text>
<line x1="330" y1="821" x2="330" y2="839" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="344" y="835" font-family="sans-serif" font-size="13" fill="#16a34a" text-anchor="start" font-weight="bold">是</text>
<text x="330" y="943" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle" font-weight="bold">↻ 下一个 engine_core_output</text>
<line x1="330" y1="917" x2="330" y2="929" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
</svg>