<text x="416" y="301" font-family="sans-serif" font-size="13" fill="#15803d" text-anchor="start" font-weight="bold">✓ 窗口="cab"，命中 "ab"（pos 4）</text>
<text x="340" y="335" font-family="sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="bold">new_char_count=2</text>
<rect x="40" y="400" width="840" height="100" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
<text x="460.0" y="422" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle" font-weight="bold">为什么这个窗口足够？</text>
<text x="460.0" y="444" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">停止串首次命中 → 其尾部必然落在本步新增字符里（否则上一步就该命中了）</text>
<text x="460.0" y="462" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">→ 只需覆盖「新增字符 + 前面 stop_len−1 个旧字符」= 窗口大小 stop_len + new_char_count − 1</text>
<text x="460.0" y="480" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">→ 搜索起点从末尾往回 (new_char_count + stop_len − 1) 位 = Python 负索引 1 − new_char_count − stop_len</text>
