<text x="1026.0" y="321" font-family="sans-serif" font-size="12" fill="#16a34a" text-anchor="start" font-weight="bold">child={} → 整体返回</text>
<text x="880.0" y="380" font-family="sans-serif" font-size="12" fill="#a21caf" text-anchor="middle" font-weight="normal">三格齐（child_requests 空）才一次性返回全部 n 个</text>
