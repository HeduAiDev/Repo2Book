<text x="390.0" y="310.0" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">index=2</text>
<text x="260" y="356" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">子完成 → child_requests 递减；已返回的不重发</text>
<text x="260" y="380" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="normal">（already_finished_and_returned 保护）</text>
