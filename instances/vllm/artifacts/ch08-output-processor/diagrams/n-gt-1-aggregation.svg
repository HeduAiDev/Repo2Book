<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1240" height="560" fill="white"/>
<text x="620.0" y="30" font-family="sans-serif" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="bold">n = 3 父聚合：ParentRequest.get_outputs</text>
<text x="620.0" y="50" font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal">finished = not child_requests（子集合空即整体完成）</text>
<line x1="620.0" y1="72" x2="620.0" y2="540" stroke="#e2e8f0" stroke-width="2"/>
