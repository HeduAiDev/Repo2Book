<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="980" height="560" fill="white"/>
<text x="490.0" y="30" font-family="sans-serif" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="bold">RequestOutputCollector：消费者慢时 DELTA 归并</text>
<text x="490.0" y="52" font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal">aggregate = (output_kind == DELTA)；put 调 RequestOutput.add 拼接</text>
<text x="60" y="96" font-family="sans-serif" font-size="14" fill="#d97706" text-anchor="start" font-weight="bold">生产者 output_handler</text>
<text x="60" y="228" font-family="sans-serif" font-size="14" fill="#a21caf" text-anchor="start" font-weight="bold">邮箱单槽 self.output</text>
<text x="60" y="416" font-family="sans-serif" font-size="14" fill="#2563eb" text-anchor="start" font-weight="bold">消费者 generate()（落后）</text>
<rect x="190" y="110" width="140" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="260.0" y="127.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">put(d1)</text>
<text x="260.0" y="143.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="你"</text>
<text x="260.0" y="159.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">token=[101]</text>
<rect x="400" y="110" width="140" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="470.0" y="127.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">put(d2)</text>
<text x="470.0" y="143.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="好"</text>
<text x="470.0" y="159.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">token=[102]</text>
<rect x="610" y="110" width="140" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="680.0" y="127.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">put(d3)</text>
<text x="680.0" y="143.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="吗"</text>
<text x="680.0" y="159.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">token=[103]</text>
<rect x="185" y="250" width="150" height="64" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="260.0" y="271.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">槽 = d1</text>
<text x="260.0" y="287.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="你"</text>
<text x="260.0" y="303.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">set(Event)</text>
<line x1="260" y1="166" x2="260" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="395" y="250" width="150" height="64" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
<text x="470.0" y="271.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">add(d1,d2)</text>
<text x="470.0" y="287.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="你好"</text>
<text x="470.0" y="303.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">拼接</text>
<line x1="470" y1="166" x2="470" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="605" y="250" width="150" height="64" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
<text x="680.0" y="271.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">add(..,d3)</text>
<text x="680.0" y="287.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="你好吗"</text>
<text x="680.0" y="303.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">拼接</text>
<line x1="680" y1="166" x2="680" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="745" y="430" width="170" height="70" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="830.0" y="446.0" font-family="monospace" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold">get() 取走</text>
<text x="830.0" y="462.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">text="你好吗"</text>
<text x="830.0" y="478.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">token=[101,102,103]</text>
<text x="830.0" y="494.0" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal">clear(Event)</text>
<line x1="755" y1="282" x2="745" y2="450" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="750.0" y="314" font-family="sans-serif" font-size="12" fill="#16a34a" text-anchor="middle" font-weight="bold">消费者一次 get 拿到合并结果，无重叠无丢失</text>
<line x1="335" y1="282" x2="395" y2="282" stroke="#a21caf" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)"/>
<line x1="545" y1="282" x2="605" y2="282" stroke="#a21caf" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)"/>
<text x="60" y="510" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="start" font-weight="normal">对比 CUMULATIVE 模式：aggregate=False → put 整体替换 self.output，只保留最后一份全量</text>
<text x="60" y="532" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="start" font-weight="normal">内存恒为「每请求一槽」O(1)，归并是背压安全阀：消费慢也不会无界堆积</text>
</svg>