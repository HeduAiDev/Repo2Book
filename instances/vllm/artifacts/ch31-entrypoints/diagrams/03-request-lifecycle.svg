<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 980" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ard" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#a855f7"/></marker></defs>
<rect width="1120" height="980" fill="white"/>
<text x="560" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">一次 generate 调用内，单个请求的生命周期</text>
