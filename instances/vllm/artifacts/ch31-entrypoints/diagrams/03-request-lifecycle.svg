<rect x="20.0" y="52" width="270.0" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="155.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">LLM</text>
<rect x="290.0" y="52" width="270.0" height="908" fill="#dcfce7" fill-opacity="0.25" stroke="#16a34a" stroke-width="1.5"/>
<rect x="290.0" y="52" width="270.0" height="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="425.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">LLMEngine</text>
<rect x="560.0" y="52" width="270.0" height="908" fill="#fef9c3" fill-opacity="0.25" stroke="#ca8a04" stroke-width="1.5"/>
<rect x="560.0" y="52" width="270.0" height="30" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text x="695.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">OutputProcessor</text>
<rect x="830.0" y="52" width="270.0" height="908" fill="#fae8ff" fill-opacity="0.25" stroke="#a21caf" stroke-width="1.5"/>
<rect x="830.0" y="52" width="270.0" height="30" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
<text x="965.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">EngineCore（后台进程）</text>
<rect x="60.0" y="100" width="190" height="52" rx="7" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
<text x="155.0" y="115.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">_add_request</text>
<text x="155.0" y="130.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">output_kind=FINAL_ONLY</text>
<text x="155.0" y="145.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">自增 request_id</text>
<line x1="250.0" y1="169" x2="325.0" y2="169" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="390" y="162" text-anchor="middle" font-size="11" fill="#475569">add_request(id, prompt, params)</text>
<rect x="320.0" y="186" width="210" height="46" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
<text x="425.0" y="205.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">add_request</text>
<text x="425.0" y="220.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">input_processor.process_inputs</text>
<line x1="530.0" y1="249" x2="595.0" y2="249" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="695" y="242" text-anchor="middle" font-size="11" fill="#475569">① output_processor.add_request</text>
<rect x="600.0" y="266" width="190" height="42" rx="7" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
<text x="695.0" y="283.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">add_request</text>
<text x="695.0" y="298.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">建 RequestState（待装配）</text>
<line x1="530.0" y1="325" x2="865.0" y2="325" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="965" y="318" text-anchor="middle" font-size="11" fill="#475569">② engine_core.add_request</text>
<rect x="865.0" y="342" width="200" height="42" rx="7" fill="#f5d0fe" stroke="#a21caf" stroke-width="2"/>
<text x="965.0" y="359.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">收下请求入调度</text>
<text x="965.0" y="374.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">（SyncMPClient 经 ZMQ 送达）</text>
<rect x="270.0" y="398" width="310" height="40" rx="7" fill="#faf5ff" stroke="#a855f7" stroke-width="1.6" stroke-dasharray="6 4"/>
<text x="425.0" y="414" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">n&gt;1：add_request 内 ParentRequest 扇出</text>
<text x="425.0" y="430" text-anchor="middle" font-size="11" fill="#7e22ce">①② 各重复 n 次（并行采样子请求）</text>
<line x1="40" y1="456" x2="1080" y2="456" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
<rect x="5.0" y="466" width="300" height="36" rx="7" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
<text x="155.0" y="489" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">_run_engine: while step()  循环 ↻</text>
<line x1="305.0" y1="519" x2="315.0" y2="519" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="390" y="512" text-anchor="middle" font-size="11" fill="#475569">step()</text>
<rect x="320.0" y="536" width="210" height="42" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
<text x="425.0" y="553.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">step</text>
<text x="425.0" y="568.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">① get_output</text>
<line x1="530.0" y1="595" x2="865.0" y2="595" stroke="#a21caf" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="965" y="588" text-anchor="middle" font-size="11" fill="#a21caf">get_output()（阻塞取队列）</text>
<rect x="865.0" y="612" width="200" height="38" rx="7" fill="#f5d0fe" stroke="#a21caf" stroke-width="2"/>
<text x="965.0" y="627.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">后台线程喂 outputs_queue</text>
<text x="965.0" y="641.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">→ 主线程阻塞取出</text>
<line x1="530.0" y1="667" x2="595.0" y2="667" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="695" y="660" text-anchor="middle" font-size="11" fill="#ca8a04">② process_outputs</text>
<rect x="595.0" y="684" width="200" height="40" rx="7" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
<text x="695.0" y="700.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">去 token 化 / 装配 RequestOutput</text>
<text x="695.0" y="714.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">判定 finished</text>
<rect x="320.0" y="744" width="210" height="38" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
<text x="425.0" y="759.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">③ abort 停止串触发的请求</text>
<text x="425.0" y="773.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">④（记 stats）</text>
<line x1="320.0" y1="799" x2="250.0" y2="799" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="155.0" y="792" text-anchor="middle" font-size="11" fill="#475569">finished 的 RequestOutput</text>
<rect x="50.0" y="816" width="210" height="52" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="155.0" y="831.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">收集 finished 输出</text>
<text x="155.0" y="845.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">循环至 has_unfinished_requests()=False</text>
<text x="155.0" y="859.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">sorted(by request_id) 返回</text>
</svg>