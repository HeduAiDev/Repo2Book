<rect x="20.0" y="52" width="270.0" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="155.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">LLM</text>
<rect x="290.0" y="52" width="270.0" height="688" fill="#dcfce7" fill-opacity="0.25" stroke="#16a34a" stroke-width="1.5"/>
<rect x="290.0" y="52" width="270.0" height="30" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="425.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">LLMEngine</text>
<rect x="560.0" y="52" width="270.0" height="688" fill="#fef9c3" fill-opacity="0.25" stroke="#ca8a04" stroke-width="1.5"/>
<rect x="560.0" y="52" width="270.0" height="30" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text x="695.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">OutputProcessor</text>
<rect x="830.0" y="52" width="270.0" height="688" fill="#fae8ff" fill-opacity="0.25" stroke="#a21caf" stroke-width="1.5"/>
<rect x="830.0" y="52" width="270.0" height="30" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
<text x="965.0" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">EngineCore（后台进程）</text>
<rect x="65.0" y="100" width="180" height="50" rx="7" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
<text x="155.0" y="114.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">_add_request</text>
<text x="155.0" y="129.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">output_kind=FINAL_ONLY</text>
<text x="155.0" y="144.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">自增 request_id</text>
<line x1="245.0" y1="170" x2="330.0" y2="170" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="287.5" y="163" text-anchor="middle" font-size="11" fill="#475569">add_request(id, prompt, params)</text>
<rect x="335.0" y="152" width="180" height="46" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
<text x="425.0" y="171.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">add_request</text>
<text x="425.0" y="186.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">input_processor.process_inputs</text>
<line x1="515.0" y1="230" x2="600.0" y2="230" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="557.5" y="223" text-anchor="middle" font-size="11" fill="#475569">① output_processor.add_request</text>
<rect x="605.0" y="212" width="180" height="42" rx="7" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
<text x="695.0" y="229.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">add_request</text>
<text x="695.0" y="244.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">建 RequestState（待装配）</text>
<line x1="515.0" y1="286" x2="865.0" y2="286" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="690.0" y="279" text-anchor="middle" font-size="11" fill="#475569">② engine_core.add_request</text>
<rect x="870.0" y="268" width="190" height="42" rx="7" fill="#f5d0fe" stroke="#a21caf" stroke-width="2"/>
<text x="965.0" y="285.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">收下请求入调度</text>
<text x="965.0" y="300.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">（SyncMPClient 经 ZMQ 送达）</text>
<rect x="275.0" y="334" width="300" height="40" rx="7" fill="#faf5ff" stroke="#a855f7" stroke-width="1.6" stroke-dasharray="6 4"/>
<text x="425.0" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">n&gt;1：add_request 内 ParentRequest 扇出</text>
<text x="425.0" y="366" text-anchor="middle" font-size="11" fill="#7e22ce">①② 各重复 n 次（并行采样子请求）</text>
<line x1="40" y1="402" x2="1080" y2="402" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
<rect x="5.0" y="410" width="300" height="36" rx="7" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
<text x="155.0" y="433" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">_run_engine: while step()  循环 ↻</text>
<line x1="245.0" y1="466" x2="330.0" y2="466" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="287.5" y="459" text-anchor="middle" font-size="11" fill="#475569">step()</text>
<rect x="330.0" y="448" width="190" height="42" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
<text x="425.0" y="465.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">step</text>
<text x="425.0" y="480.5" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">① get_output</text>
<line x1="520.0" y1="520" x2="865.0" y2="520" stroke="#a21caf" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="692.5" y="513" text-anchor="middle" font-size="11" fill="#a21caf">get_output()（阻塞取队列）</text>
<rect x="870.0" y="504" width="190" height="38" rx="7" fill="#f5d0fe" stroke="#a21caf" stroke-width="2"/>
<text x="965.0" y="519.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">后台线程喂 outputs_queue</text>
<text x="965.0" y="533.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">→ 主线程阻塞取出</text>
<line x1="520.0" y1="572" x2="600.0" y2="572" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="560.0" y="565" text-anchor="middle" font-size="11" fill="#ca8a04">② process_outputs</text>
<rect x="600.0" y="556" width="190" height="40" rx="7" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
<text x="695.0" y="572.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">去 token 化 / 装配 RequestOutput</text>
<text x="695.0" y="586.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">判定 finished</text>
<rect x="325.0" y="616" width="200" height="38" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
<text x="425.0" y="631.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">③ abort 停止串触发的请求</text>
<text x="425.0" y="645.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">④（记 stats）</text>
<line x1="330.0" y1="674" x2="250.0" y2="674" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="290.0" y="667" text-anchor="middle" font-size="11" fill="#475569">finished 的 RequestOutput</text>
<rect x="55.0" y="656" width="200" height="50" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="155.0" y="670.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">收集 finished 输出</text>
<text x="155.0" y="684.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">循环至 has_unfinished_requests()=False</text>
<text x="155.0" y="698.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">sorted(by request_id) 返回</text>
</svg>