<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="1080" height="640" fill="white"/>
<text x="540" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">make_client 三分支：离线默认走 SyncMPClient（不是 InprocClient）</text>
<rect x="340.0" y="56" width="400" height="66" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
<text x="540.0" y="76.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">from_engine_args</text>
<text x="540.0" y="94.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">检查 envs.VLLM_ENABLE_V1_MULTIPROCESSING</text>
<text x="540.0" y="112.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">（默认值 True）</text>
<line x1="540.0" y1="122" x2="540.0" y2="140" stroke="#475569" stroke-width="2.5"/>
<line x1="250" y1="140" x2="920" y2="140" stroke="#475569" stroke-width="2.5"/>
<line x1="250" y1="140" x2="250" y2="180" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ar)"/>
<line x1="620" y1="140" x2="620" y2="180" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<line x1="920" y1="140" x2="920" y2="180" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="194.0" y="109" width="112" height="22" rx="5" fill="white" stroke="#1d4ed8" stroke-width="1.2"/>
<text x="250" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">env=True（默认）</text>
<rect x="592.0" y="109" width="56" height="22" rx="5" fill="white" stroke="#475569" stroke-width="1.2"/>
<text x="620" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">env=0</text>
<rect x="844.0" y="109" width="152" height="22" rx="5" fill="white" stroke="#94a3b8" stroke-width="1.2"/>
<text x="920" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">asyncio_mode=True</text>
<rect x="76.0" y="168" width="348" height="392" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
<text x="250" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">⭐ 默认路径</text>
<rect x="90.0" y="204" width="320" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="250.0" y="228.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">enable_multiprocessing 被强翻 True</text>
<text x="250.0" y="245.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">multiprocess_mode=True, asyncio_mode=False</text>
<line x1="250" y1="260" x2="250" y2="288" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="90.0" y="288" width="320" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="250.0" y="306.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">make_client</text>
<text x="250.0" y="323.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">命中 (mp=True, async=False)</text>
<line x1="250" y1="332" x2="250" y2="360" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="90.0" y="360" width="320" height="188" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
<text x="250.0" y="416.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">SyncMPClient</text>
<text x="250.0" y="433.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">后台进程 EngineCore</text>
<text x="250.0" y="450.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">+ ZMQ output_socket</text>
<text x="250.0" y="467.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">+ 后台收数 daemon 线程</text>
<text x="250.0" y="484.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">+ outputs_queue（阻塞队列）</text>
<text x="250.0" y="501.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">get_output() = outputs_queue.get()</text>
<text x="620" y="192" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">测试 / 调试 / V0 风格回退</text>
<rect x="460.0" y="204" width="320" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="620.0" y="228.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">enable_multiprocessing 维持 False</text>
<text x="620.0" y="245.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">multiprocess_mode=False</text>
<line x1="620" y1="260" x2="620" y2="288" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="460.0" y="288" width="320" height="44" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="620.0" y="306.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">make_client</text>
<text x="620.0" y="323.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">落到最后一行（else）</text>
<line x1="620" y1="332" x2="620" y2="360" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="460.0" y="360" width="320" height="110" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
<text x="620.0" y="394.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">InprocClient</text>
<text x="620.0" y="411.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">真·进程内，无 ZMQ</text>
<text x="620.0" y="428.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">无后台进程 / 无后台线程</text>
<text x="620.0" y="445.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">get_output() 直接 engine_core.step_fn()</text>
<rect x="800.0" y="204" width="240" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
<text x="920.0" y="228.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">mp=True, async=True</text>
<text x="920.0" y="244.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#475569">make_async_mp_client</text>
<line x1="920" y1="260" x2="920" y2="288" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)" stroke-dasharray="6 4"/>
<rect x="800.0" y="288" width="240" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
<text x="920.0" y="311.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">AsyncMPClient</text>
<text x="920.0" y="327.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#475569">（第 4 章 AsyncLLM）</text>
<text x="920.0" y="343.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#475569">本章不命中</text>
</svg>