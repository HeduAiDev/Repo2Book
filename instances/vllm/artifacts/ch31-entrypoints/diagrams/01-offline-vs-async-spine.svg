<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arg" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/></marker><marker id="arb" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="1040" height="760" fill="white"/>
<text x="520" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">离线同步路径（本章）vs 异步流式路径（第 4 章）</text>
<rect x="48" y="56" width="424" height="650" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
<text x="260.0" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">离线 · 同步阻塞</text>
<rect x="70" y="100" width="380" height="46" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="260.0" y="128.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">LLM.generate(prompts)</text>
<line x1="260.0" y1="146" x2="260.0" y2="146" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="162" width="380" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="260.0" y="186.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">_render_and_add_requests</text>
<text x="260.0" y="204.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">批量提交 · output_kind=FINAL_ONLY</text>
<line x1="260.0" y1="218" x2="260.0" y2="218" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="234" width="380" height="70" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
<text x="260.0" y="256.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">_run_engine</text>
<text x="260.0" y="274.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">while has_unfinished_requests():</text>
<text x="260.0" y="292.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">    LLMEngine.step()</text>
<line x1="260.0" y1="304" x2="260.0" y2="304" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="320" width="380" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="260.0" y="344.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">SyncMPClient.get_output()</text>
<text x="260.0" y="362.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">阻塞 outputs_queue.get()</text>
<line x1="260.0" y1="376" x2="260.0" y2="376" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="392" width="380" height="56" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
<text x="260.0" y="416.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">后台收数 daemon 线程</text>
<text x="260.0" y="434.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">（EngineCoreOutputQueueThread）</text>
<line x1="260.0" y1="448" x2="260.0" y2="448" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="464" width="380" height="40" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
<text x="260.0" y="489.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">ZMQ output_socket</text>
<line x1="260.0" y1="504" x2="260.0" y2="504" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="520" width="380" height="56" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
<text x="260.0" y="544.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">后台进程 EngineCore</text>
<text x="260.0" y="562.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">（独立进程，连续批处理整批）</text>
<line x1="260.0" y1="576" x2="260.0" y2="592" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
<rect x="70" y="592" width="380" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="260.0" y="617.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">末尾 sorted(by request_id)</text>
<rect x="568" y="56" width="424" height="650" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" stroke-dasharray="7 5"/>
<text x="780.0" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#64748b">异步 · 事件循环（对照）</text>
<rect x="590" y="100" width="380" height="46" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="128.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">AsyncLLM.generate(...)</text>
<line x1="780.0" y1="146" x2="780.0" y2="146" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="162" width="380" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="186.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">add_request</text>
<text x="780.0" y="204.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#475569">output_kind=DELTA · 逐步流式</text>
<line x1="780.0" y1="218" x2="780.0" y2="218" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="234" width="380" height="56" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="258.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">asyncio 事件循环</text>
<text x="780.0" y="276.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#475569">async for out in generator:</text>
<line x1="780.0" y1="290" x2="780.0" y2="290" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="306" width="380" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="330.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">背景 output_handler 协程</text>
<text x="780.0" y="348.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#475569">不停 await get_output_async()</text>
<line x1="780.0" y1="362" x2="780.0" y2="362" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="378" width="380" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="402.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">AsyncMPClient.get_output_async()</text>
<text x="780.0" y="420.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#475569">await asyncio.Queue.get()</text>
<line x1="780.0" y1="434" x2="780.0" y2="434" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="450" width="380" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="475.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">ZMQ output_socket</text>
<line x1="780.0" y1="490" x2="780.0" y2="490" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="506" width="380" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="530.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">后台进程 EngineCore</text>
<text x="780.0" y="548.0" text-anchor="middle" font-size="14" font-weight="normal" fill="#475569">（同样独立进程）</text>
<line x1="780.0" y1="562" x2="780.0" y2="578" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arg)"/>
<rect x="590" y="578" width="380" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
<text x="780.0" y="603.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">逐 token DELTA 流式吐给客户端</text>
<rect x="480" y="230" width="80" height="48" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="520.0" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">同步阻塞</text>
<text x="520.0" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">vs 事件循环</text>
<rect x="480" y="330" width="80" height="48" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="520.0" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">FINAL_ONLY 批量</text>
<text x="520.0" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">vs DELTA 流式</text>
<rect x="70" y="716" width="900" height="34" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="520" y="738" text-anchor="middle" font-size="13" fill="#166534">两侧 EngineCore 都跑在后台进程：区别只在主进程侧的驱动方式（阻塞线程队列 vs 事件循环协程），不依赖 in-process。</text>
</svg>