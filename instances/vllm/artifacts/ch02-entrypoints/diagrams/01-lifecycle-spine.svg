<text x="654.0" y="328.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">generate()（消费者协程）</text>
<text x="654.0" y="341.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">get_nowait() or await get()</text>
