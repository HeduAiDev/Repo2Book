<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ar" viewBox="0 0 10 6" refX="1" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M10,0 L0,3 L10,6 Z" fill="#475569"/></marker></defs>
<rect width="1180" height="720" fill="white"/>
<text x="590.0" y="34" font-family="sans-serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#1e293b">一个请求的一生：端到端主线（三段式异步）</text>
<rect x="20" y="62" width="1140" height="300" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="34" y="84" font-family="sans-serif" font-size="14" text-anchor="start" font-weight="bold" fill="#334155">API 进程 · 单事件循环上的多协程</text>
