<text x="514" y="320" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="normal" fill="#475569">get()</text>
<line x1="654" y1="360" x2="654" y2="380" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="40" y="180" width="168" height="30" rx="0" fill="none" stroke="none" stroke-width="1.5"/>
<text x="124.0" y="200.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b"></text>
