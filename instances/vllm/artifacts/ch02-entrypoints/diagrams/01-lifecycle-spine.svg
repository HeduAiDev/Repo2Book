<text x="1152" y="392" font-family="sans-serif" font-size="11" text-anchor="end" font-weight="bold" fill="#ca8a04">IPC → 第 7 章</text>
<text x="1152" y="510" font-family="sans-serif" font-size="11" text-anchor="end" font-weight="bold" fill="#16a34a">四步 → 第 11·13·19·27 章</text>
