<text x="700" y="240" font-family="sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#a16207">add_request_async</text>
<text x="700" y="258" font-family="sans-serif" font-size="10" text-anchor="start" font-weight="normal" fill="#a16207">EngineCoreRequest →ZMQ</text>
<rect x="300" y="392" width="200" height="70" rx="8" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
<text x="400.0" y="418.5" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">AsyncMPClient</text>
<text x="400.0" y="431.5" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">add_request_async（入向）</text>
<text x="400.0" y="444.5" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">get_output_async（出向）</text>
<rect x="40" y="532" width="188" height="70" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="134.0" y="558.5" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">run_busy_loop</text>
<text x="134.0" y="571.5" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#1e293b">取入队 → step → 出队</text>
