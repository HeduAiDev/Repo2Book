<rect x="830" y="540" width="178" height="54" rx="8" fill="white" stroke="#15803d" stroke-width="1.5"/>
<text x="919.0" y="572.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b">4. update_from_output</text>
<text x="640" y="526" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#166534">EngineCore.step() —— 一拍：连续批里 prefill + decode 混跑</text>
