<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1000" height="660" fill="white"/>
<text x="500.0" y="36" font-family="sans-serif" font-size="22" text-anchor="middle" font-weight="bold" fill="#1e293b">两个入口，一套核心</text>
<rect x="40" y="70" width="380" height="32" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="230.0" y="91.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1d4ed8">离线 · 同进程 · 无 IPC · FINAL_ONLY</text>
<rect x="80" y="120" width="300" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="230.0" y="151.0" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#1e293b">LLM.generate() / chat()</text>
<rect x="80" y="190" width="300" height="58" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="230.0" y="217.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#1e293b">_run_engine：裸循环</text>
<text x="230.0" y="231.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#1e293b">while has_unfinished_requests: step()</text>
<rect x="80" y="268" width="300" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="230.0" y="298.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#1e293b">收集 finished，按 request_id 排序返回</text>
<line x1="230" y1="170" x2="230" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="230" y1="248" x2="230" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="580" y="70" width="380" height="32" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="770.0" y="91.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#15803d">在线 · 跨进程 ZMQ · 流式 DELTA</text>
<rect x="620" y="120" width="300" height="50" rx="8" fill="white" stroke="#16a34a" stroke-width="1.5"/>
<text x="770.0" y="150.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#1e293b">OpenAIServingChat → AsyncLLM.generate()</text>
<rect x="620" y="190" width="300" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="770.0" y="217.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#1e293b">后台 output_handler + ZMQ</text>
<text x="770.0" y="231.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#1e293b">拉一批 → process_outputs → 各请求队列</text>
<rect x="620" y="268" width="300" height="50" rx="8" fill="white" stroke="#16a34a" stroke-width="1.5"/>
<text x="770.0" y="298.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#1e293b">async for → SSE / JSON 流式回客户端</text>
<line x1="770" y1="170" x2="770" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="770" y1="248" x2="770" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="290" y="400" width="420" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="500.0" y="426.0" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#92400e">同一个 EngineCore.step()</text>
<text x="500.0" y="442.0" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#92400e">schedule → execute → sample → update</text>
<line x1="230" y1="318" x2="400" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<line x1="770" y1="318" x2="600" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="250" y="510" width="500" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="500.0" y="539.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#991b1b">同一个 OutputProcessor.process_outputs()</text>
<text x="500.0" y="554.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#991b1b">用 req_state.queue is None 分流：</text>
<text x="500.0" y="569.5" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#991b1b">None → 返回 list（离线）  ·  非 None → put 进队列（在线）</text>
<line x1="500" y1="456" x2="500" y2="510" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<text x="500" y="640" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#334155">一套调度/执行/采样/去 token 化，两种驱动方式</text>
</svg>