<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="940" height="560" fill="white"/>
<text x="470" y="32" text-anchor="middle" font-size="19" font-weight="bold" font-family="sans-serif" fill="#0f172a">增量去 token 化的 prefix / read 双窗口</text>
<text x="470" y="54" text-anchor="middle" font-size="11.5" font-weight="normal" font-family="sans-serif" fill="#64748b">new_text = decode(tokens[prefix:])，prefix_text = decode(tokens[prefix:read])，相减得增量</text>
<rect x="70" y="110" width="84" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="112" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a">…</text>
<text x="112" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 0</text>
<rect x="162" y="110" width="84" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
<text x="204" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a">wor</text>
<text x="204" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 1</text>
<rect x="254" y="110" width="84" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
<text x="296" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a">ld</text>
<text x="296" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 2</text>
<rect x="346" y="110" width="84" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
<text x="388" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a">!</text>
<text x="388" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 3</text>
<rect x="438" y="110" width="84" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
<text x="480" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a"> 你</text>
<text x="480" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 4</text>
<rect x="530" y="110" width="84" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
<text x="572" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a">&lt;半&gt;</text>
<text x="572" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 5</text>
<rect x="622" y="110" width="84" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
<text x="664" y="138" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f172a">&lt;半&gt;</text>
<text x="664" y="170" text-anchor="middle" font-size="10" font-weight="normal" font-family="sans-serif" fill="#94a3b8">idx 6</text>
<line x1="158" y1="96" x2="158" y2="180" stroke="#ca8a04" stroke-width="2.4" stroke-dasharray="5 3"/>
<text x="158" y="90" text-anchor="middle" font-size="11.5" font-weight="bold" font-family="monospace" fill="#ca8a04">prefix_offset</text>
<line x1="434" y1="96" x2="434" y2="180" stroke="#2563eb" stroke-width="2.4" stroke-dasharray="5 3"/>
<text x="434" y="90" text-anchor="middle" font-size="11.5" font-weight="bold" font-family="monospace" fill="#2563eb">read_offset</text>
<rect x="70" y="220" width="400" height="70" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="86" y="244" text-anchor="start" font-size="11.5" font-weight="bold" font-family="monospace" fill="#713f12">prefix_text = decode(tokens[prefix:read])</text>
<text x="86" y="266" text-anchor="start" font-size="11.5" font-weight="normal" font-family="sans-serif" fill="#a16207">= “world” —— 仅作上下文锚，</text>
<text x="86" y="282" text-anchor="start" font-size="11" font-weight="normal" font-family="sans-serif" fill="#a16207">  让空格 cleanup 有相邻 token 参考</text>
<rect x="500" y="220" width="420" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="516" y="244" text-anchor="start" font-size="11.5" font-weight="bold" font-family="monospace" fill="#1e3a8a">new_text = decode(tokens[prefix:])</text>
<text x="516" y="266" text-anchor="start" font-size="11.5" font-weight="normal" font-family="sans-serif" fill="#1d4ed8">= “world! 你” —— 增量 = new_text[len(prefix_text):]</text>
<text x="516" y="282" text-anchor="start" font-size="11" font-weight="normal" font-family="sans-serif" fill="#1d4ed8">= “! 你”（截掉锚段后的真正新文字）</text>
<text x="470" y="330" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#0f172a">UTF-8 多字节边界：半截字节先扣住，等下一 token 补全</text>
<rect x="70" y="348" width="780" height="54" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="1.8"/>
<text x="86" y="369" text-anchor="start" font-size="12" font-weight="bold" font-family="sans-serif" fill="#7c2d12">收到 &lt;半&gt;（一个多字节字符的前半段）</text>
<text x="86" y="389" text-anchor="start" font-size="11" font-weight="normal" font-family="sans-serif" fill="#7c2d12">new_text 末尾 = "\ufffd"（U+FFFD 替换字符）    → 吐空串、offset 不动，等下一 token</text>
<rect x="70" y="412" width="780" height="54" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
<text x="86" y="433" text-anchor="start" font-size="12" font-weight="bold" font-family="sans-serif" fill="#14532d">收到第二个 &lt;半&gt;（补全字节序列）</text>
<text x="86" y="453" text-anchor="start" font-size="11" font-weight="normal" font-family="sans-serif" fill="#14532d">new_text = "你"（完整字符，不再以 \ufffd 结尾）    → 吐出 “你”，read_offset 前移</text>
</svg>