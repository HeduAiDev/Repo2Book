<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 660">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1040" height="660" fill="white"/>
<text x="260" y="36" font-size="18" text-anchor="middle" font-weight="bold" fill="#0f172a" font-family="sans-serif">第 1 级　单算子 dispatch（构造期一次性）</text>
<text x="780" y="36" font-size="18" text-anchor="middle" font-weight="bold" fill="#0f172a" font-family="sans-serif">第 2 级　整图 dispatch（首次前向）</text>
<line x1="520" y1="50" x2="520" y2="630" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 5"/>
<rect x="110" y="64" width="300" height="40" rx="8" fill="#e0e7ff" stroke="#475569" stroke-width="1.5"/>
<text x="260" y="89" font-size="14" text-anchor="middle" font-weight="normal" fill="#1e293b" font-family="monospace">RMSNorm(...)  →  CustomOp.__init__</text>
<line x1="260" y1="104" x2="260" y2="128" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="110" y="130" width="300" height="100" rx="8" fill="#e0e7ff" stroke="#475569" stroke-width="1.5"/>
<text x="260" y="158" font-size="14" text-anchor="middle" font-weight="bold" fill="#1e293b" font-family="monospace">dispatch_forward()</text>
<text x="260" y="192" font-size="13" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">读 CompilationConfig.custom_ops</text>
<text x="260" y="213" font-size="13" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">调 enabled() / default_on()</text>
<line x1="260" y1="230" x2="130" y2="248" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="260" y1="230" x2="390" y2="248" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="20" y="250" width="220" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="130" y="274" font-size="13" text-anchor="middle" font-weight="bold" fill="#166534" font-family="sans-serif">enabled 且 CUDA</text>
<text x="130" y="296" font-size="13" text-anchor="middle" font-weight="normal" fill="#166534" font-family="monospace">→ forward_cuda</text>
<text x="130" y="318" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">预编译融合 kernel</text>
<text x="130" y="336" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">对 Inductor 不透明</text>
<rect x="280" y="250" width="220" height="96" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text x="390" y="274" font-size="13" text-anchor="middle" font-weight="bold" fill="#854d0e" font-family="sans-serif">disabled（默认 none）</text>
<text x="390" y="296" font-size="13" text-anchor="middle" font-weight="normal" fill="#854d0e" font-family="monospace">→ forward_native</text>
<text x="390" y="318" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">一串纯 torch 算子</text>
<text x="390" y="336" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">留给 Inductor 融合</text>
<line x1="130" y1="346" x2="260" y2="380" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="390" y1="346" x2="260" y2="380" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="90" y="382" width="340" height="40" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
<text x="260" y="407" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b" font-family="monospace">self._forward_method  定死，运行期零开销转发</text>
<text x="260" y="452" font-size="13" text-anchor="middle" font-weight="bold" fill="#64748b" font-family="sans-serif">粒度：单个算子选哪份实现</text>
<rect x="610" y="64" width="340" height="40" rx="8" fill="#e0e7ff" stroke="#475569" stroke-width="1.5"/>
<text x="780" y="89" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b" font-family="monospace">@support_torch_compile 模型 forward</text>
<line x1="780" y1="104" x2="780" y2="128" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="610" y="130" width="340" height="40" rx="8" fill="#e0e7ff" stroke="#475569" stroke-width="1.5"/>
<text x="780" y="155" font-size="14" text-anchor="middle" font-weight="bold" fill="#1e293b" font-family="sans-serif">Dynamo trace 整张计算图</text>
<line x1="780" y1="170" x2="780" y2="194" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="580" y="196" width="400" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="780" y="218" font-size="13" text-anchor="middle" font-weight="normal" fill="#991b1b" font-family="monospace">遇 unified_attention_with_output</text>
<text x="780" y="238" font-size="12" text-anchor="middle" font-weight="normal" fill="#991b1b" font-family="sans-serif">不透明 op：不内联、不 graph break（回收 f17）</text>
<line x1="780" y1="248" x2="780" y2="272" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="610" y="274" width="340" height="40" rx="8" fill="#e0e7ff" stroke="#475569" stroke-width="1.5"/>
<text x="780" y="299" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b" font-family="monospace">VllmBackend.split_graph 在此处切图</text>
<line x1="780" y1="314" x2="650" y2="346" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="780" y1="314" x2="910" y2="346" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="540" y="348" width="220" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="650" y="372" font-size="13" text-anchor="middle" font-weight="bold" fill="#166534" font-family="sans-serif">规整段</text>
<text x="650" y="394" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">Inductor 编译</text>
<text x="650" y="414" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">+ CUDA graph 重放</text>
<rect x="800" y="348" width="220" height="86" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="910" y="372" font-size="13" text-anchor="middle" font-weight="bold" fill="#991b1b" font-family="sans-serif">attention 段</text>
<text x="910" y="394" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">保持 eager</text>
<text x="910" y="414" font-size="12" text-anchor="middle" font-weight="normal" fill="#475569" font-family="sans-serif">跑真实 kernel</text>
<text x="780" y="452" font-size="13" text-anchor="middle" font-weight="bold" fill="#64748b" font-family="sans-serif">粒度：整段图捕获/融合策略</text>
<rect x="60" y="500" width="920" height="120" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="520.0" y="528" font-size="16" text-anchor="middle" font-weight="bold" fill="#0f172a" font-family="sans-serif">两级 dispatch 是两种不同粒度的选择</text>
<text x="520.0" y="558" font-size="14" text-anchor="middle" font-weight="normal" fill="#334155" font-family="sans-serif">第 1 级在「构造期」按平台/配置把每个算子定到 forward_cuda 或 forward_native——单算子粒度。</text>
<text x="520.0" y="582" font-size="14" text-anchor="middle" font-weight="normal" fill="#334155" font-family="sans-serif">第 2 级在「首次前向」把整图按 attention 切成段——规整段融合 + 图捕获，attention 段 eager——整图粒度。</text>
<text x="520.0" y="606" font-size="14" text-anchor="middle" font-weight="normal" fill="#334155" font-family="sans-serif">选 forward_native（第 1 级 disabled），正是为了让纯 torch 算子暴露给第 2 级的 Inductor 去融合。</text>
</svg>