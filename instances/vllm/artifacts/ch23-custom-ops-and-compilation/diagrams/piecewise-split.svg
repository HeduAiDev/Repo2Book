<text x="452" y="341" font-size="13" text-anchor="start" font-weight="normal" fill="#334155" font-family="sans-serif">切分算子段（eager）</text>
<rect x="80" y="364" width="940" height="64" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="550.0" y="388" font-size="14" text-anchor="middle" font-weight="bold" fill="#0f172a" font-family="sans-serif">切点数 ≈ attention 层数 N；子图数 ≈ 2N+1。</text>
<text x="550.0" y="412" font-size="13" text-anchor="middle" font-weight="normal" fill="#334155" font-family="sans-serif">整图若因 attention 无法 CUDA-graph，每层每算子都付 CPU launch 开销；切图后只剩 N 段 attention eager。</text>
