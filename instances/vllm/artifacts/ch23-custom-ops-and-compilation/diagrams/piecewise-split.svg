<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1100" height="520" fill="white"/>
<text x="550.0" y="38" font-size="19" text-anchor="middle" font-weight="bold" fill="#0f172a" font-family="sans-serif">piecewise 切图：一张 FX 整图在每个 attention 处被切开</text>
<rect x="120" y="60" width="860" height="38" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
<text x="550.0" y="84" font-size="14" text-anchor="middle" font-weight="normal" fill="#334155" font-family="sans-serif">Dynamo 产出的整张 FX 图（N 层 transformer，含 N 个 unified_attention_with_output 节点）</text>
