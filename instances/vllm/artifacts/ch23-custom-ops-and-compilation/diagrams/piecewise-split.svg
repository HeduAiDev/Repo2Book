<rect x="80" y="328" width="22" height="16" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="112" y="341" font-size="13" text-anchor="start" font-weight="normal" fill="#334155" font-family="sans-serif">规整段（编译 + CUDA graph）</text>
