<text x="168.4" y="164" font-size="14" text-anchor="middle" font-weight="bold" fill="#166534" font-family="monospace">submod_0</text>
<text x="168.4" y="190" font-size="12" text-anchor="middle" font-weight="normal" fill="#334155" font-family="monospace">norm + qkv_proj</text>
<text x="168.4" y="208" font-size="12" text-anchor="middle" font-weight="normal" fill="#334155" font-family="monospace">+ rope</text>
