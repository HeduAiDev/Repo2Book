<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker><marker id="arrowo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker><marker id="arrowb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker></defs>
<rect width="900" height="600" fill="white"/>
<text x="450.0" y="28" font-family="sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" font-weight="bold">把 8 个 rank 切成各并行群组（TP=2, PP=2, DP=2）</text>
<text x="450.0" y="50" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle" font-weight="normal">all_ranks = arange(8).reshape(DP, PP, TP)</text>
<rect x="60" y="80" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="88.0" y="113.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g0</text>
<rect x="126" y="80" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="154.0" y="113.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g1</text>
<rect x="192" y="80" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="220.0" y="113.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g2</text>
<rect x="258" y="80" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="286.0" y="113.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g3</text>
<rect x="90" y="146" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="118.0" y="179.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g4</text>
<rect x="156" y="146" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="184.0" y="179.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g5</text>
<rect x="222" y="146" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="250.0" y="179.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g6</text>
<rect x="288" y="146" width="56" height="56" rx="6" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
<text x="316.0" y="179.0" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">g7</text>
<text x="192" y="70" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle" font-weight="normal">← 同一行 = 同一 DP 副本，TP 相邻 →</text>
<rect x="40" y="252" width="240" height="150" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="160.0" y="276" font-family="sans-serif" font-size="14" fill="#16a34a" text-anchor="middle" font-weight="bold">TP 组</text>
<text x="160.0" y="296" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">view(-1, 2)</text>
<text x="160.0" y="322" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="normal">[g0, g1]   [g2, g3]</text>
<text x="160.0" y="342" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="normal">[g4, g5]   [g6, g7]</text>
<rect x="330" y="252" width="240" height="150" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="450.0" y="276" font-family="sans-serif" font-size="14" fill="#ea580c" text-anchor="middle" font-weight="bold">PP 组</text>
<text x="450.0" y="296" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">transpose(1,2).reshape(-1,2)</text>
<text x="450.0" y="322" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="normal">[g0, g2]   [g1, g3]</text>
<text x="450.0" y="342" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="normal">[g4, g6]   [g5, g7]</text>
<rect x="620" y="252" width="240" height="150" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="740.0" y="276" font-family="sans-serif" font-size="14" fill="#2563eb" text-anchor="middle" font-weight="bold">DP 组</text>
<text x="740.0" y="296" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">transpose(0,2).reshape(-1,2)</text>
<text x="740.0" y="322" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="normal">[g0, g4]   [g2, g6]</text>
<text x="740.0" y="342" font-family="monospace" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="normal">[g1, g5]   [g3, g7]</text>
<text x="450.0" y="432" font-family="sans-serif" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="normal">套路统一：把目标维 transpose 到末尾 → reshape 成 2D → unbind 出每个组的 rank 列表</text>
<text x="450.0" y="454" font-family="sans-serif" font-size="12" fill="#16a34a" text-anchor="middle" font-weight="bold">TP 放最内层，同组 rank 相邻 → all_reduce 走机内 NVLink 带宽最高</text>
</svg>