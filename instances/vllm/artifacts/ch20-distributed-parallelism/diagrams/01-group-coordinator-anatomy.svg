<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker><marker id="arrowo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker><marker id="arrowb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker></defs>
<rect width="880" height="560" fill="white"/>
<text x="440.0" y="30" font-family="sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" font-weight="bold">一个并行维度 = 一对进程组 + 一个 device communicator</text>
<text x="780" y="70" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="normal">每维度一个同构实例</text>
<rect x="700" y="88" width="150" height="70" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="706" y="94" width="150" height="70" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="712" y="100" width="150" height="70" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="718" y="106" width="150" height="70" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="793" y="130" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle" font-weight="bold">TP / PP / DP / EP</text>
<rect x="60" y="90" width="540" height="150" rx="10" fill="#f8fafc" stroke="#1e293b" stroke-width="2.5"/>
<text x="76" y="118" font-family="sans-serif" font-size="16" fill="#1e293b" text-anchor="start" font-weight="bold">GroupCoordinator  (此处：TP)</text>
<text x="82" y="148" font-family="monospace" font-size="13" fill="#334155" text-anchor="start" font-weight="normal">ranks = [0, 1]      world_size = 2</text>
<text x="82" y="176" font-family="monospace" font-size="13" fill="#334155" text-anchor="start" font-weight="normal">rank_in_group = 本进程在组内的序号</text>
<text x="82" y="204" font-family="monospace" font-size="13" fill="#334155" text-anchor="start" font-weight="normal">use_custom_op_call = 是否走 torch.ops.vllm.*</text>
<line x1="200" y1="240" x2="200.0" y2="320" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="80" y="320" width="240" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="200.0" y="346" font-family="sans-serif" font-size="15" fill="#2563eb" text-anchor="middle" font-weight="bold">cpu_group  (gloo)</text>
<text x="200.0" y="372" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="normal">metadata / 对象广播</text>
<text x="200.0" y="392" font-family="monospace" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="normal">broadcast_object</text>
<text x="200.0" y="412" font-family="monospace" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="normal">barrier</text>
<line x1="460" y1="240" x2="640.0" y2="320" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="520" y="320" width="240" height="110" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="640.0" y="346" font-family="sans-serif" font-size="15" fill="#ea580c" text-anchor="middle" font-weight="bold">device_group  (NCCL)</text>
<text x="640.0" y="372" font-family="sans-serif" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="normal">张量集合通信</text>
<text x="640.0" y="392" font-family="monospace" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="normal">all_reduce / all_gather</text>
<text x="640.0" y="412" font-family="monospace" font-size="11" fill="#9a3412" text-anchor="middle" font-weight="normal">reduce_scatter / send / recv</text>
<line x1="640.0" y1="430" x2="650.0" y2="470" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow)"/>
