<text x="650.0" y="494" font-family="sans-serif" font-size="13" fill="#9a3412" text-anchor="middle" font-weight="bold">device_communicator (CudaCommunicator)</text>
<text x="650.0" y="518" font-family="monospace" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="normal">CustomAllreduce → pynccl → torch.distributed</text>
