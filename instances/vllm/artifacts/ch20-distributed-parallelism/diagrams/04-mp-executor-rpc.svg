<rect width="940" height="580" fill="white"/>
<text x="470.0" y="28" font-family="sans-serif" font-size="18" fill="#1e293b" text-anchor="middle" font-weight="bold">一次 collective_rpc：控制面广播 + 数据面 NCCL + 单点回收</text>
