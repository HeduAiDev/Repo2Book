<rect x="420" y="294" width="160" height="90" rx="8" fill="white" stroke="#64748b" stroke-width="2"/>
<text x="500.0" y="316" font-family="sans-serif" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">WorkerProc r2</text>
