<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720">
<defs><marker id="ar" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#475569"/></marker><marker id="arg" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#9333ea"/></marker></defs>
<rect width="1000" height="720" fill="white"/>
<text x="24" y="34" font-family="sans-serif" font-size="18" text-anchor="start" font-weight="bold" fill="#1e293b">step_with_batch_queue() 一次调用的控制流</text>
<rect x="190" y="56" width="220" height="40" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
<text x="300.0" y="80.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b">进入：assert len(queue) &lt; size</text>
<line x1="300" y1="96" x2="300" y2="122" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="190" y="122" width="220" height="44" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="300.0" y="148.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b">scheduler.has_requests() ?</text>
<text x="60" y="200" font-family="sans-serif" font-size="15" text-anchor="start" font-weight="bold" fill="#1d4ed8">态 A：填管道（优先）</text>
<rect x="90" y="212" width="230" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="205.0" y="236.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b">schedule() + execute_model(non_block)</text>
<line x1="205" y1="252" x2="205" y2="276" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="90" y="276" width="230" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="205.0" y="299.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b">model_executed = </text>
<text x="205.0" y="317.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b">total_num_scheduled_tokens &gt; 0</text>
<line x1="205" y1="332" x2="205" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="90" y="356" width="230" height="44" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="205.0" y="382.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="normal" fill="#1e293b">pending_structured_output_tokens ?</text>
<rect x="30" y="432" width="150" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="105.0" y="455.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#1e293b">否 → get_grammar_bitmask</text>
<text x="105.0" y="473.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#1e293b">+ sample_tokens(non_block)</text>
<line x1="120" y1="400" x2="115" y2="432" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="240" y="432" width="175" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="327.5" y="455.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#6b21a8">是 → 存 deferred_scheduler_output</text>
<text x="327.5" y="473.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#6b21a8">（不入队，留到态 B）</text>
<line x1="290" y1="400" x2="315" y2="432" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="80" y="516" width="200" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="180.0" y="540.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b">appendleft((future, so, exec_f))</text>
<line x1="155" y1="488" x2="178" y2="516" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<line x1="270" y1="166" x2="205" y2="212" stroke="#3b82f6" stroke-width="2" marker-end="url(#ar)"/>
<text x="242" y="183" font-family="sans-serif" font-size="12" text-anchor="start" font-weight="normal" fill="#1d4ed8">有请求</text>
<rect x="60" y="580" width="250" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="185.0" y="603.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#1e293b">model_executed and len&lt;size</text>
<text x="185.0" y="621.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="normal" fill="#1e293b">and not queue[-1][0].done() ?</text>
<line x1="180" y1="556" x2="185" y2="580" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="60" y="656" width="130" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="125.0" y="671.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#15803d">是 → return</text>
<text x="125.0" y="689.0" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#15803d">(None, True)</text>
<line x1="120" y1="636" x2="125" y2="656" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<text x="60" y="650" font-family="sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#15803d">只填不取，转下一圈</text>
<text x="660" y="200" font-family="sans-serif" font-size="15" text-anchor="start" font-weight="bold" fill="#b45309">态 B：取结果（阻塞）</text>
<text x="560" y="600" font-family="sans-serif" font-size="12" text-anchor="start" font-weight="bold" fill="#b45309">落到态 B 的三个触发：</text>
<text x="560" y="620" font-family="sans-serif" font-size="12" text-anchor="start" font-weight="normal" fill="#b45309">① 队满  ② 无更多请求  ③ 队尾批已 done()</text>
<line x1="305" y1="608" x2="730" y2="312" stroke="#ca8a04" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ar)"/>
<line x1="330" y1="166" x2="730" y2="252" stroke="#ca8a04" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ar)"/>
<text x="390" y="200" font-family="sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#b45309">无请求但队非空</text>
<rect x="640" y="252" width="190" height="40" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
<text x="735.0" y="276.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b">future,so,exec_f = queue.pop()</text>
<line x1="735" y1="292" x2="735" y2="312" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="640" y="312" width="190" height="56" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
<text x="735.0" y="335.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="normal" fill="#1e293b">model_output = future.result()</text>
<text x="735.0" y="353.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="normal" fill="#1e293b">（None → exec_f.result() 抛异常）</text>
<line x1="735" y1="368" x2="735" y2="388" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="640" y="388" width="190" height="40" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
<text x="735.0" y="412.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#1e293b">update_from_output(...)</text>
<line x1="735" y1="428" x2="735" y2="448" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="610" y="448" width="250" height="70" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="735.0" y="469.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="normal" fill="#6b21a8">若有 deferred：(spec→take_draft)</text>
<text x="735.0" y="487.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="normal" fill="#6b21a8">get_grammar_bitmask + sample_tokens</text>
<text x="735.0" y="505.0" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="normal" fill="#6b21a8">→ appendleft 重新入队</text>
<line x1="735" y1="518" x2="735" y2="538" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
<rect x="640" y="538" width="190" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="735.0" y="562.0" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#15803d">return (outputs, model_executed)</text>
<line x1="415" y1="460" x2="610" y2="470" stroke="#9333ea" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arg)"/>
<text x="512.5" y="452" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#9333ea">deferred 支线</text>
</svg>