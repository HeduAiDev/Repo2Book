<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420">
<defs>
<marker id="af" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#3b82f6"/></marker>
<marker id="ab" viewBox="0 0 10 6" refX="1" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M10,0 L0,3 L10,6 Z" fill="#f59e0b"/></marker>
</defs>
<rect width="1040" height="420" fill="#fafafa"/>
<text x="520" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">FreeKVCacheBlockQueue — 手工双向链表</text>
<text x="520" y="52" text-anchor="middle" font-size="12" fill="#64748b">每个 Block 自己存 prev_free_block / next_free_block 指针，实现 O(1) 中间删除</text>
<rect x="30" y="130" width="110" height="90" rx="6" fill="#94a3b8" stroke="#94a3b8" stroke-width="2"/>
<text x="85" y="171" text-anchor="middle" font-size="12" fill="#1e293b">HEAD</text>
<text x="85" y="187" text-anchor="middle" font-size="12" fill="#1e293b">sentinel</text>
<rect x="200" y="130" width="110" height="90" rx="6" fill="#fef2f2" stroke="#64748b" stroke-width="2"/>
<text x="255" y="171" text-anchor="middle" font-size="12" fill="#1e293b">Block 0</text>
<text x="255" y="187" text-anchor="middle" font-size="12" fill="#1e293b">(LRU)</text>
<rect x="370" y="130" width="110" height="90" rx="6" fill="#fef2f2" stroke="#64748b" stroke-width="2"/>
<text x="425" y="179" text-anchor="middle" font-size="12" fill="#1e293b">Block 1</text>
<rect x="540" y="130" width="110" height="90" rx="6" fill="#ecfdf5" stroke="#64748b" stroke-width="2"/>
<text x="595" y="171" text-anchor="middle" font-size="12" fill="#1e293b">Block 2</text>
<text x="595" y="187" text-anchor="middle" font-size="12" fill="#1e293b">(in use)</text>
<rect x="710" y="130" width="110" height="90" rx="6" fill="#fef2f2" stroke="#64748b" stroke-width="2"/>
<text x="765" y="179" text-anchor="middle" font-size="12" fill="#1e293b">Block 3</text>
<rect x="880" y="130" width="110" height="90" rx="6" fill="#94a3b8" stroke="#94a3b8" stroke-width="2"/>
<text x="935" y="171" text-anchor="middle" font-size="12" fill="#1e293b">TAIL</text>
<text x="935" y="187" text-anchor="middle" font-size="12" fill="#1e293b">sentinel</text>
<line x1="140" y1="163" x2="196" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#af)"/>
<text x="170" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">next</text>
<line x1="310" y1="163" x2="366" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#af)"/>
<text x="340" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">next</text>
<line x1="480" y1="163" x2="536" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#af)"/>
<text x="510" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">next</text>
<line x1="650" y1="163" x2="706" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#af)"/>
<text x="680" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">next</text>
<line x1="820" y1="163" x2="876" y2="163" stroke="#3b82f6" stroke-width="2" marker-end="url(#af)"/>
<text x="850" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">next</text>
<line x1="204" y1="187" x2="140" y2="187" stroke="#f59e0b" stroke-width="2" marker-end="url(#ab)"/>
<text x="170" y="201" text-anchor="middle" font-size="10" fill="#f59e0b">prev</text>
<line x1="374" y1="187" x2="310" y2="187" stroke="#f59e0b" stroke-width="2" marker-end="url(#ab)"/>
<text x="340" y="201" text-anchor="middle" font-size="10" fill="#f59e0b">prev</text>
<line x1="544" y1="187" x2="480" y2="187" stroke="#f59e0b" stroke-width="2" marker-end="url(#ab)"/>
<text x="510" y="201" text-anchor="middle" font-size="10" fill="#f59e0b">prev</text>
<line x1="714" y1="187" x2="650" y2="187" stroke="#f59e0b" stroke-width="2" marker-end="url(#ab)"/>
<text x="680" y="201" text-anchor="middle" font-size="10" fill="#f59e0b">prev</text>
<line x1="884" y1="187" x2="820" y2="187" stroke="#f59e0b" stroke-width="2" marker-end="url(#ab)"/>
<text x="850" y="201" text-anchor="middle" font-size="10" fill="#f59e0b">prev</text>
<rect x="192" y="100" width="526" height="30" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="455" y="92" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">空闲队列 (Free Queue)</text>
<text x="425" y="242" text-anchor="middle" font-size="11" fill="#166534">ref_cnt=1</text>
<text x="425" y="256" text-anchor="middle" font-size="11" fill="#166534">不在空闲队列</text>
<text x="520" y="284" text-anchor="middle" font-size="12" fill="#475569"><tspan fill="#ef4444" font-weight="bold">head →</tspan> LRU 端（最久未用，最先驱逐）  |  ...  |  <tspan fill="#3b82f6" font-weight="bold">→ tail</tspan> MRU 端（最近使用，最后驱逐）</text>
<text x="520" y="308" text-anchor="middle" font-size="12" fill="#64748b">Sentinel 节点消除边界条件：无需检查 head/tail 是否为 None</text>
</svg>
