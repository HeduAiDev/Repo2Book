<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
<defs>
<marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker>
<marker id="arrRed" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker>
</defs>
<rect width="960" height="600" fill="#fafafa"/>
<text x="480" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#1e293b" font-weight="bold">Auto-Regressive Generation: With vs Without KV Cache</text>
<text x="480" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">L = 4 tokens generated  |  Each colored box = one token position</text>
<rect x="40" y="80" width="410" height="320" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
<text x="245" y="66" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#dc2626" font-weight="bold">Without KV Cache — Recompute all previous Q,K,V each step</text>
<text x="50" y="133" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 1</text>
<rect x="110" y="110" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="128" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="128" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="290" y1="128" x2="146" y2="128" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="50" y="193" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 2</text>
<rect x="110" y="170" width="36" height="36" rx="3" fill="#ef4444" opacity="0.85"/>
<text x="128" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="128" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">re算</text>
<rect x="150" y="170" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="168" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K2V</text>
<text x="168" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="290" y1="188" x2="186" y2="188" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="50" y="253" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 3</text>
<rect x="110" y="230" width="36" height="36" rx="3" fill="#ef4444" opacity="0.85"/>
<text x="128" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="128" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">re算</text>
<rect x="150" y="230" width="36" height="36" rx="3" fill="#ef4444" opacity="0.85"/>
<text x="168" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K2V</text>
<text x="168" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">re算</text>
<rect x="190" y="230" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="208" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K3V</text>
<text x="208" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="290" y1="248" x2="226" y2="248" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="50" y="313" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 4</text>
<rect x="110" y="290" width="36" height="36" rx="3" fill="#ef4444" opacity="0.85"/>
<text x="128" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="128" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">re算</text>
<rect x="150" y="290" width="36" height="36" rx="3" fill="#ef4444" opacity="0.85"/>
<text x="168" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K2V</text>
<text x="168" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">re算</text>
<rect x="190" y="290" width="36" height="36" rx="3" fill="#ef4444" opacity="0.85"/>
<text x="208" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K3V</text>
<text x="208" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">re算</text>
<rect x="230" y="290" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="248" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K4V</text>
<text x="248" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="290" y1="308" x2="266" y2="308" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="245" y="364" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#dc2626" font-weight="bold">Total: 1+2+3+4 = 10 computations  |  O(L²)</text>
<text x="472" y="230" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#64748b" font-weight="bold">→</text>
<text x="472" y="254" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Speedup =</text>
<text x="472" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">(L+1)/2 = 2.5x (L=4)</text>
<text x="472" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">= 2048x (L=4096)</text>
<rect x="500" y="80" width="410" height="320" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
<text x="705" y="66" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#16a34a" font-weight="bold">With KV Cache — Compute only new, read old from cache</text>
<text x="510" y="133" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 1</text>
<rect x="570" y="110" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="588" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="588" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<text x="510" y="193" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 2</text>
<rect x="570" y="170" width="36" height="36" rx="3" fill="#3b82f6" opacity="0.85"/>
<text x="588" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="588" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">缓存读</text>
<rect x="610" y="170" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="628" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K2V</text>
<text x="628" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="570" y1="162" x2="610" y2="162" stroke="#93c5fd" stroke-width="2"/>
<text x="590" y="156" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">cache read</text>
<text x="510" y="253" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 3</text>
<rect x="570" y="230" width="36" height="36" rx="3" fill="#3b82f6" opacity="0.85"/>
<text x="588" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="588" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">缓存读</text>
<rect x="610" y="230" width="36" height="36" rx="3" fill="#3b82f6" opacity="0.85"/>
<text x="628" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K2V</text>
<text x="628" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">缓存读</text>
<rect x="650" y="230" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="668" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K3V</text>
<text x="668" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="570" y1="222" x2="650" y2="222" stroke="#93c5fd" stroke-width="2"/>
<text x="610" y="216" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">cache read</text>
<text x="510" y="313" font-family="monospace" font-size="12" fill="#1e293b" font-weight="bold">Step 4</text>
<rect x="570" y="290" width="36" height="36" rx="3" fill="#3b82f6" opacity="0.85"/>
<text x="588" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K1V</text>
<text x="588" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">缓存读</text>
<rect x="610" y="290" width="36" height="36" rx="3" fill="#3b82f6" opacity="0.85"/>
<text x="628" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K2V</text>
<text x="628" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">缓存读</text>
<rect x="650" y="290" width="36" height="36" rx="3" fill="#3b82f6" opacity="0.85"/>
<text x="668" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K3V</text>
<text x="668" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">缓存读</text>
<rect x="690" y="290" width="36" height="36" rx="3" fill="#22c55e" opacity="0.85"/>
<text x="708" y="312" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">K4V</text>
<text x="708" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">新算</text>
<line x1="570" y1="282" x2="690" y2="282" stroke="#93c5fd" stroke-width="2"/>
<text x="630" y="276" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">cache read</text>
<text x="705" y="364" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#16a34a" font-weight="bold">Total: 4 computations  |  O(L)</text>
<text x="480" y="430" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b" font-weight="bold">Legend</text>
<rect x="320" y="444" width="14" height="14" rx="2" fill="#22c55e"/>
<text x="340" y="456" font-family="sans-serif" font-size="11" fill="#334155">新算 = Compute new K,V (once per token)</text>
<rect x="440" y="444" width="14" height="14" rx="2" fill="#ef4444"/>
<text x="460" y="456" font-family="sans-serif" font-size="11" fill="#334155">重算 = Recompute old K,V (waste!)</text>
<rect x="560" y="444" width="14" height="14" rx="2" fill="#3b82f6"/>
<text x="580" y="456" font-family="sans-serif" font-size="11" fill="#334155">缓存读 = Read K,V from cache</text>
<rect x="60" y="490" width="840" height="48" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="480" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e40af" font-weight="bold">Key insight: K,V for past tokens are deterministic (causal mask) — they never change.</text>
</svg>