<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480">
<defs><marker id="arrR" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="arrL" viewBox="0 0 10 6" refX="1" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M10,0 L0,3 L10,6 Z" fill="#94a3b8"/></marker></defs>
<rect width="960" height="480" fill="#fafafa"/>
<text x="480" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#1e293b" font-weight="bold">FreeKVCacheBlockQueue: Hand-Rolled Doubly-Linked List</text>
<text x="480" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Why not collections.deque? Because deque.remove(item) is O(n). We need O(1) for prefix cache touch().</text>
<rect x="50" y="100" width="100" height="40" rx="4" fill="#8b5cf6" stroke="#1e293b" stroke-width="1.5"/>
<text x="100" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">HEAD
(sentinel)</text>
<line x1="150" y1="120" x2="210" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrR)"/>
<text x="180" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">next</text>
<rect x="220" y="100" width="100" height="40" rx="4" fill="#22c55e" stroke="#1e293b" stroke-width="1.5"/>
<text x="270" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Block 42
(free)</text>
<line x1="320" y1="120" x2="370" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrR)"/>
<text x="345" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">next</text>
<line x1="320" y1="124" x2="164" y2="124" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrL)" stroke-dasharray="4,3"/>
<rect x="370" y="100" width="100" height="40" rx="4" fill="#22c55e" stroke="#1e293b" stroke-width="1.5"/>
<text x="420" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Block 73
(free)</text>
<line x1="470" y1="120" x2="520" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrR)"/>
<text x="495" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">next</text>
<line x1="470" y1="124" x2="314" y2="124" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrL)" stroke-dasharray="4,3"/>
<rect x="520" y="100" width="100" height="40" rx="4" fill="#22c55e" stroke="#1e293b" stroke-width="1.5"/>
<text x="570" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Block 15
(free)</text>
<line x1="620" y1="124" x2="464" y2="124" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrL)" stroke-dasharray="4,3"/>
<line x1="620" y1="120" x2="650" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrR)"/>
<text x="635" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">next</text>
<rect x="650" y="100" width="100" height="40" rx="4" fill="#8b5cf6" stroke="#1e293b" stroke-width="1.5"/>
<text x="700" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">TAIL
(sentinel)</text>
<line x1="650" y1="124" x2="624" y2="124" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrL)" stroke-dasharray="4,3"/>
<text x="100" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">LRU ← evict first</text>
<text x="570" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">MRU → evict last</text>
<text x="50" y="200" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">O(1) remove from middle (when prefix cache touches Block 73):</text>
<text x="420" y="230" text-anchor="middle" font-family="monospace" font-size="12" fill="#ef4444" font-weight="bold">touch(block_73)</text>
<text x="420" y="250" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">Step 1: block_73.prev.next = block_73.next</text>
<text x="420" y="267" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">Step 2: block_73.next.prev = block_73.prev</text>
<text x="420" y="284" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">Step 3: block_73.prev = block_73.next = None</text>
<text x="420" y="304" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e" font-weight="bold">Done: O(1) — no search, no traversal!</text>
<text x="50" y="330" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Operation Complexity Comparison</text>
<rect x="50" y="348" width="200" height="26" rx="2" fill="#1e40af"/>
<text x="150" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">Operation</text>
<rect x="260" y="348" width="150" height="26" rx="2" fill="#1e40af"/>
<text x="335" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">collections.deque</text>
<rect x="420" y="348" width="150" height="26" rx="2" fill="#1e40af"/>
<text x="495" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">Hand-rolled LL</text>
<rect x="580" y="348" width="200" height="26" rx="2" fill="#1e40af"/>
<text x="680" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">Why?</text>
<rect x="50" y="376" width="200" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="260" y="376" width="150" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="420" y="376" width="150" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="580" y="376" width="200" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<text x="150" y="391" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">popleft() (LRU)</text>
<text x="335" y="391" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e">O(1)</text>
<text x="495" y="391" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e">O(1)</text>
<text x="680" y="391" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Both pop head</text>
<rect x="50" y="400" width="200" height="22" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="260" y="400" width="150" height="22" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="420" y="400" width="150" height="22" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="580" y="400" width="200" height="22" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
<text x="150" y="415" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">append() (MRU)</text>
<text x="335" y="415" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e">O(1)</text>
<text x="495" y="415" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e">O(1)</text>
<text x="680" y="415" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Both append tail</text>
<rect x="50" y="424" width="200" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="260" y="424" width="150" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="420" y="424" width="150" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<rect x="580" y="424" width="200" height="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<text x="150" y="439" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e293b">remove(item) (touch)</text>
<text x="335" y="439" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444">O(n) — SCAN</text>
<text x="495" y="439" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e">O(1)</text>
<text x="680" y="439" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Has prev/next ptrs</text>
</svg>