<rect width="900" height="430" fill="#fafafa"/>
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">内存分配方式对比：连续分配 vs Block 分配</text>
<text x="225" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">连续分配 (Contiguous)</text>
<text x="225" y="70" text-anchor="middle" font-size="11" fill="#64748b">一个请求 = 一段连续显存</text>
