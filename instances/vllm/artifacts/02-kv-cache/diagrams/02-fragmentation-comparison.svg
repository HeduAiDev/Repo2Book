<text x="300.0" y="174" text-anchor="middle" font-size="10" fill="#dc2626">新请求需要 300 格 → 分配失败！</text>
<line x1="225" y1="160" x2="225" y2="180" stroke="#ef4444" stroke-width="1" marker-end="url(#a)"/>
<text x="225" y="202" text-anchor="middle" font-size="11" fill="#475569">已用: 280 格 | 空闲: 110 格 | <tspan font-weight="bold" fill="#ef4444">可用: 40 格 (最大连续空洞)</tspan></text>
<text x="225" y="220" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">利用率: 280/390 = 71.8% | 外部碎片浪费: 110 格 (28.2%)</text>
