<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
<defs>
<marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker>
</defs>
<rect width="960" height="520" fill="#fafafa"/>
<text x="480" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#1e293b" font-weight="bold">External vs Internal Fragmentation: Why Block-Based Wins</text>
<text x="30" y="70" font-family="sans-serif" font-size="16" fill="#dc2626" font-weight="bold">Contiguous Allocation — External Fragmentation</text>
<rect x="30" y="90" width="900" height="40" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="30" y="146" font-family="monospace" font-size="11" fill="#64748b">Phase 1: Request A(30 tokens) arrives → alloc [0..29]</text>
<rect x="30" y="90" width="270.0" height="40" rx="2" fill="#3b82f6" opacity="0.7"/>
<text x="165.0" y="115" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">A = 30</text>
<text x="304.0" y="115" font-family="monospace" font-size="10" fill="#64748b">Free = 70</text>
<text x="30" y="196" font-family="monospace" font-size="11" fill="#64748b">Phase 2: Request B(20 tokens) arrives → alloc [30..49]</text>
<rect x="30" y="150" width="270.0" height="40" rx="2" fill="#3b82f6" opacity="0.4"/>
<text x="165.0" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">A=30</text>
<rect x="300.0" y="150" width="180.0" height="40" rx="2" fill="#3b82f6" opacity="0.7"/>
<text x="390.0" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">B=20</text>
<text x="484.0" y="175" font-family="monospace" font-size="10" fill="#64748b">Free = 50</text>
<text x="30" y="246" font-family="monospace" font-size="11" fill="#64748b">Phase 3: A finishes → hole [0..29] appears</text>
<rect x="30" y="210" width="270.0" height="40" rx="2" fill="#ef4444" opacity="0.5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="165.0" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ef4444" font-weight="bold">HOLE=30</text>
<rect x="300.0" y="210" width="180.0" height="40" rx="2" fill="#3b82f6" opacity="0.7"/>
<text x="390.0" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">B=20</text>
<text x="484.0" y="235" font-family="monospace" font-size="10" fill="#64748b">Free = 50</text>
<text x="30" y="296" font-family="monospace" font-size="11" fill="#64748b">Phase 4: Request C(50 tokens) arrives → Total free = 30+50 = 80 &gt; 50</text>
<text x="30" y="314" font-family="monospace" font-size="11" fill="#dc2626" font-weight="bold">          BUT hole=30 &lt; 50, tail=50 — C cannot fit! EXTERNAL FRAGMENTATION</text>
<rect x="30" y="270" width="270.0" height="40" rx="2" fill="#ef4444" opacity="0.5" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="165.0" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="bold">HOLE=30</text>
<rect x="300.0" y="270" width="180.0" height="40" rx="2" fill="#3b82f6" opacity="0.7"/>
<text x="390.0" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">B=20</text>
<text x="484.0" y="295" font-family="monospace" font-size="10" fill="#64748b">Free = 50</text>
<text x="165.0" y="332" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626" font-weight="bold">TOO SMALL</text>
<text x="615.0" y="332" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626" font-weight="bold">CANNOT USE</text>
<text x="30" y="370" font-family="sans-serif" font-size="16" fill="#16a34a" font-weight="bold">Block-Based Allocation (vLLM) — Zero External Fragmentation</text>
<text x="30" y="392" font-family="monospace" font-size="11" fill="#64748b">Same scenario, block_size=16 tokens. A=30→2 blocks, B=20→2 blocks, C=50→4 blocks.</text>
<rect x="30" y="408" width="66" height="36" rx="3" fill="#3b82f6" opacity="0.7"/>
<text x="63" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">A</text>
<text x="63" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk0</text>
<rect x="102" y="408" width="66" height="36" rx="3" fill="#22c55e" opacity="0.7"/>
<text x="135" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">A</text>
<text x="135" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk1</text>
<text x="135" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">最后一个</text>
<rect x="174" y="408" width="66" height="36" rx="3" fill="#3b82f6" opacity="0.7"/>
<text x="207" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">B</text>
<text x="207" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk2</text>
<rect x="246" y="408" width="66" height="36" rx="3" fill="#22c55e" opacity="0.7"/>
<text x="279" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">B</text>
<text x="279" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk3</text>
<text x="279" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">最后一个</text>
<rect x="318" y="408" width="66" height="36" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="351" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk4</text>
<text x="351" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">free</text>
<rect x="390" y="408" width="66" height="36" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="423" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk5</text>
<text x="423" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">free</text>
<rect x="462" y="408" width="66" height="36" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="495" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk6</text>
<text x="495" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">free</text>
<rect x="534" y="408" width="66" height="36" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="567" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk7</text>
<text x="567" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">free</text>
<rect x="606" y="408" width="66" height="36" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="639" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk8</text>
<text x="639" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">free</text>
<rect x="678" y="408" width="66" height="36" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="711" y="457" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">blk9</text>
<text x="711" y="402" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">free</text>
<rect x="30" y="484" width="900" height="48" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="480" y="502" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#166534" font-weight="bold">Internal fragmentation only: each block can waste ≤ (block_size-1) tokens</text>
<text x="480" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">For block_size=16: max waste = 15 tokens/request. For 4096 tokens: ≤ 0.37% — negligible!</text>
</svg>