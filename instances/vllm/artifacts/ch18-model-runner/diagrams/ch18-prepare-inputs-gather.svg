<text x="60" y="362" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#15803d">query_pos          = [0,1, 0,1,2,3,4, 0,1,2]</text>
<text x="60" y="390" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#b45309">positions = num_computed[req_indices] + query_pos</text>
<text x="70" y="414" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#b45309">= [4,5, 1,2,3,4,5, 6,7,8]</text>
<text x="60" y="448" text-anchor="start" font-family="monospace" font-size="15" font-weight="bold" fill="#7c2d12">token_indices = positions + req_indices · M</text>
<text x="70" y="472" text-anchor="start" font-family="sans-serif" font-size="13.5" font-weight="normal" fill="#475569">(二维坐标 (r,p) → 一维扁平偏移 r·M + p)</text>
