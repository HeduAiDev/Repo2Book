<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700">
<defs>
<marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker>
<marker id="arr2" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
</defs>
<rect width="1120" height="700" fill="white"/>
<text x="40" y="45" text-anchor="start" font-family="sans-serif" font-size="17" font-weight="bold" fill="#0f172a">block_table[req] —— 逻辑块号 → 物理块号</text>
<text x="68" y="100" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="normal" fill="#64748b">CPU</text>
<rect x="80" y="70" width="110" height="50" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="135" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#5b21b6">逻辑块0</text>
<text x="135" y="110" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#4c1d95">→ phys 7</text>
<rect x="190" y="70" width="110" height="50" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="245" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#5b21b6">逻辑块1</text>
<text x="245" y="110" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#4c1d95">→ phys 3</text>
<rect x="300" y="70" width="110" height="50" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="355" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#5b21b6">逻辑块2</text>
<text x="355" y="110" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#4c1d95">→ phys 9</text>
<text x="68" y="190" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="normal" fill="#64748b">GPU</text>
<rect x="80" y="160" width="110" height="50" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
<text x="135" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#5b21b6">逻辑块0</text>
<text x="135" y="200" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#4c1d95">→ phys 7</text>
<rect x="190" y="160" width="110" height="50" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
<text x="245" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#5b21b6">逻辑块1</text>
<text x="245" y="200" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#4c1d95">→ phys 3</text>
<rect x="300" y="160" width="110" height="50" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
<text x="355" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#5b21b6">逻辑块2</text>
<text x="355" y="200" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#4c1d95">→ phys 9</text>
<path d="M 440 95 L 440 185" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr2)"/>
<text x="452" y="145" text-anchor="start" font-family="sans-serif" font-size="13" font-weight="normal" fill="#475569">commit_block_table</text>
<text x="452" y="163" text-anchor="start" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#94a3b8">CPU→GPU 拷贝</text>
<text x="40" y="270" text-anchor="start" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7c2d12">映射一例 (block_size = 16, pos = 33)</text>
<text x="70" y="298" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#334155">block_index = pos // block_size = 33 // 16 = 2</text>
<text x="70" y="324" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#334155">block_numbers = block_table[req, 2] = 9</text>
<text x="70" y="350" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#334155">block_offset  = pos % block_size = 33 % 16 = 1</text>
<text x="70" y="376" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="normal" fill="#7c2d12">slot_id = block_numbers · block_size + offset = 9·16 + 1 = 145</text>
<text x="40" y="420" text-anchor="start" font-family="monospace" font-size="14.5" font-weight="bold" fill="#be123c">非 CP 公式：  slot = block_table[req, pos // bs] · bs + pos % bs</text>
<text x="40" y="472" text-anchor="start" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">一行 token 的位置 → slot_mapping（尾部 PAD_SLOT_ID 供 CUDA graph 固定形状）</text>
