<text x="70" y="624" text-anchor="start" font-family="sans-serif" font-size="13" font-weight="normal" fill="#475569">slot_mapping[t] 是第 t 个 token 的 KV 物理槽位；前向就照它把 K、V 写进 paged cache。</text>
