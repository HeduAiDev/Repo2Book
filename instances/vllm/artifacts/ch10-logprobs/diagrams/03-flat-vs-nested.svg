<text x="540" y="418" font-family="sans-serif" font-size="12" text-anchor="start" font-weight="bold" fill="#15803d">位置 i 的候选 = token_ids[start_indices[i] : end_indices[i]]</text>
<text x="540" y="440" font-family="sans-serif" font-size="11.5" text-anchor="start" font-weight="normal" fill="#166534">__getitem__(i) 现造 {token_id: Logprob} dict，向后兼容 list[dict] 接口</text>
<text x="540" y="462" font-family="sans-serif" font-size="11.5" text-anchor="start" font-weight="normal" fill="#166534">→ 不论序列多长、K 多大，常驻对象数恒为 6，GC 扫描成本不随规模增长</text>
<text x="490.0" y="534" font-family="sans-serif" font-size="12.5" text-anchor="middle" font-weight="normal" fill="#475569">GC 压力：nested 随 L×K 线性增长　｜　flat 恒定。访问单位置：nested O(1) 取 dict，flat O(K) 现造 dict。</text>
