<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470">
<rect width="940" height="470" fill="white"/>
<text x="470.0" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">_correct_decoded_token：上下文增长 → 拼出完整字符 → 剥干净前缀</text>
<text x="470.0" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#475569">例：完成 token = 0xAD，上下文 context_token_ids = [X(0x58, 干净), 0xE4, 0xB8]　目标字符「中」= E4 B8 AD</text>
<rect x="20" y="75" width="840" height="34" fill="#1e293b"/>
<text x="55.0" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">num_ctx</text>
<text x="177.5" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">context (取末 num_ctx 个)</text>
<text x="352.5" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">decode(context+[0xAD])</text>
<text x="475.0" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">结尾 �?</text>
<text x="575.0" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">回溯 clean_end</text>
<text x="695.0" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">clean_prefix</text>
<text x="805.0" y="97" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">返回值</text>
<rect x="20" y="109" width="840" height="64" fill="#fee2e2" stroke="#cbd5e1" stroke-width="1"/>
<text x="55.0" y="146.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">1</text>
<text x="177.5" y="146.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">[0xB8]</text>
<text x="352.5" y="146.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">decode([B8, AD])</text>
<text x="475.0" y="146.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">是 �</text>
<text x="575.0" y="146.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">—（continue）</text>
<text x="695.0" y="146.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">—</text>
<text x="805.0" y="146.0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#b91c1c">继续增大 ctx</text>
<rect x="20" y="173" width="840" height="64" fill="#dcfce7" stroke="#cbd5e1" stroke-width="1"/>
<text x="55.0" y="210.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">2</text>
<text x="177.5" y="210.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">[0xE4, 0xB8]</text>
<text x="352.5" y="210.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">decode([E4, B8, AD])</text>
<text x="475.0" y="210.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">否 → 「中」</text>
<text x="575.0" y="210.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">E4、B8 单解皆 � → clean_end=0</text>
<text x="695.0" y="210.0" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">'' 空串</text>
<text x="805.0" y="210.0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">「中」</text>
<line x1="90" y1="75" x2="90" y2="237" stroke="#cbd5e1" stroke-width="1"/>
<line x1="265" y1="75" x2="265" y2="237" stroke="#cbd5e1" stroke-width="1"/>
<line x1="440" y1="75" x2="440" y2="237" stroke="#cbd5e1" stroke-width="1"/>
<line x1="510" y1="75" x2="510" y2="237" stroke="#cbd5e1" stroke-width="1"/>
<line x1="640" y1="75" x2="640" y2="237" stroke="#cbd5e1" stroke-width="1"/>
<line x1="750" y1="75" x2="750" y2="237" stroke="#cbd5e1" stroke-width="1"/>
<text x="20" y="267" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">归属结论</text>
<text x="28" y="293" font-family="sans-serif" font-size="12.5" fill="#334155">· 前两个字节 token（E4、B8）单独解码 = U+FFFD，当时各自记为空串 ''。</text>
<text x="28" y="315" font-family="sans-serif" font-size="12.5" fill="#334155">· 完成 token（AD）凭增长的上下文拼出「中」，剥掉干净前缀后，整个「中」归属它一个。</text>
<text x="28" y="337" font-family="sans-serif" font-size="12.5" fill="#334155">· max_ctx = min(len(context), 4)：UTF-8 单字符至多 4 字节，4 个上下文 token 必能拼全。</text>
<text x="28" y="359" font-family="sans-serif" font-size="12.5" fill="#334155">· 若到 4 个上下文仍以 � 结尾，说明此处字节序列确实不完整 → 返回 ''，留给后续完成 token 补出。</text>
</svg>