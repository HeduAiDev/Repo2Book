  <text x="30" y="68.15" text-anchor="start" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="30" dy="0">Follow one Q token through 3 KV blocks. Initial state: m=-inf, l=0, O_acc=0</tspan></text>
