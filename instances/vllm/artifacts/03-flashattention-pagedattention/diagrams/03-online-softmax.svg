  <text x="30" y="454.8" text-anchor="start" font-size="13" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="30" dy="0">Key insight: correction only matters when max CHANGES. In iter 2, max jumped from 3→4, so old O_acc must be scaled down.</tspan><tspan x="30" dy="16.25">In iter 3, max stayed at 4, so correction=1.0 — zero overhead. Early iters find true max; later iters are cheap.</tspan></text>
