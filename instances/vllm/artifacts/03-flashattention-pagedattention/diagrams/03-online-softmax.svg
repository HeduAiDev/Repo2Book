  <text x="390" y="347.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="390" dy="0">0.368×old + P₁ @ V₁</tspan></text>
