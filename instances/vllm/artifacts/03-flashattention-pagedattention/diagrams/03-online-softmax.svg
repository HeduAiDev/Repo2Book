  <text x="390" y="147.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="390" dy="0">S₁ = [1.5, 4.0, 2.0, 1.0]</tspan></text>
