<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1000" height="540" fill="white"/>
<text x="40" y="40" text-anchor="start" font-size="20" font-weight="bold" fill="#0f172a">remove_skipped_blocks —— 滑窗外块回收（append-only，下标不变）</text>
<text x="40" y="68" text-anchor="start" font-size="14" font-weight="normal" fill="#64748b">sliding_window = 8，block_size = 4，num_computed = 11</text>
<text x="40" y="90" text-anchor="start" font-size="13.5" font-weight="normal" fill="#475569">get_num_skipped_tokens(11) = max(0, 11 − 8 + 1) = 4 → num_skipped_blocks = 4 // 4 = 1</text>
<text x="60" y="150" text-anchor="start" font-size="16" font-weight="bold" fill="#0f172a">前　req_to_blocks</text>
<rect x="60" y="170" width="150" height="70" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
<text x="135.0" y="201.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">B0</text>
<text x="135.0" y="223.0" text-anchor="middle" font-size="12" fill="#64748b">token 0~3</text>
<text x="135.0" y="158" text-anchor="middle" font-size="12" font-weight="normal" fill="#94a3b8">下标 0</text>
<rect x="226" y="170" width="150" height="70" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
<text x="301.0" y="201.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">B1</text>
<text x="301.0" y="223.0" text-anchor="middle" font-size="12" fill="#64748b">token 4~7</text>
<text x="301.0" y="158" text-anchor="middle" font-size="12" font-weight="normal" fill="#94a3b8">下标 1</text>
<rect x="392" y="170" width="150" height="70" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
<text x="467.0" y="201.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">B2</text>
<text x="467.0" y="223.0" text-anchor="middle" font-size="12" fill="#64748b">token 8~11</text>
<text x="467.0" y="158" text-anchor="middle" font-size="12" font-weight="normal" fill="#94a3b8">下标 2</text>
<text x="60" y="270" text-anchor="start" font-size="13" font-weight="normal" fill="#b91c1c">B0 落在滑窗之外（逆序扫描第一个待回收块）</text>
<line x1="135.0" y1="290" x2="135.0" y2="335" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="153.0" y="320" text-anchor="start" font-size="13.5" font-weight="bold" fill="#475569">B0 换成 null_block，真实显存归还 free queue</text>
<text x="60" y="340" text-anchor="start" font-size="16" font-weight="bold" fill="#0f172a">后　req_to_blocks</text>
<rect x="60" y="360" width="150" height="70" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
<text x="135.0" y="391.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">NULL</text>
<text x="135.0" y="413.0" text-anchor="middle" font-size="12" fill="#64748b">占位 / 不缓存</text>
<text x="135.0" y="356" text-anchor="middle" font-size="12" font-weight="normal" fill="#94a3b8">下标 0</text>
<rect x="226" y="360" width="150" height="70" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
<text x="301.0" y="391.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">B1</text>
<text x="301.0" y="413.0" text-anchor="middle" font-size="12" fill="#64748b">token 4~7</text>
<text x="301.0" y="356" text-anchor="middle" font-size="12" font-weight="normal" fill="#94a3b8">下标 1</text>
<rect x="392" y="360" width="150" height="70" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
<text x="467.0" y="391.0" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">B2</text>
<text x="467.0" y="413.0" text-anchor="middle" font-size="12" fill="#64748b">token 8~11</text>
<text x="467.0" y="356" text-anchor="middle" font-size="12" font-weight="normal" fill="#94a3b8">下标 2</text>
<text x="60" y="466" text-anchor="start" font-size="13.5" font-weight="normal" fill="#334155">• 下标 0 仍占位 → block table 是 append-only，逻辑偏移不乱</text>
<text x="60" y="490" text-anchor="start" font-size="13.5" font-weight="normal" fill="#334155">• B0 的真实块进 free queue，可被别的请求取用 → 真显存被释放</text>
<text x="60" y="514" text-anchor="start" font-size="13.5" font-weight="normal" fill="#334155">• 逆序扫描，遇已是 null 的块立即早停 → 幂等，重复调用无副作用</text>
</svg>
