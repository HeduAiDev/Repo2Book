<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1120" height="600" fill="white"/>
<text x="40" y="40" text-anchor="start" font-size="21" font-weight="bold" fill="#0f172a">get_kv_cache_coordinator —— 构造期一次性解析拓扑差异</text>
<rect x="430" y="70" width="260" height="56" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="560.0" y="103.5" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">get_kv_cache_coordinator(...)</text>
<rect x="40" y="220" width="280" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="180.0" y="252.75" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f172a">KVCacheCoordinatorNoPrefixCache</text>
<line x1="560.0" y1="126" x2="180.0" y2="216" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="320.0" y="160.0" width="100" height="22" rx="4" fill="white" stroke="#cbd5e1"/>
<text x="370.0" y="176.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#b45309">!enable_caching</text>
<rect x="40" y="292" width="280" height="84" rx="8" fill="white" stroke="#ef4444" stroke-width="1.5"/>
<text x="54" y="316" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 关前缀缓存的退化协调器</text>
<text x="54" y="338" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 支持任意组数（含 0 组）</text>
<text x="54" y="360" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 命中恒为 0</text>
<rect x="420" y="220" width="280" height="56" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
<text x="560.0" y="252.75" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f172a">UnitaryKVCacheCoordinator</text>
<line x1="560.0" y1="126" x2="560.0" y2="216" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="510.0" y="160.0" width="100" height="22" rx="4" fill="white" stroke="#cbd5e1"/>
<text x="560.0" y="176.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#b45309">组数 == 1</text>
<rect x="420" y="292" width="280" height="84" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
<text x="434" y="316" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 单一注意力类型（最常见）</text>
<text x="434" y="338" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• find 直接委托唯一 manager</text>
<text x="434" y="360" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 命中长度 = 命中块数 × block_size</text>
<rect x="800" y="220" width="280" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
<text x="940.0" y="252.75" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0f172a">HybridKVCacheCoordinator</text>
<line x1="560.0" y1="126" x2="940.0" y2="216" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="700.0" y="160.0" width="100" height="22" rx="4" fill="white" stroke="#cbd5e1"/>
<text x="750.0" y="176.0" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#b45309">组数 &gt; 1</text>
<rect x="800" y="292" width="280" height="84" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="814" y="316" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 混合注意力（full + SWA + ...）</text>
<text x="814" y="338" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• verify_and_split 按 spec 分桶</text>
<text x="814" y="360" text-anchor="start" font-size="12.5" font-weight="normal" fill="#334155">• 不动点迭代求一致命中长度</text>
<text x="560.0" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">single_type_managers 拓扑</text>
<rect x="490" y="426" width="140" height="44" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="560.0" y="452.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">manager[0]</text>
<text x="560.0" y="500" text-anchor="middle" font-size="12" font-weight="normal" fill="#16a34a">1 个 manager</text>
<text x="940.0" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">single_type_managers 按 spec 分桶</text>
<rect x="810" y="426" width="120" height="44" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
<text x="870.0" y="444.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">full 桶</text>
<text x="870.0" y="460.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">（排首）</text>
<rect x="950" y="426" width="120" height="44" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
<text x="1010.0" y="452.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#0f172a">SWA 桶</text>
<text x="940.0" y="502" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e40af">命中长度对齐到 lcm_block_size</text>
<text x="940.0" y="520" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#64748b">（各 block_size 的最小公倍数）</text>
</svg>
