<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="1180" height="620" fill="white"/>
<text x="40" y="40" text-anchor="start" font-size="22" font-weight="bold" fill="#0f172a">KVCacheManager.allocate_slots —— 三阶段分配流水线</text>
<text x="40" y="96" text-anchor="start" font-size="14" font-weight="bold" fill="#64748b">块布局</text>
<rect x="90" y="72" width="150" height="46" rx="8" fill="#dbeafe" stroke="#94a3b8" stroke-width="1.5"/>
<text x="165.0" y="91.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">comp</text>
<text x="165.0" y="108.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">已算</text>
<rect x="240" y="72" width="150" height="46" rx="8" fill="#bfdbfe" stroke="#94a3b8" stroke-width="1.5"/>
<text x="315.0" y="91.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">new_comp</text>
<text x="315.0" y="108.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">前缀命中</text>
<rect x="390" y="72" width="150" height="46" rx="8" fill="#bae6fd" stroke="#94a3b8" stroke-width="1.5"/>
<text x="465.0" y="91.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">ext_comp</text>
<text x="465.0" y="108.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">外部命中</text>
<rect x="540" y="72" width="160" height="46" rx="8" fill="#fde68a" stroke="#94a3b8" stroke-width="1.5"/>
<text x="620.0" y="91.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">new</text>
<text x="620.0" y="108.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">本次新算</text>
<rect x="700" y="72" width="150" height="46" rx="8" fill="#fecaca" stroke="#94a3b8" stroke-width="1.5"/>
<text x="775.0" y="91.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">lookahead</text>
<text x="775.0" y="108.0" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">投机草稿</text>
<text x="390" y="180" text-anchor="start" font-size="12" font-weight="normal" fill="#2563eb">↑ 已缓存（vLLM 或 connector）</text>
<text x="540" y="180" text-anchor="start" font-size="12" font-weight="normal" fill="#b45309">↑ 待计算（new + lookahead）</text>
<rect x="40" y="215" width="200" height="130" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="140.0" y="243.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">输入参数</text>
<text x="140.0" y="259.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">num_new_tokens</text>
<text x="140.0" y="276.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">num_new_computed_tokens</text>
<text x="140.0" y="292.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">new_computed_blocks</text>
<text x="140.0" y="309.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">num_external_computed_tokens</text>
<text x="140.0" y="325.5" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">num_lookahead_tokens</text>
<rect x="285" y="200" width="270" height="165" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
<text x="420.0" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#065f46">阶段一　释放 + 预算检查</text>
<text x="420.0" y="252" text-anchor="middle" font-size="13" fill="#0f172a">remove_skipped_blocks</text>
<text x="420.0" y="271" text-anchor="middle" font-size="13" fill="#0f172a">窗外块换 null → 归还 free queue</text>
<text x="420.0" y="309" text-anchor="middle" font-size="13" fill="#0f172a">get_num_blocks_to_allocate</text>
<text x="420.0" y="328" text-anchor="middle" font-size="13" fill="#0f172a">需块 &gt; free → return None</text>
<rect x="325" y="395" width="190" height="40" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
<text x="420.0" y="419.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#b91c1c">return None（不足 → 触发抢占）</text>
<line x1="420.0" y1="365" x2="420.0" y2="395" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#ar)"/>
<rect x="573" y="200" width="270" height="165" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
<text x="708.0" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">阶段二　挂命中块</text>
<text x="708.0" y="252" text-anchor="middle" font-size="13" fill="#0f172a">touch 命中块 (ref_cnt+1)</text>
<text x="708.0" y="271" text-anchor="middle" font-size="13" fill="#0f172a">null_block 填 skipped 段</text>
<text x="708.0" y="290" text-anchor="middle" font-size="13" fill="#0f172a">external → get_new_blocks</text>
<text x="708.0" y="328" text-anchor="middle" font-size="13" fill="#0f172a">（挂进 req_to_blocks）</text>
<rect x="861" y="200" width="270" height="165" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
<text x="996.0" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#854d0e">阶段三　新建块</text>
<text x="996.0" y="252" text-anchor="middle" font-size="13" fill="#0f172a">allocate_new_blocks</text>
<text x="996.0" y="271" text-anchor="middle" font-size="13" fill="#0f172a">新建 new + lookahead 槽位</text>
<text x="996.0" y="309" text-anchor="middle" font-size="13" fill="#0f172a">get_new_blocks 取真实块</text>
<text x="996.0" y="328" text-anchor="middle" font-size="13" fill="#0f172a">（含投机草稿预留）</text>
<line x1="240" y1="280" x2="281" y2="282.5" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="555" y1="282.5" x2="569" y2="282.5" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="843" y1="282.5" x2="857" y2="282.5" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="821" y="470" width="310" height="100" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="976.0" y="496" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">收尾　缓存满块</text>
<text x="976.0" y="518.0" text-anchor="middle" font-size="12.5" fill="#0f172a">num_tokens_to_cache =</text>
<text x="976.0" y="536.5" text-anchor="middle" font-size="12.5" fill="#0f172a">min(total_computed+new, request.num_tokens)</text>
<text x="976.0" y="555.0" text-anchor="middle" font-size="12.5" fill="#0f172a">→ cache_full_blocks 写哈希入表</text>
<line x1="996.0" y1="365" x2="976.0" y2="466" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="821" y="588" text-anchor="start" font-size="12" font-weight="normal" fill="#6d28d9">未定稿草稿 token 被 min() 封掉，不污染前缀缓存</text>
</svg>
