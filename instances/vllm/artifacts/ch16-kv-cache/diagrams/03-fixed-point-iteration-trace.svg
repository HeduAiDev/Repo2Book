<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="sans-serif">
<rect width="1000" height="560" fill="white"/>
<text x="40" y="40" text-anchor="start" font-size="20" font-weight="bold" fill="#0f172a">Hybrid 不动点迭代：每类型对候选命中长度「接受或缩短」</text>
<text x="40" y="66" text-anchor="start" font-size="14" font-weight="normal" fill="#64748b">示例：max_cache_hit_length = 512，block_size = 128，full + sliding window 两组</text>
<rect x="60" y="100" width="150" height="50" fill="#1e293b" stroke="#0f172a" stroke-width="1.2"/>
<text x="135.0" y="130.25" text-anchor="middle" font-size="14.5" font-weight="bold" fill="white">迭代轮次</text>
<rect x="210" y="100" width="270" height="50" fill="#1e293b" stroke="#0f172a" stroke-width="1.2"/>
<text x="345.0" y="130.25" text-anchor="middle" font-size="14.5" font-weight="bold" fill="white">full attn（排首）</text>
<rect x="480" y="100" width="270" height="50" fill="#1e293b" stroke="#0f172a" stroke-width="1.2"/>
<text x="615.0" y="130.25" text-anchor="middle" font-size="14.5" font-weight="bold" fill="white">sliding window</text>
<rect x="750" y="100" width="200" height="50" fill="#1e293b" stroke="#0f172a" stroke-width="1.2"/>
<text x="850.0" y="130.25" text-anchor="middle" font-size="14.5" font-weight="bold" fill="white">curr_hit_length</text>
<rect x="60" y="150" width="150" height="80" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
<text x="135.0" y="195.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">第 1 轮</text>
<rect x="210" y="150" width="270" height="80" fill="#eff6ff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="345.0" y="194.75" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#0f172a">首次查表 → 接受 512</text>
<rect x="480" y="150" width="270" height="80" fill="#fef2f2" stroke="#94a3b8" stroke-width="1.2"/>
<text x="615.0" y="194.75" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#0f172a">窗内连续 → 缩短到 384</text>
<rect x="750" y="150" width="200" height="80" fill="#fef9c3" stroke="#94a3b8" stroke-width="1.2"/>
<text x="850.0" y="194.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">512 → 384（变了，重启）</text>
<rect x="60" y="230" width="150" height="80" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
<text x="135.0" y="275.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">第 2 轮</text>
<rect x="210" y="230" width="270" height="80" fill="#eff6ff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="345.0" y="274.75" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#0f172a">下闭包：截到 384</text>
<rect x="480" y="230" width="270" height="80" fill="#fef2f2" stroke="#94a3b8" stroke-width="1.2"/>
<text x="615.0" y="274.75" text-anchor="middle" font-size="13.5" font-weight="normal" fill="#0f172a">在 384 处接受 384</text>
<rect x="750" y="230" width="200" height="80" fill="#dcfce7" stroke="#94a3b8" stroke-width="1.2"/>
<text x="850.0" y="274.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">384 ≥ 384（收敛退出）</text>
<rect x="60" y="346" width="890" height="120" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="80" y="378" text-anchor="start" font-size="15" font-weight="bold" fill="#0f172a">为什么必收敛：</text>
<text x="80" y="404" text-anchor="start" font-size="13.5" font-weight="normal" fill="#334155">• 每类型把候选长度 L 映射为 L′ ≤ L（接受则 L′ = L，缩短则 L′ &lt; L）→ 单调不增</text>
<text x="80" y="428" text-anchor="start" font-size="13.5" font-weight="normal" fill="#334155">• L 取值落在 {0, lcm, 2·lcm, …} 的有限集合，下界为 0 → 至多 L / lcm 轮触底</text>
<text x="80" y="452" text-anchor="start" font-size="13.5" font-weight="normal" fill="#334155">• simple hybrid（1 full + 1 other，full 排首）：full 给上界后 other 至多缩一次 → 一轮足够</text>
</svg>
