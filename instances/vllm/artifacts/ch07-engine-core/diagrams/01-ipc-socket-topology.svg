<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="sans-serif">
<defs>
<marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker>
<marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker>
<marker id="ao" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/></marker>
<marker id="am" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#9333ea"/></marker>
</defs>
<rect width="1000" height="640" fill="white"/>
<rect x="30" y="70" width="380" height="480" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
<text x="220" y="56" font-size="17" text-anchor="middle" fill="#1d4ed8" font-weight="bold">前端进程  (AsyncLLM / LLM)</text>
<rect x="560" y="70" width="410" height="480" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
<text x="765" y="56" font-size="17" text-anchor="middle" fill="#15803d" font-weight="bold">EngineCoreProc 进程</text>
<rect x="70" y="120" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="220" y="150" font-size="15" text-anchor="middle" fill="#1e293b" font-weight="bold">input_socket = ROUTER</text>
<text x="220" y="172" font-size="13" text-anchor="middle" fill="#475569" font-weight="normal">bind  tcp://127.0.0.1:*</text>
<rect x="70" y="420" width="300" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="220" y="450" font-size="15" text-anchor="middle" fill="#1e293b" font-weight="bold">output_socket = PULL</text>
<text x="220" y="472" font-size="13" text-anchor="middle" fill="#475569" font-weight="normal">MsgpackDecoder.decode</text>
<rect x="600" y="120" width="330" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="765" y="147" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">DEALER  (connect, identity)</text>
<text x="765" y="167" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">process_input_sockets 线程</text>
<rect x="600" y="250" width="150" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="675" y="274" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="bold">input_queue</text>
<text x="675" y="294" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">(queue.Queue)</text>
<rect x="780" y="250" width="150" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="855" y="274" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="bold">output_queue</text>
<text x="855" y="294" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">(queue.Queue)</text>
<rect x="640" y="350" width="250" height="56" rx="8" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
<text x="765" y="375" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">run_busy_loop  (主线程)</text>
<text x="765" y="395" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">消费 input → step → 产出 output</text>
<rect x="600" y="430" width="330" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="765" y="457" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">PUSH</text>
<text x="765" y="477" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">process_output_sockets 线程</text>
<line x1="370" y1="145" x2="600" y2="148" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar)"/>
<text x="485" y="132" font-size="13" text-anchor="middle" fill="#2563eb" font-weight="bold">① 请求  type+帧</text>
<line x1="600" y1="168" x2="372" y2="178" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="7 4" marker-end="url(#ag)"/>
<text x="486" y="200" font-size="12" text-anchor="middle" fill="#16a34a" font-weight="bold">⓪ ready 帧（DEALER 必先发）</text>
<line x1="675" y1="184" x2="675" y2="250" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
<line x1="690" y1="306" x2="720" y2="350" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
<line x1="820" y1="350" x2="850" y2="306" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
<line x1="855" y1="306" x2="855" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
<line x1="600" y1="462" x2="372" y2="455" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ao)"/>
<text x="486" y="432" font-size="13" text-anchor="middle" fill="#64748b" font-weight="bold">③ 输出  EngineCoreOutputs</text>
<rect x="120" y="560" width="200" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="220" y="584" font-size="13" text-anchor="middle" fill="#7e22ce" font-weight="bold">TensorIpcSender</text>
<text x="220" y="604" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">share_memory_()</text>
<rect x="660" y="560" width="220" height="56" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="770" y="584" font-size="13" text-anchor="middle" fill="#7e22ce" font-weight="bold">TensorIpcReceiver</text>
<text x="770" y="604" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">drain-and-buffer</text>
<line x1="320" y1="588" x2="660" y2="588" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="2 3" marker-end="url(#am)"/>
<text x="490" y="578" font-size="12" text-anchor="middle" fill="#7e22ce" font-weight="bold">torch.mp.Queue 共享内存（OOB 大张量旁路，不进 ZMQ 帧）</text>
</svg>