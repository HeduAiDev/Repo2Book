<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="sans-serif">
<defs>
<marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
</defs>
<rect width="940" height="560" fill="white"/>
<rect x="50" y="30" width="220" height="40" rx="8" fill="white" stroke="#1d4ed8" stroke-width="2"/>
<text x="160" y="56" font-size="14" text-anchor="middle" fill="#1d4ed8" font-weight="bold">client 调用方</text>
<line x1="160" y1="70" x2="160" y2="520" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="4 4"/>
<rect x="370" y="30" width="220" height="40" rx="8" fill="white" stroke="#94a3b8" stroke-width="2"/>
<text x="480" y="56" font-size="14" text-anchor="middle" fill="#94a3b8" font-weight="bold">ZMQ ROUTER↔DEALER</text>
<line x1="480" y1="70" x2="480" y2="520" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
<rect x="680" y="30" width="220" height="40" rx="8" fill="white" stroke="#15803d" stroke-width="2"/>
<text x="790" y="56" font-size="14" text-anchor="middle" fill="#15803d" font-weight="bold">engine busy loop</text>
<line x1="790" y1="70" x2="790" y2="520" stroke="#15803d" stroke-width="1.5" stroke-dasharray="4 4"/>
<rect x="40.0" y="90" width="240" height="82" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text x="160" y="112" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">call_id = uuid1().int &gt;&gt; 64</text>
<text x="160" y="134" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">future = Future()</text>
<text x="160" y="156" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">utility_results[call_id] = future</text>
<line x1="160" y1="200" x2="790" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="475.0" y="192" font-size="12" text-anchor="middle" fill="#1e293b" font-weight="bold">① send UTILITY 帧</text>
<text x="475.0" y="216" font-size="11" text-anchor="middle" fill="#64748b" font-weight="normal">(client_index, call_id, method, args)</text>
<rect x="670.0" y="230" width="240" height="104" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
<text x="790" y="252" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">_handle_client_request 分派 UTILITY</text>
<text x="790" y="274" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">method = getattr(self, method_name)</text>
<text x="790" y="296" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">result = method(*conv_args)</text>
<text x="790" y="318" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">output = UtilityOutput(call_id, result)</text>
<line x1="790" y1="360" x2="160" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="475.0" y="352" font-size="12" text-anchor="middle" fill="#1e293b" font-weight="bold">② 回发 UtilityOutput</text>
<text x="475.0" y="376" font-size="11" text-anchor="middle" fill="#64748b" font-weight="normal">(call_id, result) 经 PUSH→PULL</text>
<rect x="40.0" y="390" width="240" height="82" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="160" y="412" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">_process_utility_output(output)</text>
<text x="160" y="434" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">future = utility_results.pop(call_id)</text>
<text x="160" y="456" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">future.set_result(...)  → 唤醒 await</text>
<text x="470" y="500" font-size="12.5" text-anchor="middle" fill="#7e22ce" font-weight="bold">单向 ZMQ 流没有内建 request-response：靠唯一 call_id 把发出的 Future 与回来的输出配对（correlation-id 模式）</text>
</svg>