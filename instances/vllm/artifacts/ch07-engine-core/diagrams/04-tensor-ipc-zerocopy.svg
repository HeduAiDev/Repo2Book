<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="sans-serif">
<defs>
<marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#ca8a04"/></marker>
<marker id="ap" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#9333ea"/></marker>
</defs>
<rect width="980" height="560" fill="white"/>
<rect x="30" y="40" width="920" height="200" rx="8" fill="#fffbeb" stroke="#ca8a04" stroke-width="2"/>
<text x="490" y="64" font-size="16" text-anchor="middle" fill="#92400e" font-weight="bold">路径 A：aux_buffers 多帧（默认）— 一次进程间拷贝</text>
<rect x="70" y="100" width="200" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="170" y="130" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">_encode_tensor</text>
<text x="170" y="152" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">append 到 aux_buffers</text>
<rect x="390" y="100" width="220" height="80" rx="8" fill="#fde68a" stroke="#ca8a04" stroke-width="2"/>
<text x="500" y="130" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">ZMQ 数据帧</text>
<text x="500" y="152" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">send_multipart(copy=False)</text>
<rect x="720" y="100" width="200" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="820" y="130" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">_decode_tensor</text>
<text x="820" y="152" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">aux_buffers[idx] 还原</text>
<line x1="270" y1="140" x2="390" y2="140" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#ag)"/>
<line x1="610" y1="140" x2="720" y2="140" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#ag)"/>
<text x="490" y="215" font-size="12" text-anchor="middle" fill="#92400e" font-weight="normal">张量字节流随 ZMQ 帧跨进程传输（内核拷贝一次），解码端 clone 进 PyTorch 内存</text>
<rect x="30" y="290" width="920" height="230" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
<text x="490" y="314" font-size="16" text-anchor="middle" fill="#7e22ce" font-weight="bold">路径 B：OOB 共享内存旁路（mm_tensor_ipc=='torch_shm'）— 零进程间拷贝</text>
<rect x="70" y="350" width="210" height="90" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="175" y="378" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="bold">_encode_tensor 见大张量</text>
<text x="175" y="400" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">TensorIpcSender.__call__</text>
<text x="175" y="420" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">share_memory_() + put</text>
<rect x="390" y="350" width="220" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="500" y="374" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="bold">msgpack 主帧</text>
<text x="500" y="396" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">{sender_id, message_id,</text>
<text x="500" y="414" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">tensor_id} 占位 dict</text>
<rect x="720" y="350" width="210" height="90" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="825" y="378" font-size="13" text-anchor="middle" fill="#1e293b" font-weight="bold">_decode_tensor 见 dict</text>
<text x="825" y="400" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">TensorIpcReceiver</text>
<text x="825" y="420" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">drain-and-buffer 取回</text>
<line x1="280" y1="395" x2="390" y2="395" stroke="#9333ea" stroke-width="2.5" marker-end="url(#ap)"/>
<line x1="610" y1="395" x2="720" y2="395" stroke="#9333ea" stroke-width="2.5" marker-end="url(#ap)"/>
<rect x="280" y="470" width="440" height="36" rx="8" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
<text x="500" y="493" font-size="12" text-anchor="middle" fill="#5b21b6" font-weight="bold">torch.mp.Queue 共享内存（张量本体走此通道，不进 ZMQ 帧）</text>
<path d="M175,440 L175,510 L825,510 L825,440" stroke="#9333ea" stroke-width="2" stroke-dasharray="3 3" fill="none" marker-end="url(#ap)"/>
</svg>