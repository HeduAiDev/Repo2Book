<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="sans-serif">
<rect width="980" height="520" fill="white"/>
<text x="40" y="60" font-size="16" text-anchor="start" fill="#1d4ed8" font-weight="bold">例一：带张量的 ADD 请求（aux_buffers 非空 → send_multipart(copy=False, track=True)）</text>
<rect x="40" y="90" width="150" height="78" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="115.0" y="122" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame0</text>
<text x="115.0" y="144" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">engine identity 2B LE</text>
<rect x="200" y="90" width="150" height="78" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="275.0" y="122" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame1</text>
<text x="275.0" y="144" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">type tag  b'\x00' (ADD)</text>
<rect x="360" y="90" width="220" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="470.0" y="122" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame2  bufs[0]</text>
<text x="470.0" y="144" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">msgpack 主结构帧</text>
<rect x="590" y="90" width="180" height="78" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="680.0" y="122" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame3</text>
<text x="680.0" y="144" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">aux_buffers[1] 张量 backing</text>
<rect x="780" y="90" width="140" height="78" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="850.0" y="122" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame4 …</text>
<text x="850.0" y="144" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">更多张量 buffer</text>
<text x="490" y="200" font-size="12" text-anchor="middle" fill="#92400e" font-weight="bold">↑ frame2 主帧里只存 backing buffer 的索引（int），张量本体在 frame3.. 零拷贝直发</text>
<text x="40" y="290" font-size="16" text-anchor="start" fill="#15803d" font-weight="bold">例二：无张量请求 / ABORT（len(msg) ≤ 3 → 直接 send_multipart(copy=False)，无需 track）</text>
<rect x="40" y="320" width="150" height="78" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="115.0" y="352" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame0</text>
<text x="115.0" y="374" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">engine identity 2B LE</text>
<rect x="200" y="320" width="150" height="78" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="275.0" y="352" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame1</text>
<text x="275.0" y="374" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">type tag  b'\x01' (ABORT)</text>
<rect x="360" y="320" width="260" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="490.0" y="352" font-size="14" text-anchor="middle" fill="#1e293b" font-weight="bold">frame2  bufs[0]</text>
<text x="490.0" y="374" font-size="12" text-anchor="middle" fill="#475569" font-weight="normal">msgpack 主帧（全部内联）</text>
<text x="40" y="440" font-size="13" text-anchor="start" fill="#475569" font-weight="normal">engine 侧 process_input_sockets：type_frame, *data_frames = recv_multipart(copy=False)</text>
<text x="40" y="466" font-size="13" text-anchor="start" fill="#475569" font-weight="normal">→ EngineCoreRequestType(bytes(type_frame.buffer)) 一步还原类型 → 按类型选 decoder 解 data_frames</text>
</svg>