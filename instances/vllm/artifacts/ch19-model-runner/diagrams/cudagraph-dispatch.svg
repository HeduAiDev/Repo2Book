<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 620">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker><marker id="ab" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#059669"/></marker></defs>
<rect width="1160" height="620" fill="white"/>
<text x="580.0" y="34" font-family="sans-serif" font-size="18" fill="#0f172a" font-weight="bold" text-anchor="middle" >CudagraphDispatcher.dispatch：FULL → PIECEWISE → NONE 分级选择</text>
<rect x="400.0" y="60" width="360" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="580.0" y="90.0" font-family="sans-serif" font-size="13" fill="#334155" font-weight="normal" text-anchor="middle">输入：num_tokens / uniform_decode / has_lora</text>
<rect x="370.0" y="140" width="420" height="56" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
<text x="580.0" y="173.0" font-family="sans-serif" font-size="13" fill="#9a3412" font-weight="bold" text-anchor="middle">未初始化 / mode==NONE / num_tokens &gt; max_size ?</text>
<line x1="580.0" y1="110" x2="580.0" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="820.0" y="144" width="180" height="48" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="910.0" y="164.0" font-family="sans-serif" font-size="14" fill="#991b1b" font-weight="bold" text-anchor="middle">NONE (eager)</text>
<text x="910.0" y="182.0" font-family="sans-serif" font-size="10" fill="#b91c1c" font-weight="normal" text-anchor="middle">launch O(算子数)</text>
<line x1="790.0" y1="168" x2="820.0" y2="168" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="805.0" y="158" font-family="sans-serif" font-size="11" fill="#dc2626" font-weight="bold" text-anchor="middle" >是 → 回退</text>
<rect x="380.0" y="240" width="400" height="50" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="580.0" y="270.0" font-family="sans-serif" font-size="12" fill="#3730a3" font-weight="normal" text-anchor="middle">构造 BatchDescriptor(num_tokens 填充后, num_reqs, uniform)</text>
<line x1="580.0" y1="196" x2="580.0" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
<text x="592.0" y="222" font-family="sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="start" >否</text>
<rect x="380.0" y="330" width="400" height="54" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
<text x="580.0" y="362.0" font-family="sans-serif" font-size="13" fill="#6b21a8" font-weight="bold" text-anchor="middle">查 FULL keys（要求精确 num_reqs 命中）?</text>
<line x1="580.0" y1="290" x2="580.0" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="200.0" y="332" width="170" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="285.0" y="352.0" font-family="sans-serif" font-size="14" fill="#166534" font-weight="bold" text-anchor="middle">FULL</text>
<text x="285.0" y="370.0" font-family="sans-serif" font-size="10" fill="#15803d" font-weight="normal" text-anchor="middle">整图 replay · launch ~O(1)</text>
<line x1="380.0" y1="357" x2="370.0" y2="356" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="375.0" y="348" font-family="sans-serif" font-size="11" fill="#059669" font-weight="bold" text-anchor="middle" >命中</text>
<rect x="380.0" y="430" width="400" height="54" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
<text x="580.0" y="462.0" font-family="sans-serif" font-size="13" fill="#6b21a8" font-weight="bold" text-anchor="middle">查 PIECEWISE relaxed keys（num_reqs=None）?</text>
<line x1="580.0" y1="384" x2="580.0" y2="430" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
<text x="592.0" y="412" font-family="sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="start" >未命中</text>
<rect x="200.0" y="432" width="170" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="285.0" y="444.0" font-family="sans-serif" font-size="14" fill="#1e40af" font-weight="bold" text-anchor="middle">PIECEWISE</text>
<text x="285.0" y="462.0" font-family="sans-serif" font-size="9" fill="#1d4ed8" font-weight="normal" text-anchor="middle">算子段 replay·attn 动态</text>
<text x="285.0" y="480.0" font-family="sans-serif" font-size="9" fill="#1d4ed8" font-weight="normal" text-anchor="middle">launch O(段数)</text>
<line x1="380.0" y1="457" x2="370.0" y2="457" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
<text x="375.0" y="448" font-family="sans-serif" font-size="11" fill="#2563eb" font-weight="bold" text-anchor="middle" >命中</text>
<rect x="490.0" y="530" width="180" height="48" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="580.0" y="550.0" font-family="sans-serif" font-size="14" fill="#991b1b" font-weight="bold" text-anchor="middle">NONE (eager)</text>
<text x="580.0" y="568.0" font-family="sans-serif" font-size="10" fill="#b91c1c" font-weight="normal" text-anchor="middle">都未命中 → 回退</text>
<line x1="580.0" y1="484" x2="580.0" y2="530" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="592.0" y="512" font-family="sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="start" >未命中</text>
<text x="580.0" y="608" font-family="sans-serif" font-size="12" fill="#475569" font-weight="italic" text-anchor="middle" >顺序即 launch 开销升序：先试最省的 FULL，退而求其次 PIECEWISE，再不行 eager。</text>
</svg>