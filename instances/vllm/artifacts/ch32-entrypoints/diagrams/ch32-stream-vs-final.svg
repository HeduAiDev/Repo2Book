<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1030 504" font-family="sans-serif">
<rect width="1030" height="504" fill="white"/>
<rect x="20" y="20" width="180" height="50" fill="#334155"/>
<text x="110" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="white">维度</text>
<rect x="200" y="20" width="405" height="50" fill="#0e7490"/>
<text x="402" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="white">流式 stream=True (DELTA)</text>
<rect x="605" y="20" width="405" height="50" fill="#7c3aed"/>
<text x="808" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="white">非流式 stream=False (FINAL_ONLY)</text>
<rect x="20" y="70" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="98" font-size="13" font-weight="bold" fill="#0f172a">同源生成器</text>
<rect x="200" y="70" width="810" height="46" fill="#dcfce7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="605" y="98" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#14532d" font-family="monospace">engine_client.generate(...)  —  完全同一个 AsyncGenerator</text>
<rect x="20" y="116" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="144" font-size="13" font-weight="bold" fill="#0f172a">消费方式</text>
<rect x="200" y="116" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="144" font-size="12.5" fill="#1e293b" font-family="sans-serif">逐个 RequestOutput 立即 yield</text>
<rect x="605" y="116" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="144" font-size="12.5" fill="#1e293b" font-family="sans-serif">async for 取到末个 RequestOutput</text>
<rect x="20" y="162" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="190" font-size="13" font-weight="bold" fill="#0f172a">首块</text>
<rect x="200" y="162" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="190" font-size="12.5" fill="#1e293b" font-family="sans-serif">单独发只含 role 的空 delta</text>
<rect x="605" y="162" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="190" font-size="12.5" fill="#1e293b" font-family="sans-serif">无（一次成型）</text>
<rect x="20" y="208" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="236" font-size="13" font-weight="bold" fill="#0f172a">增量载体</text>
<rect x="200" y="208" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="236" font-size="12.5" fill="#1e293b" font-family="sans-serif">DeltaMessage（role / content / tool_calls）</text>
<rect x="605" y="208" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="236" font-size="12.5" fill="#1e293b" font-family="sans-serif">ChatMessage（完整 message）</text>
<rect x="20" y="254" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="282" font-size="13" font-weight="bold" fill="#0f172a">用量 usage</text>
<rect x="200" y="254" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="282" font-size="12.5" fill="#1e293b" font-family="sans-serif">可选：include_usage 时末尾单独一块</text>
<rect x="605" y="254" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="282" font-size="12.5" fill="#1e293b" font-family="sans-serif">response.usage 内嵌</text>
<rect x="20" y="300" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="328" font-size="13" font-weight="bold" fill="#0f172a">错误处理</text>
<rect x="200" y="300" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="328" font-size="12.5" fill="#1e293b" font-family="sans-serif">写成 error data 帧（200 已发，改不了状态码）</text>
<rect x="605" y="300" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="328" font-size="12.5" fill="#1e293b" font-family="monospace">ErrorResponse → 可设 4xx/5xx 状态码</text>
<rect x="20" y="346" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="374" font-size="13" font-weight="bold" fill="#0f172a">终止信号</text>
<rect x="200" y="346" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="374" font-size="12.5" fill="#1e293b" font-family="monospace">data: [DONE]\n\n 哨兵</text>
<rect x="605" y="346" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="374" font-size="12.5" fill="#1e293b" font-family="sans-serif">直接 return 整个 JSON</text>
<rect x="20" y="392" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="420" font-size="13" font-weight="bold" fill="#0f172a">FastAPI 出口</text>
<rect x="200" y="392" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="420" font-size="12.5" fill="#1e293b" font-family="monospace">StreamingResponse(text/event-stream)</text>
<rect x="605" y="392" width="405" height="46" fill="#eef2f7" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="420" font-size="12.5" fill="#1e293b" font-family="monospace">JSONResponse</text>
<rect x="20" y="438" width="180" height="46" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="32" y="466" font-size="13" font-weight="bold" fill="#0f172a">延迟特征</text>
<rect x="200" y="438" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="212" y="466" font-size="12.5" fill="#1e293b" font-family="sans-serif">TTFT 低，逐 token 推送</text>
<rect x="605" y="438" width="405" height="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
<text x="617" y="466" font-size="12.5" fill="#1e293b" font-family="sans-serif">一次性返回，聚合 usage/logprobs</text>
</svg>