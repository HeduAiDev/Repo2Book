<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 760" font-family="sans-serif">
<defs><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="arR" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs>
<rect width="940" height="760" fill="white"/>
<text x="30" y="34" font-size="18" font-weight="bold" fill="#0f172a">启动序（run_server）</text>
<rect x="60" y="52" width="820" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
<text x="76" y="73" font-size="15" font-weight="bold" fill="#0f172a" font-family="monospace">setup_server</text>
<text x="76" y="92" font-size="13" fill="#334155">先绑 socket + 装 SIGTERM handler（早于引擎，避端口竞争）</text>
<rect x="60" y="124" width="820" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="76" y="145" font-size="15" font-weight="bold" fill="#0f172a" font-family="monospace">build_async_engine_client</text>
<text x="76" y="164" font-size="13" fill="#334155">AsyncLLM.from_vllm_config 起异步引擎（ch04 三段式）</text>
<rect x="60" y="196" width="820" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.6"/>
<text x="76" y="217" font-size="15" font-weight="bold" fill="#0f172a" font-family="monospace">build_and_serve</text>
<text x="76" y="236" font-size="13" fill="#334155">get_supported_tasks → build_app → init_app_state</text>
<rect x="60" y="268" width="820" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.6"/>
<text x="76" y="289" font-size="15" font-weight="bold" fill="#0f172a" font-family="monospace">serve_http (launcher)</text>
<text x="76" y="308" font-size="13" fill="#334155">起 server_task + watchdog_task + handle_shutdown</text>
<rect x="60" y="340" width="820" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
<text x="76" y="361" font-size="15" font-weight="bold" fill="#0f172a" font-family="monospace">lifespan 启动期</text>
<text x="76" y="380" font-size="13" fill="#334155">拉起 _force_log 后台任务 + freeze_gc_heap</text>
<line x1="470.0" y1="102" x2="470.0" y2="124" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="470.0" y1="174" x2="470.0" y2="196" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="470.0" y1="246" x2="470.0" y2="268" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="470.0" y1="318" x2="470.0" y2="340" stroke="#475569" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="60" y="418" width="820" height="42" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.6" stroke-dasharray="6 4"/>
<text x="470.0" y="444" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">… await server_task：稳态服务请求 …</text>
<text x="30" y="498" font-size="18" font-weight="bold" fill="#b91c1c">两条关停路径</text>
<rect x="60" y="516" width="395" height="156" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.6"/>
<text x="76" y="542" font-size="14" font-weight="bold" fill="#b91c1c">A. 信号触发（SIGINT / SIGTERM）</text>
<text x="84" y="566" font-size="12.5" fill="#334155" font-family="monospace">signal_handler → shutdown_event.set()</text>
<text x="84" y="587" font-size="12.5" fill="#334155" font-family="monospace">handle_shutdown 醒来：</text>
<text x="84" y="608" font-size="12.5" fill="#334155" font-family="monospace">engine.shutdown(timeout)  (run_in_executor)</text>
<text x="84" y="629" font-size="12.5" fill="#334155" font-family="monospace">server.should_exit = True</text>
<text x="84" y="650" font-size="12.5" fill="#334155" font-family="sans-serif">cancel server_task / watchdog_task</text>
<rect x="485" y="516" width="395" height="156" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
<text x="501" y="542" font-size="14" font-weight="bold" fill="#ea580c">B. watchdog 兜底（引擎暗死）</text>
<text x="509" y="566" font-size="12.5" fill="#334155" font-family="monospace">watchdog_loop 每 5s 醒一次：</text>
<text x="509" y="587" font-size="12.5" fill="#334155" font-family="monospace">terminate_if_errored 检查</text>
<text x="509" y="608" font-size="12.5" fill="#334155" font-family="monospace">engine.errored and not is_running</text>
<text x="509" y="629" font-size="12.5" fill="#334155" font-family="monospace">→ server.should_exit = True</text>
<text x="509" y="650" font-size="12.5" fill="#334155" font-family="sans-serif">（流式 200 已发，异常吞进生成器）</text>
<line x1="257.5" y1="672" x2="257.5" y2="688" stroke="#b91c1c" stroke-width="1.7"/>
<line x1="682.5" y1="672" x2="682.5" y2="688" stroke="#ea580c" stroke-width="1.7"/>
<line x1="257.5" y1="688" x2="682.5" y2="688" stroke="#94a3b8" stroke-width="1.7"/>
<line x1="470.0" y1="688" x2="470.0" y2="702" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="60" y="702" width="820" height="44" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.6"/>
<text x="470.0" y="729" text-anchor="middle" font-size="13.5" fill="#0f172a">退出 build_async_engine_client 上下文 → async_llm.shutdown → await shutdown_task → sock.close()</text>
</svg>