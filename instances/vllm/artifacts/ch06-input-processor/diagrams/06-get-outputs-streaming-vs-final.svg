<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1120" height="620" fill="white"/>
<text x="560.0" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">get_outputs：流式逐条转发  vs  FINAL_ONLY 按 index 聚合</text>
<rect x="20" y="60" width="1080" height="240" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
<text x="40" y="88" font-size="16" font-weight="bold" fill="#2563eb">STREAMING（output_kind ≠ FINAL_ONLY）：每路增量到达即转发</text>
<rect x="50" y="130" width="200" height="80" rx="7" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
<text x="150.0" y="166.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">child i 增量到达</text>
<text x="150.0" y="182.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">CompletionOutput(index=i)</text>
<line x1="250" y1="170" x2="300" y2="170" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="300" y="130" width="230" height="80" rx="7" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.4"/>
<text x="415.0" y="166.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">完成则移出 child_requests</text>
<text x="415.0" y="182.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">已返还过的 child → 去重</text>
<line x1="530" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="580" y="130" width="230" height="80" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
<text x="695.0" y="166.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">return [completion_output]</text>
<text x="695.0" y="182.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">（去重命中则 return []）</text>
<line x1="810" y1="170" x2="860" y2="170" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="860" y="130" width="220" height="80" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
<text x="970.0" y="166.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">finished = child_requests 空</text>
<text x="970.0" y="182.5" text-anchor="middle" font-size="13" font-weight="normal" fill="#0f172a">客户端自行拼接 n 路</text>
<text x="560.0" y="285" text-anchor="middle" font-size="13" fill="#1e40af">任一路先完成即可立刻提前返还，无需等齐——粒度更细</text>
<rect x="20" y="330" width="1080" height="270" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.6"/>
<text x="40" y="358" font-size="16" font-weight="bold" fill="#ca8a04">FINAL_ONLY：output_aggregator[index] 归位，攒齐 n 路才一次性吐</text>
<text x="200" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">child2 到达（乱序到达）</text>
<rect x="60" y="390" width="280" height="86" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
<text x="200.0" y="429.5" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">[ _ , _ , c ]</text>
<text x="200.0" y="446.5" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">child_requests 非空 → return []</text>
<line x1="340" y1="433" x2="390" y2="433" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<text x="530" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">child0 到达（乱序到达）</text>
<rect x="390" y="390" width="280" height="86" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
<text x="530.0" y="429.5" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">[ a , _ , c ]</text>
<text x="530.0" y="446.5" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">仍非空 → return []</text>
<line x1="670" y1="433" x2="720" y2="433" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
<text x="860" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">child1 到达（乱序到达）</text>
<rect x="720" y="390" width="280" height="86" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
<text x="860.0" y="429.5" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">[ a , b , c ]</text>
<text x="860.0" y="446.5" text-anchor="middle" font-size="14" font-weight="normal" fill="#0f172a">child_requests 空 → 一次性吐出</text>
<text x="560.0" y="580" text-anchor="middle" font-size="13" fill="#854d0e">归位按 CompletionOutput.index，结果顺序 [out0,out1,out2] 与到达顺序无关，finished=True</text>
</svg>