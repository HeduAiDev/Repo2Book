<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="920" height="500" fill="white"/>
<text x="20" y="34" font-size="20" font-weight="bold" fill="#0f172a" font-family="sans-serif">DP wave 状态机：全体运行 ⇄ 全体暂停</text>
<circle cx="230" cy="205" r="110" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
<text x="230" y="197" font-size="22" text-anchor="middle" font-weight="bold" fill="#047857" font-family="sans-serif">RUNNING</text>
<text x="230" y="223" font-size="13" text-anchor="middle" fill="#475569" font-family="sans-serif">engines_running=True</text>
<circle cx="690" cy="205" r="110" fill="#fffbeb" stroke="#b45309" stroke-width="3"/>
<text x="690" y="197" font-size="22" text-anchor="middle" font-weight="bold" fill="#b45309" font-family="sans-serif">PAUSED</text>
<text x="690" y="223" font-size="13" text-anchor="middle" fill="#475569" font-family="sans-serif">engines_running=False</text>
<path d="M 332 145 C 460 55, 460 55, 588 145" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<text x="460" y="47" font-size="14" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">rank0 all-reduce 判定全体无未完成</text>
<text x="460" y="67" font-size="13" text-anchor="middle" fill="#475569" font-family="sans-serif">→ 报 wave_complete，current_wave++</text>
<path d="M 588 265 C 460 355, 460 355, 332 265" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<text x="460" y="355" font-size="14" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">FIRST_REQ / START_DP_WAVE / 收到 stale-wave 请求</text>
<text x="460" y="375" font-size="13" text-anchor="middle" fill="#475569" font-family="sans-serif">→ engines_running=True</text>
<path d="M 190 107 C 100 55, 100 355, 190 303" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="85" y="201" font-size="12" text-anchor="end" fill="#64748b" font-family="sans-serif">无 ready</text>
<text x="85" y="219" font-size="12" text-anchor="end" fill="#64748b" font-family="sans-serif">→ dummy batch</text>
<rect x="20" y="444" width="880" height="44" rx="8" fill="#fef2f2" stroke="#fecaca"/>
<text x="34" y="464" font-size="13" fill="#b91c1c" font-weight="bold" font-family="sans-serif">两阶段暂停：</text>
<text x="120" y="464" font-size="13" fill="#7f1d1d" font-family="sans-serif">各 rank 设 pending_pause 继续空转 → all-reduce 确认全员同意（SUM==dp_size）</text>
<text x="34" y="482" font-size="13" fill="#7f1d1d" font-family="sans-serif">→ 共识达成置 ignore_start_dp_wave，丢弃管道里迟到的 START_DP_WAVE，避免「刚停又被旧唤醒拉起」</text>
</svg>