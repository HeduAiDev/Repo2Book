<text x="20" y="115" font-size="15" font-weight="bold" fill="#1d4ed8" font-family="sans-serif">stage k-1</text>
<rect x="175" y="174" width="885" height="80" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="20" y="219" font-size="15" font-weight="bold" fill="#7c3aed" font-family="sans-serif">NCCL 传输</text>
<rect x="175" y="278" width="885" height="80" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="20" y="323" font-size="15" font-weight="bold" fill="#047857" font-family="sans-serif">stage k (本 rank)</text>
<rect x="185" y="296" width="120" height="44" rx="6" fill="white" stroke="#047857" stroke-width="2"/>
<text x="245" y="322" font-size="13" text-anchor="middle" fill="#047857" font-family="sans-serif" font-weight="bold">wait 上轮 isend</text>
<text x="245" y="336" font-size="11" text-anchor="middle" fill="#64748b" font-family="sans-serif">_pp_send_work</text>
<rect x="315" y="296" width="110" height="44" rx="6" fill="white" stroke="#047857" stroke-width="2"/>
<text x="370" y="322" font-size="13" text-anchor="middle" fill="#047857" font-family="sans-serif" font-weight="bold">irecv 发出</text>
<text x="370" y="336" font-size="11" text-anchor="middle" fill="#64748b" font-family="sans-serif">不阻塞</text>
<rect x="435" y="296" width="230" height="44" rx="6" fill="white" stroke="#047857" stroke-width="2"/>
<text x="550" y="322" font-size="13" text-anchor="middle" fill="#047857" font-family="sans-serif" font-weight="bold">input / KV / attn metadata 准备</text>
<text x="550" y="336" font-size="11" text-anchor="middle" fill="#64748b" font-family="sans-serif">与接收重叠</text>
<rect x="675" y="296" width="130" height="44" rx="6" fill="white" stroke="#dc2626" stroke-width="2"/>
<text x="740" y="322" font-size="13" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-weight="bold">首次读 .tensors</text>
<text x="740" y="336" font-size="11" text-anchor="middle" fill="#64748b" font-family="sans-serif">触发 wait_for_comm</text>
<rect x="815" y="296" width="110" height="44" rx="6" fill="white" stroke="#047857" stroke-width="2"/>
<text x="870" y="324" font-size="13" text-anchor="middle" fill="#047857" font-family="sans-serif" font-weight="bold">model forward</text>
<rect x="935" y="296" width="90" height="44" rx="6" fill="white" stroke="#047857" stroke-width="2"/>
<text x="980" y="322" font-size="13" text-anchor="middle" fill="#047857" font-family="sans-serif" font-weight="bold">isend 发出</text>
<text x="980" y="336" font-size="11" text-anchor="middle" fill="#64748b" font-family="sans-serif">句柄留到下轮</text>
<rect x="370" y="202" width="315" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="527" y="222" font-size="12" text-anchor="middle" fill="#7c3aed" font-family="sans-serif">NCCL 接收在途（与准备并行）</text>
<rect x="185" y="98" width="120" height="30" rx="5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
<text x="245" y="118" font-size="12" text-anchor="middle" fill="#1d4ed8" font-family="sans-serif">isend 隐藏状态</text>
<line x1="245" y1="128" x2="370" y2="202" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
<line x1="370" y1="358" x2="740" y2="358" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<text x="555" y="376" font-size="12.5" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-weight="bold">推迟的 wait：irecv 发出 → 直到真正用到才阻塞</text>
<line x1="685" y1="217" x2="695" y2="296" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text x="980" y="362" font-size="11" text-anchor="middle" fill="#64748b" font-family="sans-serif">下一轮开头才 wait</text>
