<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="1080" height="470" fill="white"/>
<text x="20" y="32" font-size="20" font-weight="bold" fill="#0f172a" font-family="sans-serif">惰性 PP 同步：一格 execute_model 的时序</text>
