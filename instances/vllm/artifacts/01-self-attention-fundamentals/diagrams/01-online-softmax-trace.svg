<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1000" height="720" fill="#f8fafc"/>
<text x="500" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1e293b" font-weight="bold">Online Softmax — Q block 0 的三轮 KV 迭代状态追踪</text>
<text x="500" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">数值演示：用具体数字追踪 running max (m), running sum (l), output accumulator (O_acc) 如何更新</text>
<rect x="50" y="80" width="70" height="44" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<text x="85" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">变量</text>
<rect x="130" y="80" width="180" height="44" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<text x="220" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">初始化</text>
<text x="220" y="113" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">(kv 迭代前)</text>
<rect x="320" y="80" width="180" height="44" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<text x="410" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">kv=0 后</text>
<text x="410" y="113" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">(S₀ 处理完)</text>
<rect x="510" y="80" width="180" height="44" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<text x="600" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">kv=1 后</text>
<text x="600" y="113" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">(S₁ 处理完)</text>
<rect x="700" y="80" width="180" height="44" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<text x="790" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">kv=2 后</text>
<text x="790" y="113" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">(S₂ 处理完)</text>
<rect x="890" y="80" width="80" height="44" rx="4" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<text x="930" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">最终输出</text>
<text x="930" y="113" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">(O_block)</text>
<rect x="50" y="124" width="70" height="53" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
<text x="85" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b" font-weight="bold">m (running max)</text>
<text x="85" y="152" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b" font-weight="bold">每行当前最大的</text>
<text x="85" y="166" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b" font-weight="bold">logit值</text>
<rect x="130" y="124" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="220" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[-inf, -inf,</text>
<text x="220" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> -inf, -inf]</text>
<rect x="320" y="124" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="410" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[2.1, 1.8,</text>
<text x="410" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 3.2, 2.5]</text>
<rect x="510" y="124" width="180" height="53" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="600" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[2.1, 1.8,</text>
<text x="600" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 3.5, 2.9]</text>
<rect x="700" y="124" width="180" height="53" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="790" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[2.1, 2.4,</text>
<text x="790" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 3.5, 2.9]</text>
<rect x="890" y="124" width="80" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="930" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#dc2626">收敛 →</text>
<rect x="50" y="179" width="70" height="53" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
<text x="85" y="193" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534" font-weight="bold">l (running sum)</text>
<text x="85" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534" font-weight="bold">每行 exp(S-m) 的</text>
<text x="85" y="221" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534" font-weight="bold">累加和</text>
<rect x="130" y="179" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="220" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[0, 0, 0, 0]</text>
<rect x="320" y="179" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="410" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[3.1, 2.8,</text>
<text x="410" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 4.5, 3.9]</text>
<rect x="510" y="179" width="180" height="53" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="600" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[6.5, 6.1,</text>
<text x="600" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 8.2, 7.3]</text>
<rect x="700" y="179" width="180" height="53" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="790" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[9.8, 8.9,</text>
<text x="790" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 11.5, 10.2]</text>
<rect x="890" y="179" width="80" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="930" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#16a34a">→ 做分母</text>
<rect x="50" y="234" width="70" height="53" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
<text x="85" y="248" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9a3412" font-weight="bold">O_acc (output)</text>
<text x="85" y="262" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9a3412" font-weight="bold">累积的加权 value</text>
<text x="85" y="276" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9a3412" font-weight="bold">[4 x 8]</text>
<rect x="130" y="234" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="220" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">全零矩阵</text>
<text x="220" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[4 x 8]</text>
<rect x="320" y="234" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="410" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">O₀ (基于 S₀</text>
<text x="410" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">的 P₀@V₀)</text>
<rect x="510" y="234" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="600" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">corr×O₀</text>
<text x="600" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">+ P₁@V₁</text>
<rect x="700" y="234" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="790" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">corr×O₁</text>
<text x="790" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">+ P₂@V₂</text>
<rect x="890" y="234" width="80" height="53" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="930" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#ea580c">O_acc / l</text>
<rect x="50" y="289" width="70" height="53" rx="3" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
<text x="85" y="303" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6d28d9" font-weight="bold">correction</text>
<text x="85" y="317" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6d28d9" font-weight="bold">因子 exp(m_old</text>
<text x="85" y="331" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6d28d9" font-weight="bold">- m_new)</text>
<rect x="130" y="289" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="220" y="303" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">—</text>
<rect x="320" y="289" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="410" y="303" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">— (首次,</text>
<text x="410" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">无需修正)</text>
<rect x="510" y="289" width="180" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="600" y="303" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[1.0, 1.0,</text>
<text x="600" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 0.74, 0.67]</text>
<rect x="700" y="289" width="180" height="53" rx="3" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
<text x="790" y="303" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">[1.0, 0.55,</text>
<text x="790" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155"> 1.0, 1.0]</text>
<rect x="890" y="289" width="80" height="53" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="930" y="303" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b5cf6">—</text>
<rect x="50" y="400" width="920" height="110" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
<text x="70" y="422" font-family="sans-serif" font-size="13" fill="#854d0e" font-weight="bold">关键观察: correction 因子的收敛性质</text>
<text x="70" y="444" font-family="monospace" font-size="10" fill="#713f12">  kv=0 → kv=1: 第3,4行的 max 增大 (3.2→3.5, 2.5→2.9)，correction = exp(3.2-3.5)=0.74 &lt; 1，需要 rescale O_acc</text>
<text x="70" y="462" font-family="monospace" font-size="10" fill="#713f12">  kv=1 → kv=2: 第1,3,4行的 max 不变，correction = exp(0) = 1 → NO-OP！第2行的 max 变化 (1.8→2.4)，correction = 0.55</text>
<text x="70" y="480" font-family="sans-serif" font-size="11" fill="#dc2626" font-weight="bold">  → 后期 KV block 几乎不需要 rescaling (correction→1)。FlashAttention-2 利用此性质跳过 no-op rescaling，节省 ~5% 时间。</text>
<rect x="50" y="540" width="920" height="155" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="70" y="562" font-family="sans-serif" font-size="13" fill="#334155" font-weight="bold">Online Softmax 算法 (单 Q block 的完整循环)</text>
<text x="80" y="584" font-family="monospace" font-size="10" fill="#334155">m = [-inf, -inf, -inf, -inf]        # running max per row</text>
<text x="80" y="598" font-family="monospace" font-size="10" fill="#334155">l = [0, 0, 0, 0]                     # running exp sum (normalization denominator)</text>
<text x="80" y="612" font-family="monospace" font-size="10" fill="#334155">O_acc = zeros[4, 8]                  # running output accumulator</text>
<text x="80" y="626" font-family="monospace" font-size="10" fill="#334155"></text>
<text x="80" y="640" font-family="monospace" font-size="10" fill="#334155">for kv in 0, 1, 2:                   # iterate all KV blocks</text>
<text x="80" y="654" font-family="monospace" font-size="10" fill="#64748b">    S = Q @ K_kv^T * SCALE           # [4x4] in SRAM, never written to HBM</text>
<text x="80" y="668" font-family="monospace" font-size="10" fill="#64748b">    m_new = max(m, row_max(S))        # update running max</text>
<text x="80" y="682" font-family="monospace" font-size="10" fill="#64748b">    P = exp(S - m_new)                # numerically stable exp</text>
<text x="80" y="696" font-family="monospace" font-size="10" fill="#64748b">    correction = exp(m - m_new)       # rescale old O_acc</text>
<text x="80" y="710" font-family="monospace" font-size="10" fill="#64748b">    l = correction * l + row_sum(P)   # update running normalization</text>
<text x="80" y="724" font-family="monospace" font-size="10" fill="#64748b">    O_acc = correction * O_acc + P @ V_kv   # accumulate weighted values</text>
<text x="80" y="738" font-family="monospace" font-size="10" fill="#64748b">    m = m_new                         # update state for next iteration</text>
<text x="80" y="752" font-family="monospace" font-size="10" fill="#334155"></text>
<text x="80" y="766" font-family="monospace" font-size="10" fill="#334155">O_block = O_acc / l                   # final normalization (ONCE!)</text>
</svg>