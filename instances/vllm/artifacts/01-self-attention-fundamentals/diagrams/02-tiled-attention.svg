<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
<defs>
<marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker>
</defs>
<rect width="960" height="680" fill="#f8fafc"/>
<text x="480" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#1e3a5f" font-weight="bold">Tiled Attention + Online Softmax 算法</text>
<text x="480" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Q 分成 3 个 Block，每个 Block 遍历 4 个 KV Block — S [4x4] 永远不写入 HBM</text>
<line x1="10" y1="70" x2="950" y2="70" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
<text x="940" y="64" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94a3b8">HBM (显存)</text>
<text x="940" y="86" text-anchor="end" font-family="sans-serif" font-size="11" fill="#3b82f6" font-weight="bold">SRAM (on-chip)</text>
<rect x="20" y="76" width="100" height="28" rx="4" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="1.5"/>
<text x="70" y="95" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563eb" font-weight="bold">Q₀ [64×128]</text>
<rect x="130" y="76" width="100" height="28" rx="4" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1.5"/>
<text x="180" y="95" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed" font-weight="bold">Q₁ [64×128]</text>
<rect x="240" y="76" width="100" height="28" rx="4" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="1.5"/>
<text x="290" y="95" text-anchor="middle" font-family="monospace" font-size="11" fill="#059669" font-weight="bold">Q₂ [64×128]</text>
<rect x="410" y="76" width="120" height="28" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
<text x="470" y="95" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350f" font-weight="bold">KV₀ [64×128]</text>
<rect x="410" y="108" width="120" height="28" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
<text x="470" y="127" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350f" font-weight="bold">KV₁ [64×128]</text>
<rect x="410" y="140" width="120" height="28" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
<text x="470" y="159" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350f" font-weight="bold">KV₂ [64×128]</text>
<rect x="410" y="172" width="120" height="28" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
<text x="470" y="191" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350f" font-weight="bold">KV₃ [64×128]</text>
<text x="425" y="71" font-family="monospace" font-size="10" fill="#b45309">K/V blocks [4×64×128]</text>
<text x="20" y="200" font-family="sans-serif" font-size="14" fill="#1e40af" font-weight="bold">SRAM: 每个 Q Block 的外层循环</text>
<rect x="20" y="210" width="290" height="410" rx="6" fill="#2563eb" opacity="0.06" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2"/>
<text x="165" y="230" text-anchor="middle" font-family="monospace" font-size="12" fill="#2563eb" font-weight="bold">Q Block 0 (q_start=0)</text>
<text x="30" y="255" font-family="monospace" font-size="10" fill="#64748b">for kv in [0,1,2,3]:</text>
<text x="30" y="265" font-family="monospace" font-size="10" fill="#64748b">m = -inf, l = 0</text>
<text x="30" y="279" font-family="monospace" font-size="10" fill="#64748b">O_acc = [64,128] = 0</text>
<rect x="25" y="293" width="280" height="74" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="32" y="307" font-family="monospace" font-size="9" fill="#64748b">kv=0:</text>
<text x="75" y="307" font-family="monospace" font-size="9" fill="#3b82f6">S = Q0 @ K0^T [64,64]</text>
<text x="75" y="320" font-family="monospace" font-size="9" fill="#059669">m_new = max(m, row_max(S))</text>
<text x="75" y="333" font-family="monospace" font-size="9" fill="#7c3aed">P = exp(S - m_new)</text>
<text x="75" y="346" font-family="monospace" font-size="9" fill="#dc2626">corr = exp(m - m_new), l += ...</text>
<rect x="25" y="373" width="280" height="74" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="32" y="387" font-family="monospace" font-size="9" fill="#64748b">kv=1:</text>
