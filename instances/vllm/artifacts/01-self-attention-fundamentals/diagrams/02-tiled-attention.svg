<text x="75" y="400" font-family="monospace" font-size="9" fill="#059669">m_new = max(m, row_max(S))</text>
<text x="75" y="413" font-family="monospace" font-size="9" fill="#7c3aed">P = exp(S - m_new)</text>
<text x="75" y="426" font-family="monospace" font-size="9" fill="#dc2626">corr = exp(m - m_new), l += ...</text>
<rect x="25" y="453" width="280" height="74" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="32" y="467" font-family="monospace" font-size="9" fill="#64748b">kv=2:</text>
<text x="75" y="467" font-family="monospace" font-size="9" fill="#3b82f6">S = Q0 @ K2^T [64,64]</text>
