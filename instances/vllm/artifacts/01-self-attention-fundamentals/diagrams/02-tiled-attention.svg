<text x="75" y="506" font-family="monospace" font-size="9" fill="#dc2626">corr = exp(m - m_new), l += ...</text>
<rect x="25" y="453" width="280" height="74" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
<text x="280" y="467" font-family="monospace" font-size="8" fill="#22c55e">corr=1✓</text>
<rect x="25" y="533" width="280" height="74" rx="3" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<text x="32" y="547" font-family="monospace" font-size="9" fill="#64748b">kv=3:</text>
