<text x="280" y="547" font-family="monospace" font-size="8" fill="#22c55e">corr=1✓</text>
<rect x="25" y="617" width="280" height="24" rx="4" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
<text x="165" y="634" text-anchor="middle" font-family="monospace" font-size="10" fill="#2563eb" font-weight="bold">O0 = O_acc / l → Write HBM</text>
