<text x="585" y="547" font-family="monospace" font-size="8" fill="#22c55e">corr=1✓</text>
<rect x="330" y="617" width="280" height="24" rx="4" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1.5"/>
<text x="470" y="634" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed" font-weight="bold">O1 = O_acc / l → Write HBM</text>
<rect x="630" y="210" width="290" height="410" rx="6" fill="#059669" opacity="0.06" stroke="#059669" stroke-width="1" stroke-dasharray="4,2"/>
