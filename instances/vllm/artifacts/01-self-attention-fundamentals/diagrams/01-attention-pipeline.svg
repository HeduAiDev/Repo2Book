<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620">
<defs>
<marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker>
<marker id="ab" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="4" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#3b82f6"/></marker>
</defs>
<rect width="920" height="620" fill="#f8fafc"/>
<text x="460" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#1e3a5f" font-weight="bold">Self-Attention 计算管线</text>
<text x="460" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">从输入序列到注意力输出 — 五步全流程</text>
<rect x="20" y="78" width="140" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="90" y="98" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e40af" font-weight="bold">Input X</text>
<text x="90" y="116" text-anchor="middle" font-family="monospace" font-size="11" fill="#3b82f6">[3, d_model]</text>
<line x1="160" y1="102" x2="210" y2="74" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="220" y="50" width="100" height="48" rx="6" fill="white" stroke="#2563eb" stroke-width="2"/>
<text x="270" y="70" text-anchor="middle" font-family="monospace" font-size="13" fill="#2563eb" font-weight="bold">W^Q</text>
<text x="270" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">[3, d_k]</text>
<line x1="160" y1="102" x2="210" y2="114" stroke="#059669" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="220" y="90" width="100" height="48" rx="6" fill="white" stroke="#059669" stroke-width="2"/>
<text x="270" y="110" text-anchor="middle" font-family="monospace" font-size="13" fill="#059669" font-weight="bold">W^K</text>
<text x="270" y="128" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">[3, d_k]</text>
<line x1="160" y1="102" x2="210" y2="158" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="220" y="134" width="100" height="48" rx="6" fill="white" stroke="#dc2626" stroke-width="2"/>
<text x="270" y="154" text-anchor="middle" font-family="monospace" font-size="13" fill="#dc2626" font-weight="bold">W^V</text>
<text x="270" y="172" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">[3, d_k]</text>
<rect x="20" y="170" width="880" height="130" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="6,3"/>
<text x="35" y="190" font-family="sans-serif" font-size="14" fill="#1e40af" font-weight="bold">Step 2: 计算注意力分数 S = Q @ K^T</text>
<rect x="40" y="205" width="80" height="80" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="80" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563eb">Q [3×4]</text>
<text x="80" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">q₀·</text>
<text x="80" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">q₁·</text>
<text x="80" y="276" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">q₂·</text>
<text x="135" y="250" font-family="monospace" font-size="16" fill="#64748b">@</text>
<rect x="155" y="205" width="80" height="80" rx="3" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
<text x="195" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#059669">K^T [4×3]</text>
<text x="170" y="235" font-family="monospace" font-size="9" fill="#64748b">k₀</text>
<text x="197" y="235" font-family="monospace" font-size="9" fill="#64748b">k₁</text>
<text x="224" y="235" font-family="monospace" font-size="9" fill="#64748b">k₂</text>
<text x="160" y="250" font-family="monospace" font-size="9" fill="#64748b">d0</text>
<text x="160" y="263" font-family="monospace" font-size="9" fill="#64748b">d1</text>
<text x="160" y="276" font-family="monospace" font-size="9" fill="#64748b">d2</text>
<text x="160" y="289" font-family="monospace" font-size="9" fill="#64748b">d3</text>
<line x1="240" y1="245" x2="270" y2="245" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="280" y="205" width="120" height="80" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="340" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#b45309">Scores S [3×3]</text>
<rect x="283" y="208" width="38" height="18" rx="2" fill="#fef9c3" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="302" y="221" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₀·k₀=0.8</text>
<rect x="321" y="208" width="38" height="18" rx="2" fill="#fee2e2" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="340" y="221" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₀·k₁=0.3</text>
<rect x="359" y="208" width="38" height="18" rx="2" fill="#fee2e2" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="378" y="221" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₀·k₂=0.1</text>
<rect x="283" y="226" width="38" height="18" rx="2" fill="#fef9c3" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="302" y="239" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₁·k₀=0.5</text>
<rect x="321" y="226" width="38" height="18" rx="2" fill="#fef9c3" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="340" y="239" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₁·k₁=1.2</text>
<rect x="359" y="226" width="38" height="18" rx="2" fill="#fee2e2" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="378" y="239" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₁·k₂=0.4</text>
<rect x="283" y="244" width="38" height="18" rx="2" fill="#fef9c3" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="302" y="257" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₂·k₀=0.2</text>
<rect x="321" y="244" width="38" height="18" rx="2" fill="#fef9c3" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="340" y="257" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₂·k₁=0.7</text>
<rect x="359" y="244" width="38" height="18" rx="2" fill="#fef9c3" stroke="#d4d4d4" stroke-width="0.5"/>
<text x="378" y="257" text-anchor="middle" font-family="monospace" font-size="8" fill="#78350f">q₂·k₂=1.5</text>
<line x1="340" y1="285" x2="340" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="240" y="330" width="200" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="340" y="355" text-anchor="middle" font-family="monospace" font-size="13" fill="#5b21b6" font-weight="bold">÷ √d_k  (scale)</text>
<line x1="340" y1="370" x2="340" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="240" y="400" width="200" height="40" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
<text x="340" y="425" text-anchor="middle" font-family="monospace" font-size="13" fill="#9d174d" font-weight="bold">Softmax (per row)</text>
<line x1="340" y1="440" x2="340" y2="465" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="230" y="465" width="220" height="60" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="340" y="460" text-anchor="middle" font-family="monospace" font-size="11" fill="#b45309">Attention Weights A [3×3]</text>
<text x="235" y="485" font-family="monospace" font-size="11" fill="#1e40af">0.52</text>
<text x="305" y="485" font-family="monospace" font-size="11" fill="#1e40af">0.31</text>
<text x="375" y="485" font-family="monospace" font-size="11" fill="#1e40af">0.17</text>
<text x="235" y="498" font-family="monospace" font-size="11" fill="#1e40af">0.28</text>
<text x="305" y="498" font-family="monospace" font-size="11" fill="#1e40af">0.55</text>
<text x="375" y="498" font-family="monospace" font-size="11" fill="#1e40af">0.17</text>
<text x="235" y="511" font-family="monospace" font-size="11" fill="#1e40af">0.15</text>
<text x="305" y="511" font-family="monospace" font-size="11" fill="#1e40af">0.25</text>
<text x="375" y="511" font-family="monospace" font-size="11" fill="#1e40af">0.60</text>
<text x="340" y="523" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">每行之和 = 1.0</text>
<line x1="340" y1="525" x2="340" y2="553" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="200" y="555" width="80" height="50" rx="3" fill="#fce4ec" stroke="#dc2626" stroke-width="1.5"/>
<text x="240" y="550" text-anchor="middle" font-family="monospace" font-size="11" fill="#dc2626">V [3×4]</text>
<text x="240" y="587" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">v₀, v₁, v₂</text>
<text x="340" y="585" text-anchor="middle" font-family="monospace" font-size="16" fill="#64748b">×</text>
<line x1="340" y1="605" x2="340" y2="605" stroke="#64748b" stroke-width="0"/>
<line x1="370" y1="580" x2="400" y2="580" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
<rect x="410" y="555" width="140" height="50" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="2.5"/>
<text x="480" y="550" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">Output O [3×d_k]</text>
<text x="480" y="587" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e3a5f" font-weight="bold">← 注意力输出!</text>
<text x="20" y="630" font-family="sans-serif" font-size="11" fill="#64748b">核心公式: Attention(Q,K,V) = softmax(QK^T / √d_k) V</text>
<text x="20" y="648" font-family="sans-serif" font-size="11" fill="#64748b">Q: 我要找什么 · K: 我能提供什么 · V: 我的实际内容 · √d_k: 防止方差爆炸</text>
</svg>