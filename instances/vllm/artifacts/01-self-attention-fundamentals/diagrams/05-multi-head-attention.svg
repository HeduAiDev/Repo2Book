<text x="40" y="350" font-family="sans-serif" font-size="13" fill="#1e3a5f" font-weight="bold">核心公式</text>
<text x="40" y="373" font-family="monospace" font-size="12" fill="#334155">head_i = Attention(X · W_i^Q,  X · W_i^K,  X · W_i^V)   ← 每个头独立计算</text>
<text x="40" y="395" font-family="monospace" font-size="12" fill="#334155">MHA(X)   = Concat(head_1, head_2, ..., head_h) · W^O          ← 拼接后投影</text>
<text x="40" y="420" font-family="sans-serif" font-size="11" fill="#64748b">d_k = d_model / h   (Llama 8B: 4096 / 32 = 128)  |  参数量 = 4×d_model²  (与 L 无关)</text>
<text x="40" y="440" font-family="sans-serif" font-size="11" fill="#93c5fd">vLLM 源码: attention.py:L455-L460 — reshape 是 Multi-Head 切分子空间的关键一步</text>
