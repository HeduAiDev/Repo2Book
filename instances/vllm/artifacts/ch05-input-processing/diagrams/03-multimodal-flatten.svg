<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1120" height="720" fill="white"/>
<text x="30" y="34" font-family="sans-serif" font-size="19" font-weight="bold" fill="#1e293b">多模态展平：dict-of-list → 按 offset 排序 → list[MultiModalFeatureSpec]</text>
<text x="30" y="55" font-family="monospace" font-size="10" fill="#64748b">input_processor.py:L324-L360 · argsort_mm_positions → vllm/multimodal/utils.py</text>
<text x="40" y="95" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">输入：decoder_inputs（按 modality 分组）</text>
<rect x="40" y="110" width="280" height="28" fill="#e2e8f0" stroke="#2563eb" stroke-width="1.5"/>
<text x="180" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1e293b">mm_placeholders["image"]</text>
<rect x="40" y="138" width="140" height="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="110" y="157" text-anchor="middle" font-family="monospace" font-size="11" font-weight="normal" fill="#1e293b">offset=5</text>
<rect x="180" y="138" width="140" height="30" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="250" y="157" text-anchor="middle" font-family="monospace" font-size="11" font-weight="normal" fill="#1e293b">offset=80</text>
<text x="110" y="186" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">image[0]</text>
<text x="250" y="186" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">image[1]</text>
<rect x="40" y="215" width="280" height="28" fill="#e2e8f0" stroke="#db2777" stroke-width="1.5"/>
<text x="180" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1e293b">mm_placeholders["audio"]</text>
<rect x="40" y="243" width="280" height="30" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
<text x="180" y="262" text-anchor="middle" font-family="monospace" font-size="11" font-weight="normal" fill="#1e293b">offset=40</text>
<text x="180" y="291" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">audio[0]</text>
<text x="40" y="335" font-family="sans-serif" font-size="11" fill="#64748b">mm_hashes / mm_kwargs 同样按 modality 分组</text>
<rect x="410" y="170" width="220" height="80" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
<text x="520" y="200" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#1e293b">argsort_mm_positions</text>
<text x="520" y="222" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">摊平 → 按 offset 升序</text>
<text x="520" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">O(M log M)</text>
<path d="M320,210 L410,210" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<text x="520" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e293b">排序键序列：</text>
<text x="520" y="300" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#1e293b">(image,0)=5 → (audio,0)=40</text>
<text x="520" y="318" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#1e293b">→ (image,1)=80</text>
<text x="680" y="95" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">输出：list[MultiModalFeatureSpec]（按序列位置有序）</text>
<path d="M630,210 L670,150" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="680" y="115" width="400" height="88" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="694" y="139" font-family="monospace" font-size="12" font-weight="bold" fill="#1e293b">MultiModalFeatureSpec  #0</text>
<text x="694" y="159" font-family="monospace" font-size="10.5" fill="#1e293b">modality=image  mm_position.offset=5</text>
<text x="694" y="177" font-family="monospace" font-size="10.5" fill="#1e293b">data  mm_hash  identifier</text>
<text x="694" y="195" font-family="monospace" font-size="9.5" fill="#64748b">identifier = _get_mm_identifier(hash, lora)</text>
<rect x="680" y="215" width="400" height="88" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
<text x="694" y="239" font-family="monospace" font-size="12" font-weight="bold" fill="#1e293b">MultiModalFeatureSpec  #1</text>
<text x="694" y="259" font-family="monospace" font-size="10.5" fill="#1e293b">modality=audio  mm_position.offset=40</text>
<text x="694" y="277" font-family="monospace" font-size="10.5" fill="#1e293b">data  mm_hash  identifier</text>
<text x="694" y="295" font-family="monospace" font-size="9.5" fill="#64748b">identifier = _get_mm_identifier(hash, lora)</text>
<rect x="680" y="315" width="400" height="88" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="694" y="339" font-family="monospace" font-size="12" font-weight="bold" fill="#1e293b">MultiModalFeatureSpec  #2</text>
<text x="694" y="359" font-family="monospace" font-size="10.5" fill="#1e293b">modality=image  mm_position.offset=80</text>
<text x="694" y="377" font-family="monospace" font-size="10.5" fill="#1e293b">data  mm_hash  identifier</text>
<text x="694" y="395" font-family="monospace" font-size="9.5" fill="#64748b">identifier = _get_mm_identifier(hash, lora)</text>
<text x="880" y="425" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">下游单遍按序处理交错的图/音/视频</text>
<rect x="40" y="455" width="1040" height="100" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="58" y="481" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">为什么要展平排序？</text>
<text x="58" y="506" font-family="sans-serif" font-size="12" fill="#1e293b">下游（EngineCore / 调度 / 编码器缓存）需按 item 在 prompt 中的真实位置有序处理；</text>
<text x="58" y="528" font-family="sans-serif" font-size="12" fill="#1e293b">不同模态可能交错出现，dict-of-list 无法表达全局顺序，按 PlaceholderRange.offset 升序统一成单条扁平列表。</text>
</svg>