<path d="M510,605 L510,635" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="290" y="735" width="440" height="56" rx="6" fill="#ffffff" stroke="#475569" stroke-width="2"/>
