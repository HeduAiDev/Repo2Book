<text x="510" y="865" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">max_tokens←max_model_len-seq_len；eos/stop；bad_words</text>
<text x="510" y="880" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L303-L322</text>
