<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 1180">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1020" height="1180" fill="white"/>
<text x="30" y="36" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Stage 1 输入处理流水线：process_inputs() 把 prompt 变成 EngineCoreRequest</text>
