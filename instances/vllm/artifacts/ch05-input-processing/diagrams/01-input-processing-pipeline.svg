<rect x="290" y="1101" width="440" height="56" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="510" y="1122" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">assign_request_id：注入 8 字符随机后缀</text>
<text x="510" y="1138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">request_id → "{external}-{随机}"</text>
