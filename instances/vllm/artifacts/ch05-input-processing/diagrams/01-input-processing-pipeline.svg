<text x="510" y="772" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">按 decoder_inputs["type"]=="embeds" 区分</text>
<text x="510" y="787" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L293-L301</text>
