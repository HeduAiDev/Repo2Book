<text x="510" y="304" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L251-L259</text>
<text x="510" y="345" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6366f1">prompt 是带 "type" 的 dict 吗？</text>
