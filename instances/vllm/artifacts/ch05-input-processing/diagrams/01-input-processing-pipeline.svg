<rect x="290" y="635" width="440" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="510" y="663" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">_validate_model_inputs</text>
