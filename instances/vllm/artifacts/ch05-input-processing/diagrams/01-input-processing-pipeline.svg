<text x="270" y="409" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Renderer 已 tokenize/多模态 → 直接透传</text>
<text x="270" y="424" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L261-L272</text>
<rect x="560" y="365" width="380" height="70" rx="6" fill="#fde8e8" stroke="#dc2626" stroke-width="2"/>
<text x="750" y="393" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">否：raw prompt（deprecated）</text>
<text x="750" y="409" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">现场 input_preprocessor.preprocess() 兜底 tokenize</text>
<text x="750" y="424" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L273-L286 → preprocess.py</text>
