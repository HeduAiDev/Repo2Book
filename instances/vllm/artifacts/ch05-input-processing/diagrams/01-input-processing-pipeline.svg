<text x="510" y="977" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L324-L360</text>
<path d="M510,891 L510,921" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="290" y="1015" width="440" height="56" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="510" y="1036" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">return EngineCoreRequest(...)</text>
<text x="510" y="1052" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">cache_salt / priority / trace_headers 透传</text>
<text x="510" y="1067" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#64748b">L362-L377</text>
