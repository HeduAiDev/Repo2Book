<text x="540" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">get_child_info(idx)：child id = "{idx}_{request_id}"，子参数 n=1</text>
<rect x="60" y="560" width="960" height="120" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="78" y="586" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">子采样参数派生（_get_child_sampling_params）</text>
<text x="78" y="612" font-family="sans-serif" font-size="12" fill="#1e293b">• seed is None：所有子请求共享同一份 n=1 克隆（缓存复用，省内存；各自采样天然独立）</text>
<text x="78" y="636" font-family="sans-serif" font-size="12" fill="#1e293b">• seed 已设：每个子请求 seed = seed + index（结果各异且可复现）</text>
<text x="78" y="660" font-family="sans-serif" font-size="12" fill="#1e293b">• 输出聚合：流式逐个转发；FINAL_ONLY 按 index 攒齐 n 个再整批返回</text>
