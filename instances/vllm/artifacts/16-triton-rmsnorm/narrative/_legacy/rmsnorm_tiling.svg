  <text x="450" y="40.4" text-anchor="middle" font-size="24" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#1e40af" opacity="1"><tspan x="450" dy="0">RMSNorm 双趟 Tile 算法 (D=12, BLOCK_SIZE=4)</tspan></text>
  <text x="450" y="70.3" text-anchor="middle" font-size="18" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#3b82f6" opacity="1"><tspan x="450" dy="0">Grid: (N,) — 每个程序处理一行 | 每行分成 ⌈D/BLOCK_SIZE⌉ 个 tile</tspan></text>
  <text x="450" y="98.6" text-anchor="middle" font-size="16" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="450" dy="0">y = x / sqrt(mean(x²) + eps) * w</tspan></text>
  <text x="20" y="143.6" text-anchor="start" font-size="16" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="20" dy="0">Input x[D=12]:</tspan></text>
  <text x="215" y="146.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="215" dy="0">x₀  x₁  x₂  x₃</tspan></text>
  <text x="375" y="146.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="375" dy="0">x₄  x₅  x₆  x₇</tspan></text>
  <text x="535" y="146.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="535" dy="0">x₈  x₉  x₁₀ x₁₁</tspan></text>
  <text x="215" y="179.05" text-anchor="middle" font-size="13" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="215" dy="0">Tile 0 [0:3]</tspan></text>
  <text x="375" y="179.05" text-anchor="middle" font-size="13" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="375" dy="0">Tile 1 [4:7]</tspan></text>
  <text x="535" y="179.05" text-anchor="middle" font-size="13" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="535" dy="0">Tile 2 [8:11]</tspan></text>
  <text x="680" y="142.2" text-anchor="middle" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="680" dy="0">← BLOCK_SIZE=4 →</tspan></text>
  <text x="30" y="231.6" text-anchor="start" font-size="16" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#1e40af" opacity="1"><tspan x="30" dy="0">Pass 1: 累加平方和 (fp32 精度)</tspan></text>
  <text x="205" y="270.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="205" dy="0">sum_sq = Σ(x_i²)  ← fp32 accumulation</tspan></text>
  <text x="205" y="320.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="205" dy="0">mean_sq = sum_sq / D</tspan></text>
  <text x="205" y="370.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="205" dy="0">inv_rms = rsqrt(mean_sq + eps)</tspan></text>
  <text x="430" y="231.6" text-anchor="start" font-size="16" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#047857" opacity="1"><tspan x="430" dy="0">Pass 2: 归一化 × 权重</tspan></text>
  <text x="605" y="270.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="605" dy="0">out_f32 = x_f32 × inv_rms × w_f32</tspan></text>
  <text x="605" y="320.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="605" dy="0">tl.store(output, out_f32.to(dtype))</tspan></text>
  <text x="410" y="360.2" text-anchor="middle" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="410" dy="0">inv_rms</tspan></text>
  <text x="510" y="164.2" text-anchor="middle" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="510" dy="0">tiles 被重新读取</tspan></text>
  <text x="20" y="463.6" text-anchor="start" font-size="16" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="20" dy="0">Output y[D=12]:</tspan></text>
  <text x="215" y="466.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="215" dy="0">y₀  y₁  y₂  y₃</tspan></text>
  <text x="375" y="466.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="375" dy="0">y₄  y₅  y₆  y₇</tspan></text>
  <text x="535" y="466.15" text-anchor="middle" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#374151" opacity="1"><tspan x="535" dy="0">y₈  y₉  y₁₀ y₁₁</tspan></text>
  <text x="20" y="520.2" text-anchor="start" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="20" dy="0">实现: for col_offset in range(0, n_cols, BLOCK_SIZE):   pass1/2 loop</tspan></text>
  <text x="20" y="545.2" text-anchor="start" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#3b82f6" opacity="1"><tspan x="20" dy="0">Pass 1:  val = tl.load(...); sum_sq += val²    ← 每个 tile 一次加载</tspan></text>
  <text x="20" y="568.2" text-anchor="start" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#047857" opacity="1"><tspan x="20" dy="0">Pass 2:  out_f32 = val × inv_rms × weight; tl.store(...)  ← 第二次加载</tspan></text>
  <text x="605" y="370.2" text-anchor="middle" font-size="12" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="605" dy="0">注: weight w[D] 也通过 tl.load 在 Pass 2 读取</tspan></text>
</svg>