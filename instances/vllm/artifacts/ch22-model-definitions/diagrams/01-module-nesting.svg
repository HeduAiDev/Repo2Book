<text x="60" y="628" font-size="14.5" font-weight="bold" fill="#92400e" font-family="sans-serif">一根 prefix 串起两件事</text>
<text x="60" y="652" font-size="12.5" fill="#78350f" font-family="sans-serif">构造时逐级拼接：model.layers.0.self_attn.qkv_proj —— 这正是 checkpoint 里该权重的全名（权重匹配靠它）。</text>
<text x="60" y="674" font-size="12.5" fill="#78350f" font-family="sans-serif">走到 Attention 那一层，prefix 又被当作 layer_name 注册进 static_forward_context —— 运行期按它取回本层的 kv_cache 与 attn_metadata。</text>
<text x="60" y="696" font-size="12.5" fill="#78350f" font-family="sans-serif">所以：同一根 prefix，既定位「静态权重」，又定位「动态 KV 缓存」。</text>
