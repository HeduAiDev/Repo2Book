<rect x="1055" y="195" width="100" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="1105" y="217" font-size="12.5" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">output</text>
<text x="1105" y="234" font-size="10.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">(全量)</text>
<line x1="1015" y1="220" x2="1055" y2="220" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="40" y="400" width="1115" height="200" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="60" y="428" font-size="14.5" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">为什么整个子块只有一次通信？</text>
<text x="60" y="456" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">列并行（QKV / gate_up）：权重沿 output 维切。每个 rank 拿一段「列」，算出来的 q_i/k_i/v_i 已经是沿头维切好的——forward 里零通信。</text>
<text x="60" y="482" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">行并行（o_proj / down_proj）：权重沿 input 维切。它的输入正是列并行切好的那段（input_is_parallel=True），不用再切；</text>
<text x="60" y="508" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">    各 rank 算出来的是「部分和」partial_i，末尾一次 all_reduce 把 Σ partial_i 汇成完整结果。</text>
<text x="60" y="534" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">于是「列并行 → 行并行」成对出现：中间衔接零通信，整个 attention / MLP 子块的跨卡通信被压到末尾这一次 all_reduce。</text>
<text x="60" y="560" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">通信量 ≈ O(batch × seq × hidden)，与切多少卡无关——这是 TP 划算的关键。</text>
</svg>