<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1180" height="660" fill="white"/>
<rect x="40" y="30" width="320" height="40" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
<text x="200" y="55" font-size="14.5" text-anchor="middle" fill="#3730a3" font-weight="bold" font-family="sans-serif">① initialize_model</text>
<text x="200" y="90" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">建空壳：形状已按 tp 切好，参数尚未填值</text>
<rect x="410" y="30" width="320" height="40" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
<text x="570" y="55" font-size="14.5" text-anchor="middle" fill="#3730a3" font-weight="bold" font-family="sans-serif">② load_weights</text>
<text x="570" y="90" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">流式喂 checkpoint：边读边重命名、边切、边填</text>
<rect x="820" y="30" width="320" height="40" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
<text x="980" y="55" font-size="14.5" text-anchor="middle" fill="#3730a3" font-weight="bold" font-family="sans-serif">③ process_weights_after_loading</text>
<text x="980" y="90" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">kernel 重排 + Attention kv scale → eval()</text>
<rect x="95" y="130" width="210" height="60" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
<rect x="95" y="130" width="90" height="60" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="4 3"/>
<text x="140.0" y="165" font-size="11" text-anchor="middle" fill="#2563eb" font-weight="bold" font-family="sans-serif">q 段</text>
<rect x="185" y="130" width="60" height="60" fill="none" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="4 3"/>
<text x="215.0" y="165" font-size="11" text-anchor="middle" fill="#16a34a" font-weight="bold" font-family="sans-serif">k 段</text>
<rect x="245" y="130" width="60" height="60" fill="none" stroke="#d97706" stroke-width="1.4" stroke-dasharray="4 3"/>
<text x="275.0" y="165" font-size="11" text-anchor="middle" fill="#d97706" font-weight="bold" font-family="sans-serif">v 段</text>
<text x="200" y="210" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">qkv_proj.weight（空，[q|k|v] 三段）</text>
<text x="530" y="130" font-size="12" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">checkpoint 里是分开的三张：</text>
<rect x="410" y="150" width="150" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="485" y="172" font-size="11.5" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">q_proj.weight</text>
<text x="485" y="190" font-size="9" text-anchor="middle" fill="#475569" font-weight="normal" font-family="monospace">.replace(.q/k/v_proj → .qkv_proj)</text>
<rect x="410" y="230" width="150" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="485" y="252" font-size="11.5" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">k_proj.weight</text>
<text x="485" y="270" font-size="9" text-anchor="middle" fill="#475569" font-weight="normal" font-family="monospace">.replace(.q/k/v_proj → .qkv_proj)</text>
<rect x="410" y="310" width="150" height="50" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
<text x="485" y="332" font-size="11.5" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">v_proj.weight</text>
<text x="485" y="350" font-size="9" text-anchor="middle" fill="#475569" font-weight="normal" font-family="monospace">.replace(.q/k/v_proj → .qkv_proj)</text>
<rect x="585" y="220" width="175" height="70" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.3"/>
<text x="672" y="245" font-size="11" text-anchor="middle" fill="#92400e" font-weight="bold" font-family="sans-serif">stacked_params_mapping</text>
<text x="672" y="263" font-size="10.5" text-anchor="middle" fill="#78350f" font-weight="normal" font-family="sans-serif">重命名 + 带 shard_id</text>
<text x="672" y="280" font-size="10.5" text-anchor="middle" fill="#78350f" font-weight="normal" font-family="monospace">(q / k / v)</text>
<line x1="560" y1="175" x2="585" y2="255" stroke="#d97706" stroke-width="1.3" marker-end="url(#a)"/>
<line x1="560" y1="255" x2="585" y2="255" stroke="#d97706" stroke-width="1.3" marker-end="url(#a)"/>
<line x1="560" y1="335" x2="585" y2="255" stroke="#d97706" stroke-width="1.3" marker-end="url(#a)"/>
<text x="960" y="130" font-size="11" text-anchor="middle" fill="#0f172a" font-weight="bold" font-family="sans-serif">weight_loader：按 shard_id 算 offset，再按 rank narrow</text>
<rect x="830" y="160" width="260" height="70" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.8"/>
<rect x="830" y="160" width="110" height="70" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="885.0" y="198" font-size="13" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">q</text>
<rect x="940" y="160" width="75" height="70" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="977.5" y="198" font-size="13" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">k</text>
<rect x="1015" y="160" width="75" height="70" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
<text x="1052.5" y="198" font-size="13" text-anchor="middle" fill="#111827" font-weight="bold" font-family="sans-serif">v</text>
<text x="960" y="250" font-size="10.5" text-anchor="middle" fill="#475569" font-weight="normal" font-family="sans-serif">qkv_proj.weight（已填，本 rank 的切片）</text>
<text x="885" y="145" font-size="9.5" text-anchor="middle" fill="#2563eb" font-weight="normal" font-family="sans-serif">offset 0</text>
<text x="977" y="145" font-size="9.5" text-anchor="middle" fill="#16a34a" font-weight="normal" font-family="sans-serif">+q宽</text>
<text x="1052" y="145" font-size="9.5" text-anchor="middle" fill="#d97706" font-weight="normal" font-family="sans-serif">+q+k宽</text>
<line x1="672" y1="200" x2="885" y2="195" stroke="#2563eb" stroke-width="1.6" marker-end="url(#a)"/>
<line x1="672" y1="290" x2="977" y2="195" stroke="#16a34a" stroke-width="1.6" marker-end="url(#a)"/>
<line x1="760" y1="360" x2="1052" y2="195" stroke="#d97706" stroke-width="1.6" marker-end="url(#a)"/>
<text x="790" y="360" font-size="10" text-anchor="start" fill="#d97706" font-weight="normal" font-family="sans-serif">v_proj 同理 →</text>
<line x1="305" y1="160" x2="405" y2="160" stroke="#1e293b" stroke-width="2.2" marker-end="url(#a)"/>
<line x1="770" y1="195" x2="825" y2="195" stroke="#1e293b" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="40" y="340" width="1115" height="290" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="60" y="370" font-size="14.5" text-anchor="start" fill="#0f172a" font-weight="bold" font-family="sans-serif">一次 weight_loader 同时干两件事：fuse + TP 切分</text>
<text x="60" y="398" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">offset（fuse 定位）：q 段从 0 起、宽 num_heads×head_size；k 段紧跟其后；v 段再往后。三张独立 checkpoint 各自落进对应段。</text>
<text x="60" y="424" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">narrow（TP 切分）：从磁盘全量里按 start_idx = shard_rank × shard_size 切出本 rank 那一份，copy_ 进去。</text>
<text x="60" y="450" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif"></text>
<text x="60" y="476" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">q 与 k/v 的 shard_rank 不一样——这是 GQA 的关键：</text>
<text x="60" y="502" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">    q：shard_rank = tp_rank          （每张卡拿自己那批 query 头）</text>
<text x="60" y="528" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="monospace">    k/v：shard_rank = tp_rank // num_kv_head_replicas   （KV 头比卡少时，相邻几张卡复制同一份 K/V）</text>
<text x="60" y="554" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif"></text>
<text x="60" y="580" font-size="12.5" text-anchor="start" fill="#334155" font-weight="normal" font-family="sans-serif">三段式为何分开：先建空壳（峰值显存可控），再流式边读边切边填，最后才做 kernel 重排——三段职责清晰，与量化/TP/PP 正交。</text>
</svg>