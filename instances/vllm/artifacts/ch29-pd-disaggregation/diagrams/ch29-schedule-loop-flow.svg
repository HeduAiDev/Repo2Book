<text x="300.0" y="322.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">get_computed_blocks（本地命中）</text>
<text x="300.0" y="340.0" text-anchor="middle" font-size="12" font-family="monospace" font-weight="bold" fill="#1e3a8a">connector.get_num_new_matched_tokens</text>
<line x1="300" y1="356" x2="300" y2="386" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<polygon points="300,368 480,410 300,452 120,410" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="300" y="415.0" text-anchor="middle" font-size="12" font-family="monospace" font-weight="bold" fill="#92400e">ext_tokens is None ?</text>
<line x1="480" y1="410" x2="550" y2="410" stroke="#c2410c" stroke-width="2" marker-end="url(#ao)"/>
<text x="490" y="402" text-anchor="middle" font-size="11" fill="#c2410c">是 → 隔离，下步再问</text>
<rect x="550" y="388" width="300" height="44" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="700" y="408" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">隔离进 step_skipped_waiting</text>
<text x="700" y="425" text-anchor="middle" font-size="11" fill="#9a3412">pop + prepend，continue</text>
