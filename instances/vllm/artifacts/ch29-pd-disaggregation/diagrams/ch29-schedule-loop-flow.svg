<polygon points="300,86 480,128 300,170 120,128" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="300" y="133.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">_is_blocked_waiting_status?</text>
