<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1080" font-family="sans-serif">
<defs>
<marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
<marker id="ao" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#c2410c"/></marker>
</defs>
<rect width="920" height="1080" fill="white"/>
<rect x="120.0" y="30" width="360" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
<text x="300.0" y="57.0" text-anchor="middle" font-size="13" font-family="monospace" font-weight="bold" fill="#3730a3">_select_waiting_queue_for_scheduling()</text>
