<text x="308" y="567.0" font-size="11" fill="#334155">（两支都继续）</text>
<text x="486" y="506" font-size="11" fill="#1e40af">是 → num_new_tokens = 0</text>
<rect x="120.0" y="578" width="360" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="300.0" y="604.0" text-anchor="middle" font-size="11" font-family="monospace" font-weight="bold" fill="#166534">allocate_slots(</text>
<text x="300.0" y="622.0" text-anchor="middle" font-size="11" font-family="monospace" font-weight="bold" fill="#166534">  num_external_computed_tokens, delay_cache_blocks=load_kv_async)</text>
<line x1="300" y1="638" x2="300" y2="668" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<rect x="120.0" y="668" width="360" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="300.0" y="698.0" text-anchor="middle" font-size="12" font-family="monospace" font-weight="bold" fill="#166534">connector.update_state_after_alloc(...)</text>
<line x1="300" y1="718" x2="300" y2="748" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<polygon points="300,730 480,772 300,814 120,772" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="300" y="777.0" text-anchor="middle" font-size="12" font-family="monospace" font-weight="bold" fill="#92400e">load_kv_async ?</text>
<line x1="480" y1="772" x2="550" y2="772" stroke="#c2410c" stroke-width="2" marker-end="url(#ao)"/>
<rect x="550" y="750" width="300" height="44" rx="8" fill="#ffe4e6" stroke="#f43f5e" stroke-width="2"/>
<text x="700" y="768" text-anchor="middle" font-size="11" font-weight="bold" fill="#9f1239">status=WAITING_FOR_REMOTE_KVS</text>
<text x="700" y="785" text-anchor="middle" font-size="11" fill="#9f1239">隔离进 skipped，continue</text>
<line x1="300" y1="814" x2="300" y2="844" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<text x="308" y="833.0" font-size="11" fill="#334155">否</text>
<rect x="120.0" y="844" width="360" height="46" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
<text x="300.0" y="872.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">进入 running（正常 RUNNING）</text>
<line x1="300" y1="890" x2="300" y2="926" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
<text x="308" y="912.0" font-size="11" fill="#334155">（循环结束）</text>
<rect x="20" y="928" width="560" height="58" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="300.0" y="953.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">循环末尾：build_connector_meta(scheduler_output)</text>
<text x="300.0" y="971.0" text-anchor="middle" font-size="12" font-family="monospace" font-weight="bold" fill="#5b21b6">→ scheduler_output.kv_connector_metadata</text>
<text x="300" y="1010" text-anchor="middle" font-size="13" fill="#64748b">橙色出口 = 隔离避队头阻塞；红色 = 远程 KV 阻塞态</text>
</svg>