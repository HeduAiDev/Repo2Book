<text x="300" y="229.0" text-anchor="middle" font-size="12" font-family="monospace" font-weight="bold" fill="#92400e">num_computed_tokens == 0 ?</text>
<line x1="300" y1="266" x2="300" y2="296" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
