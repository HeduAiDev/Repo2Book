<text x="700" y="126" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">_try_promote_blocked_waiting_request</text>
<text x="700" y="143" text-anchor="middle" font-size="11" fill="#854d0e">成功→提升；失败→隔离</text>
<line x1="300" y1="170" x2="300" y2="200" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
