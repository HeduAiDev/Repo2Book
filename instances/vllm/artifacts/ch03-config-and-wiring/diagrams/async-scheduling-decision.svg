<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1280" height="620" fill="white"/>
<text x="40" y="38" font-size="20" font-weight="bold" fill="#0f172a">async_scheduling 三态决策（VllmConfig.__post_init__）</text>
<rect x="440" y="60" width="230" height="56" rx="7" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.6"/>
<text x="555.0" y="84" text-anchor="middle" font-size="13" fill="#0f172a">scheduler_config</text>
<text x="555.0" y="101" text-anchor="middle" font-size="13" fill="#0f172a">.async_scheduling 的值？</text>
<line x1="555.0" y1="116" x2="250.0" y2="200" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="362.5" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">True (显式开)</text>
<rect x="130" y="200" width="240" height="50" rx="7" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
<text x="250.0" y="221" text-anchor="middle" font-size="13" fill="#0f172a">硬校验：执行器</text>
<text x="250.0" y="238" text-anchor="middle" font-size="13" fill="#0f172a">supports_async_scheduling()?</text>
<line x1="555.0" y1="116" x2="590.0" y2="200" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="555.0" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">False (显式关)</text>
<rect x="470" y="200" width="240" height="50" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
<text x="590.0" y="229" text-anchor="middle" font-size="13" fill="#0f172a">直接采纳</text>
<line x1="555.0" y1="116" x2="930.0" y2="200" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="782.5" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">None (自动)</text>
<rect x="810" y="200" width="240" height="50" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="930.0" y="229" text-anchor="middle" font-size="13" fill="#0f172a">逐条排除不兼容项</text>
<line x1="250.0" y1="250" x2="180.0" y2="320" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="150" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">否</text>
<rect x="30" y="320" width="180" height="46" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="1.6"/>
<text x="120.0" y="347" text-anchor="middle" font-size="13" fill="#0f172a">raise ValueError</text>
<line x1="250.0" y1="250" x2="350" y2="320" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="350" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">是</text>
<rect x="270" y="320" width="170" height="46" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="355.0" y="347" text-anchor="middle" font-size="13" fill="#0f172a">enabled</text>
<line x1="590.0" y1="250" x2="590.0" y2="320" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="500.0" y="320" width="180" height="46" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
<text x="590.0" y="347" text-anchor="middle" font-size="13" fill="#0f172a">disabled</text>
<rect x="810" y="320" width="240" height="46" rx="7" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/>
<text x="930.0" y="347" text-anchor="middle" font-size="13" fill="#0f172a">runner_type == pooling?</text>
<line x1="930.0" y1="250" x2="930.0" y2="320" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="1050" y1="343" x2="1120" y2="343" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="1080" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">是</text>
<rect x="1120" y="320" width="150" height="40" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
<text x="1195.0" y="344" text-anchor="middle" font-size="12" fill="#0f172a">disabled</text>
<rect x="810" y="390" width="240" height="46" rx="7" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/>
<text x="930.0" y="417" text-anchor="middle" font-size="13" fill="#0f172a">有不兼容的投机方法?</text>
<line x1="930.0" y1="366" x2="930.0" y2="390" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="1050" y1="413" x2="1120" y2="413" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="1080" y="406" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">是</text>
<rect x="1120" y="390" width="150" height="40" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
<text x="1195.0" y="414" text-anchor="middle" font-size="12" fill="#0f172a">disabled</text>
<rect x="810" y="460" width="240" height="46" rx="7" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/>
<text x="930.0" y="487" text-anchor="middle" font-size="13" fill="#0f172a">执行器不支持 async?</text>
<line x1="930.0" y1="436" x2="930.0" y2="460" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="1050" y1="483" x2="1120" y2="483" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="1080" y="476" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">是</text>
<rect x="1120" y="460" width="150" height="40" rx="7" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
<text x="1195.0" y="484" text-anchor="middle" font-size="12" fill="#0f172a">disabled</text>
<line x1="930.0" y1="506" x2="930.0" y2="534" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="810" y="534" width="240" height="46" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="930.0" y="561" text-anchor="middle" font-size="13" fill="#0f172a">全否 → enabled</text>
<text x="40" y="604" font-size="12" fill="#64748b">默认 None 表示「自动」：默认想开 async，但遇到 pooling / 不兼容投机 / 执行器不支持就安全退化为 disabled。</text>
</svg>