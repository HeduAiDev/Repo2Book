<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
<rect width="900" height="500" fill="white"/>
<text x="450" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">同步 Scheduler vs 异步 AsyncScheduler：占位让调度/执行重叠</text>
<line x1="120.0" y1="64" x2="120.0" y2="470" stroke="#e2e8f0" stroke-width="1"/>
<text x="205" y="80" text-anchor="middle" font-size="13" fill="#64748b">拍 0</text>
<line x1="290.0" y1="64" x2="290.0" y2="470" stroke="#e2e8f0" stroke-width="1"/>
<text x="375" y="80" text-anchor="middle" font-size="13" fill="#64748b">拍 1</text>
<line x1="460.0" y1="64" x2="460.0" y2="470" stroke="#e2e8f0" stroke-width="1"/>
<text x="545" y="80" text-anchor="middle" font-size="13" fill="#64748b">拍 2</text>
<line x1="630.0" y1="64" x2="630.0" y2="470" stroke="#e2e8f0" stroke-width="1"/>
<text x="715" y="80" text-anchor="middle" font-size="13" fill="#64748b">拍 3</text>
<text x="20" y="140" font-size="14" font-weight="bold" fill="#0f172a">同步</text>
<text x="20" y="158" font-size="11" fill="#64748b">Scheduler</text>
<rect x="126" y="110" width="75" height="34" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="164" y="131" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 0</text>
<rect x="207" y="110" width="77" height="34" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
<text x="246" y="131" text-anchor="middle" font-size="11.5" fill="#0f172a">fwd 0</text>
<rect x="296" y="110" width="75" height="34" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="334" y="131" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 1</text>
<rect x="377" y="110" width="77" height="34" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
<text x="416" y="131" text-anchor="middle" font-size="11.5" fill="#0f172a">fwd 1</text>
<rect x="466" y="110" width="75" height="34" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="504" y="131" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 2</text>
<rect x="547" y="110" width="77" height="34" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
<text x="586" y="131" text-anchor="middle" font-size="11.5" fill="#0f172a">fwd 2</text>
<text x="120" y="172" font-size="11.5" fill="#b91c1c">sched 必须等上一拍 fwd 出 token 才能算 num_computed_tokens → GPU 有气泡</text>
<text x="20" y="280" font-size="14" font-weight="bold" fill="#0f172a">异步</text>
<text x="20" y="298" font-size="11" fill="#64748b">AsyncScheduler</text>
<rect x="126" y="250" width="156" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="204" y="269" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 0</text>
<rect x="296" y="250" width="156" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="374" y="269" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 1</text>
<rect x="466" y="250" width="156" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="544" y="269" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 2</text>
<rect x="636" y="250" width="156" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="714" y="269" text-anchor="middle" font-size="11.5" fill="#0f172a">sched 3</text>
<rect x="296" y="286" width="156" height="30" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
<text x="374" y="305" text-anchor="middle" font-size="11.5" fill="#0f172a">fwd 0</text>
<rect x="466" y="286" width="156" height="30" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
<text x="544" y="305" text-anchor="middle" font-size="11.5" fill="#0f172a">fwd 1</text>
<rect x="636" y="286" width="156" height="30" rx="5" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
<text x="714" y="305" text-anchor="middle" font-size="11.5" fill="#0f172a">fwd 2</text>
<text x="290" y="340" font-size="11.5" fill="#15803d">sched 1 与 fwd 0 同墙钟重叠 —— 靠 num_output_placeholders 占位预调度下一拍 decode 槽</text>
<text x="20" y="378" font-size="12.5" font-weight="bold" fill="#0f172a">num_output_placeholders</text>
<rect x="179" y="388" width="52" height="30" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
<text x="205" y="408" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">0</text>
<rect x="349" y="388" width="52" height="30" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
<text x="375" y="408" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">1</text>
<text x="375" y="434" text-anchor="middle" font-size="10" fill="#475569">sched0 +1</text>
<rect x="519" y="388" width="52" height="30" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
<text x="545" y="408" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">2 → 1</text>
<text x="545" y="434" text-anchor="middle" font-size="10" fill="#475569">sched1 +1 / fwd0 −1</text>
<rect x="689" y="388" width="52" height="30" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
<text x="715" y="408" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">1 → ...</text>
<text x="715" y="434" text-anchor="middle" font-size="10" fill="#475569">配平</text>
<text x="450" y="492" text-anchor="middle" font-size="12.5" fill="#475569" font-style="italic">占位 += 1+num_spec_tokens（调度时），−= len(new_token_ids)（token 回流时），始终配平且 ≥ 0</text>
</svg>