<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460">
<rect width="880" height="460" fill="white"/>
<text x="440" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">一拍 token_budget = 64 的分配（批大小 = token 数）</text>
<rect x="60" y="130" width="760" height="56" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="60.0" y="130" width="11.9" height="56" fill="#22c55e" stroke="white" stroke-width="1.5"/>
<line x1="65.9" y1="130" x2="65.9" y2="120.0" stroke="#16a34a" stroke-width="0.8"/>
<text x="61.9" y="116.0" text-anchor="end" font-size="10.5" fill="#166534">decode a (1)</text>
<rect x="71.9" y="130" width="11.9" height="56" fill="#22c55e" stroke="white" stroke-width="1.5"/>
<line x1="77.8" y1="130" x2="77.8" y2="102.0" stroke="#16a34a" stroke-width="0.8"/>
<text x="73.8" y="98.0" text-anchor="end" font-size="10.5" fill="#166534">decode b (1)</text>
<rect x="83.8" y="130" width="11.9" height="56" fill="#22c55e" stroke="white" stroke-width="1.5"/>
<line x1="89.7" y1="130" x2="89.7" y2="84.0" stroke="#16a34a" stroke-width="0.8"/>
<text x="85.7" y="80.0" text-anchor="end" font-size="10.5" fill="#166534">decode c (1)</text>
<rect x="95.6" y="130" width="475.0" height="56" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
<text x="333.1" y="154" text-anchor="middle" font-size="12.5" fill="white" font-weight="bold">prefill d (chunk)</text>
<text x="333.1" y="172" text-anchor="middle" font-size="12.5" fill="white">40 tok</text>
<rect x="570.6" y="130" width="249.4" height="56" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
<text x="695.3" y="154" text-anchor="middle" font-size="12.5" fill="white" font-weight="bold">prefill e (chunk)</text>
<text x="695.3" y="172" text-anchor="middle" font-size="12.5" fill="white">21 tok</text>
<line x1="820" y1="116" x2="820" y2="200" stroke="#dc2626" stroke-width="2.5"/>
<text x="820" y="108" text-anchor="end" font-size="13" font-weight="bold" fill="#dc2626">max_num_scheduled_tokens = 64</text>
<text x="60" y="236" font-size="13" fill="#334155" font-weight="bold">token_budget 逐段递减：</text>
<text x="60" y="260" font-size="14" fill="#0f172a" font-family="monospace">64 → 63 → 62 → 61 → 21 → 0</text>
<rect x="60" y="340" width="22" height="22" fill="#22c55e"/>
<text x="90" y="356" font-size="13.5" fill="#0f172a">RUNNING 的 decode：每请求 1 token（追赶公式 = 1）</text>
<rect x="60" y="374" width="22" height="22" fill="#3b82f6"/>
<text x="90" y="390" font-size="13.5" fill="#0f172a">WAITING 的 prefill chunk：数十~数百 token，按剩余预算截断</text>
<text x="440" y="434" text-anchor="middle" font-size="13.5" fill="#475569" font-style="italic">prefill 的大块与 decode 的单 token 共享同一个预算池 —— 同一拍混批，不分相</text>
</svg>