<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 720">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/></marker></defs>
<rect width="860" height="720" fill="white"/>
<text x="430" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">schedule()：先 RUNNING 后 WAITING 的两阶段</text>
<rect x="40" y="58" width="380" height="360" rx="9" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="60" y="80" font-size="14.5" font-weight="bold" fill="#166534">阶段 1 · 遍历 self.running（RUNNING 优先）</text>
<rect x="130" y="92" width="300" height="46" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
<text x="280.0" y="121.2" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">token_budget = max_num_scheduled_tokens</text>
<rect x="130" y="156" width="300" height="56" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
<text x="280.0" y="182.5" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f172a">num_new_tokens =</text>
<text x="280.0" y="198.0" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">num_tokens_with_spec − num_computed_tokens</text>
<rect x="130" y="230" width="300" height="44" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
<text x="280.0" y="258.2" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#0f172a">allocate_slots(request, num_new_tokens)</text>
<polygon points="280,300 360,334 280,368 200,334" fill="#fef9c3" stroke="#eab308" stroke-width="1.8"/>
<text x="280" y="330" text-anchor="middle" font-size="12" fill="#854d0e">new_blocks</text>
<text x="280" y="346" text-anchor="middle" font-size="12" fill="#854d0e">是 None?</text>
<line x1="280" y1="138" x2="280" y2="156" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="280" y1="212" x2="280" y2="230" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="280" y1="274" x2="280" y2="300" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="470" y="306" width="320" height="56" rx="7" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
<text x="630.0" y="332.5" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0f172a">否则抢占：self.running.pop() → _preempt_request</text>
<text x="630.0" y="347.0" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#0f172a">被抢者回 waiting、num_computed_tokens = 0</text>
<line x1="360" y1="334" x2="470" y2="334" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="421.0" y="331.0" font-size="11.5" fill="#dc2626">是</text>
<path d="M790,306 L820,306 L820,252 L450,252" fill="none" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#ar)"/>
<text x="700" y="247" font-size="11" fill="#dc2626">重试分配</text>
<line x1="200" y1="334" x2="120" y2="334" stroke="#16a34a" stroke-width="1.8" marker-end="url(#a)"/>
<text x="166.0" y="331.0" font-size="11.5" fill="#16a34a">否</text>
<rect x="40" y="350" width="150" height="56" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
<text x="115.0" y="369.8" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#0f172a">记账：</text>
<text x="115.0" y="383.2" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#0f172a">num_scheduled_tokens[id]</text>
<text x="115.0" y="396.8" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#0f172a">budget −= n</text>
<line x1="115" y1="334" x2="115" y2="350" stroke="#16a34a" stroke-width="1.8" marker-end="url(#a)"/>
<polygon points="230,440 360,470 230,500 100,470" fill="#fef9c3" stroke="#eab308" stroke-width="1.8"/>
<text x="230" y="466" text-anchor="middle" font-size="12" fill="#854d0e">if not preempted_reqs</text>
<text x="230" y="482" text-anchor="middle" font-size="12" fill="#854d0e">本拍发生过抢占?</text>
<line x1="280" y1="418" x2="230" y2="440" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="40" y="518" width="500" height="170" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="60" y="540" font-size="14.5" font-weight="bold" fill="#1e40af">阶段 2 · 遍历 self.waiting（仅当未抢占且 UNPAUSED）</text>
<rect x="130" y="552" width="320" height="50" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
<text x="290.0" y="575.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">前缀缓存命中 → num_computed_tokens</text>
<text x="290.0" y="589.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">num_new_tokens = num_tokens − num_computed_tokens</text>
<rect x="130" y="614" width="320" height="50" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
<text x="290.0" y="637.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">allocate_slots 成功 → self.running.append</text>
<text x="290.0" y="651.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">WAITING→new_reqs / PREEMPTED→resumed_reqs</text>
<line x1="290" y1="602" x2="290" y2="614" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="230" y1="500" x2="290" y2="552" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a)"/>
<text x="266.0" y="523.0" font-size="11.5" fill="#2563eb">否</text>
<rect x="560" y="444" width="270" height="52" rx="7" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
<text x="695.0" y="468.5" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0f172a">是：跳过 WAITING 阶段</text>
<text x="695.0" y="483.0" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#0f172a">（刚释放的内存不让新请求占走）</text>
<line x1="360" y1="470" x2="560" y2="470" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="466.0" y="467.0" font-size="11.5" fill="#dc2626">是</text>
<rect x="560" y="594" width="270" height="64" rx="7" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.8"/>
<text x="695.0" y="617.5" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">组装 SchedulerOutput</text>
<text x="695.0" y="631.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">new_reqs(全量) + cached_reqs(增量)</text>
<text x="695.0" y="645.5" text-anchor="middle" font-size="11" font-weight="normal" fill="#0f172a">+ _update_after_schedule 乐观推进</text>
<line x1="450" y1="639" x2="560" y2="624" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="695" y1="496" x2="695" y2="594" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
</svg>