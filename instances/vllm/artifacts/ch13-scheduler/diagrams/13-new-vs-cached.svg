<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
<rect width="880" height="470" fill="white"/>
<text x="440" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">SchedulerOutput 二分：全量首发 vs 增量续发</text>
<rect x="40" y="70" width="360" height="340" rx="9" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
<text x="220.0" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#b91c1c">NewRequestData（首次调度 · 全量）</text>
<text x="220.0" y="120" text-anchor="middle" font-size="12.5" fill="#7f1d1d">scheduled_new_reqs — WAITING 第一次进 running</text>
<rect x="56" y="140" width="328" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="68" y="157" font-size="13" font-weight="bold" font-family="monospace" fill="#991b1b">prompt_token_ids</text>
<text x="68" y="173" font-size="11" fill="#7f1d1d">全部 prompt token</text>
<rect x="56" y="184" width="328" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="68" y="201" font-size="13" font-weight="bold" font-family="monospace" fill="#991b1b">sampling_params</text>
<text x="68" y="217" font-size="11" fill="#7f1d1d">采样参数（温度/max_tokens…）</text>
<rect x="56" y="228" width="328" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="68" y="245" font-size="13" font-weight="bold" font-family="monospace" fill="#991b1b">mm_features</text>
<text x="68" y="261" font-size="11" fill="#7f1d1d">多模态特征</text>
<rect x="56" y="272" width="328" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="68" y="289" font-size="13" font-weight="bold" font-family="monospace" fill="#991b1b">block_ids</text>
<text x="68" y="305" font-size="11" fill="#7f1d1d">首批 KV 块</text>
<rect x="56" y="316" width="328" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="68" y="333" font-size="13" font-weight="bold" font-family="monospace" fill="#991b1b">num_computed_tokens</text>
<text x="68" y="349" font-size="11" fill="#7f1d1d">已算 token 数</text>
<rect x="56" y="360" width="328" height="38" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="68" y="377" font-size="13" font-weight="bold" font-family="monospace" fill="#991b1b">lora_request</text>
<text x="68" y="393" font-size="11" fill="#7f1d1d">LoRA 适配器</text>
<rect x="480" y="70" width="360" height="340" rx="9" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
<text x="660.0" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803d">CachedRequestData（后续步 · 增量 diff）</text>
<text x="660.0" y="120" text-anchor="middle" font-size="12.5" fill="#14532d">scheduled_cached_reqs — running / resumed 续发</text>
<rect x="496" y="140" width="328" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
<text x="508" y="157" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">req_ids</text>
<text x="508" y="173" font-size="11" fill="#14532d">只发 id，静态数据 worker 已缓存</text>
<rect x="496" y="184" width="328" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
<text x="508" y="201" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">new_block_ids</text>
<text x="508" y="217" font-size="11" fill="#14532d">本拍新增的 KV 块（追加）</text>
<rect x="496" y="228" width="328" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
<text x="508" y="245" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">num_computed_tokens</text>
<text x="508" y="261" font-size="11" fill="#14532d">更新后的已算 token 数</text>
<rect x="496" y="272" width="328" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
<text x="508" y="289" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">num_output_tokens</text>
<text x="508" y="305" font-size="11" fill="#14532d">已出 token 数（含占位）</text>
<rect x="496" y="316" width="328" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
<text x="508" y="333" font-size="13" font-weight="bold" font-family="monospace" fill="#166534">resumed_req_ids</text>
<text x="508" y="349" font-size="11" fill="#14532d">抢占恢复者：替换 block 而非追加</text>
<line x1="404" y1="240" x2="474" y2="240" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#a)"/>
<text x="440.0" y="228" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7c3aed">worker 缓存全量后</text>
<text x="440.0" y="262" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7c3aed">每拍只收 diff</text>
<text x="440" y="442" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">prev_step_scheduled_req_ids 判定谁「上一拍没调度」，需补传 all_token_ids —— 把 IPC 通信量压到最小</text>
</svg>