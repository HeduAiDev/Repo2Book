<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 470" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1180" height="470" fill="white"/>
<text x="590.0" y="30" text-anchor="middle" font-size="18" fill="#0f172a" font-weight="bold">单请求逐位置接受 / 拒绝：首个拒绝即截断，全接受补 bonus</text>
<text x="40" y="96" text-anchor="start" font-size="15" fill="#0f172a" font-weight="bold">random 路径（rejection_random_sample_kernel）</text>
<rect x="90" y="110" width="150" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="165.0" y="140.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos0 accept</text>
<text x="165.0" y="157.0" text-anchor="middle" font-size="11" fill="#475569">p_t/p_d ≥ u</text>
<rect x="258" y="110" width="150" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="333.0" y="140.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos1 accept</text>
<text x="333.0" y="157.0" text-anchor="middle" font-size="11" fill="#475569">p_t/p_d ≥ u</text>
<line x1="240" y1="142" x2="258" y2="142" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="426" y="110" width="150" height="64" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="501.0" y="140.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos2 REJECT</text>
<text x="501.0" y="157.0" text-anchor="middle" font-size="11" fill="#475569">取 recovered，停</text>
<line x1="408" y1="142" x2="426" y2="142" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="594" y="110" width="150" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="669.0" y="140.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos3 = -1</text>
<text x="669.0" y="157.0" text-anchor="middle" font-size="11" fill="#475569">PLACEHOLDER</text>
<line x1="576" y1="142" x2="594" y2="142" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="762" y="110" width="150" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="837.0" y="140.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">无 bonus</text>
<text x="837.0" y="157.0" text-anchor="middle" font-size="11" fill="#475569">rejected=True</text>
<line x1="744" y1="142" x2="762" y2="142" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<text x="590.0" y="198" text-anchor="middle" font-size="12.5" fill="#475569" font-weight="normal">接受准则 accepted = (target_prob/draft_prob ≥ uniform)；拒绝处写 recovered，后续位保留 -1，不补 bonus</text>
<text x="40" y="286" text-anchor="start" font-size="15" fill="#0f172a" font-weight="bold">greedy 路径（rejection_greedy_sample_kernel）</text>
<rect x="90" y="300" width="150" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="165.0" y="330.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos0 accept</text>
<text x="165.0" y="347.0" text-anchor="middle" font-size="11" fill="#475569">draft==argmax</text>
<rect x="258" y="300" width="150" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="333.0" y="330.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos1 accept</text>
<text x="333.0" y="347.0" text-anchor="middle" font-size="11" fill="#475569">draft==argmax</text>
<line x1="240" y1="332" x2="258" y2="332" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="426" y="300" width="150" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="501.0" y="330.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">pos2 accept</text>
<text x="501.0" y="347.0" text-anchor="middle" font-size="11" fill="#475569">draft==argmax</text>
<line x1="408" y1="332" x2="426" y2="332" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="594" y="300" width="150" height="64" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="669.0" y="330.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">全部接受</text>
<text x="669.0" y="347.0" text-anchor="middle" font-size="11" fill="#475569">rejected=False</text>
<line x1="576" y1="332" x2="594" y2="332" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="762" y="300" width="150" height="64" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
<text x="837.0" y="330.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">+ bonus</text>
<text x="837.0" y="347.0" text-anchor="middle" font-size="11" fill="#475569">采自最后行</text>
<line x1="744" y1="332" x2="762" y2="332" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<text x="590.0" y="388" text-anchor="middle" font-size="12.5" fill="#475569" font-weight="normal">draft_token_id == target_argmax_id 即接受；3 个草稿全中 → 在第 num_draft 槽追加 bonus → 这一轮吐 4 个 token</text>
<text x="590.0" y="440" text-anchor="middle" font-size="13" fill="#7c2d12" font-weight="normal">两条 kernel 用 is_greedy mask 在同一 batch 内共存：各自跳过不属于自己的请求</text>
</svg>