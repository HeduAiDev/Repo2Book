<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 360" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1240" height="360" fill="white"/>
<text x="620.0" y="30" text-anchor="middle" font-size="18" fill="#0f172a" font-weight="bold">投机解码一轮：一次目标前向产出 k+1 个 token</text>
<rect x="26" y="90" width="178" height="78" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="115.0" y="127.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">proposer 产草稿</text>
<text x="115.0" y="144.0" text-anchor="middle" font-size="11" fill="#475569">ngram / EAGLE / MTP</text>
<text x="115.0" y="194" text-anchor="middle" font-size="11" fill="#64748b" font-weight="normal">list[list[int]]</text>
<rect x="226" y="90" width="178" height="78" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="315.0" y="127.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">摊平 + 建 index</text>
<text x="315.0" y="144.0" text-anchor="middle" font-size="11" fill="#475569">SpecDecodeMetadata</text>
<text x="315.0" y="194" text-anchor="middle" font-size="11" fill="#64748b" font-weight="normal">draft [num_tokens]</text>
<line x1="204" y1="129.0" x2="226" y2="129.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="426" y="90" width="178" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
<text x="515.0" y="127.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">目标模型一次前向</text>
<text x="515.0" y="144.0" text-anchor="middle" font-size="11" fill="#475569">扁平 logits</text>
<text x="515.0" y="194" text-anchor="middle" font-size="11" fill="#64748b" font-weight="normal">[num_tokens+batch, vocab]</text>
<line x1="404" y1="129.0" x2="426" y2="129.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="626" y="90" width="178" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="715.0" y="127.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">切 target / bonus</text>
<text x="715.0" y="144.0" text-anchor="middle" font-size="11" fill="#475569">RejectionSampler.forward</text>
<text x="715.0" y="194" text-anchor="middle" font-size="11" fill="#64748b" font-weight="normal">target / bonus logits</text>
<line x1="604" y1="129.0" x2="626" y2="129.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="826" y="90" width="178" height="78" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="915.0" y="127.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">逐位接受 / 拒绝</text>
<text x="915.0" y="144.0" text-anchor="middle" font-size="11" fill="#475569">rejection_sample</text>
<text x="915.0" y="194" text-anchor="middle" font-size="11" fill="#64748b" font-weight="normal">[batch, max_spec_len+1]</text>
<line x1="804" y1="129.0" x2="826" y2="129.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="1026" y="90" width="178" height="78" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
<text x="1115.0" y="127.0" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">还原变长</text>
<text x="1115.0" y="144.0" text-anchor="middle" font-size="11" fill="#475569">parse_output</text>
<text x="1115.0" y="194" text-anchor="middle" font-size="11" fill="#64748b" font-weight="normal">list[list[int]]</text>
<line x1="1004" y1="129.0" x2="1026" y2="129.0" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
<text x="620.0" y="300" text-anchor="middle" font-size="13" fill="#7c2d12" font-weight="normal">全 k 个草稿被接受时，最后一行 logits 顺手再采一个 bonus token —— 输出第二维 max_spec_len+1 的那个 +1</text>
<text x="620.0" y="326" text-anchor="middle" font-size="12" fill="#64748b" font-weight="normal">承接 ch27 采样层（target/bonus 都过普通 sampler）与 ch25 的 MTP draft 头</text>
