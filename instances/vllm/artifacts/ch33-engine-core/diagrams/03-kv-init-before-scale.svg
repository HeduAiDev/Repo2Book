<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ah" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="820" height="540" fill="white"/>
<text x="410.0" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">新引擎：扩入发生在 KV cache 初始化之前</text>
<rect x="130.0" y="70" width="560" height="56" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="410.0" y="96.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">EngineCore.__init__</text>
<text x="410.0" y="111.0" text-anchor="middle" font-size="11" fill="#475569">见 VLLM_ELASTIC_EP_SCALE_UP_LAUNCH=1</text>
<rect x="130.0" y="154" width="560" height="56" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="410.0" y="180.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">_eep_scale_up_before_kv_init()</text>
<text x="410.0" y="195.0" text-anchor="middle" font-size="11" fill="#475569">建 worker_type="new" 状态机</text>
<line x1="410.0" y1="126" x2="410.0" y2="154" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="130.0" y="238" width="560" height="56" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="410.0" y="264.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">run_pre_kv_init_states()  [PRE_KV_INIT]</text>
<text x="410.0" y="279.0" text-anchor="middle" font-size="11" fill="#475569">发 WEIGHTS_INIT_READY · receive_weights</text>
<line x1="410.0" y1="210" x2="410.0" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="130.0" y="322" width="560" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="410.0" y="348.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">sync_kv_cache_memory_size(new_dp_group)</text>
<text x="410.0" y="363.0" text-anchor="middle" font-size="11" fill="#475569">→ available_gpu_memory_for_kv_cache（全组统一额度）</text>
<line x1="410.0" y1="294" x2="410.0" y2="322" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="130.0" y="406" width="560" height="56" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="410.0" y="432.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">_initialize_kv_caches()</text>
<text x="410.0" y="447.0" text-anchor="middle" font-size="11" fill="#475569">用同步额度分配，而非各自 determine_available_memory()</text>
<line x1="410.0" y1="378" x2="410.0" y2="406" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<path d="M700.0,350.0 C760.0,350.0 760.0,434.0 700.0,434.0" fill="none" stroke="#b45309" stroke-width="2" marker-end="url(#ah)"/>
<text x="766.0" y="392.0" text-anchor="start" font-size="12" font-weight="bold" fill="#b45309">复用</text>
<text x="766.0" y="408.0" text-anchor="start" font-size="12" font-weight="bold" fill="#b45309">额度</text>
<text x="410.0" y="524" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">若新引擎自己 profiling，DP 组内各 rank 显存/块数会不一致；先同步、再分配，从源头消除分歧</text>
</svg>