<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ah" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="860" height="540" fill="white"/>
<text x="430.0" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">scale_down：减引擎时余留引擎与被裁引擎的两条短链</text>
<text x="190.0" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">余留引擎  ScaleDownRemainingEngineState</text>
<text x="670.0" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">被裁引擎  ScaleDownRemovingEngineState</text>
<rect x="70" y="80" width="240" height="64" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="190.0" y="110.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">PREPARE</text>
<text x="190.0" y="125.0" text-anchor="middle" font-size="11" fill="#475569">登记 eep_barrier_engine_count</text>
<rect x="70" y="174" width="240" height="64" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="190.0" y="204.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">EPLB_RESHUFFLE</text>
<text x="190.0" y="219.0" text-anchor="middle" font-size="11" fill="#475569">reshuffle→建组→switch→update_config</text>
<line x1="190.0" y1="144" x2="190.0" y2="174" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="70" y="268" width="240" height="64" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="190.0" y="298.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">SWITCH_AND_PREPARE</text>
<text x="190.0" y="313.0" text-anchor="middle" font-size="11" fill="#475569">(并入上一态内顺序完成)</text>
<line x1="190.0" y1="238" x2="190.0" y2="268" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="70" y="362" width="240" height="64" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="190.0" y="398.3333333333333" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">COMPLETE</text>
<line x1="190.0" y1="332" x2="190.0" y2="362" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="550" y="80" width="240" height="64" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="670.0" y="110.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">PREPARE</text>
<text x="670.0" y="125.0" text-anchor="middle" font-size="11" fill="#475569">登记 eep_barrier_engine_count</text>
<rect x="550" y="174" width="240" height="64" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="670.0" y="204.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">EPLB_RESHUFFLE</text>
<text x="670.0" y="219.0" text-anchor="middle" font-size="11" fill="#475569">reshuffle→switch_and_remove</text>
<line x1="670.0" y1="144" x2="670.0" y2="174" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="550" y="268" width="240" height="64" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="670.0" y="298.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">COMPLETE</text>
<text x="670.0" y="313.0" text-anchor="middle" font-size="11" fill="#475569">发 SHUTDOWN_COMPLETE</text>
<line x1="670.0" y1="238" x2="670.0" y2="268" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="550" y="362" width="240" height="40" rx="6" fill="#fecaca" stroke="#b91c1c" stroke-width="1.5"/>
<text x="670.0" y="386.0" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">run_busy_loop → raise SystemExit</text>
<line x1="670.0" y1="332" x2="670.0" y2="362" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a)"/>
<text x="430.0" y="526" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">余留引擎在一个 EPLB_RESHUFFLE 态内连做 reshuffle→建组→切换→更新 config，比 scale_up 紧凑</text>
</svg>