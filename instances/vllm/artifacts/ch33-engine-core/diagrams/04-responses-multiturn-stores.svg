<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ah" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="900" height="540" fill="white"/>
<text x="450.0" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Responses 多轮：msg_store 的 list 与 context._messages 是同一对象</text>
<line x1="70" y1="60" x2="70" y2="490" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="70" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">客户端</text>
<line x1="360" y1="60" x2="360" y2="490" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="360" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">OpenAIServingResponses</text>
<line x1="720" y1="60" x2="720" y2="490" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="720" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">response_store / msg_store</text>
<text x="70" y="80" text-anchor="start" font-size="13" font-weight="bold" fill="#0369a1">── 轮 1 ──</text>
<line x1="70" y1="100" x2="360" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<text x="215.0" y="94" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">create_responses(input="my name is Bob")</text>
<rect x="370" y="116" width="300" height="34" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="520.0" y="136.66666666666666" text-anchor="middle" font-size="11" font-weight="normal" fill="#1e293b">construct_input_messages → messages</text>
<line x1="520" y1="176" x2="720" y2="176" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
<text x="620.0" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">store: msg_store[id1] = messages</text>
<rect x="210" y="196" width="300" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="360.0" y="213.0" text-anchor="middle" font-size="11" font-weight="normal" fill="#1e293b">生成 → context.append_output</text>
<text x="360.0" y="226.0" text-anchor="middle" font-size="9" fill="#475569">self._messages.extend(output)</text>
<path d="M510,215 C540.0,215 540.0,176 720,176" fill="none" stroke="#b45309" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#ah)"/>
<text x="560.0" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">同一 list 对象 → output 自动留存</text>
<line x1="520" y1="290" x2="720" y2="290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
<text x="620.0" y="284" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">response_store[id1] = response</text>
<line x1="40" y1="316" x2="860" y2="316" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
<text x="70" y="340" text-anchor="start" font-size="13" font-weight="bold" fill="#0369a1">── 轮 2 ──</text>
<line x1="70" y1="360" x2="360" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<text x="215.0" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">create_responses(prev_id=id1, input="what is my name?")</text>
<line x1="720" y1="404" x2="520" y2="404" stroke="#0369a1" stroke-width="1.5" marker-end="url(#a)"/>
<text x="620.0" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">prev = response_store.get(id1)  ·  hist = msg_store[id1]</text>
<rect x="210" y="424" width="300" height="42" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="360.0" y="443.0" text-anchor="middle" font-size="12" font-weight="normal" fill="#1e293b">拼历史 + 本轮 input</text>
<text x="360.0" y="457.0" text-anchor="middle" font-size="10" fill="#475569">construct_input_messages(_with_harmony)</text>
<line x1="360" y1="496" x2="70" y2="496" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
<text x="215.0" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">resp2（已知 "Bob"）</text>
<text x="450.0" y="522" text-anchor="middle" font-size="12" font-weight="normal" fill="#64748b">上轮 output 无需显式写回——因 msg_store[id] 与 context._messages 共享同一 list，续轮取回即得完整历史</text>
</svg>