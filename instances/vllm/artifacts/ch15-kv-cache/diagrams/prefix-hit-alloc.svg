<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560"><defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ared" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker><marker id="agrn" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#15803d"/></marker><marker id="ablu" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1d4ed8"/></marker></defs><rect width="880" height="560" fill="white"/><text x="440.0" y="30" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1e293b" font-weight="bold">allocate_slots 三段式 + 前缀命中复用时序</text><rect x="70" y="60" width="740" height="66" rx="8" fill="#eef2ff" stroke="#475569" stroke-width="1.5"/><text x="96" y="84" font-family="sans-serif" font-size="13" text-anchor="start" fill="#1e293b" font-weight="bold">段前　get_computed_blocks：沿 block_hashes 查 cached_block_hash_to_block</text><text x="120" y="104" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">命中 k 块即停（链一断即停）→ num_new_computed_tokens = k·block_size</text><text x="120" y="122" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">max_cache_hit_length = num_tokens − 1（至少重算最后一个 token 取 logits）</text><line x1="440" y1="126" x2="440" y2="144" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/><rect x="70" y="144" width="740" height="48" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/><text x="96" y="168" font-family="sans-serif" font-size="13" text-anchor="start" fill="#1e293b" font-weight="bold">段一　容量检查</text><text x="120" y="188" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">num_blocks_to_allocate（含可驱逐命中块计数）&gt; 空闲块数 → 返回 None</text><line x1="440" y1="192" x2="440" y2="210" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/><rect x="70" y="210" width="740" height="66" rx="8" fill="#ecfdf5" stroke="#475569" stroke-width="1.5"/><text x="96" y="234" font-family="sans-serif" font-size="13" text-anchor="start" fill="#1e293b" font-weight="bold">段二　allocate_new_computed_blocks → touch(命中块)</text><text x="120" y="254" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">ref_cnt += 1；若命中块 ref_cnt 原为 0（在 free queue）→ remove() 救回</text><text x="120" y="272" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">挂进 req_to_blocks，标记 num_cached_block，不重新分配物理块</text><line x1="440" y1="276" x2="440" y2="294" stroke="#15803d" stroke-width="1.6" marker-end="url(#agrn)"/><rect x="70" y="294" width="740" height="66" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/><text x="96" y="318" font-family="sans-serif" font-size="13" text-anchor="start" fill="#1e293b" font-weight="bold">段三　allocate_new_blocks → get_new_blocks(剩余 token 的块数)</text><text x="120" y="338" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">popleft_n 取块；每块 _maybe_evict_cached_block（有旧 hash 则摘除并 reset）</text><text x="120" y="356" font-family="monospace" font-size="11" text-anchor="start" fill="#334155" font-weight="normal">再 cache_blocks → cache_full_blocks 给新满块写 hash 并 insert 进 map</text><rect x="70" y="378" width="740" height="46" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/><text x="90" y="397" font-family="sans-serif" font-size="11" text-anchor="start" fill="#7f1d1d" font-weight="normal">被抢占请求重排回来：从 0 重 prefill，但其前缀块若未被取走复用、hash 仍在 map →</text><text x="90" y="416" font-family="sans-serif" font-size="11" text-anchor="start" fill="#7f1d1d" font-weight="bold">get_computed_blocks 直接命中、touch 救回，重算只剩命中长度之外的部分。</text></svg>