mily="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">cache_salt（仅首块）</text><text x="740" y="300" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#475569" font-weight="normal">显式租户命名空间隔离</text><text x="450.0" y="398" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#b91c1c" font-weight="normal">相同 token 但 parent / extra 不同 → 不同 hash，杜绝跨语义错误命中别人的 KV</text></svg>