94a3b8" stroke-width="1.5"/><text x="95" y="233" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">head</text><rect x="156" y="210" width="70" height="36" rx="6" fill="#fde68a" stroke="#2563eb" stroke-width="1.5"/><text x="191" y="233" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk2</text><line x1="130" y1="228" x2="154" y2="228" stroke="#94a3b8" stroke-width="1.3"/><line x1="154" y1="234" x2="130" y2="234" stroke="#cbd5e1" stroke-width="1.0"/><rect x="252" y="210" width="70" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="287" y="233" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk3</text><line x1="226" y1="228" x2="250" y2="228" stroke="#94a3b8" stroke-width="1.3"/><line x1="250" y1="234" x2="226" y2="234" stroke="#cbd5e1" stroke-width="1.0"/><rect x="348" y="210" width="70" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="383" y="233" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk4</text><line x1="322" y1="228" x2="346" y2="228" stroke="#94a3b8" stroke-width="1.3"/><line x1="346" y1="234" x2="322" y2="234" stroke="#cbd5e1" stroke-width="1.0"/><rect x="444" y="210" width="70" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="479" y="233" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk5</text><line x1="418" y1="228" x2="442" y2="228" stroke="#94a3b8" stroke-width="1.3"/><line x1="442" y1="234" x2="418" y2="234" stroke="#cbd5e1" stroke-width="1.0"/><rect x="540" y="210" width="70" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/><text x="575" y="233" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">tail</text><line x1="514" y1="228" x2="538" y2="228" stroke="#94a3b8" stroke-width="1.3"/><line x1="538" y1="234" x2="514" y2="234" stroke="#cbd5e1" stroke-width="1.0"/><text x="60" y="268" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">下一个 LRU 候选变成 blk2；num_free_blocks 减 1</text><text x="60" y="328" font-family="sans-serif" font-size="12" text-anchor="start" fill="#334155" font-weight="bold">③ free_blocks(reversed)：请求块逆序入队尾</text><rect x="60" y="340" width="70" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/><text x="95" y="363" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">head</text><rect x="156" y="340" width="70" height="36" rx="6" fill="#fde68a" stroke="#2563eb" stroke-width="1.5"/><text x="191" y="363" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk2</text><line x1="130" y1="358" x2="154" y2="358" stroke="#94a3b8" stroke-width="1.3"/><line x1="154" y1="364" x2="130" y2="364" stroke="#cbd5e1" stroke-width="1.0"/><rect x="252" y="340" width="70" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="287" y="363" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk3</text><line x1="226" y1="358" x2="250" y2="358" stroke="#94a3b8" stroke-width="1.3"/><line x1="250" y1="364" x2="226" y2="364" stroke="#cbd5e1" stroke-width="1.0"/><rect x="348" y="340" width="70" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="383" y="363" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">blk5</text><line x1="322" y1="358" x2="346" y2="358" stroke="#94a3b8" stroke-width="1.3"/><line x1="346" y1="364" x2="322" y2="364" stroke="#cbd5e1" stroke-width="1.0"/><rect x="444" y="340" width="70" height="36" rx="6" fill="#bbf7d0" stroke="#2563eb" stroke-width="1.5"/><text x="479" y="363" font-family="monospace" 