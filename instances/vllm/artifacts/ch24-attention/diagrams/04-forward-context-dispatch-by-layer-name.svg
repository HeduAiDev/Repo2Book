<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ad" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#8b5cf6"/></marker></defs>
<rect width="1040" height="600" fill="white"/>
<text x="520.0" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">按 layer_name 分发：先写 cache，再算+读</text>
<rect x="760" y="80" width="260" height="420" rx="10" fill="#faf5ff" stroke="#e9d5ff"/>
<text x="890" y="102" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#7c3aed">forward_context</text>
<text x="890" y="120" font-family="sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#64748b">model_runner 那头按 layer_name 装</text>
<rect x="776" y="140" width="228" height="56" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.4"/>
<text x="890.0" y="164.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">attn_metadata</text>
<text x="890.0" y="178.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">{"layer.0.attn": md, ...}</text>
<rect x="776" y="210" width="228" height="56" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.4"/>
<text x="890.0" y="234.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">slot_mapping</text>
<text x="890.0" y="248.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">{"layer.0.attn": tensor, ...}</text>
<rect x="776" y="280" width="228" height="56" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.4"/>
<text x="890.0" y="304.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">no_compile_layers</text>
<text x="890.0" y="318.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">{"layer.0.attn": Attention}</text>
<rect x="776" y="350" width="228" height="56" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.4"/>
<text x="890.0" y="374.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">→ attn_layer.kv_cache</text>
<text x="890.0" y="388.85" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#0f172a">真实 paged 显存</text>
<rect x="60" y="80" width="300" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.4"/>
<text x="210.0" y="101.625" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#0f172a">Attention.forward(q, k, v)</text>
<text x="210.0" y="117.125" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#0f172a">层 prefix = layer.0.attn</text>
<rect x="60" y="160" width="300" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
<text x="210.0" y="181.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">reshape q / k / v</text>
<text x="210.0" y="196.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">use_direct_call → 直调</text>
<rect x="60" y="250" width="300" height="56" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.4"/>
<text x="210.0" y="274.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">unified_kv_cache_update(k, v,</text>
<text x="210.0" y="289.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">  layer_name)  —— 写</text>
<rect x="60" y="326" width="300" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
<text x="210.0" y="350.025" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">impl.do_kv_cache_update（写 KV）</text>
<rect x="60" y="410" width="300" height="56" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
<text x="210.0" y="434.775" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#0f172a">unified_attention_with_output(</text>
<text x="210.0" y="449.275" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#0f172a">  query, ..., layer_name)  —— 算+读</text>
<rect x="60" y="486" width="300" height="40" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
<text x="210.0" y="510.025" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">impl.forward（读 paged KV 算注意力）</text>
<line x1="210" y1="130" x2="210" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="210" y1="210" x2="210" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="210" y1="306" x2="210" y2="326" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="210" y1="366" x2="210" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="210" y1="466" x2="210" y2="486" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<path d="M 360 290 Q 430 350 360 430" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a)"/>
<text x="445" y="360" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#b45309">kv_cache_dummy_dep</text>
<text x="445" y="376" font-family="sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#92400e">串一条写→算假依赖</text>
<text x="445" y="392" font-family="sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#92400e">防 torch.compile 乱序</text>
<text x="575" y="250" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#7c3aed">get_attention_context(layer_name)</text>
<line x1="360" y1="278" x2="760" y2="200" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ad)"/>
<line x1="360" y1="438" x2="760" y2="230" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ad)"/>
<text x="575" y="470" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#7c3aed">按 layer_name 取本层 kv_cache /</text>
<text x="575" y="486" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#7c3aed">attn_metadata / slot_mapping</text>
<text x="520.0" y="584" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#475569">一次前向里几十个注意力层各有自己的 KV cache 与 metadata；layer_name 是把它们串起来的键</text>
</svg>