<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#15803d"/></marker></defs>
<rect width="1100" height="620" fill="white"/>
<text x="550.0" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">AttentionBackend 抽象 → 注册表懒加载 → 按配置选后端</text>
<rect x="20" y="56" width="340" height="540" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="190" y="78" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8">① 抽象层：AttentionBackend</text>
<rect x="40" y="96" width="300" height="130" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="190.0" y="127.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">六个抽象 staticmethod（后端身份证）</text>
<text x="190.0" y="142.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">get_name / get_impl_cls</text>
<text x="190.0" y="157.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">get_builder_cls</text>
<text x="190.0" y="172.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">get_kv_cache_shape</text>
<text x="190.0" y="187.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">get_kv_cache_stride_order</text>
<text x="190.0" y="202.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">validate_configuration（能力聚合）</text>
<rect x="40" y="246" width="300" height="60" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="190.0" y="272.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">AttentionMetadataBuilder.build()</text>
<text x="190.0" y="287.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">Common → 后端专属 metadata</text>
<rect x="40" y="326" width="300" height="80" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
<text x="190.0" y="355.2" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">AttentionImpl</text>
<text x="190.0" y="370.2" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">forward（算+读 paged KV）</text>
<text x="190.0" y="385.2" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">do_kv_cache_update（写 paged KV）</text>
<rect x="40" y="426" width="300" height="60" rx="7" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="190.0" y="452.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">FlashAttentionBackend 等具体后端</text>
<text x="190.0" y="467.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">= 把六个方法落地实现</text>
<line x1="190" y1="226" x2="190" y2="246" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="190" y1="306" x2="190" y2="326" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="190" y1="406" x2="190" y2="426" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="190" y="520" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">选后端 / 问 KV shape / 问优先级</text>
<text x="190" y="538" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">都发生在『还没实例化对象』阶段</text>
<text x="190" y="556" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#1d4ed8">→ 用 staticmethod 仅凭类就能查</text>
<rect x="380" y="56" width="320" height="540" rx="10" fill="#fef2f2" stroke="#fecaca"/>
<text x="540" y="78" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#b91c1c">② 注册表：AttentionBackendEnum</text>
<rect x="400" y="96" width="280" height="120" rx="7" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="540.0" y="123.775" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">枚举值 = 默认类路径字符串：</text>
<text x="540.0" y="138.275" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">FLASH_ATTN = "...flash_attn.</text>
<text x="540.0" y="152.775" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">  FlashAttentionBackend"</text>
<text x="540.0" y="167.275" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">FLASHINFER = "..."</text>
<text x="540.0" y="181.775" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">TRITON_ATTN = "..."</text>
<text x="540.0" y="196.275" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">CUSTOM = None（待 register）</text>
<rect x="400" y="236" width="280" height="70" rx="7" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
<text x="540.0" y="260.2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">get_class()</text>
<text x="540.0" y="275.2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">= _ATTN_OVERRIDES 查覆盖表</text>
<text x="540.0" y="290.2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">→ 回退枚举值</text>
<rect x="400" y="336" width="280" height="56" rx="7" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
<text x="540.0" y="360.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">resolve_obj_by_qualname</text>
<text x="540.0" y="375.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">用到才真正 import（懒加载）</text>
<rect x="400" y="420" width="280" height="56" rx="7" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
<text x="540.0" y="444.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">register_backend(...)</text>
<text x="540.0" y="459.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">运行时覆盖 / 注册第三方 CUSTOM</text>
<line x1="540" y1="216" x2="540" y2="236" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<line x1="540" y1="306" x2="540" y2="336" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="540" y="510" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">重依赖（FlashInfer/FlashMLA）</text>
<text x="540" y="528" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">若 import 全部后端会拖崩缺失依赖</text>
<text x="540" y="546" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#b91c1c">→ 用到哪个才 import 哪个</text>
<rect x="720" y="56" width="360" height="540" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
<text x="900" y="78" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#15803d">③ 选择：get_attn_backend</text>
<rect x="740" y="96" width="320" height="56" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="900.0" y="120.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">get_attn_backend(head_size, dtype,</text>
<text x="900.0" y="135.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">kv_cache_dtype, use_mla, ...)</text>
<rect x="740" y="168" width="320" height="50" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="900.0" y="189.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">AttentionSelectorConfig（可哈希键）</text>
<text x="900.0" y="204.7" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#0f172a">→ @cache 同配置只解一次</text>
<rect x="740" y="234" width="320" height="56" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
<text x="900.0" y="258.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">platform.get_attn_backend_cls</text>
<text x="900.0" y="273.7" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">（按 compute capability 决策）</text>
<rect x="740" y="306" width="320" height="78" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="900.0" y="327.275" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">显式 --attention-backend ?</text>
<text x="900.0" y="341.775" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">  是 → 只校验它，不合法直接报错</text>
<text x="900.0" y="356.275" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">  否 → 按优先级列表逐个</text>
<text x="900.0" y="370.775" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">       validate_configuration 过滤</text>
<rect x="740" y="400" width="320" height="50" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
<text x="900.0" y="421.775" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#0f172a">取 invalid_reasons==[] 中优先级最高者</text>
<text x="900.0" y="436.275" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#0f172a">→ 返回类路径字符串</text>
<rect x="740" y="466" width="320" height="50" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
<text x="900.0" y="487.775" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">若后端要求特定 KV layout（HND）</text>
<text x="900.0" y="502.275" font-family="sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#0f172a">→ set_kv_cache_layout 全局生效</text>
<line x1="900" y1="152" x2="900" y2="168" stroke="#15803d" stroke-width="1.8" marker-end="url(#ag)"/>
<line x1="900" y1="218" x2="900" y2="234" stroke="#15803d" stroke-width="1.8" marker-end="url(#ag)"/>
<line x1="900" y1="290" x2="900" y2="306" stroke="#15803d" stroke-width="1.8" marker-end="url(#ag)"/>
<line x1="900" y1="384" x2="900" y2="400" stroke="#15803d" stroke-width="1.8" marker-end="url(#ag)"/>
<line x1="900" y1="450" x2="900" y2="466" stroke="#15803d" stroke-width="1.8" marker-end="url(#ag)"/>
<line x1="360" y1="156" x2="400" y2="156" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<text x="380" y="146" font-family="sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#64748b">实现</text>
<line x1="700" y1="264" x2="740" y2="262" stroke="#15803d" stroke-width="1.8" marker-end="url(#ag)"/>
<text x="720" y="252" font-family="sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#64748b">查表</text>
<text x="900" y="548" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">head_size / dtype / compute capability</text>
<text x="900" y="566" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#15803d">→ 决定 FlashAttention / FlashInfer / Triton</text>
</svg>