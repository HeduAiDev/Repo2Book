<rect x="530" y="562" width="380" height="30" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.3"/>
<text x="540" y="582" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#0f172a">prefix_kv_lens / suffix_kv_lens</text>
<text x="500.0" y="628" font-family="sans-serif" font-size="12.5" font-weight="normal" text-anchor="middle" fill="#475569">翻译模式：共享量只算一次（省重复）+ 各后端按需补 kernel 要的特有字段</text>
</svg>