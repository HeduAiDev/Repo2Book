<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker></defs>
<rect width="1000" height="640" fill="white"/>
<text x="500.0" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">两层 metadata：CommonAttentionMetadata → FlashAttentionMetadata</text>
