<text x="70" y="328" font-family="sans-serif" font-size="12.5" font-weight="normal" text-anchor="start" fill="#0f172a">causal</text>
<text x="530" y="290" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#92400e">block_table_tensor / slot_mapping</text>
<text x="530" y="308" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">= 两级页表，所有后端/所有层共用</text>
<line x1="250.0" y1="332" x2="250.0" y2="390" stroke="#0f172a" stroke-width="1.8" marker-end="url(#a)"/>
<text x="380.0" y="365" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#0f172a">builder.build(common_prefix_len, common)</text>
<text x="380.0" y="382" font-family="sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#64748b">唯一中心翻译入口</text>
