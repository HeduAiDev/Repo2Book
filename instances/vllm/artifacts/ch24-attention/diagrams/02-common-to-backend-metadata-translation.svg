<text x="78" y="582" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#0f172a">max_query_len / max_seq_len / causal</text>
<text x="700" y="446" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">FA 特有：build 过程新增</text>
<rect x="530" y="460" width="380" height="30" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.3"/>
<text x="540" y="480" font-family="sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#0f172a">use_cascade / common_prefix_len</text>
<rect x="530" y="494" width="380" height="30" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.3"/>
