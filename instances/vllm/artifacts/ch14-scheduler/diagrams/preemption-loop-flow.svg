<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620"><defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ared" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker><marker id="agrn" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#15803d"/></marker></defs><rect width="760" height="620" fill="white"/><text x="380.0" y="32" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1e293b" font-weight="bold">RUNNING 阶段：allocate_slots 失败时的抢占循环</text><rect x="160.0" y="60" width="280" height="44" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/><text x="300" y="80" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#1e293b" font-weight="normal">遍历 self.running 取一个 request</text><text x="300" y="96" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#475569" font-weight="normal">num_new_tokens = 追赶量</text><rect x="195.0" y="138" width="210" height="50" rx="8" fill="#fef9c3" stroke="#a16207" stroke-width="1.5"/><text x="300" y="160" font-family="monospace" font-size="12.5" text-anchor="middle" fill="#1e293b" font-weight="normal">allocate_slots(request)</text><text x="300" y="178" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#1e293b" font-weight="normal">能分到 KV 块吗？</text><line x1="300" y1="104" x2="300" y2="138" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/><rect x="530" y="138" width="180" height="50" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/><text x="620" y="160" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#15803d" font-weight="bold">能 → break</text><text x="620" y="178" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">调度该 request</text><line x1="405.0" y1="163" x2="530" y2="163" stroke="#15803d" stroke-width="1.6" marker-end="url(#agrn)"/><text x="467.5" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d" font-weight="normal">new_blocks≠None</text><rect x="160.0" y="250" width="280" height="50" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/><text x="300" y="271" font-family="monospace" font-size="12" text-anchor="middle" fill="#b91c1c" font-weight="normal">FCFS: preempted_req = running.pop()</text><text x="300" y="289" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">抢 RUNNING 末尾（LIFO，最晚加入者）</text><line x1="300" y1="188" x2="300" y2="250" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#ared)"/><text x="388" y="221.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#b91c1c" font-weight="normal">不能</text><rect x="130.0" y="332" width="340" height="86" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/><text x="300" y="352" font-family="monospace" font-size="12.5" text-anchor="middle" fill="#1e293b" font-weight="bold">_preempt_request(preempted_req)</text><text x="300" y="370" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">free KV 块（丢弃，不换出到 CPU）</text><text x="300" y="386" font-family="monospace" font-size="11" text-anchor="middle" fill="#1e293b" font-weight="normal">status → PREEMPTED ；num_computed_tokens = 0</text><text x="300" y="402" font-family="monospace" font-size="11" text-anchor="middle" fill="#1e293b" font-weight="normal">num_preemptions++ ；waiting.prepend_request 回队头</text><line x1="300" y1="300" x2="300" y2="332" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#ared)"/><rect x="195.0" y="452" width="210" height="50" rx="8" fill="#fef9c3" stroke="#a16207" stroke-width="1.5"/><text x="300" y="474" font-family="monospace" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">preempted_req == request ?</text><text x="300" y="492" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#1e293b" font-weight="normal">（连自己都抢了？）</text><line x1="300" y1="418" x2="300" y2="452" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/><line x1="195.0" y1="477" x2="70" y2="477" stroke="#475569" stroke-width="1.6"/><line x1="70" y1="477" x2="70" y2="163" stroke="#475569" stroke-width="1.6"/><line x1="70" y1="163" x2="195.0" y2="163" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/><text x="78" y="320.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">否：重试分配</text><text x="100" y="470" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#475569" font-weight="normal">否</text><rect x="160.0" y="556" width="280" height="44" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/><text x="300" y="575" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1e293b" font-weight="bold">break：本请求这一拍排不进</text><text x="300" y="591" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#475569" font-weight="normal">外层 new_blocks is None → 退出 RUNNING 循环</text><line x1="300" y1="502" x2="300" y2="556" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/><text x="318" y="529.0" font-family="sans-serif" font-size="11" text-anchor="start" fill="#475569" font-weight="normal">是</text></svg>