<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs>
<rect width="1080" height="640" fill="white"/>
<text x="540.0" y="30" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1e293b">SamplingMetadata：逐请求参数 → 一次性批量张量化</text>
<rect x="150.0" y="56" width="220" height="96" rx="7" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
<text x="260.0" y="85" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">req 0  SamplingParams</text>
<text x="260.0" y="101" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">temp=0.0</text>
<text x="260.0" y="116" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">seed=None</text>
<text x="260.0" y="132" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">min_tok=4</text>
<rect x="430.0" y="56" width="220" height="96" rx="7" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
<text x="540.0" y="85" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">req 1  SamplingParams</text>
<text x="540.0" y="101" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">temp=0.7</text>
<text x="540.0" y="116" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">top_p=0.9</text>
<text x="540.0" y="132" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">seed=42</text>
<rect x="710.0" y="56" width="220" height="96" rx="7" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
<text x="820.0" y="85" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">req 2  SamplingParams</text>
<text x="820.0" y="101" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">temp=1.0</text>
<text x="820.0" y="116" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">top_k=50</text>
<text x="820.0" y="132" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="normal" fill="#1e293b">freq_pen=0.5</text>
<rect x="90" y="300" width="900" height="280" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
<text x="106" y="326" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">SamplingMetadata（整批一份）</text>
<line x1="260.0" y1="152" x2="540.0" y2="300" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
<line x1="540.0" y1="152" x2="540.0" y2="300" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
<line x1="820.0" y1="152" x2="540.0" y2="300" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="110" y="350" width="300" height="100" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
<text x="260.0" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#14532d">[batch] 张量列</text>
<text x="260.0" y="397" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#14532d">temperature [0.0, 0.7, 1.0]</text>
<text x="260.0" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#14532d">top_p / top_k / 三种 penalty</text>
<text x="260.0" y="427" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#14532d">all_greedy / all_random 批级标志</text>
<rect x="440" y="350" width="300" height="100" rx="7" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.4"/>
<text x="590.0" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#713f12">逐请求字典 / list</text>
<text x="590.0" y="397" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#713f12">generators: {1:gen42, ...}</text>
<text x="590.0" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#713f12">output_token_ids: [[..],[..],[..]]</text>
<text x="590.0" y="427" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#713f12">bad_words_token_ids: {idx:[...]}</text>
<rect x="770" y="350" width="300" height="100" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
<text x="920.0" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4c1d95">已就绪的容器</text>
<text x="920.0" y="397" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#4c1d95">logitsprocs:</text>
<text x="920.0" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#4c1d95">  argmax_invariant=[min_p]</text>
<text x="920.0" y="427" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="normal" fill="#4c1d95">  non_argmax_invariant=[min_tok, bias]</text>
<text x="106" y="564" font-family="sans-serif" font-size="12.5" fill="#475569">Sampler 全程吃这一个对象 · 逐请求差异编码进张量行 / 字典键，避免 Python 逐请求循环。</text>
</svg>