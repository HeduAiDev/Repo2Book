<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640">
<rect width="880" height="640" fill="white"/>
<text x="440" y="34" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1e293b">logits 处理器按 argmax-invariance 分类</text>
<text x="440" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">is_argmax_invariant() == False → 前置 step3-6（可改 argmax，greedy 必须看到它们）</text>
<text x="440" y="74" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">is_argmax_invariant() == True  → 推迟 step7c（不改 argmax，greedy 可安全跳过）</text>
<rect x="60" y="96" width="360" height="38" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
<text x="240" y="112" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">NOT argmax-invariant  →  前置（step 3–6）</text>
<text x="240" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">能改 greedy 结果，必须在 all_greedy 早退之前生效</text>
<rect x="470" y="96" width="360" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
<text x="650" y="112" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">argmax-invariant  →  推迟（step 7c）</text>
<text x="650" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">不改 greedy 结果，greedy 早退可安全跳过</text>
<rect x="60" y="144" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="161" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step3  allowed token 白名单</text>
<text x="72" y="175" font-family="sans-serif" font-size="11" fill="#475569">masked_fill_(-inf) 把非白名单 token 摁死</text>
<text x="72" y="190" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 能把原 argmax token 直接删掉</text>
<rect x="60" y="206" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="223" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step4  bad words 屏蔽</text>
<text x="72" y="237" font-family="sans-serif" font-size="11" fill="#475569">前缀命中时把末 token 置 -inf</text>
<text x="72" y="252" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 能让原最高分 token 失效</text>
<rect x="60" y="268" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="285" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step5a  min_tokens 处理器</text>
<text x="72" y="299" font-family="sans-serif" font-size="11" fill="#475569">在未到最小长度前摁死 EOS/stop</text>
<text x="72" y="314" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 若 EOS 原为 argmax 则座次换人</text>
<rect x="60" y="330" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="347" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step5b  logit_bias 处理器</text>
<text x="72" y="361" font-family="sans-serif" font-size="11" fill="#475569">给指定 token 加偏置（可正可负）</text>
<text x="72" y="376" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 加够了能把其他 token 顶到第一</text>
<rect x="60" y="392" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="409" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step6a  repetition penalty</text>
<text x="72" y="423" font-family="sans-serif" font-size="11" fill="#475569">出现过的 token：正 logit 除、负 logit 乘</text>
<text x="72" y="438" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 够重时能压低原 argmax</text>
<rect x="60" y="454" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="471" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step6b  frequency penalty</text>
<text x="72" y="485" font-family="sans-serif" font-size="11" fill="#475569">logit -= freq × 出现次数（线性比例）</text>
<text x="72" y="500" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 高频出现可导致座次变化</text>
<rect x="60" y="516" width="360" height="56" rx="5" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.2"/>
<text x="72" y="533" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step6c  presence penalty</text>
<text x="72" y="547" font-family="sans-serif" font-size="11" fill="#475569">出现过即扣固定值，不管次数</text>
<text x="72" y="562" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">→ 能把原 argmax 拉出前位</text>
<rect x="470" y="144" width="360" height="56" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
<text x="482" y="161" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step7c  min_p 处理器</text>
<text x="482" y="175" font-family="sans-serif" font-size="11" fill="#475569">砍掉概率 &lt; min_p × max_prob 的尾部</text>
<text x="482" y="190" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">max_prob 本身满足 max_prob ≥ min_p×max_prob</text>
<rect x="470" y="206" width="360" height="56" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
<text x="482" y="223" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step7b  temperature 缩放</text>
<text x="482" y="237" font-family="sans-serif" font-size="11" fill="#475569">logits /= T（T&gt;0 单调变换）</text>
<text x="482" y="252" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">除以正数不改任何两 logit 的大小关系</text>
<rect x="470" y="268" width="360" height="56" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
<text x="482" y="285" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step7d  top-k 截断</text>
<text x="482" y="299" font-family="sans-serif" font-size="11" fill="#475569">只砍升序最小的 V-k 个</text>
<text x="482" y="314" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">最大值 token 永远落在留下的 k 个里</text>
<rect x="470" y="330" width="360" height="56" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
<text x="482" y="347" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1e293b">step7d  top-p 截断</text>
<text x="482" y="361" font-family="sans-serif" font-size="11" fill="#475569">砍掉累积概率尾部</text>
<text x="482" y="376" font-family="sans-serif" font-size="10.5" fill="#b45309" font-style="italic">最大概率 token 永远排在累积首位</text>
<line x1="445" y1="96" x2="445" y2="620" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="440" y="622" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">vllm/v1/sample/logits_processor/state.py:L148  ·  builtin.py:L46, L130, L186</text>
</svg>