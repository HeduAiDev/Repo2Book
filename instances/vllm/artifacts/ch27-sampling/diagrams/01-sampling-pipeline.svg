<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880">
<defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker><marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#15803d"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b45309"/></marker></defs>
<rect width="1040" height="880" fill="white"/>
<rect x="300" y="30" width="380" height="56" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="490.0" y="54" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step1  抽取 raw logprobs</text>
<text x="490.0" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">在任何惩罚/温度之前 · log_softmax(原始 logits)</text>
<line x1="490.0" y1="86" x2="490.0" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="300" y="110" width="380" height="56" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="490.0" y="134" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step2  logits → float32</text>
<text x="490.0" y="152" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">全程 fp32 算，避免半精度数值问题</text>
<line x1="490.0" y1="166" x2="490.0" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="300" y="190" width="380" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="490.0" y="214" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step3  allowed token 白名单</text>
<text x="490.0" y="232" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">非白名单位置 masked_fill_ 置 -inf</text>
<line x1="490.0" y1="246" x2="490.0" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="300" y="270" width="380" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="490.0" y="294" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step4  bad words 屏蔽</text>
<text x="490.0" y="312" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">前缀命中→末 token 置 -inf</text>
<line x1="490.0" y1="326" x2="490.0" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="300" y="350" width="380" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="490.0" y="374" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step5  non-argmax-invariant 处理器</text>
<text x="490.0" y="392" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">min_tokens / logit_bias（能改 argmax）</text>
<line x1="490.0" y1="406" x2="490.0" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="300" y="430" width="380" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="490.0" y="454" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step6  penalties</text>
<text x="490.0" y="472" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">repetition / frequency / presence</text>
<rect x="40" y="146" width="22" height="296" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
<text x="51" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b91c1c" transform="rotate(-90 51 290)">step3-6 改 argmax</text>
<rect x="300" y="510" width="380" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="490.0" y="531" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e293b">step7  sample —— 在这里分叉</text>
<text x="490.0" y="550" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="normal" fill="#1e293b"></text>
<line x1="490.0" y1="510" x2="490.0" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="490.0" y1="486" x2="490.0" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<line x1="490.0" y1="560" x2="230.0" y2="600" stroke="#15803d" stroke-width="2" marker-end="url(#ag)"/>
<rect x="70" y="600" width="320" height="70" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
<text x="230.0" y="623" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">greedy 快路（all_greedy 早退）</text>
<text x="230.0" y="640" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#1e293b">greedy_sample = argmax</text>
<text x="230.0" y="657" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#1e293b">跳过温度 / min_p / top-k / top-p</text>
<line x1="490.0" y1="560" x2="765.0" y2="600" stroke="#b45309" stroke-width="2" marker-end="url(#ar)"/>
<rect x="560" y="600" width="410" height="52" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
<text x="765.0" y="622" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">7b  apply_temperature</text>
<text x="765.0" y="639" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#1e293b">logits /= T（temp&lt;eps 替 1.0 防除零）</text>
<line x1="765.0" y1="652" x2="765.0" y2="670" stroke="#b45309" stroke-width="2" marker-end="url(#ar)"/>
<rect x="560" y="670" width="410" height="52" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
<text x="765.0" y="692" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">7c  argmax-invariant 处理器</text>
<text x="765.0" y="709" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#1e293b">默认 min_p（永不改 argmax）</text>
<line x1="765.0" y1="722" x2="765.0" y2="740" stroke="#b45309" stroke-width="2" marker-end="url(#ar)"/>
<rect x="560" y="740" width="410" height="52" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
<text x="765.0" y="762" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">7d  top-k / top-p 截断</text>
<text x="765.0" y="779" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#1e293b">TopKTopPSampler 多后端</text>
<line x1="765.0" y1="792" x2="765.0" y2="810" stroke="#b45309" stroke-width="2" marker-end="url(#ar)"/>
<rect x="560" y="810" width="410" height="52" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
<text x="765.0" y="832" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">7e  随机采样</text>
<text x="765.0" y="849" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="normal" fill="#1e293b">random_sample / flashinfer</text>
<rect x="300" y="916" width="380" height="50" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="490.0" y="937" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">torch.where(temp&lt;eps, greedy, random)</text>
<text x="490.0" y="955" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">混合批逐请求合并</text>
<line x1="230.0" y1="670" x2="421.6" y2="916" stroke="#15803d" stroke-width="2" marker-end="url(#ag)"/>
<line x1="765.0" y1="862" x2="558.4000000000001" y2="916" stroke="#b45309" stroke-width="2" marker-end="url(#ar)"/>
<rect x="300" y="996" width="380" height="50" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="490.0" y="1017" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step8  gather_logprobs</text>
<text x="490.0" y="1035" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b">对 step1 的 raw_logprobs 取 topk + 采样 token + rank</text>
<line x1="490.0" y1="966" x2="490.0" y2="996" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<rect x="300" y="1076" width="380" height="46" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="490.0" y="1095" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">step9  返回 SamplerOutput</text>
<text x="490.0" y="1113" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="normal" fill="#1e293b"></text>
<line x1="490.0" y1="1046" x2="490.0" y2="1076" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
<text x="700" y="50" font-family="sans-serif" font-size="13" fill="#64748b">forward()</text>
<text x="700" y="200" font-family="sans-serif" font-size="13" fill="#64748b">apply_logits_processors()</text>
<text x="978" y="620" font-family="sans-serif" font-size="13" fill="#64748b">sample()</text>
</svg>