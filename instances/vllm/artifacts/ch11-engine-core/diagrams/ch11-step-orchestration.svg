<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640"><defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs><rect width="900" height="640" fill="white"/><text x="450" y="30" text-anchor="middle" font-size="19" font-family="sans-serif" font-weight="bold" fill="#0f172a">EngineCore.step() 一次迭代</text><text x="450" y="52" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="normal" fill="#64748b">CPU 算掩码 与 GPU 跑前向 在同一段时间重叠</text><text x="250" y="88" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#1d4ed8">主线程 (CPU)</text><text x="660" y="88" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#b45309">Worker / GPU</text><rect x="115" y="105" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="127" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">scheduler.schedule()</text><text x="250" y="142" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">排出本拍要算的批</text><rect x="115" y="185" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="207" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">execute_model(non_block=True)</text><text x="250" y="222" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">发起前向, 立刻返回 future</text><rect x="115" y="265" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="287" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">get_grammar_bitmask()</text><text x="250" y="302" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">趁前向在跑, 算结构化掩码</text><rect x="115" y="345" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="367" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">future.result()</text><text x="250" y="382" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">到此才等前向; None = 采样归主进程</text><rect x="115" y="425" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="447" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">sample_tokens(grammar)</text><text x="250" y="462" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">用掩码采样</text><rect x="115" y="505" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="527" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">_process_aborts_queue()</text><text x="250" y="542" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">执行期 abort 批量落地</text><rect x="115" y="585" width="270" height="44" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/><text x="250" y="607" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">update_from_output()</text><text x="250" y="622" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#3b82f6">转 EngineCoreOutputs 收口</text><line x1="250" y1="149" x2="250" y2="183" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/><line x1="250" y1="229" x2="250" y2="263" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/><line x1="250" y1="309" x2="250" y2="343" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/><line x1="250" y1="389" x2="250" y2="423" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/><line x1="250" y1="469" x2="250" y2="503" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/><line x1="250" y1="549" x2="250" y2="583" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/><rect x="525" y="207" width="270" height="160" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="2"/><text x="660" y="281" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#92400e">GPU 前向</text><text x="660" y="299" text-anchor="middle" font-size="10.5" font-family="sans-serif" font-weight="normal" fill="#d97706">model forward (异步)</text><line x1="385" y1="207" x2="523" y2="221" stroke="#b45309" stroke-width="2" marker-end="url(#a)"/><text x="455" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="normal" fill="#b45309">发起前向</text><line x1="523" y1="353" x2="385" y2="367" stroke="#b45309" stroke-width="2" marker-end="url(#a)"/><text x="455" y="383" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="normal" fill="#b45309">等到结果</text><rect x="103" y="257" width="704" height="60" rx="10" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4"/><text x="455" y="279" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#16a34a">重叠区</text><text x="455" y="297" text-anchor="middle" font-size="10.5" font-family="sans-serif" font-weight="normal" fill="#16a34a">掩码与前向并行</text></svg>