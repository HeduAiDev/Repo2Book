<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"><defs><marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker><marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker></defs><rect width="900" height="520" fill="white"/><text x="450" y="30" text-anchor="middle" font-size="19" font-family="sans-serif" font-weight="bold" fill="#0f172a">生命周期: pause 三模式 + sleep 三级</text><text x="450" y="52" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="normal" fill="#64748b">停调度 与 让出显存 是两组正交旋钮</text><text x="70" y="94" text-anchor="start" font-size="12" font-family="sans-serif" font-weight="bold" fill="#475569">PauseState (停调度)</text><rect x="110" y="100" width="200" height="56" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="210" y="124" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#16a34a">UNPAUSED</text><text x="210" y="144" text-anchor="middle" font-size="10.5" font-family="sans-serif" font-weight="normal" fill="#16a34a">正常</text><rect x="370" y="100" width="200" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><text x="470" y="124" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#ca8a04">PAUSED_NEW</text><text x="470" y="144" text-anchor="middle" font-size="10.5" font-family="sans-serif" font-weight="normal" fill="#ca8a04">不收新, 跑完在途</text><rect x="630" y="100" width="200" height="56" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="730" y="124" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#dc2626">PAUSED_ALL</text><text x="730" y="144" text-anchor="middle" font-size="10.5" font-family="sans-serif" font-weight="normal" fill="#dc2626">全停, 保留状态</text><line x1="310" y1="120" x2="368" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="340" y="114" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#475569">abort</text><line x1="570" y1="120" x2="628" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/><text x="600" y="114" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#475569">keep</text><path d="M370,150 C340,190 330,190 310,150" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#a)"/><text x="340" y="200" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="normal" fill="#16a34a">resume_scheduler → UNPAUSED</text><text x="70" y="244" text-anchor="start" font-size="12" font-family="sans-serif" font-weight="bold" fill="#475569">sleep level (让出显存, 叠加在 pause 之上)</text><rect x="110" y="250" width="220" height="80" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="220" y="274" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#0284c7">level 0</text><text x="220" y="296" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="normal" fill="#0284c7">只停调度</text><text x="220" y="314" text-anchor="middle" font-size="9.5" font-family="sans-serif" font-weight="normal" fill="#0284c7">无显存变化, 醒得最快</text><rect x="360" y="250" width="220" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="470" y="274" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#d97706">level 1</text><text x="470" y="296" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="normal" fill="#d97706">卸权重→CPU, 弃 KV</text><text x="470" y="314" text-anchor="middle" font-size="9.5" font-family="sans-serif" font-weight="normal" fill="#d97706">委托 executor.sleep(1)</text><rect x="610" y="250" width="220" height="80" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="720" y="274" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#dc2626">level 2</text><text x="720" y="296" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="normal" fill="#dc2626">弃全部 GPU 显存</text><text x="720" y="314" text-anchor="middle" font-size="9.5" font-family="sans-serif" font-weight="normal" fill="#dc2626">委托 executor.sleep(2), 醒最贵</text><text x="450" y="355" text-anchor="middle" font-size="11.5" font-family="sans-serif" font-weight="normal" fill="#475569">sleep 不论哪级都先 pause_scheduler; level≥1 才委托 executor 动显存</text><rect x="180" y="380" width="540" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/><text x="450" y="403" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#334155">多进程版: 在途未排空 → 挂 idle 回调, 返回未完成 Future</text><text x="450" y="423" text-anchor="middle" font-size="10.5" font-family="sans-serif" font-weight="normal" fill="#64748b">引擎转空闲时 _notify_idle_state_callbacks 触发 → 清缓存 → set_result</text></svg>