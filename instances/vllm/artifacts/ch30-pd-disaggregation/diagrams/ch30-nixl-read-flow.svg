<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 640">
<defs>
<marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
<marker id="arBig" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="6" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker>
<marker id="arG" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/></marker>
</defs>
<rect width="1060" height="640" fill="white"/>
<text x="530.0" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">NIXL：D 单边 RDMA READ 直接从 P 显存拉 KV</text>
<rect x="150" y="70" width="260" height="40" rx="8" fill="#dcfce7" stroke="#475569" stroke-width="1.5"/>
<text x="280" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">D-worker (decode)</text>
<line x1="280" y1="110" x2="280" y2="600" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,5"/>
<rect x="670" y="70" width="260" height="40" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
<text x="800" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">P-worker (prefill)</text>
<line x1="800" y1="110" x2="800" y2="600" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,5"/>
<rect x="175.0" y="135" width="210" height="38" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
<text x="280" y="150.0" text-anchor="middle" font-size="12.5" fill="#0f172a">start_load_kv：首遇 P，</text>
<text x="280" y="165.0" text-anchor="middle" font-size="12.5" fill="#0f172a">_remote_agents 里没有它</text>
<line x1="292" y1="195" x2="788" y2="195" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#ar)"/>
<text x="540.0" y="188" text-anchor="middle" font-size="12" fill="#475569">后台握手：交换内存注册元数据 (agent metadata)</text>
<line x1="788" y1="231" x2="292" y2="231" stroke="#475569" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#ar)"/>
<text x="540.0" y="224" text-anchor="middle" font-size="12" fill="#475569">握手回包；本请求挂起，待 _ready_requests 取出补发</text>
<rect x="175.0" y="283" width="210" height="38" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.4"/>
<text x="280" y="298.0" text-anchor="middle" font-size="12.5" fill="#b91c1c">make_prepped_xfer('READ') + transfer</text>
<text x="280" y="313.0" text-anchor="middle" font-size="12.5" fill="#b91c1c">handle 存入 _recving_transfers</text>
<line x1="788" y1="341" x2="292" y2="341" stroke="#b91c1c" stroke-width="4.5" marker-end="url(#arBig)"/>
<text x="540.0" y="331" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#b91c1c">RDMA 单边 READ：P 显存 → D paged buffer</text>
<text x="540.0" y="359" text-anchor="middle" font-size="12" fill="#b91c1c">（P 端 CPU/GPU 完全不参与传输）</text>
<rect x="175.0" y="397" width="210" height="38" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
<text x="280" y="412.0" text-anchor="middle" font-size="12.5" fill="#0f172a">后续 step 轮询 check_xfer_state(handle)</text>
<text x="280" y="427.0" text-anchor="middle" font-size="12.5" fill="#0f172a">PROC=留着 / DONE=收完成</text>
<line x1="292" y1="455" x2="788" y2="455" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arG)"/>
<text x="540.0" y="448" text-anchor="middle" font-size="12" fill="#16a34a">读完 send_notif 通知 P</text>
<rect x="60.0" y="505" width="200" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.4"/>
<text x="160" y="521.0" text-anchor="middle" font-size="12.5" fill="#0f172a">get_finished →</text>
<text x="160" y="536.0" text-anchor="middle" font-size="12.5" fill="#0f172a">finished_recving</text>
<rect x="675.0" y="505" width="250" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
<text x="800" y="521.0" text-anchor="middle" font-size="12.5" fill="#0f172a">get_finished 收通知 →</text>
<text x="800" y="536.0" text-anchor="middle" font-size="12.5" fill="#0f172a">finished_sending，释放被读 block</text>
<rect x="650" y="569" width="300" height="40" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.3"/>
<text x="800" y="587" text-anchor="middle" font-size="12" fill="#854d0e">超时兜底 (reqs_to_send 过期)：</text>
<text x="800" y="602" text-anchor="middle" font-size="12" fill="#854d0e">防 D 失联把 P 的 block 永久占住</text>
</svg>