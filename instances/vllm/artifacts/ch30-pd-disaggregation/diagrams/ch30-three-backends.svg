<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1054 658">
<rect width="1054" height="658" fill="white"/>
<text x="527.0" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">三类传输后端，各填同一套 worker 契约</text>
<rect x="164" y="56" width="870" height="34" rx="6" fill="#1e293b"/>
<text x="599.0" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#f8fafc">同一套 KVConnectorBase_V1 worker 契约</text>
<rect x="168" y="96" width="282" height="56" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="309.0" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">P2P NCCL</text>
<text x="309.0" y="136" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">(点对点)</text>
<rect x="458" y="96" width="282" height="56" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="599.0" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">NIXL RDMA</text>
<text x="599.0" y="136" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">(高性能)</text>
<rect x="748" y="96" width="282" height="56" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="889.0" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Offloading</text>
<text x="889.0" y="136" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">(CPU·磁盘)</text>
<text x="81.0" y="203.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">结构</text>
<rect x="168" y="164" width="282" height="70" rx="6" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="1.2"/>
<text x="309.0" y="195.0" text-anchor="middle" font-size="12.5" fill="#0f172a">单类自包含</text>
<text x="309.0" y="211.0" text-anchor="middle" font-size="12.5" fill="#0f172a">is_producer 分 P/D</text>
<rect x="458" y="164" width="282" height="70" rx="6" fill="#dcfce7" fill-opacity="0.35" stroke="#22c55e" stroke-width="1.2"/>
<text x="599.0" y="195.0" text-anchor="middle" font-size="12.5" fill="#0f172a">facade：按 role 建</text>
<text x="599.0" y="211.0" text-anchor="middle" font-size="12.5" fill="#0f172a">worker 子对象</text>
<rect x="748" y="164" width="282" height="70" rx="6" fill="#fef3c7" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.2"/>
<text x="889.0" y="195.0" text-anchor="middle" font-size="12.5" fill="#0f172a">facade：按 role 建</text>
<text x="889.0" y="211.0" text-anchor="middle" font-size="12.5" fill="#0f172a">worker 子对象</text>
<text x="81.0" y="281.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">start_load_kv</text>
<rect x="168" y="242" width="282" height="70" rx="6" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="1.2"/>
<text x="309.0" y="273.0" text-anchor="middle" font-size="12.5" fill="#0f172a">consumer 逐请求逐层</text>
<text x="309.0" y="289.0" text-anchor="middle" font-size="12.5" fill="#0f172a">recv_tensor + inject</text>
<rect x="458" y="242" width="282" height="70" rx="6" fill="#dcfce7" fill-opacity="0.35" stroke="#22c55e" stroke-width="1.2"/>
<text x="599.0" y="273.0" text-anchor="middle" font-size="12.5" fill="#0f172a">发非阻塞 RDMA READ</text>
<text x="599.0" y="289.0" text-anchor="middle" font-size="12.5" fill="#0f172a">(先握手再 READ)</text>
<rect x="748" y="242" width="282" height="70" rx="6" fill="#fef3c7" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.2"/>
<text x="889.0" y="273.0" text-anchor="middle" font-size="12.5" fill="#0f172a">提交本步 load +</text>
<text x="889.0" y="289.0" text-anchor="middle" font-size="12.5" fill="#0f172a">上步 store 的 transfer_async</text>
<text x="81.0" y="359.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">save 路径</text>
<rect x="168" y="320" width="282" height="70" rx="6" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="1.2"/>
<text x="309.0" y="351.0" text-anchor="middle" font-size="12.5" fill="#0f172a">producer 逐层</text>
<text x="309.0" y="367.0" text-anchor="middle" font-size="12.5" fill="#0f172a">extract + send_tensor</text>
<rect x="458" y="320" width="282" height="70" rx="6" fill="#dcfce7" fill-opacity="0.35" stroke="#22c55e" stroke-width="1.2"/>
<text x="599.0" y="351.0" text-anchor="middle" font-size="12.5" fill="#0f172a">no-op</text>
<text x="599.0" y="367.0" text-anchor="middle" font-size="12.5" fill="#0f172a">(保存 = 让 D 来读)</text>
<rect x="748" y="320" width="282" height="70" rx="6" fill="#fef3c7" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.2"/>
<text x="889.0" y="351.0" text-anchor="middle" font-size="12.5" fill="#0f172a">wait_for_save 只入队</text>
<text x="889.0" y="367.0" text-anchor="middle" font-size="12.5" fill="#0f172a">store，推迟到下一步</text>
<text x="81.0" y="437.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">wait_for_save</text>
<rect x="168" y="398" width="282" height="70" rx="6" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="1.2"/>
<text x="309.0" y="429.0" text-anchor="middle" font-size="12.5" fill="#0f172a">wait_for_sent</text>
<text x="309.0" y="445.0" text-anchor="middle" font-size="12.5" fill="#0f172a">等 send_queue 排空</text>
<rect x="458" y="398" width="282" height="70" rx="6" fill="#dcfce7" fill-opacity="0.35" stroke="#22c55e" stroke-width="1.2"/>
<text x="599.0" y="429.0" text-anchor="middle" font-size="12.5" fill="#0f172a">仅 host buffer 模式</text>
<text x="599.0" y="445.0" text-anchor="middle" font-size="12.5" fill="#0f172a">才回拷设备</text>
<rect x="748" y="398" width="282" height="70" rx="6" fill="#fef3c7" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.2"/>
<text x="889.0" y="429.0" text-anchor="middle" font-size="12.5" fill="#0f172a">prepare_store_kv</text>
<text x="889.0" y="445.0" text-anchor="middle" font-size="12.5" fill="#0f172a">只入队，不真等</text>
<text x="81.0" y="507.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">get_finished</text>
<text x="81.0" y="523.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">(完成信号)</text>
<rect x="168" y="476" width="282" height="70" rx="6" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="1.2"/>
<text x="309.0" y="507.0" text-anchor="middle" font-size="12.5" fill="#0f172a">引擎双向记账</text>
<text x="309.0" y="523.0" text-anchor="middle" font-size="12.5" fill="#0f172a">(收发都本地可见)</text>
<rect x="458" y="476" width="282" height="70" rx="6" fill="#dcfce7" fill-opacity="0.35" stroke="#22c55e" stroke-width="1.2"/>
<text x="599.0" y="507.0" text-anchor="middle" font-size="12.5" fill="#0f172a">收 = handle 转 DONE</text>
<text x="599.0" y="523.0" text-anchor="middle" font-size="12.5" fill="#0f172a">发 = 对端通知</text>
<rect x="748" y="476" width="282" height="70" rx="6" fill="#fef3c7" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.2"/>
<text x="889.0" y="507.0" text-anchor="middle" font-size="12.5" fill="#0f172a">仅 load 报 recving；</text>
<text x="889.0" y="523.0" text-anchor="middle" font-size="12.5" fill="#0f172a">store 走 completed_jobs 围栏</text>
<text x="81.0" y="593.0" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">介质·瓶颈</text>
<rect x="168" y="554" width="282" height="70" rx="6" fill="#dbeafe" fill-opacity="0.35" stroke="#3b82f6" stroke-width="1.2"/>
<text x="309.0" y="585.0" text-anchor="middle" font-size="12.5" fill="#0f172a">GPU↔GPU NCCL</text>
<text x="309.0" y="601.0" text-anchor="middle" font-size="12.5" fill="#0f172a">带宽 / 队列串行</text>
<rect x="458" y="554" width="282" height="70" rx="6" fill="#dcfce7" fill-opacity="0.35" stroke="#22c55e" stroke-width="1.2"/>
<text x="599.0" y="585.0" text-anchor="middle" font-size="12.5" fill="#0f172a">网卡单边读对端显存</text>
<text x="599.0" y="601.0" text-anchor="middle" font-size="12.5" fill="#0f172a">RTT / P 端零拷贝</text>
<rect x="748" y="554" width="282" height="70" rx="6" fill="#fef3c7" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.2"/>
<text x="889.0" y="585.0" text-anchor="middle" font-size="12.5" fill="#0f172a">GPU↔CPU·磁盘</text>
<text x="889.0" y="601.0" text-anchor="middle" font-size="12.5" fill="#0f172a">PCIe / 推迟避开关键路径</text>
</svg>