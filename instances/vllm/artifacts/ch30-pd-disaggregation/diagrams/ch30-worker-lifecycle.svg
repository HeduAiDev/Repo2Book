<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 620">
<defs>
<marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#475569"/></marker>
<marker id="arR" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#b91c1c"/></marker>
</defs>
<rect width="1300" height="620" fill="white"/>
<text x="650.0" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#0f172a">_get_kv_connector_output：把 forward 夹在 connector 生命周期里</text>
<rect x="250" y="90" width="1020" height="110" fill="#eff6ff" stroke="#cbd5e1" stroke-width="1"/>
<text x="236" y="150.0" text-anchor="end" font-size="15" font-weight="bold" fill="#334155">connector 调用</text>
<rect x="250" y="230" width="1020" height="110" fill="#f0fdf4" stroke="#cbd5e1" stroke-width="1"/>
<text x="236" y="290.0" text-anchor="end" font-size="15" font-weight="bold" fill="#334155">model forward</text>
<rect x="250" y="370" width="1020" height="110" fill="#fef2f2" stroke="#cbd5e1" stroke-width="1"/>
<text x="236" y="430.0" text-anchor="end" font-size="15" font-weight="bold" fill="#334155">后台传输</text>
<line x1="250" y1="500" x2="1270" y2="500" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="1270" y="522" text-anchor="end" font-size="13" fill="#64748b">时间 →</text>
<rect x="260" y="110" width="130" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="325.0" y="141.0" text-anchor="middle" font-size="13" fill="#0f172a">bind_connector</text>
<text x="325.0" y="157.0" text-anchor="middle" font-size="13" fill="#0f172a">_metadata</text>
<rect x="405" y="110" width="150" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="480.0" y="133.0" text-anchor="middle" font-size="13" fill="#0f172a">start_load_kv</text>
<text x="480.0" y="149.0" text-anchor="middle" font-size="13" fill="#0f172a">(异步发起,</text>
<text x="480.0" y="165.0" text-anchor="middle" font-size="13" fill="#0f172a">立即返回)</text>
<rect x="1050" y="110" width="130" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="1115.0" y="141.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">wait_for_save</text>
<text x="1115.0" y="157.0" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">(阻塞收齐)</text>
<rect x="1195" y="110" width="95" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="1242.5" y="141.0" text-anchor="middle" font-size="13" fill="#0f172a">get_finished</text>
<text x="1242.5" y="157.0" text-anchor="middle" font-size="13" fill="#0f172a">→ clear</text>
<rect x="580" y="250" width="80" height="70" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
<text x="620.0" y="289.0" text-anchor="middle" font-size="14" fill="#0f172a">层 0</text>
<rect x="674" y="250" width="80" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="714.0" y="289.0" text-anchor="middle" font-size="14" fill="#0f172a">层 1</text>
<rect x="768" y="250" width="80" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="808.0" y="289.0" text-anchor="middle" font-size="14" fill="#0f172a">层 2</text>
<rect x="862" y="250" width="80" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="902.0" y="289.0" text-anchor="middle" font-size="14" fill="#0f172a">层 3</text>
<rect x="956" y="250" width="80" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="996.0" y="289.0" text-anchor="middle" font-size="14" fill="#0f172a">层 4</text>
<rect x="856" y="250" width="170" height="64" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="941.0" y="270.0" text-anchor="middle" font-size="11" fill="#b91c1c">wait_for_layer_load</text>
<text x="941.0" y="286.0" text-anchor="middle" font-size="11" fill="#b91c1c">(阻塞到该层 KV 到位,</text>
<text x="941.0" y="302.0" text-anchor="middle" font-size="11" fill="#b91c1c">与前面层计算重叠)</text>
<line x1="856" y1="282" x2="849" y2="285" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arR)"/>
<line x1="996.0" y1="322" x2="996.0" y2="390" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar)"/>
<rect x="480" y="390" width="328.0" height="44" rx="6" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
<text x="644.0" y="417" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">后台 load KV（与计算重叠）</text>
<rect x="996.0" y="390" width="54.0" height="44" rx="6" fill="#a5f3fc" stroke="#06b6d4" stroke-width="1.5"/>
<text x="1023.0" y="417" text-anchor="middle" font-size="12" fill="#155e75">后台 save</text>
<line x1="480" y1="180" x2="484" y2="388" stroke="#475569" stroke-width="1.3" marker-end="url(#ar)"/>
<text x="250" y="540" font-size="13" fill="#334155">enter：bind → start_load_kv（发起即返回）。finally：wait_for_save → get_finished → clear。异常路径也保证收尾不漏块。</text>
<text x="250" y="562" font-size="13" fill="#334155">输出 KVConnectorOutput（finished_sending / finished_recving）随 ModelRunnerOutput 回传 scheduler，接第 29 章的提升 / 释放闭环。</text>
</svg>