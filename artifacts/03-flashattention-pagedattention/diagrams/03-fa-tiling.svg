  <text x="80" y="375.15" text-anchor="start" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="80" dy="0">Each Q tile loads ONCE from HBM, then iterates ALL KV tiles.</tspan></text>
  <text x="80" y="400.15" text-anchor="start" font-size="14" font-family="'Cascadia Code', 'Source Code Pro', 'Courier New', monospace" fill="#64748b" opacity="1"><tspan x="80" dy="0">KV tiles are re-read L/BLOCK = 3 times — cost of avoiding O(L²) HBM writes.</tspan></text>
